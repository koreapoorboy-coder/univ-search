<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>공용 탐구 설계 엔진</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>공용 탐구 설계 엔진</h1>
      <p>키워드와 학년, 계열, 희망 전공을 넣으면 AI가 탐구 설계 흐름을 만들어줍니다.</p>
    </section>

    <section class="panel form-panel">
      <div class="grid">
        <label>
          <span>키워드</span>
          <input id="keyword" type="text" placeholder="예: 이차전지" />
        </label>

        <label>
          <span>학년</span>
          <select id="grade">
            <option value="">선택</option>
            <option value="1">고1</option>
            <option value="2">고2</option>
            <option value="3">고3</option>
          </select>
        </label>

        <label>
          <span>관심 계열</span>
          <input id="track" type="text" placeholder="예: 이공계" />
        </label>

        <label>
          <span>희망 전공</span>
          <input id="major" type="text" placeholder="예: 화학공학" />
        </label>

        <label>
          <span>현재 활동 수준</span>
          <select id="activityLevel">
            <option value="미입력">선택 안 함</option>
            <option value="시작 전">시작 전</option>
            <option value="기초 탐구 경험">기초 탐구 경험</option>
            <option value="교과 연계 경험">교과 연계 경험</option>
            <option value="심화 탐구 경험">심화 탐구 경험</option>
          </select>
        </label>

        <label>
          <span>탐구 스타일</span>
          <select id="style">
            <option value="미입력">선택 안 함</option>
            <option value="조사·보고서형">조사·보고서형</option>
            <option value="실험형">실험형</option>
            <option value="데이터 분석형">데이터 분석형</option>
            <option value="토론형">토론형</option>
            <option value="제작형">제작형</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="generateBtn" type="button">탐구 설계 생성</button>
        <button id="resetBtn" type="button" class="secondary">초기화</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section id="resultPanel" class="panel result-panel hidden">
      <div class="result-header">
        <h2>생성 결과</h2>
        <span id="resultMode" class="badge"></span>
      </div>
      <div id="resultBody" class="result-body"></div>
    </section>
  </main>

  <script src="assets/keyword_engine.js"></script>
</body>
</html>
