
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RNY 탐구 보고서 프로그램</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
  <link rel="stylesheet" href="assets/topic_generator.css" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-badge">RNY 탐구보고서 프로그램 </div>
      <h1>학생용 탐구 보고서 설계 엔진</h1>
      <p>학생은 쉽게 쓰고, 운영자는 <strong>학교·수행평가별 데이터</strong>를 쌓을 수 있게 구성했습니다.</p>
    </section>

    <section class="panel form-panel">
      <div class="form-grid single-column-form">
        <label>
          <span>학교명</span>
          <input id="schoolName" type="text" placeholder="예: 알과영고" />
        </label>

        <label>
          <span>학년</span>
          <select id="grade">
            <option value="">선택</option>
            <option>고1</option>
            <option>고2</option>
            <option>고3</option>
          </select>
        </label>

        <label>
          <span>과목</span>
          <select id="subject">
            <option value="">선택</option>
            <option value="통합과학1">통합과학1</option>
            <option value="통합과학2">통합과학2</option>
            <option value="과학탐구실험1">과학탐구실험1</option>
            <option value="과학탐구실험2">과학탐구실험2</option>
            <option value="공통수학1">공통수학1</option>
            <option value="공통수학2">공통수학2</option>
            <option value="공통국어1">공통국어1</option>
            <option value="공통국어2">공통국어2</option>
            <option value="통합사회1">통합사회1</option>
            <option value="통합사회2">통합사회2</option>
            <option value="정보">정보</option>
            <option value="대수">대수</option>
            <option value="확률과 통계">확률과 통계</option>
            <option value="미적분1">미적분1</option>
            <option value="기하">기하</option>
            <option value="물리">물리(물리학Ⅰ)</option>
            <option value="화학">화학(화학Ⅰ)</option>
            <option value="생명과학">생명과학</option>
            <option value="지구과학">지구과학</option>
            <option value="역학과 에너지">역학과 에너지</option>
            <option value="전자기와 양자">전자기와 양자</option>
            <option value="물질과 에너지">물질과 에너지</option>
            <option value="세포와 물질대사">세포와 물질대사</option>
            <option value="지구시스템과학">지구시스템과학</option>
          </select>
        </label>

        <label>
          <span>활동 과제 이름</span>
          <input id="taskName" type="text" placeholder="예: 과학 탐구 보고서, 동아리 주제 발표, 자율활동 기록 정리" />
        </label>

        <label>
          <span>결과물 유형</span>
          <select id="taskType">
            <option value="">선택</option>
                        <option value="탐구보고서">탐구보고서</option>
            <option value="실험보고서">실험보고서</option>
            <option value="자료조사 보고서">자료조사 보고서</option>
            <option value="발표보고서">발표보고서</option>
          </select>
        </label>
        <select id="usagePurpose" hidden>
          <option value=""></option>
        </select>

        <label class="full">
          <span>선생님 안내문</span>
          <textarea id="taskDescription" rows="4" placeholder="예: 교과 개념과 연결한 자료조사형 보고서, 실험은 어렵고 발표 포함 / 동아리에서 실제 사례 조사 중심"></textarea>
        </label>

        <label>
          <span>학과 검색</span>
          <input id="career" type="text" placeholder="예: 컴퓨터, 반도체, 간호, 신소재, 환경" />
        </label>
        <input id="keyword" type="hidden" value="" />
      </div>

      <div class="actions">
        <button id="generateBtn" class="primary-btn">학생용 결과 생성</button>
        <button id="resetBtn" class="secondary-btn" type="button">초기화</button>
        <div id="loadingMessage" class="loading-text" style="display:none;">생성 중...</div>
      </div>
      <div id="errorMessage" class="status-message error" style="display:none;"></div>
    </section>

    <section id="resultSection" class="result-section" style="display:none;">
      <div class="student-top">
        <div class="big-card">
          <div class="mini-label">최종 추천</div>
          <h2 id="finalMode"></h2>
          <p id="finalReason"></p>
        </div>
        <div class="big-card">
          <div class="mini-label">추천 주제</div>
          <h2 id="finalTopic"></h2>
          <p id="topicSub"></p>
        </div>
      </div>

      <div class="action-card">
        <div class="mini-label">지금 바로 할 일 3단계</div>
        <div id="actionSteps" class="action-steps"></div>
      </div>

      <div class="student-grid">
        <div class="quick-card" id="outputCard"></div>
        <div class="quick-card" id="reportFrameCard"></div>
        <div class="quick-card" id="doDontCard"></div>
        <div class="quick-card" id="inputSummaryCard"></div>
      </div>

      <section class="report-panel">
        <div class="report-head">
          <div>
            <div class="mini-label">학생 제출용 초안</div>
            <h3>바로 쓸 수 있는 보고서</h3>
          </div>
          <div class="report-actions">
            <button id="copyReportBtn" class="secondary-btn" type="button">보고서 복사</button>
          </div>
        </div>
        <div id="studentReport" class="student-report"></div>
      </section>

      <details class="details-panel">
        <summary>운영/분석용 참고 보기</summary>
        <div class="details-grid">
          <div class="compact-card" id="reasonCard"></div>
          <div class="compact-card" id="stepsCard"></div>
          <div class="compact-card" id="flowCard"></div>
          <div class="compact-card" id="subjectLinksCard"></div>
          <div class="compact-card" id="warningsCard"></div>
          <div class="compact-card" id="assessmentReferenceCard"></div>
          <div class="compact-card" id="textbookSection"></div>
          <div class="compact-card" id="extensionLibrarySection"></div>
        </div>
      </details>
    </section>
  </div>

  <script src="assets/student_textbook_matcher.js"></script>
  <script src="assets/keyword_engine.js"></script>
  <script src="assets/report_navigation_helper.js"></script>
  <script src="assets/student_focus_helper.js"></script>
  <script src="assets/draft_report_helper.js"></script>
  <script src="assets/topic_generator.js"></script>
  <script src="assets/major_engine_helper.js?v=v84_direct_routing_compare_lock"></script>
  <script src="assets/textbook_concept_helper.js?v=v87_book_toggle_lock"></script>
  <script src="assets/textbook_runtime_bridge_helper.js?v=v33_20_major_search_performance_fix"></script>
  <script src="assets/js/book_recommendation_adapter.js?v=v88_axis_specific_book_groups"></script>
  <script src="assets/js/book_210_ui_bridge.js?v=v16_stable_summary_click"></script>
  <script src="assets/js/mini_payload_builder.js?v=v33_selection_hydration"></script>
  <script src="assets/js/report_6_8_flow_bridge.js?v=v33_student_choice_book_state_fix"></script>
  <script src="assets/js/mini_worker_generate_bridge_v32.js?v=v58_student_display_major_diff_precision"></script>
</body>
</html>
