
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RNY 탐구 보고서 프로그램</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
  <link rel="stylesheet" href="assets/topic_generator.css" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-badge">RNY 탐구보고서 프로그램 </div>
      <h1>학생용 탐구 보고서 설계 엔진</h1>
      <p>학생은 쉽게 쓰고, 운영자는 <strong>학교·수행평가별 데이터</strong>를 쌓을 수 있게 구성했습니다.</p>
    </section>

    <section class="panel form-panel">
      <div class="form-grid single-column-form">
        <label>
          <span>학교명</span>
          <input id="schoolName" type="text" placeholder="예: 알과영고" />
        </label>

        <label>
          <span>학년</span>
          <select id="grade">
            <option value="">선택</option>
            <option>고1</option>
            <option>고2</option>
            <option>고3</option>
          </select>
        </label>

        <label>
          <span>교과</span>
          <select id="subjectGroup">
            <option value="">교과 선택</option>
            <option value="국어">국어</option>
            <option value="영어">영어</option>
            <option value="수학">수학</option>
            <option value="사회">사회</option>
            <option value="과학">과학</option>
            <option value="정보">정보</option>
          </select>
        </label>

        <label>
          <span>세부 과목</span>
          <select id="subject">
            <option value="">교과를 먼저 선택하세요</option>
            <option value="공통국어1" data-subject-group="국어">공통국어1</option>
            <option value="공통국어2" data-subject-group="국어">공통국어2</option>
            <option value="영어" data-subject-group="영어">영어</option>
            <option value="공통수학1" data-subject-group="수학">공통수학1</option>
            <option value="공통수학2" data-subject-group="수학">공통수학2</option>
            <option value="대수" data-subject-group="수학">대수</option>
            <option value="확률과 통계" data-subject-group="수학">확률과 통계</option>
            <option value="미적분1" data-subject-group="수학">미적분1</option>
            <option value="기하" data-subject-group="수학">기하</option>
            <option value="통합사회1" data-subject-group="사회">통합사회1</option>
            <option value="통합사회2" data-subject-group="사회">통합사회2</option>
            <option value="통합과학1" data-subject-group="과학">통합과학1</option>
            <option value="통합과학2" data-subject-group="과학">통합과학2</option>
            <option value="과학탐구실험1" data-subject-group="과학">과학탐구실험1</option>
            <option value="과학탐구실험2" data-subject-group="과학">과학탐구실험2</option>
            <option value="물리" data-subject-group="과학">물리(물리학Ⅰ)</option>
            <option value="화학" data-subject-group="과학">화학(화학Ⅰ)</option>
            <option value="생명과학" data-subject-group="과학">생명과학</option>
            <option value="지구과학" data-subject-group="과학">지구과학</option>
            <option value="역학과 에너지" data-subject-group="과학">역학과 에너지</option>
            <option value="전자기와 양자" data-subject-group="과학">전자기와 양자</option>
            <option value="물질과 에너지" data-subject-group="과학">물질과 에너지</option>
            <option value="세포와 물질대사" data-subject-group="과학">세포와 물질대사</option>
            <option value="지구시스템과학" data-subject-group="과학">지구시스템과학</option>
            <option value="정보" data-subject-group="정보">정보</option>
          </select>
        </label>

        <input id="taskName" type="hidden" value="탐구보고서" />

        <label>
          <span>결과물 유형</span>
          <select id="taskType">
            <option value="탐구보고서">탐구보고서</option>
            <option value="실험보고서">실험보고서</option>
            <option value="자료조사 보고서">자료조사 보고서</option>
            <option value="발표보고서">발표보고서</option>
          </select>
        </label>
        <select id="usagePurpose" hidden>
          <option value=""></option>
        </select>

        <label class="full">
          <span>선생님 안내문</span>
          <textarea id="taskDescription" rows="4" placeholder="예: 교과 개념과 연결한 자료조사형 보고서, 실험은 어렵고 발표 포함 / 동아리에서 실제 사례 조사 중심"></textarea>
        </label>

        <label>
          <span>학과 검색</span>
          <input id="career" type="text" placeholder="예: 컴퓨터, 반도체, 간호, 신소재, 환경" />
        </label>
        <input id="keyword" type="hidden" value="" />
      </div>

      <div class="actions">
        <button id="generateBtn" class="primary-btn">학생용 결과 생성</button>
        <button id="resetBtn" class="secondary-btn" type="button">초기화</button>
        <div id="loadingMessage" class="loading-text" style="display:none;">생성 중...</div>
      </div>
      <div id="errorMessage" class="status-message error" style="display:none;"></div>
    </section>

    <section id="resultSection" class="result-section" style="display:none;">
      <div class="student-top">
        <div class="big-card">
          <div class="mini-label">최종 추천</div>
          <h2 id="finalMode"></h2>
          <p id="finalReason"></p>
        </div>
        <div class="big-card">
          <div class="mini-label">추천 주제</div>
          <h2 id="finalTopic"></h2>
          <p id="topicSub"></p>
        </div>
      </div>

      <div class="action-card">
        <div class="mini-label">지금 바로 할 일 3단계</div>
        <div id="actionSteps" class="action-steps"></div>
      </div>

      <div class="student-grid">
        <div class="quick-card" id="outputCard"></div>
        <div class="quick-card" id="reportFrameCard"></div>
        <div class="quick-card" id="doDontCard"></div>
        <div class="quick-card" id="inputSummaryCard"></div>
      </div>

      <section class="report-panel">
        <div class="report-head">
          <div>
            <div class="mini-label">학생 제출용 초안</div>
            <h3>바로 쓸 수 있는 보고서</h3>
          </div>
          <div class="report-actions">
            <button id="copyReportBtn" class="secondary-btn" type="button">보고서 복사</button>
          </div>
        </div>
        <div id="studentReport" class="student-report"></div>
      </section>

      <details class="details-panel">
        <summary>운영/분석용 참고 보기</summary>
        <div class="details-grid">
          <div class="compact-card" id="reasonCard"></div>
          <div class="compact-card" id="stepsCard"></div>
          <div class="compact-card" id="flowCard"></div>
          <div class="compact-card" id="subjectLinksCard"></div>
          <div class="compact-card" id="warningsCard"></div>
          <div class="compact-card" id="assessmentReferenceCard"></div>
          <div class="compact-card" id="textbookSection"></div>
          <div class="compact-card" id="extensionLibrarySection"></div>
        </div>
      </details>
    </section>
  </div>

  <script src="assets/student_textbook_matcher.js"></script>
  <script src="assets/keyword_engine.js?v=v220_subject_group_ui"></script>
  <script src="assets/report_navigation_helper.js"></script>
  <script src="assets/student_focus_helper.js"></script>
  <script src="assets/draft_report_helper.js"></script>
  <script src="assets/topic_generator.js"></script>
  <script src="assets/major_engine_helper.js?v=v102_major_confirmed_lock_v84_direct_routing_compare_lock"></script>
  <script src="assets/textbook_concept_helper.js?v=v223_book_on_demand_search"></script>
  <script src="assets/textbook_runtime_bridge_helper.js?v=v220_subject_group_field_watch"></script>
  <script src="assets/js/book_recommendation_adapter.js?v=v24_axis_diversity_engine"></script>
  <script src="assets/js/book_210_ui_bridge.js?v=v224_global_book_search"></script>
  <script src="assets/js/mini_payload_builder.js?v=v222_book_optional_performance"></script>
  <script src="assets/js/report_6_8_flow_bridge.js?v=v222_book_optional_method_evidence"></script>
  <script src="assets/js/mini_worker_generate_bridge_v32.js?v=v222_book_optional_network_fallback"></script>
  <script>
    /* v221 inline emergency fallback: external subject filter가 누락되어도 세부 과목을 교과별로 제한 */
    window.__SUBJECT_GROUP_INLINE_FALLBACK_VERSION__ = "v221-inline-strict-filter";
    (function(){
      const C={"국어":[["공통국어1","공통국어1"],["공통국어2","공통국어2"]],"영어":[["영어","영어"]],"수학":[["공통수학1","공통수학1"],["공통수학2","공통수학2"],["대수","대수"],["확률과 통계","확률과 통계"],["미적분1","미적분1"],["기하","기하"]],"사회":[["통합사회1","통합사회1"],["통합사회2","통합사회2"],["한국사","한국사"]],"과학":[["통합과학1","통합과학1"],["통합과학2","통합과학2"],["과학탐구실험1","과학탐구실험1"],["과학탐구실험2","과학탐구실험2"],["물리","물리(물리학Ⅰ)"],["화학","화학(화학Ⅰ)"],["생명과학","생명과학"],["지구과학","지구과학"],["역학과 에너지","역학과 에너지"],["전자기와 양자","전자기와 양자"],["물질과 에너지","물질과 에너지"],["세포와 물질대사","세포와 물질대사"],["지구시스템과학","지구시스템과학"]],"정보":[["정보","정보"]]};
      function $(id){return document.getElementById(id)}
      function sync(){
        if(window.__installSubjectGroupStrictFilterV221){ window.__installSubjectGroupStrictFilterV221(); return; }
        const g=$("subjectGroup"), s=$("subject"), t=$("taskType"), n=$("taskName"); if(!g||!s) return;
        const group=(g.value||"").trim(), keep=(s.value||"").trim(), list=C[group]||[];
        s.innerHTML=""; const ph=document.createElement("option"); ph.value=""; ph.textContent=group?group+" 세부 과목 선택":"교과를 먼저 선택하세요"; s.appendChild(ph);
        list.forEach(([v,txt])=>{const o=document.createElement("option");o.value=v;o.textContent=txt;o.dataset.subjectGroup=group;s.appendChild(o);});
        if(list.some(([v])=>v===keep)) s.value=keep; else s.value="";
        if(n){n.type="hidden"; n.value=s.value ? s.value+" "+((t&&t.value)||"탐구보고서") : ((t&&t.value)||"탐구보고서");}
      }
      function boot(){ const g=$("subjectGroup"), s=$("subject"); if(!g||!s) return; if(!g.dataset.inlineV221){g.addEventListener("change",sync);g.dataset.inlineV221="1";} ["focus","mousedown","pointerdown","click"].forEach(e=>s.addEventListener(e,sync,true)); sync(); }
      document.addEventListener("DOMContentLoaded",boot); window.addEventListener("load",boot); setTimeout(boot,150); setTimeout(boot,600);
    })();
  </script>
  <script src="assets/js/ui_subject_group_filter_v221.js?v=v221_subject_group_filter_strict"></script>
</body>
</html>
