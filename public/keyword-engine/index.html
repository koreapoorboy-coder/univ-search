<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>탐구 보고서 설계 엔진</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>탐구 보고서 설계 엔진</h1>
      <p>과목과 수행평가 맥락을 먼저 반영해, 현실적인 탐구 보고서 방향을 추천합니다.</p>
    </section>

    <section class="panel">
      <div class="form-grid">
        <label>
          <span>과목</span>
          <select id="subject">
            <option value="">선택</option>
            <option>통합과학</option>
            <option>과학탐구실험</option>
            <option>화학</option>
            <option>생명과학</option>
            <option>물리학</option>
            <option>정보</option>
            <option>통합사회</option>
            <option>공통국어</option>
            <option>공통영어</option>
            <option>수학</option>
          </select>
        </label>

        <label>
          <span>수행평가 형태</span>
          <select id="taskType">
            <option value="">선택</option>
            <option>탐구 보고서</option>
            <option>자료조사 보고서</option>
            <option>발표</option>
            <option>포스터</option>
            <option>정책 제안서</option>
            <option>실험 보고서</option>
            <option>제작·설계형</option>
          </select>
        </label>

        <label class="full">
          <span>수행평가 설명</span>
          <textarea id="taskDescription" rows="4" placeholder="예: 교과서 개념과 연결한 자료조사형 수행평가, 실험은 어려움, 발표 포함"></textarea>
        </label>

        <label>
          <span>희망 진로</span>
          <input id="career" type="text" placeholder="예: 신소재공학, 반도체공학, 간호학" />
        </label>

        <label>
          <span>키워드</span>
          <input id="keyword" type="text" placeholder="예: 이차전지, 반도체, 폐배터리" />
        </label>

        <label>
          <span>학년</span>
          <select id="grade">
            <option value="">선택</option>
            <option>고1</option>
            <option>고2</option>
            <option>고3</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="generateBtn" class="primary-btn">탐구 설계 생성</button>
        <button id="resetBtn" class="secondary-btn" type="button">초기화</button>
        <div id="loadingMessage" class="loading-text" style="display:none;">생성 중...</div>
      </div>
      <div id="errorMessage" class="status-message error" style="display:none;"></div>
    </section>

    <section id="resultSection" class="panel" style="display:none;">
      <div class="section-head">
        <h2>설계 결과 <span id="resultModeBadge" class="badge">task-first</span></h2>
        <p id="inputSummary" class="muted"></p>
      </div>

      <div class="summary-box" id="taskSummaryCard"></div>

      <div class="result-grid">
        <div class="result-card" id="reasonCard"></div>
        <div class="result-card" id="stepsCard"></div>
        <div class="result-card" id="flowCard"></div>
        <div class="result-card" id="approachCard"></div>
        <div class="result-card" id="extensionCard"></div>
        <div class="result-card" id="subjectLinksCard"></div>
        <div class="result-card" id="warningsCard"></div>
        <div class="result-card" id="assessmentReferenceCard"></div>
      </div>

      <div id="textbookSection"></div>
      <div id="extensionLibrarySection"></div>
    </section>
  </div>

  <script src="assets/student_textbook_matcher.js"></script>
  <script src="assets/keyword_engine.js"></script>
</body>
</html>
