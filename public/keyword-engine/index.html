<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>탐구 보고서 설계 엔진</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-badge">결론 먼저 보는 탐구 설계</div>
      <h1>탐구 보고서 설계 엔진</h1>
      <p>설명보다 먼저, <strong>지금 해야 할 것</strong>부터 보여줍니다.</p>
    </section>

    <section class="panel form-panel">
      <div class="form-grid">
        <label>
          <span>과목</span>
          <select id="subject">
            <option value="">선택</option>
            <option>통합과학</option>
            <option>과학탐구실험</option>
            <option>화학</option>
            <option>생명과학</option>
            <option>물리학</option>
            <option>정보</option>
            <option>통합사회</option>
            <option>공통국어</option>
            <option>공통영어</option>
            <option>수학</option>
          </select>
        </label>

        <label>
          <span>수행평가 형태</span>
          <select id="taskType">
            <option value="">선택</option>
            <option>탐구 보고서</option>
            <option>자료조사 보고서</option>
            <option>발표</option>
            <option>포스터</option>
            <option>정책 제안서</option>
            <option>실험 보고서</option>
            <option>제작·설계형</option>
          </select>
        </label>

        <label class="full">
          <span>수행평가 설명</span>
          <textarea id="taskDescription" rows="4" placeholder="예: 교과서 개념과 연결한 자료조사형 수행평가, 실험은 어려움, 발표 포함"></textarea>
        </label>

        <label>
          <span>희망 진로</span>
          <input id="career" type="text" placeholder="예: 신소재공학, 반도체공학, 간호학" />
        </label>

        <label>
          <span>키워드</span>
          <input id="keyword" type="text" placeholder="예: 이차전지, 반도체, 폐배터리" />
        </label>

        <label>
          <span>학년</span>
          <select id="grade">
            <option value="">선택</option>
            <option>고1</option>
            <option>고2</option>
            <option>고3</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="generateBtn" class="primary-btn">탐구 설계 생성</button>
        <button id="resetBtn" class="secondary-btn" type="button">초기화</button>
        <div id="loadingMessage" class="loading-text" style="display:none;">생성 중...</div>
      </div>
      <div id="errorMessage" class="status-message error" style="display:none;"></div>
    </section>

    <section id="resultSection" class="result-section" style="display:none;">
      <div class="conclusion-grid">
        <div class="big-card">
          <div class="mini-label">1. 최종 추천</div>
          <h2 id="finalMode"></h2>
          <p id="finalReason"></p>
        </div>
        <div class="big-card">
          <div class="mini-label">2. 추천 주제</div>
          <h2 id="finalTopic"></h2>
          <p id="topicSub"></p>
        </div>
      </div>

      <div class="action-card">
        <div class="mini-label">3. 지금 바로 할 일</div>
        <div id="actionSteps" class="action-steps"></div>
      </div>

      <div class="quick-grid">
        <div class="quick-card" id="outputCard"></div>
        <div class="quick-card" id="reportFrameCard"></div>
        <div class="quick-card" id="doDontCard"></div>
        <div class="quick-card" id="inputSummaryCard"></div>
      </div>

      <details class="details-panel" open>
        <summary>왜 이렇게 추천됐는지 보기</summary>
        <div class="details-grid">
          <div class="compact-card" id="reasonCard"></div>
          <div class="compact-card" id="stepsCard"></div>
          <div class="compact-card" id="flowCard"></div>
          <div class="compact-card" id="subjectLinksCard"></div>
          <div class="compact-card" id="warningsCard"></div>
          <div class="compact-card" id="assessmentReferenceCard"></div>
          <div class="compact-card" id="textbookSection"></div>
          <div class="compact-card" id="extensionLibrarySection"></div>
        </div>
      </details>
    </section>
  </div>

  <script src="assets/student_textbook_matcher.js"></script>
  <script src="assets/keyword_engine.js"></script>
</body>
</html>
