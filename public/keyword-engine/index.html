<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>학생용 탐구 보고서 설계 엔진</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-badge">데이터 축적형 학생 엔진</div>
      <h1>학생용 탐구 보고서 설계 엔진</h1>
      <p>학생은 쉽게 쓰고, 운영자는 <strong>학교·수행평가별 데이터</strong>를 쌓을 수 있게 구성했습니다.</p>
    </section>

    <section class="panel form-panel">
      <div class="form-grid">
        <label>
          <span>학교명</span>
          <input id="schoolName" type="text" placeholder="예: 한영고" />
        </label>

        <label>
          <span>학년</span>
          <select id="grade">
            <option value="">선택</option>
            <option>고1</option>
            <option>고2</option>
            <option>고3</option>
          </select>
        </label>

        <label>
          <span>과목</span>
          <select id="subject">
            <option value="">선택</option>
            <option>통합과학</option>
            <option>과학탐구실험</option>
            <option>화학</option>
            <option>생명과학</option>
            <option>물리학</option>
            <option>정보</option>
            <option>통합사회</option>
            <option>공통국어</option>
            <option>공통영어</option>
            <option>수학</option>
          </select>
        </label>

        <label>
          <span>수행평가명</span>
          <input id="taskName" type="text" placeholder="예: 과학 탐구 보고서, 정책 제안 발표" />
        </label>

        <label>
          <span>수행평가 형태</span>
          <select id="taskType">
            <option value="">선택</option>
            <option>탐구 보고서</option>
            <option>자료조사 보고서</option>
            <option>발표</option>
            <option>포스터</option>
            <option>정책 제안서</option>
            <option>실험 보고서</option>
            <option>제작·설계형</option>
          </select>
        </label>

        <label>
          <span>사용 목적</span>
          <select id="usagePurpose">
            <option value="">선택</option>
            <option>수행평가 주제 선정</option>
            <option>보고서 구조 잡기</option>
            <option>발표 주제 정리</option>
            <option>생기부 확장 아이디어</option>
            <option>탐구 방향 점검</option>
          </select>
        </label>

        <label class="full">
          <span>수행평가 설명</span>
          <textarea id="taskDescription" rows="4" placeholder="예: 교과서 개념과 연결한 자료조사형 수행평가, 실험은 어려움, 발표 포함"></textarea>
        </label>

        <label>
          <span>희망 진로</span>
          <input id="career" type="text" placeholder="예: 신소재공학, 반도체공학, 간호학" />
        </label>

        <label>
          <span>키워드</span>
          <input id="keyword" type="text" placeholder="예: 이차전지, 반도체, 폐배터리" />
        </label>
      </div>

      <div class="actions">
        <button id="generateBtn" class="primary-btn">학생용 결과 생성</button>
        <button id="resetBtn" class="secondary-btn" type="button">초기화</button>
        <div id="loadingMessage" class="loading-text" style="display:none;">생성 중...</div>
      </div>
      <div id="errorMessage" class="status-message error" style="display:none;"></div>
    </section>

    <section id="resultSection" class="result-section" style="display:none;">
      <div class="student-top">
        <div class="big-card">
          <div class="mini-label">최종 추천</div>
          <h2 id="finalMode"></h2>
          <p id="finalReason"></p>
        </div>
        <div class="big-card">
          <div class="mini-label">추천 주제</div>
          <h2 id="finalTopic"></h2>
          <p id="topicSub"></p>
        </div>
      </div>

      <div class="action-card">
        <div class="mini-label">지금 바로 할 일 3단계</div>
        <div id="actionSteps" class="action-steps"></div>
      </div>

      <div class="student-grid">
        <div class="quick-card" id="outputCard"></div>
        <div class="quick-card" id="reportFrameCard"></div>
        <div class="quick-card" id="doDontCard"></div>
        <div class="quick-card" id="inputSummaryCard"></div>
      </div>

      <section class="report-panel">
        <div class="report-head">
          <div>
            <div class="mini-label">학생 제출용 초안</div>
            <h3>바로 쓸 수 있는 보고서</h3>
          </div>
          <div class="report-actions">
            <button id="copyReportBtn" class="secondary-btn" type="button">보고서 복사</button>
          </div>
        </div>
        <div id="studentReport" class="student-report"></div>
      </section>

      <details class="details-panel">
        <summary>운영/분석용 참고 보기</summary>
        <div class="details-grid">
          <div class="compact-card" id="reasonCard"></div>
          <div class="compact-card" id="stepsCard"></div>
          <div class="compact-card" id="flowCard"></div>
          <div class="compact-card" id="subjectLinksCard"></div>
          <div class="compact-card" id="warningsCard"></div>
          <div class="compact-card" id="assessmentReferenceCard"></div>
          <div class="compact-card" id="textbookSection"></div>
          <div class="compact-card" id="extensionLibrarySection"></div>
        </div>
      </details>
    </section>
  </div>

  <script src="assets/student_textbook_matcher.js"></script>
  <script src="assets/keyword_engine.js"></script>
</body>
</html>
