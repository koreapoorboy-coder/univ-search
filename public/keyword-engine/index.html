<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>공용 탐구 설계 엔진</title>
  <link rel="stylesheet" href="./assets/keyword_engine.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>공용 탐구 설계 엔진</h1>
      <p class="hero-sub">키워드를 입력하면 탐구 주제, 활동 설계, 생활기록부형 문장을 함께 제안합니다.</p>
    </header>

    <section class="search-panel">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="예: 이차전지, 반도체, 인공지능" />
        <button id="searchBtn" type="button">검색</button>
      </div>
      <div class="quick-row">
        <button class="quick-keyword" data-keyword="이차전지">이차전지</button>
        <button class="quick-keyword" data-keyword="반도체">반도체</button>
        <button class="quick-keyword" data-keyword="인공지능">인공지능</button>
        <button class="quick-keyword" data-keyword="미세먼지">미세먼지</button>
      </div>
    </section>

    <section id="statusBox" class="status-box" hidden></section>

    <section id="resultWrap" class="result-wrap" hidden>
      <div class="summary-card">
        <div class="summary-top">
          <span class="summary-badge" id="summaryBadge">공용 추천</span>
          <span class="summary-keyword" id="summaryKeyword"></span>
        </div>
        <h2 id="summaryTitle"></h2>
        <p id="summarySentence" class="summary-sentence"></p>
      </div>

      <div class="detail-grid">
        <article class="detail-card">
          <h3>탐구 확장 방향</h3>
          <ul id="directionList" class="bullet-list"></ul>
        </article>

        <article class="detail-card">
          <h3>활동 설계 흐름</h3>
          <p id="flowText" class="flow-text"></p>
        </article>

        <article class="detail-card">
          <h3>완성 결과 예시</h3>
          <ul id="resultExampleList" class="bullet-list"></ul>
        </article>

        <article class="detail-card">
          <h3>생활기록부 문장</h3>
          <p id="recordSentence" class="record-text"></p>
          <button id="copySentenceBtn" class="copy-btn" type="button">문장 복사</button>
        </article>
      </div>

      <section class="pattern-section">
        <h3>탐구 패턴 가이드</h3>
        <div id="patternGuide" class="pattern-grid"></div>
      </section>
    </section>
  </main>

  <script src="./assets/keyword_engine.js"></script>
</body>
</html>
