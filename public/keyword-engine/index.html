<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>공용 탐구 설계 엔진</title>
  <link rel="stylesheet" href="assets/keyword_engine.css" />
  <style>
    :root{
      --bg:#f5f7fb;--card:#ffffff;--line:#dbe3f0;--text:#162132;--muted:#667085;
      --accent:#5168ff;--soft:#eef2ff;--soft2:#f7f9fc;--good:#ecfdf3;--warn:#fff7ed;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 40px}
    .hero h1{margin:0 0 8px;font-size:30px}
    .hero p{margin:0;color:var(--muted);font-size:16px;line-height:1.6}
    .panel,.section-box,.top-summary,.subject-shell,.evidence-box,.planner-box,.textbook-box,.template-box{background:var(--card);border:1px solid var(--line);border-radius:24px}
    .panel{margin-top:20px;padding:22px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 24px}
    .field label{display:block;font-weight:700;margin:0 0 10px;font-size:15px}
    .field input,.field select{width:100%;height:58px;border:1px solid #d8ddea;border-radius:18px;padding:0 18px;font-size:15px;background:#fff}
    .actions{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap}
    .btn{border:none;border-radius:16px;height:56px;padding:0 28px;font-weight:700;font-size:16px;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff}
    .btn.secondary{background:#eef1f7;color:#1f2937}
    .status{margin-top:14px}
    .loading{display:none;color:var(--accent);font-weight:700}
    .error{display:none;background:#fff2f2;border:1px solid #f3c8c8;color:#a11a1a;padding:14px 16px;border-radius:14px}
    .result-wrap{display:none;margin-top:24px}
    .result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px}
    .result-head h2{margin:0;font-size:24px}
    .badge{min-width:42px;height:42px;border-radius:999px;background:#eef2ff;color:#5b6cff;display:flex;align-items:center;justify-content:center;font-weight:700}
    .top-summary{padding:18px 20px;margin-bottom:16px}
    .summary-kicker{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px}
    .summary-title{font-size:28px;font-weight:800;line-height:1.3;margin:0 0 8px}
    .summary-desc{margin:0;color:var(--muted);line-height:1.7}
    .subject-shell{padding:20px}
    .subject-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}
    .subject-title{margin:0;font-size:28px}
    .subject-desc{margin:8px 0 0;color:#334155;line-height:1.7;font-size:17px}
    .subject-tag{padding:10px 16px;border:1px solid var(--line);background:#f8fafc;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .mini-card{border:1px solid var(--line);border-radius:18px;padding:18px;background:var(--soft2)}
    .mini-card.good{background:var(--good)}
    .mini-card.warn{background:var(--warn)}
    .mini-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
    .mini-body{font-size:17px;line-height:1.7;font-weight:700}
    .evidence-box,.planner-box,.textbook-box,.template-box{padding:18px;margin-top:14px}
    .section-title{margin:0 0 12px;font-size:19px}
    .bullet-list{margin:0;padding-left:20px;line-height:1.8}
    .bullet-list li+li{margin-top:4px}
    .planner-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .plan-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fbfcff}
    .plan-title{font-size:20px;font-weight:800;line-height:1.5;margin:0 0 10px}
    .plan-block{margin-top:10px}
    .plan-block b{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    .plan-block p{margin:0;line-height:1.75;font-size:16px}
    .textbook-list,.template-list{display:grid;gap:12px}
    .textbook-item,.template-item{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}
    .textbook-head,.template-head{display:flex;flex-wrap:wrap;gap:6px 8px;margin-bottom:10px;align-items:center}
    .pill{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#4454da;font-size:12px;font-weight:700}
    .meta-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .meta-chip{padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:#f8fafc;font-size:12px;font-weight:700;color:#475467}
    .muted{color:var(--muted)}
    @media (max-width:980px){.planner-grid{grid-template-columns:1fr}.mini-grid,.form-grid{grid-template-columns:1fr}.subject-head{flex-direction:column}.subject-tag{white-space:normal}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>공용 탐구 설계 엔진</h1>
      <p>키워드와 학년, 계열, 희망 전공을 넣으면 AI가 탐구 방향을 제안하고, 바로 적용 가능한 활동 설계·교과서 근거·추천 활동 예시까지 한 번에 보여줍니다.</p>
    </div>

    <div class="panel">
      <div class="form-grid">
        <div class="field">
          <label for="keyword">키워드</label>
          <input id="keyword" type="text" placeholder="예: 이차전지" />
        </div>

        <div class="field">
          <label for="grade">학년</label>
          <select id="grade">
            <option value="">선택</option>
            <option value="1학년">1학년</option>
            <option value="2학년">2학년</option>
            <option value="3학년">3학년</option>
          </select>
        </div>

        <div class="field">
          <label for="track">관심 계열</label>
          <input id="track" type="text" placeholder="예: 이공계, 보건·의료, 인문사회" />
        </div>

        <div class="field">
          <label for="major">희망 전공</label>
          <input id="major" type="text" placeholder="예: 화학공학, 간호학과, 컴퓨터공학과" />
        </div>

        <div class="field">
          <label for="activityLevel">현재 활동 수준</label>
          <select id="activityLevel">
            <option value="">선택 안 함</option>
            <option value="초기">초기</option>
            <option value="기초">기초</option>
            <option value="심화">심화</option>
          </select>
        </div>

        <div class="field">
          <label for="style">탐구 스타일</label>
          <select id="style">
            <option value="">선택 안 함</option>
            <option value="실험형">실험형</option>
            <option value="보고서형">보고서형</option>
            <option value="사례분석형">사례분석형</option>
            <option value="시뮬레이션형">시뮬레이션형</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="generateBtn" class="btn primary" type="button">탐구 설계 생성</button>
        <button id="resetBtn" class="btn secondary" type="button">초기화</button>
      </div>

      <div class="status">
        <div id="loadingMessage" class="loading">생성 중...</div>
        <div id="errorMessage" class="error"></div>
      </div>

      <div id="resultSection" class="result-wrap">
        <div class="result-head">
          <h2>생성 결과</h2>
          <div id="resultModeBadge" class="badge">ai</div>
        </div>

        <div id="topSummary" class="top-summary"></div>
        <div id="subjectShell" class="subject-shell"></div>
      </div>
    </div>
  </div>

  <script src="assets/student_textbook_matcher.js"></script>
  <script src="assets/keyword_engine.js"></script>
</body>
</html>
