<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Book Adapter Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; line-height: 1.5; }
    pre { background:#f6f8fa; padding:16px; border-radius:10px; white-space:pre-wrap; }
    button { padding:10px 14px; border-radius:8px; border:1px solid #ccc; cursor:pointer; }
  </style>
</head>
<body>
  <h1>210권 도서 추천 어댑터 테스트</h1>
  <p>v1.9 강제 제외 게이트 테스트입니다.</p>
  <button onclick="runTest()">테스트 실행</button>
  <pre id="out">대기 중</pre>

  <script>
    async function loadAdapterFresh() {
      delete window.BookRecommendationAdapter;
      delete window.BOOK_ADAPTER_VERSION;

      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "./book_recommendation_adapter.js?v=v1.9-hard-exclude-gate&t=" + Date.now();
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function runTest() {
      const out = document.getElementById("out");
      try {
        await loadAdapterFresh();
        const resolved = await BookRecommendationAdapter.resolveBookEngineBase();
        const master = resolved.master;

        const payload = {
          subject: "통합과학1",
          department: "반도체공학과",
          selectedConcept: "과학의 측정과 우리 사회",
          selectedRecommendedKeyword: "폭염주의보",
          followupAxis: "수리 데이터 모델링 축"
        };

        const result = BookRecommendationAdapter.recommendBooks(payload, master.books);

        const blocked = BookRecommendationAdapter.recommendBooks({
          subject: "통합과학1",
          department: "반도체공학과"
        }, master.books);

        out.textContent = JSON.stringify({
          status: "OK",
          adapterVersion: window.BOOK_ADAPTER_VERSION || BookRecommendationAdapter.version,
          detectedBase: resolved.base,
          totalBooks: master.totalBooks,
          directBooks: result.directBooks.map(b => [b.managementNo, b.title, b.matchScore, b.matchReasons]),
          expansionBooks: result.expansionBooks.map(b => [b.managementNo, b.title, b.matchScore, b.matchReasons]),
          debug: result.debug,
          majorOnlyDefense: {
            warning: blocked.warning,
            directCount: blocked.directBooks.length,
            expansionCount: blocked.expansionBooks.length
          }
        }, null, 2);
      } catch (e) {
        out.textContent = JSON.stringify({ status: "ERROR", message: e.message, tried: e.tried || null }, null, 2);
      }
    }
  </script>
</body>
</html>
