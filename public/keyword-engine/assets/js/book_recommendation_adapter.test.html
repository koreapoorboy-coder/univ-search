<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Book Report Role Engine Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; line-height: 1.5; }
    pre { background:#f6f8fa; padding:16px; border-radius:10px; white-space:pre-wrap; }
    button { padding:10px 14px; border-radius:8px; border:1px solid #ccc; cursor:pointer; }
  </style>
</head>
<body>
  <h1>210권 도서 축별 차등 추천 엔진 테스트</h1>
  <button onclick="runTest()">테스트 실행</button>
  <pre id="out">대기 중</pre>

  <script>
    async function loadAdapterFresh() {
      delete window.BookRecommendationAdapter;
      delete window.BOOK_ADAPTER_VERSION;
      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "./book_recommendation_adapter.js?v=v24_axis_diversity_engine&t=" + Date.now();
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function runTest() {
      const out = document.getElementById("out");
      try {
        await loadAdapterFresh();
        const resolved = await BookRecommendationAdapter.resolveBookEngineBase();
        await BookRecommendationAdapter.loadRules();
        const master = resolved.master;

        const payload = {
          subject: "통합과학1",
          department: "컴퓨터공학과",
          selectedConcept: "과학의 측정과 우리 사회",
          selectedRecommendedKeyword: "폭염주의보",
          followupAxis: "수리 데이터 모델링 축"
        };

        const result = BookRecommendationAdapter.recommendBooks(payload, master.books);

        out.textContent = JSON.stringify({
          status: "OK",
          adapterVersion: window.BOOK_ADAPTER_VERSION,
          totalBooks: master.totalBooks,
          majorGroup: result.majorGroup,
          axisProfile: result.debug && result.debug.axisProfile,
          directBooks: result.directBooks.map(b => ({
            no: b.managementNo,
            title: b.title,
            score: b.matchScore,
            domains: b.bookDomains,
            reasons: b.matchReasons,
            context: b.selectedBookContext
          })),
          expansionBooks: result.expansionBooks.map(b => ({
            no: b.managementNo,
            title: b.title,
            score: b.matchScore,
            domains: b.bookDomains,
            reasons: b.matchReasons,
            context: b.selectedBookContext
          })),
          debug: result.debug
        }, null, 2);
      } catch (e) {
        out.textContent = JSON.stringify({ status: "ERROR", message: e.message, tried: e.tried || null }, null, 2);
      }
    }
  </script>
</body>
</html>
