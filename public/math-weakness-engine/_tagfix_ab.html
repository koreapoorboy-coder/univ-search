<!doctype html>
<meta charset="utf-8">
<title>observed_errors A/B</title>
<body>
<pre id="log">running...</pre>
<script src="assets/algebra_master_matcher.js"></script>
<script src="assets/math_weakness_engine.js"></script>
<script src="assets/math_weakness_evidence_review.js"></script>
<script src="assets/math_ai_bridge_client.js"></script>
<script src="assets/math_verification_flow.js"></script>
<script src="assets/math_hybrid_report_renderer.js"></script>
<script>
const SAMPLES = ['global_runtime','h1_common_math1_counting','h1_common_math1_equation_inequality',
 'h1_common_math1_matrix','h1_common_math1_polynomial','h1_common_math2_function_graph',
 'h1_common_math2_geometry_equation','h1_common_math2_set_proposition','h2_algebra_exp_log_function',
 'h2_algebra_sequence','h2_algebra_trigonometric_function','h2_calculus1_differentiation',
 'h2_calculus1_integration','h2_calculus1_limit_continuity','h2_calculus2_differentiation',
 'h2_calculus2_integration','h2_calculus2_sequence_limit','h2_exp_log','m1_all_units',
 'm1_basic_geometry','m1_combined_int_rational_expression','m1_coordinate_graph','m1_data_analysis',
 'm1_expression','m1_int_rational','m1_plane_geometry','m1_prime_factorization','m1_solid_geometry',
 'm2_geometry_properties','m2_linear_equation','m2_linear_function','m2_linear_inequality',
 'm2_number_expression','m2_probability','m3_polynomial_multiplication_factorization',
 'm3_quadratic_equation','m3_quadratic_function','m3_real_numbers_and_operations'];
const lines=[]; const L=s=>{lines.push(s);document.getElementById('log').textContent=lines.join('\n');};

(async () => {
  const engine = new MathWeaknessEngine('.');
  const flow = new MathVerificationFlow({ engine, bridge: null });
  await engine.load({ unitIds: [] });
  if (engine.loadEvidenceLogic) await engine.loadEvidenceLogic();

  const newTagsFor = engine._tagsFor.bind(engine);
  // 수정 전 동작을 그대로 재현한 함수. observed_errors를 읽지 않는다.
  const oldTagsFor = (attempt, pt, instruction) => Array.from(new Set([
    ...(pt.error_tags||[]), ...(attempt.observed_error_tags||[]),
    ...(attempt.error_tags||[]), ...(instruction&&instruction.error_tags||[])
  ].filter(Boolean)));

  const rows = [];
  for (const name of SAMPLES) {
    const raw = await (await fetch(`samples/${name}.student_attempt.sample.json`)).json();
    const list = engine.collectAttemptList(raw);
    const usesObservedErrors = list.filter(a => Array.isArray(a.observed_errors) && a.observed_errors.length).length;

    engine._tagsFor = oldTagsFor;
    const before = await flow.runLocalEngineDiagnosis({ engine_adapter: { student_attempt: raw } });
    engine._tagsFor = newTagsFor;
    const after = await flow.runLocalEngineDiagnosis({ engine_adapter: { student_attempt: raw } });

    const pack = d => ({
      tags: (d.tag_stats||[]).length,
      rules: (d.triggered_rules||[]).length,
      concepts: (d.top_concepts||[]).length,
      profiles: ((d.student_behavior_analysis||{}).profiles||[]).length,
      sev: (d.wrong_answer_diagnoses||[]).map(w=>w.severity&&w.severity.score).filter(x=>x!=null)
    });
    const b = pack(before), a = pack(after);
    const changed = b.tags!==a.tags || b.rules!==a.rules || b.concepts!==a.concepts
      || b.profiles!==a.profiles || JSON.stringify(b.sev)!==JSON.stringify(a.sev);
    rows.push({ sample:name, attempts_with_observed_errors:usesObservedErrors,
      tags:[b.tags,a.tags], rules:[b.rules,a.rules], profiles:[b.profiles,a.profiles],
      sev_changed: JSON.stringify(b.sev)!==JSON.stringify(a.sev), changed });
    L(name + (changed ? '  ← 변화' : ''));
  }
  const moved = rows.filter(r=>r.changed);
  L('\n=== 변화 있는 샘플 ' + moved.length + '개 ===');
  L(JSON.stringify(moved, null, 1));
  window.__RESULT__ = rows;
})().catch(e => L('ERROR: ' + (e && e.stack || e)));
</script>
</body>
