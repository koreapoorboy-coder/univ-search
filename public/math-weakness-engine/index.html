<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>수학 취약유형 진단 엔진</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:24px;line-height:1.5;color:#111827;background:#f8fafc}h1{font-size:24px}textarea{width:100%;min-height:240px;font-family:ui-monospace,Menlo,Consolas,monospace}button{padding:10px 14px;border:0;border-radius:8px;background:#111827;color:white;cursor:pointer;margin:2px}table{border-collapse:collapse;width:100%;background:white;margin:16px 0}th,td{border:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top}th{background:#f1f5f9}.card{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin:14px 0}.muted{color:#64748b}.tag{display:inline-block;padding:2px 8px;border-radius:999px;background:#e2e8f0;margin:2px;font-size:12px}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;padding:12px;border-radius:8px;overflow:auto}</style>
</head>
<body>
<h1>수학 취약유형 진단 엔진 v0.6</h1>
<p class="muted">현재 데이터 범위: 중1 정수와 유리수 + 문자와 식 + 좌표평면과 그래프 + 기본 도형과 작도 + 평면도형의 성질 + 입체도형의 성질. 학생 오답 데이터를 넣으면 직접 취약 개념, 선행 취약 의심, 중2 이후 위험 연결을 출력합니다.</p>
<div class="card"><h2>입력 JSON</h2><p>형식: <code>{"attempts":[{"question_no":1,"problem_type_id":"M1_EX_PT021","correct":false,"difficulty":"basic"}]}</code></p><textarea id="input"></textarea><br/><button id="run">진단 실행</button> <button id="sample_ir">정수와 유리수 샘플</button> <button id="sample_ex">문자와 식 샘플</button> <button id="sample_mix">정수+문자 복합 샘플</button> <button id="sample_coord">좌표평면과 그래프 샘플</button> <button id="sample_basic_geo">기본 도형과 작도 샘플</button> <button id="sample_plane">평면도형의 성질 샘플</button> <button id="sample_solid">입체도형의 성질 샘플</button> <button id="sample_all">중1 누적 샘플</button></div>
<div id="out"></div>
<script src="assets/math_weakness_engine.js"></script>
<script>
const $=s=>document.querySelector(s);
const engine=new MathWeaknessEngine('.');
async function loadSample(path){ const sample=await fetch(path).then(r=>r.json()); $('#input').value=JSON.stringify(sample,null,2); }
async function init(){ await engine.load(); await loadSample('samples/m1_expression.student_attempt.sample.json'); }
function render(res){
  const rows=res.top_concepts.map(c=>`<tr><td>${c.concept_id}</td><td><b>${c.concept_name||''}</b><br><span class="muted">${c.grade||''} ${c.unit_name||''} / ${c.strand||''}</span></td><td>${(c.score||0).toFixed(1)}</td><td>${(c.direct||0).toFixed(1)}</td><td>${(c.prerequisite||0).toFixed(1)}</td><td>${c.remediation?c.remediation.title:''}</td></tr>`).join('');
  const rules=res.triggered_rules.map(r=>`<div class="card"><b>${r.name}</b><p>${r.diagnosis}</p><p class="muted">${r.parent_message}</p></div>`).join('') || '<p>발동된 규칙 없음</p>';
  const risks=res.cross_grade_risks.map(r=>`<tr><td>${r.from_name||r.from}</td><td>${r.to_name||r.to}</td><td>${r.scope||''}</td><td>${r.reason}</td></tr>`).join('');
  $('#out').innerHTML=`<div class="card"><h2>요약</h2><p>로드 단원 ${res.summary.loaded_unit_count}개 / 문항 ${res.summary.attempt_count}개 / 오답 ${res.summary.wrong_count}개 / 매칭 실패 ${res.summary.missing_type_count}개</p></div><h2>취약 개념 점수</h2><table><tr><th>ID</th><th>개념</th><th>총점</th><th>직접</th><th>선행 의심</th><th>보강</th></tr>${rows}</table><h2>진단 규칙</h2>${rules}<h2>후행 연결 위험</h2><table><tr><th>현재/선행 원인</th><th>후행 개념</th><th>범위</th><th>연결 이유</th></tr>${risks}</table><h2>Raw result</h2><pre>${JSON.stringify(res,null,2)}</pre>`;
}
$('#run').onclick=()=>{ const data=JSON.parse($('#input').value); render(engine.diagnose(data.attempts||data)); };
$('#sample_ir').onclick=()=>loadSample('samples/m1_int_rational.student_attempt.sample.json');
$('#sample_ex').onclick=()=>loadSample('samples/m1_expression.student_attempt.sample.json');
$('#sample_mix').onclick=()=>loadSample('samples/m1_combined_int_rational_expression.student_attempt.sample.json');
$('#sample_coord').onclick=()=>loadSample('samples/m1_coordinate_graph.student_attempt.sample.json');
$('#sample_basic_geo').onclick=()=>loadSample('samples/m1_basic_geometry.student_attempt.sample.json');
$('#sample_plane').onclick=()=>loadSample('samples/m1_plane_geometry.student_attempt.sample.json');
$('#sample_solid').onclick=()=>loadSample('samples/m1_solid_geometry.student_attempt.sample.json');
$('#sample_all').onclick=()=>loadSample('samples/m1_all_units.student_attempt.sample.json');
init();
</script>
</body></html>
