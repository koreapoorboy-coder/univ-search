<!doctype html>
<meta charset="utf-8">
<title>sample shape audit</title>
<body>
<pre id="log">running...</pre>
<script src="assets/algebra_master_matcher.js"></script>
<script src="assets/math_weakness_engine.js"></script>
<script src="assets/math_weakness_evidence_review.js"></script>
<script src="assets/math_ai_bridge_client.js"></script>
<script src="assets/math_verification_flow.js"></script>
<script src="assets/math_hybrid_report_renderer.js"></script>
<script>
const ODD = [
  ['m2_linear_function', 'student_attempts'],
  ['m2_linear_equation', 'sample_student_attempts'],
  ['m2_geometry_properties', 'samples'],
  ['m2_probability', 'samples'],
  ['m3_quadratic_function', 'samples'],
  ['h1_common_math1_counting', 'wrong_problem_type_ids'],
  ['h1_common_math1_matrix', 'wrong_problem_type_ids'],
  ['h1_common_math2_function_graph', 'wrong_problem_type_ids'],
  ['h1_common_math2_geometry_equation', 'wrong_problem_type_ids'],
  ['h1_common_math2_set_proposition', 'wrong_problem_type_ids'],
  ['h2_algebra_exp_log_function', 'wrong_problem_type_ids'],
  ['h2_algebra_sequence', 'wrong_problem_type_ids'],
  ['h2_algebra_trigonometric_function', 'wrong_problem_type_ids']
];
const lines = [];
function L(s){ lines.push(s); document.getElementById('log').textContent = lines.join('\n'); }

(async () => {
  const engine = new MathWeaknessEngine('.');
  const flow = new MathVerificationFlow({ engine, bridge: null });
  await engine.load({ unitIds: [] });
  if (engine.loadEvidenceLogic) await engine.loadEvidenceLogic();
  await engine.ensureUnits((engine.indexedUnits || []).map(u => u.unit_id));
  L('loaded units = ' + engine.units.length + ' / declared ' + (engine.indexedUnits||[]).length);
  L('problem types in engine = ' + Object.keys(engine.problemTypeById || {}).length);

  const out = [];
  for (const [name, key] of ODD) {
    const raw = await (await fetch(`samples/${name}.student_attempt.sample.json`)).json();
    const list = raw[key] || [];
    // 컨테이너 키만 attempts로 바꿔 정규화 — 안의 필드는 손대지 않는다.
    const attempts = key === 'wrong_problem_type_ids'
      ? list.map(id => ({ problem_type_id: id, is_correct: false }))
      : list.map(x => ({ ...x, is_correct: x.is_correct !== undefined ? x.is_correct : false }));

    // 파일을 손대지 않고 그대로 넣는다. 엔진이 컨테이너 키를 알아서 찾아야 한다.
    const asIs = await flow.runLocalEngineDiagnosis({ engine_adapter: { student_attempt: raw } });
    const ids = attempts.map(a => a.problem_type_id);
    const bad = ids.filter(id => !engine.problemTypeById[id]);
    out.push({
      sample: name, container_key: key,
      items_in_file: list.length,
      asis_attempt_count: asIs ? asIs.summary.attempt_count : null,
      asis_missing_type_count: asIs ? asIs.summary.missing_type_count : null,
      invalid_problem_type_ids: bad.length,
      asis_wrong_diags: asIs ? (asIs.wrong_answer_diagnoses || []).length : 0,
      asis_chain_rendered: asIs ? !!MathHybridReportRenderer.renderBacktrackChains(asIs) : false,
      asis_connection_rows: asIs ? MathHybridReportRenderer.engineConnections(asIs).length : 0
    });
    L(name + ' → done');
  }
  L('\n' + JSON.stringify(out, null, 2));
  window.__RESULT__ = out;
})().catch(e => { L('ERROR: ' + (e && e.stack || e)); });
</script>
</body>
