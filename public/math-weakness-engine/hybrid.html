<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>수학 하이브리드 AI 진단 · Math Weakness Engine</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:24px;line-height:1.55;color:#111827;background:#f8fafc}h1{font-size:24px}h2{font-size:19px;margin-top:0}h3{font-size:16px;margin-bottom:6px}label{display:block;font-weight:700;margin-top:10px}input,select,textarea{width:100%;box-sizing:border-box;padding:9px;border:1px solid #cbd5e1;border-radius:8px;background:white}textarea{min-height:100px;font-family:ui-monospace,Menlo,Consolas,monospace}button{padding:10px 14px;border:0;border-radius:8px;background:#111827;color:white;cursor:pointer;margin:4px 4px 4px 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card,.subcard{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin:14px 0}.subcard{background:#f8fafc}.muted{color:#64748b}.tag{display:inline-block;padding:2px 8px;border-radius:999px;background:#e2e8f0;margin:2px;font-size:12px}.warn{background:#fff7ed;border-color:#fed7aa}.ok{background:#ecfdf5;border-color:#a7f3d0}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;padding:12px;border-radius:8px;overflow:auto}.tabs button{background:#475569}.small{font-size:12px}@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>수학 하이브리드 AI 진단</h1>
<p class="muted">학생 PDF/풀이/필기 → AI 구조화 → 수학 취약유형 엔진 → 검수 문항 → 학생 답안 재검수 흐름을 테스트하는 페이지입니다.</p>

<div class="card warn"><h2>Worker 연결</h2><p class="muted">OpenAI API Key는 브라우저에 넣지 않습니다. Cloudflare Worker URL만 입력합니다.</p><label>Cloudflare Worker URL</label><input id="worker_url" placeholder="https://math-diagnosis-worker.your-name.workers.dev" /><button id="health_btn">Worker 확인</button><span id="health_out" class="small muted"></span></div>

<div class="card"><h2>1. 학생 자료 입력</h2><div class="grid"><div><label>학생 이름</label><input id="student_name" placeholder="예: 김OO" /></div><div><label>학년</label><input id="grade_label" placeholder="예: 중1" /></div><div><label>과목/과정</label><input id="course" placeholder="예: 중학수학 1-1" /></div><div><label>단원명</label><input id="unit_name" placeholder="예: 유리수와 순환소수" /></div><div><label>수업/인강 제목</label><input id="lesson_title" placeholder="예: 유리수와 무리수 개념 정리" /></div><div><label>오답 번호</label><input id="wrong_numbers" placeholder="예: 3, 7, 12" /></div></div><label>알고 있는 problem_type_id</label><input id="problem_type_ids" placeholder="선택: M1_INT_RATIONAL_PT001, ..." /><label>학생 풀이 텍스트</label><textarea id="solution_text" placeholder="풀이 사진을 텍스트로 옮긴 내용 또는 학생이 직접 입력한 풀이"></textarea><label>인강 필기/개념 정리 텍스트</label><textarea id="note_text" placeholder="필기 사진을 텍스트로 옮긴 내용"></textarea><label>학생 파일 업로드</label><input id="files" type="file" multiple accept="application/pdf,image/*" /><label>분석 모드</label><select id="mode"><option value="low_cost">low_cost · 비용 절감</option><option value="balanced" selected>balanced · 기본</option><option value="high_precision">high_precision · 정밀 검수</option></select><button id="analyze_btn">1차 AI 분석 실행</button><button id="local_vq_btn">로컬 검수 문항 생성</button></div>

<div class="card"><h2>2. 학생 검수 답안 입력</h2><p class="muted">1차 분석 후 나온 검수 문항을 학생에게 풀리고, 답안을 여기에 붙여넣습니다.</p><textarea id="verification_answer" placeholder="학생이 검수 문항을 푼 답안"></textarea><input id="verification_files" type="file" multiple accept="image/*,application/pdf" /><button id="review_btn">검수 답안 재검수</button><button id="final_btn">최종 리포트 생성</button></div>

<div id="result"></div>

<script src="assets/math_weakness_engine.js"></script>
<script src="assets/math_weakness_evidence_review.js"></script>
<script src="assets/math_ai_bridge_client.js"></script>
<script src="assets/math_verification_flow.js"></script>
<script src="assets/math_hybrid_report_renderer.js"></script>
<script>
const $=s=>document.querySelector(s);
let state={payload:null,extraction:null,engineDiagnosis:null,noteReview:null,verificationSet:null,answerReview:null,finalReport:null};
const engine=new MathWeaknessEngine('.');
const bridge=new MathAIBridgeClient();
const flow=new MathVerificationFlow({engine,bridge});
function esc(v){return MathHybridReportRenderer.esc(v)}
function collectForm(){
  return flow.buildStudentUploadFromForm({
    studentName:$('#student_name').value, gradeLabel:$('#grade_label').value, course:$('#course').value,
    unitName:$('#unit_name').value, lessonTitle:$('#lesson_title').value, wrongQuestionNumbers:$('#wrong_numbers').value,
    knownProblemTypeIds:$('#problem_type_ids').value, studentSolutionText:$('#solution_text').value,
    lectureNoteText:$('#note_text').value, verificationAnswerText:$('#verification_answer').value,
    mode:$('#mode').value, files:$('#files').files
  });
}
function render(){
  $('#result').innerHTML = [
    MathHybridReportRenderer.renderExtraction(state.extraction),
    state.engineDiagnosis ? MathHybridReportRenderer.card('수학 엔진 진단 결과', `<p>오답 ${esc(state.engineDiagnosis.summary?.wrong_count)}개 / 매칭 실패 ${esc(state.engineDiagnosis.summary?.missing_type_count)}개</p>${MathHybridReportRenderer.pre(state.engineDiagnosis)}`,'ok') : '',
    state.noteReview ? MathHybridReportRenderer.card('필기 검수 결과', `<p>시청 흔적 ${esc(state.noteReview.summary?.watch_confidence_score)}점 / 이해 ${esc(state.noteReview.summary?.understanding_score)}점</p>${MathHybridReportRenderer.pre(state.noteReview)}`, state.noteReview.summary?.understanding_score>=70?'ok':'warn') : '',
    MathHybridReportRenderer.renderVerificationQuestions(state.verificationSet),
    MathHybridReportRenderer.renderAnswerReview(state.answerReview),
    MathHybridReportRenderer.renderFinalReport(state.finalReport)
  ].join('');
}
$('#health_btn').onclick=async()=>{try{bridge.setWorkerBaseUrl($('#worker_url').value);const h=await bridge.health();$('#health_out').textContent=JSON.stringify(h);}catch(e){$('#health_out').textContent=e.message;}};
$('#analyze_btn').onclick=async()=>{try{bridge.setWorkerBaseUrl($('#worker_url').value);state.payload=collectForm();state.extraction=await bridge.analyze(state.payload, $('#files').files);state.engineDiagnosis=await flow.runLocalEngineDiagnosis(state.extraction);state.noteReview=await flow.runLocalNoteReview(state.extraction);if(state.extraction?.verification_need?.needed){try{state.verificationSet=await bridge.generateVerification({ai_extraction:state.extraction,engine_diagnosis:state.engineDiagnosis,note_review:state.noteReview});}catch(e){state.verificationSet=flow.buildFallbackVerificationQuestions(state.extraction,state.engineDiagnosis,state.noteReview);}}render();}catch(e){$('#result').innerHTML=`<div class="card warn"><h2>오류</h2><pre>${esc(e.stack||e.message)}</pre></div>`;}};
$('#local_vq_btn').onclick=()=>{state.payload=collectForm();state.extraction=state.extraction||{verification_need:{needed:true,reason:'로컬 생성',focus_concepts:[state.payload.learning_context.unit_name],must_check_actions:[]},student_material_review:{lecture_note_review:{missing_evidence:['과정/이유 설명 확인 필요']}}};state.verificationSet=flow.buildFallbackVerificationQuestions(state.extraction,state.engineDiagnosis,state.noteReview);render();};
$('#review_btn').onclick=async()=>{try{bridge.setWorkerBaseUrl($('#worker_url').value);const payload={student_upload:collectForm(),verification_set:state.verificationSet,student_answer_text:$('#verification_answer').value,ai_extraction:state.extraction,engine_diagnosis:state.engineDiagnosis};if(bridge.hasWorker()) state.answerReview=await bridge.reviewVerification(payload,$('#verification_files').files); else state.answerReview=flow.buildFallbackAnswerReview(state.verificationSet,$('#verification_answer').value);render();}catch(e){state.answerReview=flow.buildFallbackAnswerReview(state.verificationSet,$('#verification_answer').value);render();}};
$('#final_btn').onclick=async()=>{try{bridge.setWorkerBaseUrl($('#worker_url').value);const payload={student_upload:collectForm(),ai_extraction:state.extraction,engine_diagnosis:state.engineDiagnosis,note_review:state.noteReview,verification_set:state.verificationSet,answer_review:state.answerReview};state.finalReport=bridge.hasWorker()?await bridge.finalReport(payload):{report_id:`local_report_${Date.now()}`,report_type:'full_cycle',student_summary:{status:'로컬 임시 리포트입니다.',what_is_understood:[],what_is_missing:['Worker 연결 후 정밀 리포트 필요'],next_action:['검수 문항 답안을 교사가 확인']},teacher_summary:{diagnosis:'AI Worker 미연결 상태입니다.',evidence:[],instruction_plan:['Cloudflare Worker 연결 후 재분석'],watch_points:[]},parent_summary:{plain_message:'현재는 임시 결과이며 정밀 분석 전입니다.',home_support:['학생이 풀이 과정과 이유를 다시 쓰도록 확인']},next_plan:{redo_tasks:['검수 문항 답안 재작성'],verification_required_again:true,recommended_due_date_hint:'다음 수업 전'}};render();}catch(e){$('#result').innerHTML+=`<div class="card warn"><pre>${esc(e.stack||e.message)}</pre></div>`;}};
(async()=>{try{await engine.load(); if(engine.loadEvidenceLogic) await engine.loadEvidenceLogic();}catch(e){console.warn(e)}})();
</script>
</body>
</html>
