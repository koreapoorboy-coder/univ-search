<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>대학 정시 검색기</title>
  <style>
    html,body{margin:0;padding:0;background:#f7f7f8;color:#111;font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    *{box-sizing:border-box}
    .wrap{max-width:1280px;margin:0 auto;padding:20px}
    .hero{background:#fff;border:1px solid #e6e6e8;border-radius:22px;padding:20px 20px 16px}
    .title{font-size:28px;font-weight:900;margin:0 0 8px}
    .sub{opacity:.72;line-height:1.6}

    .grid{display:grid;grid-template-columns:1.4fr repeat(4,minmax(0,1fr));gap:10px;margin-top:16px}
    .score-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-top:14px}
    .control{width:100%;padding:12px 14px;border:1px solid #d9d9de;border-radius:14px;background:#fff;font-size:14px}
    .bar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:14px}
    .badge{display:inline-flex;align-items:center;border:1px solid #d9d9de;border-radius:999px;padding:7px 12px;background:#fff;font-weight:800}
    .btn{border:1px solid #111;border-radius:12px;padding:10px 14px;background:#fff;font-weight:900;cursor:pointer}
    .btn:hover{background:#fafafa}

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .tab{border:1px solid #111;border-radius:999px;padding:8px 12px;background:#fff;cursor:pointer;font-weight:900}
    .tab.active{background:#111;color:#fff}

    .panel{background:#fff;border:1px solid #e6e6e8;border-radius:22px;padding:16px;margin-top:14px}
    .section-title{font-size:16px;font-weight:900;margin:0 0 6px}
    .section-sub{font-size:13px;opacity:.68}

    .tablebox{overflow:auto}
    table{width:100%;min-width:1280px;border-collapse:collapse}
    th,td{padding:12px 10px;border-bottom:1px solid #efeff2;text-align:left;font-size:14px;vertical-align:top;white-space:nowrap}
    th{position:sticky;top:0;background:#fafafb;font-weight:900}
    .num{text-align:right}
    .muted{opacity:.62}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;border:1px solid #d9d9de;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;background:#fff}
    .chip.ok{border-color:#0b57d0}
    .chip.ng{border-color:#b26a00}
    .chip.na{opacity:.6}

    .status{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;border:1px solid #ddd;background:#fff}
    .status.fit{border-color:#0b57d0;color:#0b57d0}
    .status.up{border-color:#b26a00;color:#b26a00}
    .status.na{border-color:#bbb;color:#666}

    .mobile-list{display:none}
    .mcard{border:1px solid #ececf0;border-radius:18px;padding:14px;margin-top:12px}
    .mtitle{font-size:16px;font-weight:900;line-height:1.35}
    .msub{margin-top:4px;font-size:13px;opacity:.7;line-height:1.5}
    .cutgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .cutitem{border:1px solid #ececf0;border-radius:12px;padding:8px 10px;display:flex;justify-content:space-between;gap:10px}
    .empty{padding:22px;border:1px dashed #d9d9de;border-radius:18px;color:#555;background:#fff}

    @media(max-width:980px){
      .grid{grid-template-columns:1fr 1fr}
      .score-grid{grid-template-columns:1fr 1fr 1fr}
    }
    @media(max-width:760px){
      .grid{grid-template-columns:1fr}
      .score-grid{grid-template-columns:1fr 1fr}
      .tablebox{display:none}
      .mobile-list{display:block}
      .title{font-size:24px}
    }
    @media(max-width:520px){
      .score-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1 class="title">대학 정시 검색기</h1>
    <div class="sub">배부용 조회 전용 화면입니다. 대학명·학과명 검색과 학생 백분위 비교를 함께 사용할 수 있습니다.</div>

    <div class="grid">
      <input id="q" class="control" placeholder="대학명 / 학과명 / 메모 검색" />
      <select id="year" class="control"><option value="">전체 연도</option></select>
      <select id="group" class="control"><option value="">전체 계열</option></select>
      <select id="univ" class="control"><option value="">전체 대학</option></select>
      <select id="rule" class="control"><option value="">전체 방식</option></select>
    </div>

    <div class="panel" style="margin-top:16px;padding:14px">
      <div class="section-title">학생 백분위 입력</div>
      <div class="section-sub">현재 컷 데이터가 백분위 기준이라서, 여기에는 학생의 과목별 백분위를 넣으면 됩니다.</div>

      <div class="score-grid">
        <input id="s_kor" class="control" type="number" step="0.1" placeholder="국어 백분위" />
        <input id="s_math" class="control" type="number" step="0.1" placeholder="수학 백분위" />
        <input id="s_inq1" class="control" type="number" step="0.1" placeholder="탐1 백분위" />
        <input id="s_inq2" class="control" type="number" step="0.1" placeholder="탐2 백분위" />
        <input id="s_eng" class="control" type="number" step="0.1" placeholder="영어 백분위" />
      </div>

      <div class="bar">
        <div class="chips">
          <span class="badge" id="studentInputBadge">학생 점수 미입력</span>
        </div>
        <button id="resetScoreBtn" class="btn" type="button">학생 점수 초기화</button>
      </div>

      <div class="tabs" id="compareTabs">
        <button class="tab active" data-tab="all" type="button">전체</button>
        <button class="tab" data-tab="fit" type="button">적정</button>
        <button class="tab" data-tab="up" type="button">상향</button>
      </div>
    </div>

    <div class="bar">
      <div class="chips">
        <span class="badge" id="countBadge">0건</span>
      </div>
      <button id="resetBtn" class="btn" type="button">필터 초기화</button>
    </div>
  </div>

  <div class="panel" id="resultPanel">
    <div class="tablebox">
      <table>
        <thead>
          <tr>
            <th>판정</th>
            <th>연도</th>
            <th>계열</th>
            <th>대학</th>
            <th>학과</th>
            <th>방식</th>
            <th>과목별 비교</th>
            <th class="num">비교</th>
            <th class="num">평균차이</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="mobile-list" id="mobileList"></div>
  </div>
</div>

<script>
/* 기존 DATA 붙여넣기 시작 */
const DATA = [
  /* 여기에 지금 코치님 index.html 안에 있는 기존 const DATA = [ ... ] 전체를 그대로 붙여넣기 */
];
/* 기존 DATA 붙여넣기 끝 */

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const numText = (v) => (v === null || v === undefined || v === "") ? "-" : String(v);

const state = {
  q: "",
  year: "",
  group: "",
  univ: "",
  rule: "",
  compareTab: "all"
};

function parseNum(v){
  if(v === null || v === undefined || v === "") return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function getStudentScores(){
  return {
    kor: parseNum($("#s_kor").value),
    math: parseNum($("#s_math").value),
    inq1: parseNum($("#s_inq1").value),
    inq2: parseNum($("#s_inq2").value),
    eng: parseNum($("#s_eng").value)
  };
}

function hasStudentScores(scores){
  return Object.values(scores).some(v => v !== null);
}

function uniqueSorted(key) {
  return [...new Set(DATA.map(x => x[key]).filter(Boolean))].sort((a,b) => String(a).localeCompare(String(b), "ko"));
}

function fillSelect(id, items, placeholder) {
  const el = $(id);
  el.innerHTML = `<option value="">${placeholder}</option>` + items.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
}

function compareRow(row, scores){
  const subjectDefs = [
    { label:"국어", student:scores.kor, cut:parseNum(row.cut_kor) },
    { label:"수학", student:scores.math, cut:parseNum(row.cut_math) },
    { label:"탐1", student:scores.inq1, cut:parseNum(row.cut_inq1) },
    { label:"탐2", student:scores.inq2, cut:parseNum(row.cut_inq2) },
    { label:"영어", student:scores.eng, cut:parseNum(row.cut_eng) }
  ];

  let compared = 0;
  let okCount = 0;
  let diffSum = 0;

  const details = subjectDefs.map(x => {
    if(x.student === null || x.cut === null){
      return { ...x, diff:null, state:"na" };
    }
    const diff = x.student - x.cut;
    compared += 1;
    diffSum += diff;
    if(diff >= 0) okCount += 1;
    return { ...x, diff, state: diff >= 0 ? "ok" : "ng" };
  });

  let code = "na";
  if(compared > 0){
    code = (okCount === compared) ? "fit" : "up";
  }

  return {
    code,
    details,
    compared,
    okCount,
    avgDiff: compared ? (diffSum / compared) : null
  };
}

function statusHtml(code){
  if(code === "fit") return `<span class="status fit">적정</span>`;
  if(code === "up") return `<span class="status up">상향</span>`;
  return `<span class="status na">비교불가</span>`;
}

function diffText(v){
  if(v === null || v === undefined) return "-";
  return v >= 0 ? `+${v.toFixed(1)}` : `${v.toFixed(1)}`;
}

function compareChipsHtml(comp){
  return `<div class="chips">` + comp.details.map(d => {
    const cls = d.state === "ok" ? "chip ok" : (d.state === "ng" ? "chip ng" : "chip na");
    const text = (d.student === null || d.cut === null)
      ? `${d.label} 비교불가`
      : `${d.label} ${d.student} / 컷 ${d.cut} / ${diffText(d.diff)}`;
    return `<span class="${cls}">${esc(text)}</span>`;
  }).join("") + `</div>`;
}

function updateStudentBadge(scores){
  const badge = $("#studentInputBadge");
  if(!hasStudentScores(scores)){
    badge.textContent = "학생 점수 미입력";
    return;
  }
  const filled = [];
  if(scores.kor !== null) filled.push(`국어 ${scores.kor}`);
  if(scores.math !== null) filled.push(`수학 ${scores.math}`);
  if(scores.inq1 !== null) filled.push(`탐1 ${scores.inq1}`);
  if(scores.inq2 !== null) filled.push(`탐2 ${scores.inq2}`);
  if(scores.eng !== null) filled.push(`영어 ${scores.eng}`);
  badge.textContent = filled.join(" · ");
}

function initFilters() {
  fillSelect("#year", uniqueSorted("year"), "전체 연도");
  fillSelect("#group", uniqueSorted("group"), "전체 계열");
  fillSelect("#univ", uniqueSorted("univ"), "전체 대학");
  fillSelect("#rule", uniqueSorted("ruleMode"), "전체 방식");

  $("#q").addEventListener("input", (e) => {
    state.q = e.target.value.trim().toLowerCase();
    render();
  });
  $("#year").addEventListener("change", (e) => {
    state.year = e.target.value;
    render();
  });
  $("#group").addEventListener("change", (e) => {
    state.group = e.target.value;
    render();
  });
  $("#univ").addEventListener("change", (e) => {
    state.univ = e.target.value;
    render();
  });
  $("#rule").addEventListener("change", (e) => {
    state.rule = e.target.value;
    render();
  });

  ["#s_kor","#s_math","#s_inq1","#s_inq2","#s_eng"].forEach(id => {
    $(id).addEventListener("input", render);
  });

  $("#resetBtn").addEventListener("click", () => {
    state.q = "";
    state.year = "";
    state.group = "";
    state.univ = "";
    state.rule = "";
    $("#q").value = "";
    $("#year").value = "";
    $("#group").value = "";
    $("#univ").value = "";
    $("#rule").value = "";
    render();
  });

  $("#resetScoreBtn").addEventListener("click", () => {
    $("#s_kor").value = "";
    $("#s_math").value = "";
    $("#s_inq1").value = "";
    $("#s_inq2").value = "";
    $("#s_eng").value = "";
    state.compareTab = "all";
    syncTabs();
    render();
  });

  $$("#compareTabs .tab").forEach(btn => {
    btn.addEventListener("click", () => {
      state.compareTab = btn.dataset.tab;
      syncTabs();
      render();
    });
  });
}

function syncTabs(){
  $$("#compareTabs .tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === state.compareTab);
  });
}

function filteredRows() {
  const scores = getStudentScores();
  const scoreMode = hasStudentScores(scores);

  let rows = DATA.filter(x => {
    if (state.year && String(x.year) !== state.year) return false;
    if (state.group && x.group !== state.group) return false;
    if (state.univ && x.univ !== state.univ) return false;
    if (state.rule && x.ruleMode !== state.rule) return false;
    if (state.q) {
      const blob = [x.univ, x.major, x.note, x.group, x.ruleMode].join(" ").toLowerCase();
      if (!blob.includes(state.q)) return false;
    }
    return true;
  }).map(x => {
    const comp = compareRow(x, scores);
    return { ...x, _comp: comp };
  });

  if(scoreMode && state.compareTab !== "all"){
    rows = rows.filter(x => x._comp.code === state.compareTab);
  }

  rows.sort((a,b) => {
    const order = { fit: 2, up: 1, na: 0 };
    if(scoreMode){
      const oa = order[a._comp.code] ?? 0;
      const ob = order[b._comp.code] ?? 0;
      if(ob !== oa) return ob - oa;

      const da = a._comp.avgDiff ?? -9999;
      const db = b._comp.avgDiff ?? -9999;
      if(db !== da) return db - da;
    }

    const y = (b.year || 0) - (a.year || 0);
    if (y !== 0) return y;
    const u = String(a.univ).localeCompare(String(b.univ), "ko");
    if (u !== 0) return u;
    return String(a.major).localeCompare(String(b.major), "ko");
  });

  return rows;
}

function render() {
  const scores = getStudentScores();
  updateStudentBadge(scores);

  const rows = filteredRows();
  $("#countBadge").textContent = `${rows.length}건`;

  if (!rows.length) {
    $("#tbody").innerHTML = `<tr><td colspan="10"><div class="empty">조건에 맞는 데이터가 없습니다.</div></td></tr>`;
    $("#mobileList").innerHTML = `<div class="empty">조건에 맞는 데이터가 없습니다.</div>`;
    return;
  }

  $("#tbody").innerHTML = rows.map(x => `
    <tr>
      <td>${statusHtml(x._comp.code)}</td>
      <td>${esc(x.year)}</td>
      <td>${esc(x.group)}</td>
      <td>${esc(x.univ)}</td>
      <td>${esc(x.major)}</td>
      <td>${esc(x.ruleMode)}</td>
      <td>${compareChipsHtml(x._comp)}</td>
      <td class="num">${esc(x._comp.compared)}</td>
      <td class="num">${esc(diffText(x._comp.avgDiff))}</td>
      <td style="white-space:normal">${esc(x.note || "-")}</td>
    </tr>
  `).join("");

  $("#mobileList").innerHTML = rows.map(x => `
    <div class="mcard">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
        <div>
          <div class="mtitle">${esc(x.univ)} · ${esc(x.major)}</div>
          <div class="msub">${esc(x.year)} · ${esc(x.group)} · ${esc(x.ruleMode)}</div>
        </div>
        <div>${statusHtml(x._comp.code)}</div>
      </div>

      <div class="msub" style="margin-top:10px">비교 과목 ${esc(x._comp.compared)}개 · 평균차이 ${esc(diffText(x._comp.avgDiff))}</div>

      <div style="margin-top:10px">
        ${compareChipsHtml(x._comp)}
      </div>

      ${x.note ? `<div class="msub" style="margin-top:10px">${esc(x.note)}</div>` : ""}
    </div>
  `).join("");
}

initFilters();
syncTabs();
render();
</script>
</body>
</html>
