
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>대학 정시 검색기</title>
  <style>
    html,body{margin:0;padding:0;background:#f7f7f8;color:#111;font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    *{box-sizing:border-box}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .hero{background:#fff;border:1px solid #e6e6e8;border-radius:22px;padding:20px 20px 16px}
    .title{font-size:28px;font-weight:900;margin:0 0 8px}
    .sub{opacity:.72;line-height:1.6}
    .grid{display:grid;grid-template-columns:1.4fr repeat(4,minmax(0,1fr));gap:10px;margin-top:16px}
    .control{width:100%;padding:12px 14px;border:1px solid #d9d9de;border-radius:14px;background:#fff;font-size:14px}
    .bar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:14px}
    .badge{display:inline-flex;align-items:center;border:1px solid #d9d9de;border-radius:999px;padding:7px 12px;background:#fff;font-weight:800}
    .btn{border:1px solid #111;border-radius:12px;padding:10px 14px;background:#fff;font-weight:900;cursor:pointer}
    .panel{background:#fff;border:1px solid #e6e6e8;border-radius:22px;padding:16px;margin-top:14px}
    .tablebox{overflow:auto}
    table{width:100%;min-width:980px;border-collapse:collapse}
    th,td{padding:12px 10px;border-bottom:1px solid #efeff2;text-align:left;font-size:14px;vertical-align:top;white-space:nowrap}
    th{position:sticky;top:0;background:#fafafb;font-weight:900}
    .num{text-align:right}
    .muted{opacity:.62}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;border:1px solid #d9d9de;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;background:#fff}
    .mobile-list{display:none}
    .mcard{border:1px solid #ececf0;border-radius:18px;padding:14px;margin-top:12px}
    .mtitle{font-size:16px;font-weight:900;line-height:1.35}
    .msub{margin-top:4px;font-size:13px;opacity:.7;line-height:1.5}
    .cutgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .cutitem{border:1px solid #ececf0;border-radius:12px;padding:8px 10px;display:flex;justify-content:space-between;gap:10px}
    .empty{padding:22px;border:1px dashed #d9d9de;border-radius:18px;color:#555;background:#fff}
    @media(max-width:980px){
      .grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:760px){
      .grid{grid-template-columns:1fr}
      .tablebox{display:none}
      .mobile-list{display:block}
      .title{font-size:24px}
    }
  </style>
</head>

<div class="wrap">
  <div class="hero">
    <h1 class="title">대학 정시 검색기</h1>
    <div class="sub">배부용 조회 전용 화면입니다. 대학명·학과명 검색, 연도/계열/대학/판정방식 필터로 빠르게 찾을 수 있습니다.</div>

    <div class="grid">
      <input id="q" class="control" placeholder="대학명 / 학과명 / 메모 검색" />
      <select id="year" class="control"><option value="">전체 연도</option></select>
      <select id="group" class="control"><option value="">전체 계열</option></select>
      <select id="univ" class="control"><option value="">전체 대학</option></select>
      <select id="rule" class="control"><option value="">전체 방식</option></select>
    </div>

    <div class="bar">
      <div class="chips">
        <span class="badge" id="countBadge">0건</span>
        <span class="badge">데이터 181건 내장</span>
      </div>
      <button id="resetBtn" class="btn">필터 초기화</button>
    </div>
  </div>

  <div class="panel" id="resultPanel">
    <div class="tablebox">
      <table>
        <thead>
          <tr>
            <th>연도</th>
            <th>계열</th>
            <th>대학</th>
            <th>학과</th>
            <th>방식</th>
            <th class="num">국어</th>
            <th class="num">수학</th>
            <th class="num">탐1</th>
            <th class="num">탐2</th>
            <th class="num">영어</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="mobile-list" id="mobileList"></div>
  </div>
</div>

const $ = (s) => document.querySelector(s);
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const numText = (v) => (v === null || v === undefined || v === "") ? "-" : String(v);

const state = {
  q: "",
  year: "",
  group: "",
  univ: "",
  rule: ""
};

function uniqueSorted(key) {
  return [...new Set(DATA.map(x => x[key]).filter(Boolean))].sort((a,b) => String(a).localeCompare(String(b), "ko"));
}

function fillSelect(id, items, placeholder) {
  const el = $(id);
  el.innerHTML = `<option value="">${placeholder}</option>` + items.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
}

function initFilters() {
  fillSelect("#year", uniqueSorted("year"), "전체 연도");
  fillSelect("#group", uniqueSorted("group"), "전체 계열");
  fillSelect("#univ", uniqueSorted("univ"), "전체 대학");
  fillSelect("#rule", uniqueSorted("ruleMode"), "전체 방식");

  $("#q").addEventListener("input", (e) => {
    state.q = e.target.value.trim().toLowerCase();
    render();
  });
  $("#year").addEventListener("change", (e) => {
    state.year = e.target.value;
    render();
  });
  $("#group").addEventListener("change", (e) => {
    state.group = e.target.value;
    render();
  });
  $("#univ").addEventListener("change", (e) => {
    state.univ = e.target.value;
    render();
  });
  $("#rule").addEventListener("change", (e) => {
    state.rule = e.target.value;
    render();
  });

  $("#resetBtn").addEventListener("click", () => {
    state.q = "";
    state.year = "";
    state.group = "";
    state.univ = "";
    state.rule = "";
    $("#q").value = "";
    $("#year").value = "";
    $("#group").value = "";
    $("#univ").value = "";
    $("#rule").value = "";
    render();
  });
}

function filteredRows() {
  return DATA.filter(x => {
    if (state.year && String(x.year) !== state.year) return false;
    if (state.group && x.group !== state.group) return false;
    if (state.univ && x.univ !== state.univ) return false;
    if (state.rule && x.ruleMode !== state.rule) return false;
    if (state.q) {
      const blob = [x.univ, x.major, x.note, x.group, x.ruleMode].join(" ").toLowerCase();
      if (!blob.includes(state.q)) return false;
    }
    return true;
  }).sort((a,b) => {
    const y = (b.year || 0) - (a.year || 0);
    if (y !== 0) return y;
    const u = String(a.univ).localeCompare(String(b.univ), "ko");
    if (u !== 0) return u;
    return String(a.major).localeCompare(String(b.major), "ko");
  });
}

function render() {
  const rows = filteredRows();
  $("#countBadge").textContent = `${rows.length}건`;

  if (!rows.length) {
    $("#tbody").innerHTML = `<tr><td colspan="11"><div class="empty">조건에 맞는 데이터가 없습니다.</div></td></tr>`;
    $("#mobileList").innerHTML = `<div class="empty">조건에 맞는 데이터가 없습니다.</div>`;
    return;
  }

  $("#tbody").innerHTML = rows.map(x => `
    <tr>
      <td>${esc(x.year)}</td>
      <td>${esc(x.group)}</td>
      <td>${esc(x.univ)}</td>
      <td>${esc(x.major)}</td>
      <td>${esc(x.ruleMode)}</td>
      <td class="num">${esc(numText(x.cut_kor))}</td>
      <td class="num">${esc(numText(x.cut_math))}</td>
      <td class="num">${esc(numText(x.cut_inq1))}</td>
      <td class="num">${esc(numText(x.cut_inq2))}</td>
      <td class="num">${esc(numText(x.cut_eng))}</td>
      <td style="white-space:normal">${esc(x.note || "-")}</td>
    </tr>
  `).join("");

  $("#mobileList").innerHTML = rows.map(x => `
    <div class="mcard">
      <div class="mtitle">${esc(x.univ)} · ${esc(x.major)}</div>
      <div class="msub">${esc(x.year)} · ${esc(x.group)} · ${esc(x.ruleMode)}</div>
      <div class="cutgrid">
        <div class="cutitem"><span>국어</span><strong>${esc(numText(x.cut_kor))}</strong></div>
        <div class="cutitem"><span>수학</span><strong>${esc(numText(x.cut_math))}</strong></div>
        <div class="cutitem"><span>탐1</span><strong>${esc(numText(x.cut_inq1))}</strong></div>
        <div class="cutitem"><span>탐2</span><strong>${esc(numText(x.cut_inq2))}</strong></div>
        <div class="cutitem"><span>영어</span><strong>${esc(numText(x.cut_eng))}</strong></div>
      </div>
      ${x.note ? `<div class="msub" style="margin-top:10px">${esc(x.note)}</div>` : ""}
    </div>
  `).join("");
}

initFilters();
render();
</script>
