<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>수시 학생부교과 판독기</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="page">
    <header class="top">
      <a class="back-link" href="rolling.html">← 수시 메인</a>
      <h1>학생부교과 판독기</h1>
      <p class="sub">내신과 수능최저를 기준으로 지원 가능 전형을 조회합니다.</p>
    </header>

    <section class="panel">
      <h2>학생 입력</h2>

      <div class="form-grid">
        <label>
          <span>학생 이름 / 메모</span>
          <input type="text" id="studentName" placeholder="예: 고3 자연계 / 1학기 기준" />
        </label>

        <label>
          <span>전체 내신 평균</span>
          <input type="number" id="gradeAvg" step="0.01" placeholder="예: 1.72" />
        </label>

        <label>
          <span>반영교과 평균</span>
          <input type="number" id="subjectGrade" step="0.01" placeholder="예: 1.58" />
        </label>

        <label>
          <span>수능최저 충족 예상</span>
          <select id="csatExpected">
            <option value="all">전체</option>
            <option value="yes">가능</option>
            <option value="no">불안</option>
          </select>
        </label>

        <label>
          <span>계열</span>
          <select id="groupFilter">
            <option value="all">전체</option>
            <option value="인문">인문</option>
            <option value="자연">자연</option>
            <option value="예체능">예체능</option>
          </select>
        </label>

        <label>
          <span>지역</span>
          <select id="regionFilter">
            <option value="all">전체</option>
            <option value="서울">서울</option>
            <option value="경기">경기</option>
            <option value="수도권">수도권</option>
            <option value="지방">지방</option>
          </select>
        </label>

        <label class="full">
          <span>대학 / 학과 / 전형명 검색</span>
          <input type="text" id="keyword" placeholder="예: 경희대 / 전자공학 / 학교추천" />
        </label>
      </div>

      <div class="btn-row">
        <button type="button" id="btnSearch">판정 보기</button>
        <button type="button" id="btnReset" class="secondary">초기화</button>
      </div>
    </section>

    <section class="panel">
      <div class="result-head">
        <h2>조회 결과</h2>
        <div id="resultCount" class="meta-text">결과 없음</div>
      </div>

      <div id="resultList" class="result-list">
        <div class="empty">조건을 입력한 뒤 판정 보기를 눌러주세요.</div>
      </div>
    </section>
  </main>

  <script src="assets/rolling_school.js"></script>
</body>
</html>
