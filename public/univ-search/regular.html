<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>정시 판독기</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="page">
    <header class="top">
      <!-- ✅ '← 메인으로' 버튼 삭제 (눌렀을 때 대학/학과 검색기로 잘못 이동 이슈 방지) -->
      <h1>정시 판독기</h1>
      <p class="sub">국어 · 수학 · 탐구 백분위와 영어 등급 기준으로 지원 가능 대학을 조회합니다.</p>
    </header>

    <section class="panel">
      <div class="search-layout">
        <div class="row row-top">
          <label class="field field-group">
            <span>계열</span>
            <select id="groupFilter">
              <option value="all">전체</option>
              <option value="인문">인문</option>
              <option value="자연">자연</option>
            </select>
          </label>

          <label class="field field-keyword">
            <span>대학 / 학과 검색</span>
            <input
              type="text"
              id="keyword"
              autocomplete="off"
              placeholder="예: 경희대 / 전자공학 / 일반전형"
            />
          </label>
        </div>

        <div class="row row-two">
          <label class="field">
            <span>영어 등급</span>
            <select id="engGrade">
              <option value="">선택</option>
              <option value="1">1등급</option>
              <option value="2">2등급</option>
              <option value="3">3등급</option>
              <option value="4">4등급</option>
              <option value="5">5등급</option>
              <option value="6">6등급</option>
              <option value="7">7등급</option>
              <option value="8">8등급</option>
              <option value="9">9등급</option>
            </select>
          </label>

          <label class="field">
            <span>국어 백분위</span>
            <input
              type="number"
              id="kor"
              min="0"
              max="100"
              step="1"
              inputmode="numeric"
              placeholder="예: 92"
            />
          </label>
        </div>

        <div class="row row-two">
          <label class="field">
            <span>수학 백분위</span>
            <input
              type="number"
              id="math"
              min="0"
              max="100"
              step="1"
              inputmode="numeric"
              placeholder="예: 94"
            />
          </label>

          <label class="field">
            <span>탐구 1 백분위</span>
            <input
              type="number"
              id="inq1"
              min="0"
              max="100"
              step="1"
              inputmode="numeric"
              placeholder="예: 89"
            />
          </label>
        </div>

        <div class="row row-two row-bottom">
          <label class="field">
            <span>탐구 2 백분위</span>
            <input
              type="number"
              id="inq2"
              min="0"
              max="100"
              step="1"
              inputmode="numeric"
              placeholder="예: 90"
            />
          </label>

          <div class="field">
            <span class="filter-label">판정 필터</span>

            <div class="judge-tabs" id="judgementTabs">
              <button type="button" class="judge-tab is-active" data-value="all">전체</button>
              <button type="button" class="judge-tab" data-value="안정">안정</button>
              <button type="button" class="judge-tab" data-value="적정">적정</button>
              <button type="button" class="judge-tab" data-value="상향">상향</button>
              <button type="button" class="judge-tab" data-value="도전">도전</button>
            </div>

            <input type="hidden" id="judgementFilter" value="all" />
          </div>
        </div>

        <input type="hidden" id="methodFilter" value="all" />
      </div>
    </section>

    <section class="panel">
      <div class="result-head">
        <h2>조회 결과</h2>
        <div id="resultCount" class="meta-text">결과 없음</div>
      </div>

      <div id="resultStats" class="result-stats"></div>

      <div id="resultList" class="result-list">
        <div class="empty">국어/수학/탐구/영어 중 최소 1개 이상 입력하거나 대학/학과 검색어를 입력해주세요.</div>
      </div>
    </section>
  </main>

  <script src="assets/regular.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((err) => {
          console.error("SW 등록 실패:", err);
        });
      });
    }
  </script>
</body>
</html>
