<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_mapping</title>
<style>
:root{--bg:#f6f8fc;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1460px;margin:0 auto;padding:24px 18px 48px}
.hero{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:26px;margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:34px}.sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--text);font-weight:900}
.nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
.side{position:sticky;top:18px;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.side-title{font-size:20px;font-weight:900;margin:0 0 12px}
.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.side-box+.side-box{margin-top:12px}
.side-label{font-size:12px;color:var(--sub);font-weight:800;margin-bottom:5px}.side-value{font-weight:900;line-height:1.75}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:14px}
.bar{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px}
.bar-left{font-weight:900}.bar-sub{font-size:13px;color:var(--sub);font-weight:700;margin-top:3px}
.btn{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:900;cursor:pointer}
.map-card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px}
.map-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:12px}
.map-title{font-size:24px;font-weight:900}.map-sub{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}
.map-score{min-width:72px;height:72px;border-radius:22px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.map-item{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px}
.map-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.map-body{font-size:15px;line-height:1.75;font-weight:800}
.reason-box{margin-top:12px;border:1px solid #e7ecf3;border-radius:18px;background:#f8fbff;padding:14px}
.reason-title{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}
.reason-body{font-size:14px;line-height:1.75;font-weight:800}
.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:18px;line-height:1.8;color:var(--sub)}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}}
@media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.map-title{font-size:20px}.map-grid{grid-template-columns:1fr}.map-score{min-width:58px;height:58px;font-size:24px;border-radius:18px}.bar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="heroTitle">교과서 매핑 보기</h1>
    <div class="sub">학생 키워드와 선택과목을 바탕으로 교과서 단원, 핵심 개념, 추천 탐구, 세특 씨앗을 과목별로 매칭해 보여주는 화면입니다.</div>
    <div class="nav">
      <a id="goBasic" href="./record_detail.html">생활기록부 분석</a>
      <a class="active">교과서 매핑 보기</a>
      <a id="goExtension" href="./record_detail_extension.html">확장 활동 보기</a>
    </div>
  </section>

  <div class="layout">
    <aside class="side">
      <h2 class="side-title">학생 요약</h2>
      <div class="side-box"><div class="side-label">학생</div><div class="side-value" id="studentBasic">-</div></div>
      <div class="side-box"><div class="side-label">선택과목</div><div class="chips" id="subjectChips"></div></div>
      <div class="side-box"><div class="side-label">진로축</div><div class="side-value" id="trackValue">-</div></div>
      <div class="side-box"><div class="side-label">활동유형</div><div class="side-value" id="styleValue">-</div></div>
      <div class="side-box"><div class="side-label">상위 매칭 과목</div><div class="chips" id="topMatchChips"></div></div>
    </aside>

    <main class="main">
      <section class="bar">
        <div>
          <div class="bar-left">교과서 매핑 결과</div>
          <div class="bar-sub" id="resultInfo">상위 3개만 먼저 표시합니다.</div>
        </div>
        <button class="btn" id="toggleMoreBtn" type="button">더 보기</button>
      </section>
      <div id="cards"></div>
    </main>
  </div>
</div>

<script src="../univ-search/data/student_textbook_matcher.js"></script>
<script>
const esc = s => String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
const unique = arr => [...new Set((Array.isArray(arr)?arr:[]).filter(Boolean))];
let ALL_RESULTS = [];
let SHOW_ALL = false;

function scoreColor(score){
  const n = Number(score || 0);
  if (n >= 40) return '#2f3f93';
  if (n >= 30) return '#6f57c7';
  return '#6d7786';
}

function extractCurrentYearSubjects(student){
  const years = Array.isArray(student?.years) ? student.years : [];
  const year = years[0] || {};
  return Array.isArray(year?.subjects) ? year.subjects : [];
}

function buildStudentTextbookInputFromStudent(student){
  const currentSubjects = extractCurrentYearSubjects(student);
  const selectedSubjects = unique([...(Array.isArray(student?.selected_subjects)?student.selected_subjects:[]), ...currentSubjects.map(s=>s.subject||s.subject_name).filter(Boolean)]);
  const keywordPool = [];
  currentSubjects.forEach(item => {
    if(Array.isArray(item.keywords)) keywordPool.push(...item.keywords);
    ['summary','subject_goal_focus','current_activity_basis','analysis_basis'].forEach(k => item[k] && keywordPool.push(item[k]));
    const ef = item.evidence_first || {};
    ['evidence_summary','observed_performance','interpretation','evaluation_meaning','next_improvement'].forEach(k => ef[k] && keywordPool.push(ef[k]));
    const jb = item.judgment_block || {};
    ['admission_officer_view','subject_judgment','record_judgment','overall_opinion','structure_interpretation','extension_interpretation'].forEach(k => jb[k] && keywordPool.push(jb[k]));
    if(Array.isArray(item.activity_framework)) keywordPool.push(...item.activity_framework);
    if(Array.isArray(item.evaluation_priority)) keywordPool.push(...item.evaluation_priority);
  });

  const joined = keywordPool.join(" "), joinedLower = joined.toLowerCase();
  const trackKeywords = [], styleKeywords = [];
  if(/배터리|이차전지|전고체|에너지|전기차|전기전자|전지|리튬/.test(joined)) trackKeywords.push("배터리","에너지","전기전자");
  if(/생명|의학|의생명|세포|유전|면역|항상성|단백질|효소/.test(joined)) trackKeywords.push("생명·의생명");
  if(/환경|기후|지구|해양|재해|탄소|지질|대기/.test(joined)) trackKeywords.push("환경·지구");
  if(/ai|인공지능|정보|보안|알고리즘|데이터|모델링/.test(joinedLower)) trackKeywords.push("AI·정보·보안");
  if(/반도체|전자기|회로|전자|광학|파동/.test(joined)) trackKeywords.push("반도체·전자");
  if(/실험|측정|변인|관찰|전해|반응|검증|조작/.test(joined)) styleKeywords.push("실험형");
  if(/데이터|그래프|해석|통계|시각화|수치/.test(joined)) styleKeywords.push("데이터형");
  if(/시스템|설계|구조|모델|최적화|회로/.test(joined)) styleKeywords.push("시스템형");
  if(/윤리|사회|책임|시민|영향|안전/.test(joined)) styleKeywords.push("윤리·사회형");
  const activityKeywords = unique(keywordPool.flatMap(v => String(v||"").split(/[,·/()]/)).map(v => v.trim()).filter(v => v && v.length >= 2)).slice(0,40);

  return {
    student_id: student?.student_id || student?.id || "",
    track_keywords: unique(trackKeywords),
    activity_keywords: activityKeywords,
    selected_subjects: selectedSubjects,
    style_keywords: unique(styleKeywords)
  };
}

async function loadBaseStudent(){
  const params = new URLSearchParams(location.search);
  const sid = params.get('student_id') || 'shstudy09';
  document.getElementById('goBasic').href = `./record_detail.html?student_id=${encodeURIComponent(sid)}`;
  document.getElementById('goExtension').href = `./record_detail_extension.html?student_id=${encodeURIComponent(sid)}`;
  const baseDir = location.pathname.replace(/[^/]*$/, '');
  const paths = [`${baseDir}record_detail.json`,`${baseDir}record_detail_concrete.json`,`${baseDir}record_detail (1).json`];
  for(const path of paths){
    try{
      const res = await fetch(path + `?v=${Date.now()}`, {cache:'no-store'});
      if(!res.ok) continue;
      const data = await res.json();
      const arr = Array.isArray(data?.students) ? data.students : [];
      const student = arr.find(s => String(s.student_id||s.id||'') === sid) || arr[0];
      if(student) return student;
    }catch(e){}
  }
  return null;
}

function cacheKey(studentId){ return `tb_match_cache_v2_${studentId}`; }
function saveResultsToCache(studentId, results){
  try{ localStorage.setItem(cacheKey(studentId), JSON.stringify({savedAt: Date.now(), results})); }catch(e){}
}
function loadResultsFromCache(studentId){
  try{
    const raw = localStorage.getItem(cacheKey(studentId));
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed?.results) ? parsed.results : null;
  }catch(e){ return null; }
}

function fillSidebar(student, studentInput, results){
  document.getElementById('heroTitle').textContent = `${student.student_name || student.name || ''} 교과서 매핑 보기`;
  document.getElementById('studentBasic').textContent = `${student.student_name || student.name || ''} · ${student.school_name || student.school || ''}`;
  document.getElementById('subjectChips').innerHTML = unique(studentInput.selected_subjects).slice(0,12).map(v=>`<span class="chip">${esc(v)}</span>`).join('');
  document.getElementById('trackValue').textContent = unique(studentInput.track_keywords).join(', ') || '-';
  document.getElementById('styleValue').textContent = unique(studentInput.style_keywords).join(', ') || '-';
  document.getElementById('topMatchChips').innerHTML = unique(results.map(r=>r.subject)).slice(0,6).map(v=>`<span class="chip">${esc(v)}</span>`).join('');
}

function cardHTML(item){
  const matched = unique(item.matched_keywords || []).join(', ') || '-';
  const concepts = unique(item.core_concepts || []).slice(0,6).join(', ') || '-';
  const topics = unique(item.recommended_topics || []).slice(0,3).join(' · ') || '-';
  const seeds = unique(item.record_seeds || []).slice(0,2).join(' · ') || '-';
  const majors = unique(item.major_links || []).slice(0,4).join(', ') || '-';
  const reason = item.match_reason || '단원-키워드-전공 연결성이 확인됨';

  return `
    <section class="map-card">
      <div class="map-head">
        <div>
          <div class="map-title">${esc(item.subject || '')}</div>
          <div class="map-sub">${esc(item.unit || '')}</div>
          <div class="map-sub">${esc(item.subunit || '')}</div>
        </div>
        <div class="map-score" style="background:${scoreColor(item.score)}">${esc(item.score || '')}</div>
      </div>

      <div class="map-grid">
        <div class="map-item"><div class="map-label">매핑 키워드</div><div class="map-body">${esc(matched)}</div></div>
        <div class="map-item"><div class="map-label">핵심 개념</div><div class="map-body">${esc(concepts)}</div></div>
        <div class="map-item"><div class="map-label">추천 탐구</div><div class="map-body">${esc(topics)}</div></div>
        <div class="map-item"><div class="map-label">세특 씨앗</div><div class="map-body">${esc(seeds)}</div></div>
        <div class="map-item"><div class="map-label">관련 전공</div><div class="map-body">${esc(majors)}</div></div>
      </div>

      <div class="reason-box">
        <div class="reason-title">추천 근거</div>
        <div class="reason-body">${esc(reason)}</div>
      </div>
    </section>
  `;
}

function renderResults(){
  const cards = document.getElementById('cards');
  const info = document.getElementById('resultInfo');
  const btn = document.getElementById('toggleMoreBtn');

  if(!ALL_RESULTS.length){
    cards.innerHTML = `<div class="empty">교과서 매핑 결과가 없습니다.</div>`;
    info.textContent = '표시할 결과가 없습니다.';
    btn.style.display = 'none';
    return;
  }

  const visible = SHOW_ALL ? ALL_RESULTS : ALL_RESULTS.slice(0,3);
  cards.innerHTML = visible.map(cardHTML).join('');
  info.textContent = SHOW_ALL ? `전체 ${ALL_RESULTS.length}개 결과를 표시 중입니다.` : `상위 3개 / 전체 ${ALL_RESULTS.length}개 결과`;
  btn.textContent = SHOW_ALL ? '접기' : '더 보기';
  btn.style.display = ALL_RESULTS.length > 3 ? 'inline-block' : 'none';
}

async function boot(){
  const cards = document.getElementById('cards');
  if(!window.StudentTextbookMatcher){
    cards.innerHTML = `<div class="empty">student_textbook_matcher.js가 로드되지 않았습니다.</div>`;
    return;
  }

  const student = await loadBaseStudent();
  if(!student){
    cards.innerHTML = `<div class="empty">학생 데이터를 불러오지 못했습니다.</div>`;
    return;
  }

  const studentInput = buildStudentTextbookInputFromStudent(student);
  const sid = studentInput.student_id || 'unknown';

  let results = loadResultsFromCache(sid);
  if(!results){
    try{
      results = await window.StudentTextbookMatcher.runStudentTextbookMatch(studentInput, {
        textbookPath:'../univ-search/data/textbook_master.json',
        keywordMapPath:'../univ-search/data/student_textbook_keyword_map.json',
        minScore:10,
        topN:12
      });
      saveResultsToCache(sid, results);
    }catch(err){
      console.error(err);
      cards.innerHTML = `<div class="empty">교과서 매핑 생성 중 오류가 발생했습니다.</div>`;
      return;
    }
  }

  ALL_RESULTS = Array.isArray(results) ? results : [];
  fillSidebar(student, studentInput, ALL_RESULTS);
  renderResults();

  document.getElementById('toggleMoreBtn').addEventListener('click', () => {
    SHOW_ALL = !SHOW_ALL;
    renderResults();
  });
}
boot();
</script>
</body>
</html>
