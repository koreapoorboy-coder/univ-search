<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>생활기록부 원문</title>
<style>
:root{--bg:#f7faff;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1360px;margin:0 auto;padding:24px 18px 48px}.hero,.side,.section,.card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
.hero{padding:26px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:34px}.sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:#16202a;font-weight:900}.nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}.side{padding:20px;position:sticky;top:18px}.side-title{font-size:20px;font-weight:900;margin:0 0 12px}
.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.side-box+.side-box{margin-top:12px}.label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.value{font-weight:800;line-height:1.8}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:16px}.section{padding:18px}.section-title{font-size:22px;font-weight:900;margin:0 0 12px}.card{padding:18px}.head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:12px}
.title{font-size:24px;font-weight:900}.subtitle{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}.box{border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:14px}.kicker{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.body{font-size:15px;line-height:1.85;font-weight:800;white-space:pre-wrap}.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:18px;line-height:1.8;color:var(--sub)}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}} @media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.title{font-size:20px}}
</style></head><body><div class="wrap">
<section class="hero"><h1>생활기록부 원문</h1><div class="sub">shstudy01 전용 원문 분리 화면입니다. 원문은 학생별로 따로 관리합니다.</div>
<div class="nav"><a id="goBasic" href="./record_detail.html">생활기록부 분석</a><a id="goMapping" href="./record_detail_mapping.html">생활기록부 연결</a><a id="goExtension" href="./record_detail_extension.html">확장 활동 보기</a><a id="goCreative" href="./record_creative.html">창의체험활동 분석</a><a class="active">생활기록부 원문</a></div></section>
<div class="layout"><aside class="side"><h2 class="side-title">원문 요약</h2><div class="side-box"><div class="label">학생</div><div class="value" id="studentBox">shstudy01</div></div><div class="side-box"><div class="label">원문 분류</div><div class="chips" id="categoryChips"></div></div><div class="side-box"><div class="label">표시 방식</div><div class="value">원문형 유지 / 과도한 요약 없이 분리 보관</div></div></aside><main class="main"><section class="section"><div class="head"><div><h2 class="section-title" style="margin:0">원문 항목</h2><div class="subtitle">학생별 원문을 따로 관리하고, 필요 시 분석 화면과 분리해 확인할 수 있습니다.</div></div></div><div id="itemsWrap"></div></section></main></div></div>
<script>
const qs=new URLSearchParams(location.search); const targetId=qs.get('student_id')||'shstudy01';
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
function unique(arr){return [...new Set((Array.isArray(arr)?arr:[]).filter(Boolean))];}
async function loadJson(path){const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'}); if(!r.ok) throw new Error(path); return r.json();}
function getRawRecord(data,id){ if(data?.[id]) return data[id]; if(data?.raw_record) return data.raw_record; return data; }
function collectRows(raw){ if(Array.isArray(raw?.rows)) return raw.rows; return []; }
function fillSidebar(rows){ const cats=unique(rows.map(x=>x.category)); document.getElementById('categoryChips').innerHTML=cats.length?cats.map(v=>`<span class="chip">${esc(v)}</span>`).join(''):'<span class="chip">원문 분류 없음</span>'; }
function itemCard(item){return `<section class="card"><div class="head"><div><div class="title">${esc(item.subject||item.title||'')}</div><div class="subtitle">${esc([item.term,item.category,item.item].filter(Boolean).join(' | '))}</div></div></div><div class="box"><div class="kicker">원문</div><div class="body">${esc(item.text||item.raw_text||'')}</div></div></section>`;}
(async function(){ try{document.getElementById('goBasic').href=`./record_detail.html?student_id=${encodeURIComponent(targetId)}`;document.getElementById('goMapping').href=`./record_detail_mapping.html?student_id=${encodeURIComponent(targetId)}`;document.getElementById('goExtension').href=`./record_detail_extension.html?student_id=${encodeURIComponent(targetId)}`;document.getElementById('goCreative').href=`./record_creative.html?student_id=${encodeURIComponent(targetId)}`; const data=await loadJson('./school_record_raw.json'); const raw=getRawRecord(data,targetId); const rows=collectRows(raw); document.getElementById('studentBox').textContent=targetId; fillSidebar(rows); document.getElementById('itemsWrap').innerHTML=rows.length?rows.map(itemCard).join(''):'<div class="empty">표시할 원문이 없습니다.</div>'; } catch(e){ document.getElementById('itemsWrap').innerHTML=`<div class="empty">원문 데이터를 불러오지 못했습니다. (${esc(e.message)})</div>`; }})();
</script></body></html>
