<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>창의체험활동 분석</title>
<style>
:root{--bg:#f7faff;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08);--accent:#111827;--soft:#eef4ff}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1440px;margin:0 auto;padding:24px 18px 48px}
.hero,.side,.section,.activity-card,.box{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
.hero{padding:26px;margin-bottom:18px} .hero h1{margin:0 0 8px;font-size:34px} .sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px} .nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:#16202a;font-weight:900} .nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
.side{padding:20px;position:sticky;top:18px} .side-title{font-size:20px;font-weight:900;margin:0 0 12px}
.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff} .side-box+.side-box{margin-top:12px}
.label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px} .value{font-weight:800;line-height:1.8}
.chips{display:flex;flex-wrap:wrap;gap:8px} .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:16px} .section{padding:18px} .section-title{font-size:22px;font-weight:900;margin:0 0 12px}
.activity-list{display:grid;gap:14px} .activity-card{padding:18px}
.head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:12px}
.title{font-size:24px;font-weight:900} .subtitle{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}
.badge{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:900;background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px} .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.box{padding:14px;border-radius:18px;background:#fbfdff} .kicker{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px} .body{font-size:15px;line-height:1.8}
.list{margin:0;padding-left:18px} .list li{margin:6px 0;line-height:1.7}
.level{display:inline-flex;align-items:center;margin-left:8px;padding:4px 8px;border-radius:999px;background:#f4f7fb;border:1px solid var(--line);font-size:11px;font-weight:900}
.error{padding:16px;border:1px solid #fecaca;background:#fff1f2;color:#991b1b;border-radius:16px}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:static}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const h = (v='') => String(v).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function loadJson(path){ const r = await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error(path+' 로딩 실패'); return r.json(); }
function nav(){ return `
<div class="nav">
  <a href="./record_detail.html">생활기록부 분석</a>
  <a href="./record_detail_mapping.html">생활기록부 연결</a>
  <a href="./record_detail_extension.html">확장 활동 보기</a>
  <a href="./record_creative.html" class="active">창의체험활동 분석</a>
  <a href="./record_detail_raw.html">생활기록부 원문</a>
</div>`; }
function subjectLinks(items=[]){
  return `<ul class="list">${items.map(it=>`<li><b>${h(it.subject)}</b><span class="level">${h(it.level)}</span> — ${h(it.reason)}</li>`).join('')}</ul>`;
}
function activityCard(a){ return `
<article class="activity-card">
  <div class="head">
    <div>
      <div class="title">${h(a.title)}</div>
      <div class="subtitle">${h(a.category)} · ${h(a.term)}</div>
    </div>
    <div class="badge">보수형 해석</div>
  </div>
  <div class="grid2">
    <div class="box"><div class="kicker">핵심 발췌</div><div class="body">${h(a.key_excerpt)}</div></div>
    <div class="box"><div class="kicker">활동 성격</div><div class="body">${h(a.activity_nature)}</div></div>
  </div>
  <div class="grid2" style="margin-top:12px">
    <div class="box"><div class="kicker">현재 기록에서 확인되는 역량</div><ul class="list">${(a.confirmed_strengths||[]).map(v=>`<li>${h(v)}</li>`).join('')}</ul></div>
    <div class="box"><div class="kicker">선택과목 연결 정도</div>${subjectLinks(a.subject_links||[])}</div>
  </div>
  <div class="grid3" style="margin-top:12px">
    <div class="box"><div class="kicker">연속 활동 축</div><div class="body">${h(a.continuity_axis)}</div></div>
    <div class="box"><div class="kicker">무리 없는 확장 해석</div><div class="body">${h(a.conservative_extension)}</div></div>
    <div class="box"><div class="kicker">보수적 종합 판단</div><div class="body">${h(a.overall_judgment)}</div></div>
  </div>
</article>`; }
function render(data){
  const app = document.getElementById('app');
  app.innerHTML = `
  <section class="hero">
    <h1>창의체험활동 분석</h1>
    <div class="sub">원문을 그대로 늘어놓기보다, 현재 창체 기록에서 확인되는 활동 성격·선택과목 연결 정도·연속 활동 축을 보수적으로 정리한 화면입니다.</div>
    ${nav()}
  </section>
  <div class="layout">
    <aside class="side">
      <div class="side-title">학생 개요</div>
      <div class="side-box"><div class="label">학생 ID</div><div class="value">${h(data.student_id)}</div></div>
      <div class="side-box"><div class="label">통합 방향</div><div class="value">${h(data.integrated_direction)}</div></div>
      <div class="side-box"><div class="label">보조 축</div><div class="value">${h(data.secondary_track)}</div></div>
      <div class="side-box"><div class="label">선택과목</div><div class="chips">${(data.selected_subjects||[]).map(v=>`<span class="chip">${h(v)}</span>`).join('')}</div></div>
    </aside>
    <main class="main">
      <section class="section">
        <h2 class="section-title">창체 기록 보수형 분석</h2>
        <div class="activity-list">${(data.creative_activities||[]).map(activityCard).join('')}</div>
      </section>
    </main>
  </div>`;
}
(async()=>{ try { const data = await loadJson('./creative_activities.json'); render(data); } catch(err){ document.getElementById('app').innerHTML = `<div class="error">오류: ${h(err.message||String(err))}</div>`; }})();
</script>
</body>
</html>
