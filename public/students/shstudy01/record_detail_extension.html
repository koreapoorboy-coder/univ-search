<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>확장 활동 보기</title>
<style>:root{--bg:#f6f7fb;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--soft:#f3f4f6;--brand:#2563eb;--brand2:#0ea5e9}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:var(--bg);color:var(--ink)}.wrap{max-width:1100px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}.title{font-size:28px;font-weight:800}.sub{color:var(--muted);font-size:14px}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;text-decoration:none;color:var(--ink);font-weight:700}.hero{background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1px solid #dbeafe;border-radius:20px;padding:18px 18px 14px;margin-bottom:18px}.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.hero h2{margin:0 0 8px;font-size:20px}.hero p{margin:0;color:#334155;line-height:1.7}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.meta .box{background:#fff;border:1px solid #dbeafe;border-radius:16px;padding:12px}.meta .label{font-size:12px;color:#64748b;font-weight:700;margin-bottom:6px}.meta .value{font-size:15px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 18px rgba(15,23,42,.04)}.card h3{margin:0 0 6px;font-size:22px}.role{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;margin-bottom:12px}.section{margin-top:14px;padding:12px 13px;border-radius:14px;background:var(--soft);border:1px solid #eef2f7}.section h4{margin:0 0 8px;font-size:15px}.section p{margin:0;color:#374151;line-height:1.7}ul.clean{margin:0;padding-left:18px}ul.clean li{margin:6px 0;color:#374151;line-height:1.6}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:#334155}.loading,.empty{padding:18px;border:1px dashed #cbd5e1;background:#fff;border-radius:16px;color:#64748b}.footer-note{margin-top:16px;padding:14px 16px;border-radius:16px;background:#fffbeb;border:1px solid #fde68a;color:#78350f;line-height:1.7}@media (max-width:900px){.hero-grid,.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><div class="top"><div><div class="title">확장 활동 보기</div><div class="sub">시작한 흐름을 학교 안에서 어떻게 설계해 갈지 보여주는 전문형 페이지</div></div><div class="toolbar"><a class="btn" href="./record_detail.html">생활기록부 분석</a><a class="btn" href="./record_detail_mapping.html">생활기록부 연결</a><a class="btn" href="./record_creative.html">창의체험활동 분석</a><a class="btn" href="./record_detail_raw.html">생활기록부 원문</a></div></div><div id="app" class="loading">로딩 중...</div></div>
<script>
(async function(){ const qs=new URLSearchParams(location.search); const targetId=qs.get('student_id')||'shstudy01'; const app=document.getElementById('app');
const h=v=>String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); const arr=v=>Array.isArray(v)?v:[]; async function loadJson(path){ const res=await fetch(path+'?v='+Date.now(),{cache:'no-store'}); if(!res.ok) throw new Error(path+' 로딩 실패'); return await res.json(); }
function firstStudent(payload,id){ if(Array.isArray(payload?.students)) return payload.students.find(s=>s.student_id===id)||{}; return payload?.[id]||{}; }
function chipsHTML(items){ return arr(items).map(v=>`<span class="chip">${h(v)}</span>`).join(''); }
function listHTML(items){ return arr(items).length?`<ul class="clean">${arr(items).map(v=>`<li>${h(v)}</li>`).join('')}</ul>`:'<div class="empty">표시할 내용이 없습니다.</div>'; }
function normalizeSubject(s){ return { subject:s?.subject||'', course_role:s?.course_role||'', current_evidence:arr(s?.current_evidence), current_strength:s?.current_strength||'', gap_point:s?.gap_point||'', textbook_connection:s?.textbook_connection||{}, school_scene:arr(s?.school_scene), expansion_questions:arr(s?.expansion_questions), execution_plan:arr(s?.execution_plan), output_structure:arr(s?.output_structure), record_point:arr(s?.record_point), next_stage_activities:arr(s?.next_stage_activities), evaluation_point:s?.evaluation_point||'', proposal_examples: arr(s?.next_stage_activities).map(a=>a?.title).filter(Boolean) }; }
try{ const ext=await loadJson('./record_detail_extension.json'); const student=firstStudent(ext,targetId); const plan=student.selected_subjects_plan||{}; const subjects=arr(plan.selection_subjects).map(normalizeSubject);
app.innerHTML=`<section class="hero"><div class="hero-grid"><div><h2>${h(student.student_name||targetId)} 학생 포트폴리오 확장 설계</h2><p>${h((plan.integrated_direction||student.track||'')+' 방향으로 재정리한 확장 화면입니다.')}</p></div><div class="meta"><div class="box"><div class="label">학생</div><div class="value">${h((student.student_name||'')+' · '+(student.school_name||''))}</div></div><div class="box"><div class="label">진로 방향</div><div class="value">${h(student.track||'')}</div></div><div class="box"><div class="label">보조 축</div><div class="value">${h(plan.secondary_track||'')}</div></div><div class="box"><div class="label">핵심 과목</div><div class="value">${chipsHTML(student.selected_subjects)}</div></div></div></div></section><div class="grid">${subjects.map(s=>`<section class="card"><h3>${h(s.subject)}</h3><div class="role">${h(s.course_role)}</div><div class="section"><h4>현재 강점</h4><p>${h(s.current_strength)}</p></div><div class="section"><h4>보완 관점</h4><p>${h(s.gap_point)}</p></div><div class="section"><h4>현재 기록 근거</h4>${listHTML(s.current_evidence)}</div><div class="section"><h4>교과서 연결 근거</h4>${listHTML(s.textbook_connection.related_units)}</div><div class="section"><h4>확장 질문</h4>${listHTML(s.expansion_questions)}</div><div class="section"><h4>세부 실행 설계</h4>${listHTML(s.execution_plan.length?s.execution_plan:s.next_stage_activities.map(v=>v.activity_detail).filter(Boolean))}</div><div class="section"><h4>보고서/발표 구조</h4>${listHTML(s.output_structure)}</div><div class="section"><h4>학교 안에서 작동 가능한 장면</h4>${listHTML(s.school_scene)}</div><div class="section"><h4>학생부에서 읽힐 수 있는 포인트</h4>${listHTML(s.record_point.length?s.record_point:s.next_stage_activities.map(v=>v.expected_record_change).filter(Boolean))}</div><div class="section"><h4>확장 활동 제안 예시</h4>${listHTML(s.proposal_examples)}</div></section>`).join('')}</div><div class="footer-note">이 페이지는 학생을 대신 수행시키는 목적이 아니라, 현재 기록을 바탕으로 어떤 방식의 설계가 자연스러운지 구조적으로 보여주는 용도입니다.</div>`;
if(!subjects.length){ app.innerHTML='<div class="empty">확장 데이터가 비어 있습니다.</div>'; }
}catch(e){ app.innerHTML=`<div class="empty">확장 데이터를 불러오지 못했습니다. (${h(e.message)})</div>`; }
})();
</script></body></html>
