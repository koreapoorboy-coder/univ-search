<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_extension</title>
<style>
:root{
  --bg:#f5f8fd; --line:#dfe8f4; --text:#16202a; --sub:#5c6b7a; --shadow:0 12px 30px rgba(22,32,42,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1460px;margin:0 auto;padding:24px 18px 48px}
.hero{background:linear-gradient(135deg,#ffffff,#f7fbff);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:26px;margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:34px}
.sub{color:var(--sub);line-height:1.75}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;align-items:start}
.side{position:sticky;top:18px;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.side-title{font-size:20px;font-weight:900;margin:0 0 12px}
.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}
.side-box + .side-box{margin-top:12px}
.side-label{font-size:12px;color:var(--sub);font-weight:800;margin-bottom:5px}
.side-value{font-weight:900;line-height:1.75;word-break:keep-all}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:16px}
.ext-card{background:var(--card-bg);border:1px solid var(--line);border-left:8px solid var(--card-bd);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.ext-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px}
.ext-title{font-size:26px;font-weight:900;line-height:1.2}
.ext-sub{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}
.ext-tag{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:900;white-space:nowrap}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mini-box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
.mini-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:7px}
.mini-body{font-weight:800;line-height:1.8;word-break:keep-all}
.line-block{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
.evidence{margin:0;padding-left:18px;line-height:1.9;font-weight:800}
.activities{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.activity-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}
.activity-title{font-size:16px;font-weight:900;line-height:1.45;margin-bottom:10px}
.field + .field{margin-top:10px}
.field-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:4px}
.field-body{font-size:14px;line-height:1.7;font-weight:800;word-break:keep-all}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--text);font-weight:900}
.nav a.active{background:#111;color:#fff;border-color:#111}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}.activities{grid-template-columns:1fr}}
@media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.ext-title{font-size:22px}.dual{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="heroTitle">학생 포트폴리오 확장 설계</h1>
    <div class="sub" id="heroSub">학생 진로 방향으로 재정리한 확장 화면입니다.</div>
    <div class="nav">
      <a href="./record_detail.html">기본 상담 보기</a>
      <a class="active">확장 활동 보기</a>
    </div>
  </section>

  <div class="layout">
    <aside class="side">
      <h2 class="side-title">학생 요약</h2>
      <div class="side-box">
        <div class="side-label">학생</div>
        <div class="side-value" id="studentBasic"></div>
      </div>
      <div class="side-box">
        <div class="side-label">진로 방향</div>
        <div class="side-value" id="directionValue"></div>
      </div>
      <div class="side-box">
        <div class="side-label">보조 축</div>
        <div class="side-value" id="secondaryValue"></div>
      </div>
      <div class="side-box">
        <div class="side-label">핵심 과목</div>
        <div class="chips" id="subjectChips"></div>
      </div>
      <div class="side-box">
        <div class="side-label">포트폴리오 키워드</div>
        <div class="chips" id="portfolioChips"></div>
      </div>
    </aside>

    <main class="main" id="cards"></main>
  </div>
</div>

<script>
const COLORS = {
  "물리학":["#f6fbff","#4f8cc9"],
  "물리Ⅱ":["#f6fbff","#4f8cc9"],
  "화학":["#fff8f3","#e38b2c"],
  "화학Ⅱ":["#fff8f3","#e38b2c"],
  "생명과학":["#f7fcf7","#4da866"],
  "생명과학Ⅰ":["#f7fcf7","#4da866"],
  "대수":["#f8f6ff","#7e66d4"],
  "미적분":["#f8f6ff","#7e66d4"],
  "고급생명과학":["#fff7fb","#c05693"],
  "고급화학":["#fff7fb","#c05693"]
};
const esc = (s='') => String(s)
  .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
  .replaceAll('"','&quot;').replaceAll("'","&#39;");

function cardHTML(subj){
  const [bg,bd] = COLORS[subj.subject] || ['#fff','#5c6b7a'];
  const acts = (subj.next_stage_activities || []).map(a => `
    <div class="activity-card">
      <div class="activity-title">${esc(a.title || '')}</div>
      <div class="field"><div class="field-label">왜 필요한가</div><div class="field-body">${esc(a.why_needed || '')}</div></div>
      <div class="field"><div class="field-label">활동 내용</div><div class="field-body">${esc(a.activity_detail || '')}</div></div>
      <div class="field"><div class="field-label">기록 변화</div><div class="field-body">${esc(a.expected_record_change || '')}</div></div>
    </div>
  `).join('');
  const evidence = (subj.current_evidence || []).map(v => `<li>${esc(v)}</li>`).join('');
  return `
    <section class="ext-card" style="--card-bg:${bg}; --card-bd:${bd}">
      <div class="ext-head">
        <div>
          <div class="ext-title">${esc(subj.subject || '')}</div>
          <div class="ext-sub">${esc(subj.course_role || '')}</div>
        </div>
        <div class="ext-tag">확장 설계</div>
      </div>

      <div class="dual">
        <div class="mini-box">
          <div class="mini-label">현재 강점</div>
          <div class="mini-body">${esc(subj.current_strength || '')}</div>
        </div>
        <div class="mini-box">
          <div class="mini-label">보완 지점</div>
          <div class="mini-body">${esc(subj.gap_point || '')}</div>
        </div>
      </div>

      <div class="line-block">
        <div class="mini-label">현재 기록 근거</div>
        <ul class="evidence">${evidence}</ul>
      </div>

      <div class="line-block">
        <div class="mini-label">다음 단계 활동</div>
        <div class="activities">${acts}</div>
      </div>

      <div class="line-block">
        <div class="mini-label">입시 관점</div>
        <div class="mini-body">${esc(subj.admission_view || '')}</div>
      </div>
    </section>
  `;
}

(async function(){
  try{
    const res = await fetch('./record_detail_extension.json?v='+Date.now(), {cache:'no-store'});
    const data = await res.json();
    const student = (data.students || [])[0] || {};
    const plan = student.selected_subjects_plan || {};
    const subjects = plan.selection_subjects || [];

    document.getElementById('heroTitle').textContent = `${student.student_name || '학생'} 학생 포트폴리오 확장 설계`;
    document.getElementById('heroSub').textContent = `${plan.integrated_direction || student.track || ''} 방향으로 재정리한 확장 화면입니다.`;
    document.getElementById('studentBasic').textContent = `${student.student_name || ''} · ${student.school_name || ''}`;
    document.getElementById('directionValue').textContent = student.track || '';
    document.getElementById('secondaryValue').textContent = plan.secondary_track || '';
    document.getElementById('subjectChips').innerHTML = (student.selected_subjects || []).map(v => `<span class="chip">${esc(v)}</span>`).join('');
    const keywordSet = new Set();
    (student.selected_subjects || []).forEach(v => keywordSet.add(v));
    subjects.forEach(s => {
      if (s.subject) keywordSet.add(s.subject);
      (s.current_evidence || []).slice(0,2).forEach(v => {
        const m = String(v).split(/[·,]/)[0].trim();
        if (m) keywordSet.add(m);
      });
    });
    document.getElementById('portfolioChips').innerHTML = [...keywordSet].slice(0,8).map(v => `<span class="chip">${esc(v)}</span>`).join('');
    document.getElementById('cards').innerHTML = subjects.map(cardHTML).join('');
  }catch(e){
    document.getElementById('cards').innerHTML = '<section class="ext-card" style="--card-bg:#fff; --card-bd:#999"><div class="mini-body">확장 데이터를 불러오지 못했습니다.</div></section>';
  }
})();
</script>
</body>
</html>
