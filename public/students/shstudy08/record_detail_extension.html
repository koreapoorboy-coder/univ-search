<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_extension</title>
<style>
:root{--bg:#f5f8fd;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}.wrap{max-width:1460px;margin:0 auto;padding:24px 18px 48px}.hero,.side,.ext-card,.topbar{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.hero{padding:26px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:34px}.sub{color:var(--sub);line-height:1.75}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:#16202a;font-weight:900}.nav a.active{background:#111;color:#fff;border-color:#111}.layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;align-items:start}.side{padding:20px;position:sticky;top:18px}.side-title{font-size:20px;font-weight:900;margin:0 0 12px}.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.side-box+.side-box{margin-top:12px}.label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.value{font-weight:800;line-height:1.8}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}.main{display:grid;gap:16px}.topbar{padding:14px 16px}.topbar-title{font-weight:900}.topbar-sub{font-size:13px;color:var(--sub);font-weight:700;margin-top:3px}.btn{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:900;cursor:pointer}.ext-card{padding:20px}.ext-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px}.ext-title{font-size:26px;font-weight:900}.ext-sub{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}.ext-tag{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:900}.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}.mini-box,.line-block,.activity-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.mini-title,.field-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.mini-body,.field-body{font-weight:800;line-height:1.8}.activities{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.activity-title{font-size:16px;font-weight:900;line-height:1.45;margin-bottom:10px}.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:18px;line-height:1.8;color:var(--sub)} ul.clean{margin:0;padding-left:18px;line-height:1.9;font-weight:800}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}.activities{grid-template-columns:1fr}}@media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.dual{grid-template-columns:1fr}.ext-title{font-size:22px}}
</style></head><body>
<div class="wrap"><section class="hero"><h1 id="heroTitle">학생 포트폴리오 확장 설계</h1><div class="sub">전문 설계형 버전입니다. 연결 페이지가 출발점을 보여준다면, 이 페이지는 실제 설계 구조를 보여줍니다.</div><div class="nav"><a id="goBasic" href="./record_detail.html">생활기록부 분석</a><a id="goMapping" href="./record_detail_mapping.html">생활기록부 연결</a><a class="active">확장 활동 보기</a><a id="goCreative" href="./record_creative.html">창의체험활동 분석</a><a id="goRaw" href="./record_detail_raw.html">생활기록부 원문</a></div></section>
<div class="layout"><aside class="side"><h2 class="side-title">학생 요약</h2><div class="side-box"><div class="label">학생</div><div class="value" id="studentBasic"></div></div><div class="side-box"><div class="label">통합 방향</div><div class="value" id="directionValue"></div></div><div class="side-box"><div class="label">보조 축</div><div class="value" id="secondaryValue"></div></div><div class="side-box"><div class="label">확장 과목</div><div class="chips" id="subjectChips"></div></div></aside><main class="main"><section class="topbar"><div><div class="topbar-title">확장 활동 설계 결과</div><div class="topbar-sub" id="resultInfo">실제로 수행할 탐구 활동 중심으로 정리했습니다.</div></div><button class="btn" id="toggleMoreBtn" type="button">더 보기</button></section><div id="cards"></div></main></div></div>
<script>
const COLORS={"물리학":["#f6fbff","#4f8cc9"],"물리학Ⅰ":["#f6fbff","#4f8cc9"],"물리Ⅱ":["#f6fbff","#4f8cc9"],"화학":["#fff8f3","#e38b2c"],"화학Ⅰ":["#fff8f3","#e38b2c"],"화학Ⅱ":["#fff8f3","#e38b2c"],"생명과학":["#f7fcf7","#4da866"],"생명과학Ⅰ":["#f7fcf7","#4da866"],"대수":["#f8f6ff","#7e66d4"],"미적분":["#f8f6ff","#7e66d4"],"기하":["#f8f6ff","#7e66d4"],"고급생명과학":["#fff7fb","#c05693"],"고급화학":["#fff7fb","#c05693"],"문학":["#fffaf4","#cf8d3c"]};
const esc=(s='')=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;"); let SHOW_ALL=false, ALL_SUBJECTS=[];
function arr(v){return Array.isArray(v)?v.filter(Boolean):[]}
function hasText(v){return typeof v==='string' ? v.trim().length>0 : !!v}
function block(title, inner){ if(!inner) return ''; return `<div class="line-block"><div class="mini-title">${title}</div>${inner}</div>`; }
function listBlock(title, values, klass='clean'){ const a=arr(values); return a.length ? block(title, `<ul class="${klass}">${a.map(v=>`<li>${esc(v)}</li>`).join('')}</ul>`) : ''; }
function textBlock(title, text){ return hasText(text) ? block(title, `<div class="mini-body">${esc(text)}</div>`) : ''; }
function activityCards(acts){ const a=arr(acts); if(!a.length) return ''; const cards=a.map(x=>`<div class="activity-card">${hasText(x.title)?`<div class="activity-title">${esc(x.title)}</div>`:''}${textBlock('왜 필요한가',x.why_needed).replace('line-block','field').replace('mini-title','field-label').replace('mini-body','field-body')}${textBlock('활동 내용',x.activity_detail).replace('line-block','field').replace('mini-title','field-label').replace('mini-body','field-body')}${textBlock('기대되는 연결 포인트',x.expected_record_change).replace('line-block','field').replace('mini-title','field-label').replace('mini-body','field-body')}</div>`).join(''); return block('세부 실행 설계', `<div class="activities">${cards}</div>`); }
function reportStructureBlock(subj){ const vals=arr(subj.report_structure||subj.presentation_structure); return vals.length ? listBlock('보고서/발표 구조', vals) : ''; }
function textbookBlock(subj){ const t=subj.textbook_connection||{}; const parts=[]; if(arr(t.related_units).length) parts.push(`<div class="field"><div class="field-label">관련 단원</div><div class="field-body">${arr(t.related_units).map(esc).join(' / ')}</div></div>`); if(arr(t.core_concepts).length) parts.push(`<div class="field"><div class="field-label">핵심 개념</div><div class="field-body">${arr(t.core_concepts).map(esc).join(' / ')}</div></div>`); if(hasText(t.concept_link)) parts.push(`<div class="field"><div class="field-label">연결 설명</div><div class="field-body">${esc(t.concept_link)}</div></div>`); return parts.length ? block('교과서 연결 근거', parts.join('')) : ''; }
function cardHTML(subj){const [bg,bd]=COLORS[subj.subject]||['#fff','#5c6b7a']; const evidence=(subj.current_evidence||[]).map(v=>`<li>${esc(v)}</li>`).join(''); return `<section class="ext-card" style="--card-bg:${bg}; --card-bd:${bd}"><div class="ext-head"><div><div class="ext-title">${esc(subj.subject||'')}</div>${hasText(subj.course_role)?`<div class="ext-sub">${esc(subj.course_role)}</div>`:''}</div><div class="ext-tag">전문 설계</div></div><div class="dual">${hasText(subj.current_strength)?`<div class="mini-box"><div class="mini-title">현재 강점</div><div class="mini-body">${esc(subj.current_strength)}</div></div>`:''}${hasText(subj.gap_point)?`<div class="mini-box"><div class="mini-title">보완 관점</div><div class="mini-body">${esc(subj.gap_point)}</div></div>`:''}</div>${evidence?`<div class="line-block"><div class="mini-title">현재 기록 근거</div><ul class="clean">${evidence}</ul></div>`:''}${textbookBlock(subj)}${listBlock('확장 가능 방향',subj.expansion_directions||subj.expansion_questions)}${activityCards(subj.next_stage_activities)}${reportStructureBlock(subj)}${listBlock('학교 안에서 작동 가능한 장면',subj.school_scene)}${listBlock('학생부에서 읽힐 수 있는 포인트',subj.record_point||subj.record_points)}${listBlock('확장 활동 제안 예시',subj.proposal_examples||subj.next_stage_examples||[])}${textBlock('종합 메모',subj.admission_view||subj.overall_note)}</section>`;}
function renderCards(){const wrap=document.getElementById('cards'); const info=document.getElementById('resultInfo'); const btn=document.getElementById('toggleMoreBtn'); const visible=SHOW_ALL?ALL_SUBJECTS:ALL_SUBJECTS.slice(0,3); wrap.innerHTML=visible.map(cardHTML).join('') || '<div class="empty">데이터가 없습니다.</div>'; info.textContent=SHOW_ALL?`전체 ${ALL_SUBJECTS.length}개 과목을 표시 중입니다.`:`상위 3개 / 전체 ${ALL_SUBJECTS.length}개 과목`; btn.textContent=SHOW_ALL?'접기':'더 보기'; btn.style.display=ALL_SUBJECTS.length>3?'inline-block':'none';}
(async function(){const qs=new URLSearchParams(location.search); const sid=qs.get('student_id')||'shstudy08'; const yearIdx=Number(qs.get('year_idx')||'0')||0; document.getElementById('goBasic').href=`./record_detail.html?student_id=${encodeURIComponent(sid)}&year_idx=${yearIdx}`; document.getElementById('goMapping').href=`./record_detail_mapping.html?student_id=${encodeURIComponent(sid)}&year_idx=${yearIdx}`; document.getElementById('goCreative').href=`./record_creative.html?student_id=${encodeURIComponent(sid)}`; document.getElementById('goRaw').href=`./record_detail_raw.html?student_id=${encodeURIComponent(sid)}`; const res=await fetch('./record_detail_extension.json?v='+Date.now(), {cache:'no-store'}); const data=await res.json(); const students=Array.isArray(data.students)?data.students:[]; const student=students.find(s=>String(s.student_id||'')===sid)||students[0]||{}; const plan=student.selected_subjects_plan||{}; ALL_SUBJECTS=plan.selection_subjects||[]; document.getElementById('heroTitle').textContent=`${student.student_name||'학생'} 학생 포트폴리오 확장 설계`; document.getElementById('studentBasic').textContent=`${student.student_name||''} · ${student.school_name||''}`; document.getElementById('directionValue').textContent=plan.integrated_direction||student.track||''; document.getElementById('secondaryValue').textContent=plan.secondary_track||''; document.getElementById('subjectChips').innerHTML=(ALL_SUBJECTS||[]).map(v=>`<span class="chip">${esc(v.subject||'')}</span>`).join(''); renderCards(); document.getElementById('toggleMoreBtn').onclick=()=>{SHOW_ALL=!SHOW_ALL; renderCards();};})();
</script></body></html>
