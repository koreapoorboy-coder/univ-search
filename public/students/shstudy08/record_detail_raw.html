</div><div class='card'><h1>생활기록부 원문</h1><div class='small'>학년/유형 토글을 눌러 필요한 원문만 확인할 수 있습니다.</div><div style='margin-top:10px'><button onclick="setYear('전체')">전체</button> <button onclick="setYear('1학년')">1학년</button> <button onclick="setType('전체')">전체유형</button> <button onclick="setType('세특')">세특</button> <button onclick="setType('창의체험활동')">창의체험활동</button></div></div><div id='list'></div></div><script>
let YEAR='전체', TYPE='전체'; let ROWS=[];
function render(){ const list=document.getElementById('list'); const filtered=ROWS.filter(r=>(YEAR==='전체'||r.term===YEAR)&&(TYPE==='전체'||r.category===TYPE)); list.innerHTML=filtered.map((r,i)=>`<details><summary>${r.term} · ${r.category} · ${r.subject}</summary><div class='small'>${r.item||''}</div><div style='margin-top:8px;white-space:pre-wrap;line-height:1.65'>${r.text||''}</div></details>`).join(''); }
function setYear(v){YEAR=v;render();} function setType(v){TYPE=v;render();}
fetch('./school_record_raw.json').then(r=>r.json()).then(data=>{ const rec=data['shstudy08']||data.raw_record||{}; ROWS=rec.rows||[]; render(); });
</script></body></html>
