<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>record_mapping_shstudy08</title><style>body{font-family:Arial,Apple SD Gothic Neo,sans-serif;margin:24px;background:#f7f8fc;color:#222}.wrap{max-width:1080px;margin:0 auto}.card{background:#fff;border:1px solid #e7e9f1;border-radius:16px;padding:18px;margin:14px 0}.nav a{text-decoration:none;color:#234;display:inline-block;margin-right:8px;padding:8px 10px;background:#eef2ff;border-radius:10px}.muted{color:#667}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.chip{display:inline-block;background:#f1f5f9;border-radius:999px;padding:6px 10px;margin:4px 6px 0 0}.sec{font-weight:700;margin:8px 0}details{background:#fff;border:1px solid #e7e9f1;border-radius:12px;padding:10px;margin:10px 0}summary{cursor:pointer;font-weight:700}.small{font-size:13px;color:#667}ul{margin:8px 0 0 18px}</style></head><body><div class="wrap"><div class="nav">
<a href="./record_detail.html?student_id=shstudy08&year_idx=0">생활기록부 분석</a> |
<a href="./record_detail_mapping.html?student_id=shstudy08&year_idx=0">생활기록부 연결</a> |
<a href="./record_detail_extension.html?student_id=shstudy08&year_idx=0">확장 활동 보기</a> |
<a href="./record_creative.html?student_id=shstudy08">창의체험활동 분석</a> |
<a href="./record_detail_raw.html?student_id=shstudy08&year_idx=0">생활기록부 원문</a>
</div><div id="app"></div></div><script>
const targetId=(new URLSearchParams(location.search)).get('student_id')||'shstudy08';
Promise.all([fetch('./record_detail.json').then(r=>r.json()), fetch('./record_detail_extension.json').then(r=>r.json())]).then(([detail,ext])=>{
 const s=(detail.students||[]).find(v=>v.student_id===targetId)||{}; const ex=(ext.students||[]).find(v=>v.student_id===targetId)||{}; const list=ex.selected_subjects_plan?.selection_subjects||[];
 document.getElementById('app').innerHTML=`<div class="card"><h1>생활기록부 연결</h1><div class='muted'>현재 기록에서 다음 선택과목이 왜 자연스러운지 확인하는 페이지</div><div class='sec'>통합 방향</div><div>${ex.selected_subjects_plan?.integrated_direction||''}</div></div>`+
 list.map(item=>`<div class='card'><h3>${item.subject}</h3><div class='sec'>왜 다음 과목 후보인가</div><ul>${(item.auto_reasons||[]).map(v=>`<li>${v}</li>`).join('') || `<li>${item.current_evidence||''}</li>`}</ul><div class='sec'>연결 개념</div>${((item.textbook_connection?.core_concepts)||[]).map(v=>`<span class='chip'>${v}</span>`).join('')}<div class='sec'>시작해볼 수 있는 연결 행동</div><ul>${(item.proposal_examples||[]).slice(0,2).map(v=>`<li>${v}</li>`).join('')}</ul><div class='sec'>다음 과목 역할</div><div>${item.course_role||''}</div></div>`).join('');
})
</script></body></html>
