<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_raw</title>
<style>
:root{--bg:#f7faff;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}.wrap{max-width:1360px;margin:0 auto;padding:24px 18px 48px}.hero,.side,.section,.card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.hero{padding:26px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:34px}.sub{color:var(--sub);line-height:1.75}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:#16202a;font-weight:900}.nav a.active{background:#111;color:#fff;border-color:#111}.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}.side{padding:20px;position:sticky;top:18px}.side-title{font-size:20px;font-weight:900;margin:0 0 12px}.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.side-box+.side-box{margin-top:12px}.label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.value{font-weight:800;line-height:1.8}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip,.filter-btn{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}.filter-btn{cursor:pointer;background:#fff}.filter-btn.active{background:#111;color:#fff;border-color:#111}.main{display:grid;gap:16px}.section{padding:18px}.section-title{font-size:22px;font-weight:900;margin:0 0 12px}.card{padding:0;overflow:hidden}.acc-head{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:16px 18px;cursor:pointer}.title{font-size:20px;font-weight:900}.subtitle{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}.box{border-top:1px solid var(--line);background:#fbfdff;padding:14px 18px;display:none}.card.open .box{display:block}.kicker{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.body{font-size:15px;line-height:1.85;font-weight:800;white-space:pre-wrap}.toggle{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;font-weight:900;cursor:pointer}.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:18px;line-height:1.8;color:var(--sub)}.filters{display:grid;gap:12px}.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.badge{padding:6px 10px;border-radius:999px;background:#f1f5fb;border:1px solid var(--line);font-size:12px;font-weight:900;color:var(--sub)}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}}@media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.title{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="heroTitle">생활기록부 원문</h1>
    <div class="sub">학생별 원문을 학년/유형별로 나눠 보되, 클릭했을 때만 내용을 펼쳐 확인하는 화면입니다.</div>
    <div class="nav">
      <a id="goBasic" href="./record_detail.html">생활기록부 분석</a>
      <a id="goMapping" href="./record_detail_mapping.html">생활기록부 연결</a>
      <a id="goExtension" href="./record_detail_extension.html">확장 활동 보기</a>
      <a id="goCreative" href="./record_creative.html">창의체험활동 분석</a>
      <a class="active">생활기록부 원문</a>
    </div>
  </section>

  <div class="layout">
    <aside class="side">
      <h2 class="side-title">원문 요약</h2>
      <div class="side-box"><div class="label">학생</div><div class="value" id="studentBox">-</div></div>
      <div class="side-box"><div class="label">학년 토글</div><div class="chips" id="yearChips"></div></div>
      <div class="side-box"><div class="label">원문 분류</div><div class="chips" id="categoryChips"></div></div>
      <div class="side-box"><div class="label">표시 방식</div><div class="value">학년별 / 세특·창체 분리 / 토글 클릭 시 원문 펼침</div></div>
    </aside>

    <main class="main">
      <section class="section">
        <div class="section-title">원문 항목</div>
        <div class="sub" style="margin-bottom:12px">학년과 유형을 먼저 고른 뒤, 필요한 항목만 눌러서 펼쳐 확인합니다.</div>
        <div class="filters">
          <div class="filter-row" id="yearFilters"></div>
          <div class="filter-row" id="typeFilters"></div>
        </div>
        <div id="itemsWrap" style="margin-top:16px"></div>
      </section>
    </main>
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
let targetId = qs.get('student_id') || '';
let ALL_ITEMS = [];
let CURRENT_YEAR = '전체';
let CURRENT_TYPE = '전체';

function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");}
function unique(arr){return [...new Set((Array.isArray(arr)?arr:[]).filter(Boolean))];}
async function loadJson(path){ const r = await fetch(path + `?v=${Date.now()}`, {cache:'no-store'}); if(!r.ok) throw new Error(path); return r.json(); }
function classifyType(row){ return row.category === '창의체험활동' ? '창의체험활동' : '세특'; }
function resolveTargetId(data){ if(targetId) return targetId; const keys = Object.keys(data || {}); return keys[0] || ''; }
function normalizeRawData(data){ let root=data; if(data[targetId]) root=data[targetId]; else if(data.raw_record) root=data.raw_record; const rows=Array.isArray(root?.rows)?root.rows:[]; return rows.map((r,idx)=>({ key:`${idx}-${r.term||''}-${r.subject||''}`,
  year:r.term||'미분류', type:classifyType(r), category:r.category||'', subject:r.subject||'', item:r.item||'', raw_text:r.text||'', title:`${r.subject||r.category||'원문'}${r.item?` · ${r.item}`:''}` })); }
function fillSidebars(items){ document.getElementById('studentBox').textContent=targetId; const years=['전체', ...unique(items.map(x=>x.year))]; document.getElementById('yearChips').innerHTML=years.map(y=>`<span class="chip">${esc(y)}</span>`).join(''); document.getElementById('categoryChips').innerHTML=['세특','창의체험활동'].map(c=>`<span class="chip">${esc(c)}</span>`).join(''); }
function renderFilterButtons(){ const years=['전체', ...unique(ALL_ITEMS.map(x=>x.year))]; document.getElementById('yearFilters').innerHTML=years.map(y=>`<button class="filter-btn ${CURRENT_YEAR===y?'active':''}" data-year="${esc(y)}">${esc(y)}</button>`).join(''); document.getElementById('typeFilters').innerHTML=['전체','세특','창의체험활동'].map(t=>`<button class="filter-btn ${CURRENT_TYPE===t?'active':''}" data-type="${esc(t)}">${esc(t)}</button>`).join(''); document.querySelectorAll('[data-year]').forEach(b=>b.onclick=()=>{CURRENT_YEAR=b.dataset.year; render();}); document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{CURRENT_TYPE=b.dataset.type; render();}); }
function itemCard(item){ return `<section class="card"><div class="acc-head"><div><div class="title">${esc(item.title)}</div><div class="subtitle">${esc(item.year)} · ${esc(item.type)} · ${esc(item.category)}</div></div><span class="badge">토글 보기</span></div><div class="box"><div class="kicker">원문</div><div class="body">${esc(item.raw_text)}</div></div></section>`; }
function bindAccordions(){ document.querySelectorAll('.acc-head').forEach(h=>{ h.onclick=()=> h.parentElement.classList.toggle('open'); }); }
function render(){ renderFilterButtons(); let visible=ALL_ITEMS.slice(); if(CURRENT_YEAR!=='전체') visible=visible.filter(v=>v.year===CURRENT_YEAR); if(CURRENT_TYPE!=='전체') visible=visible.filter(v=>v.type===CURRENT_TYPE); document.getElementById('itemsWrap').innerHTML = visible.length ? visible.map(itemCard).join('') : '<div class="empty">선택한 조건에 해당하는 원문이 없습니다.</div>'; bindAccordions(); }
(async function(){ const data=await loadJson('../school_record_raw.json'); targetId = resolveTargetId(data); document.getElementById('goBasic').href=`./record_detail.html?student_id=${encodeURIComponent(targetId)}`; document.getElementById('goMapping').href=`./record_detail_mapping.html?student_id=${encodeURIComponent(targetId)}`; document.getElementById('goExtension').href=`./record_detail_extension.html?student_id=${encodeURIComponent(targetId)}`; document.getElementById('goCreative').href=`./record_creative.html?student_id=${encodeURIComponent(targetId)}`; ALL_ITEMS = normalizeRawData(data); fillSidebars(ALL_ITEMS); render(); })();
</script>
</body>
</html>
