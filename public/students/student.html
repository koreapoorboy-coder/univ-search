<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>학생 성적</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .badge{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:6px 10px;font-weight:900;background:#fff
    }
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .subject-grid{
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap:12px;
      margin-top:12px;
    }
    @media(max-width: 980px){ .subject-grid{grid-template-columns: repeat(3, minmax(0, 1fr));} }
    @media(max-width: 680px){ .subject-grid{grid-template-columns: repeat(2, minmax(0, 1fr));} }
    @media(max-width: 460px){ .subject-grid{grid-template-columns: 1fr;} }

    .score-box{
      border:1px solid #eee;border-radius:16px;padding:14px;background:#fff;
      min-height:84px;
    }
    .score-head{
      display:flex;justify-content:space-between;gap:8px;align-items:flex-start;
      font-weight:900
    }
    .score-subj{font-size:16px}
    .score-p{opacity:.75;font-weight:900;white-space:nowrap}
    .score-main{
      margin-top:6px;display:flex;justify-content:space-between;gap:8px;align-items:flex-end
    }
    .score-point{font-size:24px;font-weight:900;line-height:1}
    .score-grade{font-size:14px;font-weight:900;opacity:.8;white-space:nowrap}
    .score-grade.hidden{display:none}

    .inline-note{margin-top:8px;color:#444;font-size:13px}

    details.rounds{
      margin-top:12px;border:1px solid #eee;border-radius:14px;padding:10px 12px;background:#fff;
    }
    details.rounds > summary{
      cursor:pointer;font-weight:900;list-style:none;
    }
    details.rounds > summary::-webkit-details-marker{display:none}
    .round-list{margin-top:10px;display:grid;gap:10px}
    .round-item{
      border:1px solid #eee;border-radius:12px;padding:10px;background:#fff
    }
    .round-head{
      display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap
    }
    .round-title{font-weight:900}
    .round-meta{opacity:.75;font-size:13px}
    .mini-grid{
      display:grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap:8px;
      margin-top:8px;
    }
    @media(max-width:980px){ .mini-grid{grid-template-columns: repeat(3, minmax(0,1fr));} }
    @media(max-width:680px){ .mini-grid{grid-template-columns: repeat(2, minmax(0,1fr));} }
    @media(max-width:460px){ .mini-grid{grid-template-columns: 1fr;} }

    .mini{
      border:1px solid #eee;border-radius:10px;padding:8px 10px;
      display:flex;justify-content:space-between;gap:8px;align-items:center
    }
    .mini .k{font-weight:900}
    .mini .v{font-weight:900}
    .mini .g{font-size:12px;opacity:.75;font-weight:900}

    select{
      border:1px solid #ddd;border-radius:12px;padding:10px 12px;background:#fff;font-weight:900;
      max-width:100%;
    }

    .spacer{height:2px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">학생 성적</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>

    <div class="row" id="navRow"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="title" style="font-size:16px;margin:0">최신 성적: <span id="latestRoundLabel">-</span></div>
      </div>
      <div class="rightgroup">
        <span class="muted">원점수 + 백분위(p) + 등급(컷)</span>
      </div>
    </div>

    <div class="subject-grid" id="scoreGrid"></div>
    <div class="inline-note">※ 등급은 해당 회차의 과목별 컷(원점수) 기준으로 계산됩니다. 컷 데이터가 없으면 백분위 기준으로 보정 표시합니다.</div>

    <details class="rounds" id="prevWrap">
      <summary>이전 성적 보기</summary>
      <div class="round-list" id="prevRounds"></div>
    </details>
  </div>
</div>

<script>
(() => {
  // ✅ 다른 페이지(index / univ_list / progress_detail / record_detail / record_raw_detail)와 동일하게 맞추세요.
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN";
  const LS_KEY = "__ADMIN_TOKEN__";

  const SUBJECTS = ["국어","수학","영어","탐1","탐2"];

  const qs = new URLSearchParams(location.search);
  const idParam = qs.get("id");
  const tParam  = qs.get("t") || qs.get("token");
  const adminParam = (qs.get("admin") || "").trim();
  const adminSaved = (localStorage.getItem(LS_KEY) || "").trim();
  const admin = adminParam || adminSaved;

  const isAdmin = (admin === ADMIN_TOKEN);
  if (adminParam && isAdmin) localStorage.setItem(LS_KEY, adminParam);

  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
  const norm = (v)=>String(v ?? "").trim();

  function pickName(s){ return s.studentName ?? s.studentname ?? s.name ?? s["학생명"] ?? s["이름"] ?? s["성명"] ?? s.id ?? "-"; }
  function pickId(s){ return s.id ?? s.studentId ?? s.studentID ?? s["ID"] ?? s["학생ID"] ?? s["학번"] ?? null; }
  function pickToken(s){ return s.token ?? s.accessToken ?? s.key ?? s["token"] ?? s["토큰"] ?? null; }

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  function parseNum(v){
    if(v === null || v === undefined || v === "") return null;
    const n = Number(String(v).replace(/[^\d.-]/g,""));
    return Number.isFinite(n) ? n : null;
  }

  function scoreOf(row, subj){
    return parseNum(
      row[subj],
      row[`${subj}점수`],
      row[`${subj}_score`],
      row[`${subj}Score`]
    );
  }

  function percentileOf(row, subj){
    // 다양한 형태 허용
    return parseNum(
      row[`${subj}p`], row[`${subj}P`],
      row[`${subj}백분위`], row[`${subj}_percentile`], row[`${subj}percentile`]
    );
  }

  function explicitGradeOf(row, subj){
    const v = pickText(
      row[`${subj}등급`],
      row[`${subj}_grade`],
      row[`${subj}grade`]
    );
    if(!v) return null;
    const n = parseNum(v);
    return n ? `${n}등급` : v;
  }

  function cutAt(row, subj, grade){
    // 우선순위: 과목컷1~9 → 과목_컷_1 → cuts 객체
    let v = row[`${subj}컷${grade}`];
    if(v == null) v = row[`${subj}_컷_${grade}`];
    if(v == null && row.cuts && row.cuts[subj] && row.cuts[subj][grade] != null) v = row.cuts[subj][grade];

    // 레거시: `${subj}컷` 만 있는 경우 = 1등급 컷으로 간주
    if(v == null && grade === 1) v = row[`${subj}컷`];

    return parseNum(v);
  }

  function gradeByCuts(row, subj){
    const score = scoreOf(row, subj);
    if(score == null) return null;

    const cuts = [];
    for(let g=1; g<=9; g++){
      const c = cutAt(row, subj, g);
      if(c != null) cuts.push({ g, c });
    }
    if(!cuts.length) return null;

    // 컷이 모두 있을 수도, 일부만 있을 수도 있음. "해당 점수 이상인 가장 높은 등급" 계산
    // 기준: 낮은 등급 숫자가 더 좋은 등급
    cuts.sort((a,b) => a.g - b.g); // 1,2,3...
    for(const x of cuts){
      if(score >= x.c) return `${x.g}등급`;
    }

    // 어떤 컷에도 못 미치면 최대 +1 또는 9등급 처리
    const maxG = Math.max(...cuts.map(x => x.g));
    return `${Math.min(9, maxG + 1)}등급`;
  }

  function gradeByPercentile(row, subj){
    const p = percentileOf(row, subj);
    if(p == null) return null;

    // 표준 9등급 누적 백분위 근사 기준 (상위%가 낮을수록 유리)
    // 여기 p가 "백분위 점수(높을수록 좋음)"인지, "상위% (낮을수록 좋음)"인지 혼재 가능
    // 화면 예시가 99p, 92p 형태여서 "높을수록 좋음"으로 가정
    const pp = Number(p);

    // 백분위 점수 기준 근사 (많이 쓰는 분기)
    if(pp >= 96) return "1등급";
    if(pp >= 89) return "2등급";
    if(pp >= 77) return "3등급";
    if(pp >= 60) return "4등급";
    if(pp >= 40) return "5등급";
    if(pp >= 23) return "6등급";
    if(pp >= 11) return "7등급";
    if(pp >= 4)  return "8등급";
    return "9등급";
  }

  function gradeLabel(row, subj){
    return (
      explicitGradeOf(row, subj) ||
      gradeByCuts(row, subj) ||
      gradeByPercentile(row, subj)
    );
  }

  function roundNumOf(r){
    return parseNum(r.round ?? r.Round ?? r["회차"] ?? r["차수"]);
  }
  function dateOf(r){
    return pickText(r.date, r.Date, r["날짜"], r["일자"]);
  }
  function roundKey(r){
    const rn = roundNumOf(r);
    const d = dateOf(r);
    if(rn != null && d) return `#${rn} (${d})`;
    if(rn != null) return `#${rn}`;
    if(d) return d;
    return "회차 미지정";
  }

  function sortScores(rows){
    return rows.slice().sort((a,b)=>{
      const ra = roundNumOf(a), rb = roundNumOf(b);
      if(ra != null && rb != null && ra !== rb) return rb - ra; // 최신 회차 먼저

      const da = Date.parse(dateOf(a) || "");
      const db = Date.parse(dateOf(b) || "");
      const aOk = Number.isFinite(da), bOk = Number.isFinite(db);
      if(aOk && bOk && da !== db) return db - da;

      return 0;
    });
  }

  function renderStudentMeta(student){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student.school, student["학교"]);
    const career = pickText(student.career, student["진로"]);
    const adm = pickText(student.admission, student["전형"]);

    $("#hdr").innerHTML = `${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student){
    const sid = norm(pickId(student));
    const stok = norm(pickToken(student));
    const nav = [];

    if(isAdmin){
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(admin)}">학생 목록</a>`);
      nav.push(`<a class="btn" href="./univ_list.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}">대학 상향/적정</a>`);
      nav.push(`<a class="btn" href="./progress_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}">진도 보기</a>`);
      nav.push(`<a class="btn" href="./record_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}">생기부 분석 보기</a>`);
      nav.push(`<a class="btn" href="./record_raw_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}">생기부 원문 보기</a>`);
    } else {
      // ✅ 핵심 수정: token 모드에도 생기부 2개 버튼 표시
      nav.push(`<a class="btn" href="./univ_list.html?t=${encodeURIComponent(stok)}">대학 상향/적정</a>`);
      nav.push(`<a class="btn" href="./progress_detail.html?t=${encodeURIComponent(stok)}">진도 보기</a>`);
      nav.push(`<a class="btn" href="./record_detail.html?t=${encodeURIComponent(stok)}">생기부 분석 보기</a>`);
      nav.push(`<a class="btn" href="./record_raw_detail.html?t=${encodeURIComponent(stok)}">생기부 원문 보기</a>`);
    }

    $("#navRow").innerHTML = nav.join("");
  }

  function scoreBoxHtml(subj, row){
    const sc = scoreOf(row, subj);
    const p  = percentileOf(row, subj);
    const g  = gradeLabel(row, subj);

    return `
      <div class="score-box">
        <div class="score-head">
          <div class="score-subj">${esc(subj)}</div>
          <div class="score-p">${p != null ? `${esc(p)}p` : `-`}</div>
        </div>
        <div class="score-main">
          <div class="score-point">${sc != null ? `${esc(sc)}점` : `-`}</div>
          <div class="score-grade ${g ? "" : "hidden"}">${g ? esc(g) : ""}</div>
        </div>
      </div>
    `;
  }

  function renderLatest(row){
    $("#latestRoundLabel").textContent = roundKey(row);
    $("#scoreGrid").innerHTML = SUBJECTS.map(s => scoreBoxHtml(s, row)).join("");
  }

  function miniRow(subj, row){
    const sc = scoreOf(row, subj);
    const p = percentileOf(row, subj);
    const g = gradeLabel(row, subj);
    return `
      <div class="mini">
        <div class="k">${esc(subj)}</div>
        <div style="text-align:right">
          <div class="v">${sc != null ? `${esc(sc)}점` : "-"}</div>
          <div class="g">${p != null ? `${esc(p)}p` : "-"}${g ? ` · ${esc(g)}` : ""}</div>
        </div>
      </div>
    `;
  }

  function renderPrevious(rows){
    const prev = rows.slice(1);
    const wrap = $("#prevWrap");
    const list = $("#prevRounds");

    if(!prev.length){
      wrap.open = false;
      list.innerHTML = `<div class="muted">이전 성적이 없습니다.</div>`;
      return;
    }

    list.innerHTML = prev.map(r => `
      <div class="round-item">
        <div class="round-head">
          <div class="round-title">${esc(roundKey(r))}</div>
          <div class="round-meta">${esc(pickText(r.memo, r.note, r["메모"]) || "")}</div>
        </div>
        <div class="mini-grid">
          ${SUBJECTS.map(s => miniRow(s, r)).join("")}
        </div>
      </div>
    `).join("");
  }

  async function main(){
    const students = await loadJson("./students.json");
    if(!Array.isArray(students)) throw new Error("students.json is not an array");

    let student = null;
    if(isAdmin && idParam){
      student = students.find(s => norm(pickId(s)) === norm(idParam));
    }
    if(!student && tParam){
      student = students.find(s => norm(pickToken(s)) === norm(tParam));
    }

    if(!student){
      $(".wrap").innerHTML = `
        <div class="card">
          <div class="title">접근 권한이 없습니다.</div>
          <div class="warn">학생을 찾을 수 없습니다.</div>
          <div class="muted" style="margin-top:8px">
            관리자: student.html?id=학생ID&admin=관리자토큰 / 학생·학부모: student.html?t=개별토큰
          </div>
        </div>
      `;
      return;
    }

    renderStudentMeta(student);
    renderNav(student);

    const sid = norm(pickId(student));

    let scoresRaw = [];
    try{
      scoresRaw = await loadJson("./scores.json");
    }catch(e){
      // scores.json 없을 때도 페이지는 열리게
      scoresRaw = [];
    }

    let rows = Array.isArray(scoresRaw) ? scoresRaw : [];
    rows = rows.filter(r => norm(r?.id) === sid);
    rows = sortScores(rows);

    if(!rows.length){
      $("#latestRoundLabel").textContent = "-";
      $("#scoreGrid").innerHTML = SUBJECTS.map(s => `
        <div class="score-box">
          <div class="score-head"><div class="score-subj">${esc(s)}</div><div class="score-p">-</div></div>
          <div class="score-main"><div class="score-point">-</div><div class="score-grade hidden"></div></div>
        </div>
      `).join("");
      $("#prevWrap").open = false;
      $("#prevRounds").innerHTML = `<div class="muted">성적 데이터가 없습니다. (scores.json 확인)</div>`;
      return;
    }

    renderLatest(rows[0]);
    renderPrevious(rows);
  }

  main().catch(err => {
    $(".wrap").innerHTML = `
      <div class="card">
        <div class="title">오류</div>
        <div class="warn">로딩 오류</div>
        <div class="muted" style="margin-top:8px">${esc(err.message)}</div>
      </div>
    `;
  });
})();
</script>
</body>
</html>
