<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>진도 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .subttl{font-size:16px;font-weight:900;margin:0}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .pill.soft{border-color:#eee}
    .pill.ok{border-color:#0b7a22}
    .pill.off{border-color:#bbb;opacity:.8}

    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .btn.secondary{border-color:#ddd}
    .btn.disabled{pointer-events:none;opacity:.45;background:#f8f8f8;border-color:#ddd;color:#666}

    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .entry-list{display:grid;gap:12px}
    .entry-card{
      border:1px solid #eee;border-radius:16px;padding:14px;background:#fff
    }
    .entry-head{
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap
    }
    .entry-title{font-weight:900;font-size:16px;line-height:1.3}
    .entry-meta{opacity:.8;font-size:12px;line-height:1.5}

    .section{
      margin-top:12px;padding-top:10px;border-top:1px dashed #eee
    }
    .section:first-child{margin-top:10px}
    .section-label{
      font-size:12px;font-weight:900;opacity:.75;margin-bottom:6px
    }
    .text{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.55;
      font-size:14px;
    }

    .task-grid{
      display:grid;grid-template-columns:1fr;gap:8px;margin-top:6px
    }
    .task{
      border:1px solid #eee;border-radius:12px;padding:10px;background:#fff
    }
    .task-top{
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap
    }
    .task-subject{font-weight:900}
    .task-status{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:4px 8px;font-size:12px;font-weight:900;white-space:nowrap
    }
    .task-status.done{border-color:#0b7a22}
    .task-status.todo{border-color:#ddd}
    .task-status.na{border-color:#ddd;opacity:.7}

    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:5px 9px;font-size:12px;font-weight:900;background:#fff
    }

    .empty{
      border:1px dashed #ddd;border-radius:14px;padding:14px;background:#fff;
      color:#555
    }

    details.rounds{
      margin-top:12px;border:1px solid #eee;border-radius:14px;padding:10px 12px;background:#fff;
    }
    details.rounds > summary{
      cursor:pointer;font-weight:900;list-style:none;
    }
    details.rounds > summary::-webkit-details-marker{display:none}

    .tiny{font-size:12px;opacity:.8}

    @media(max-width:760px){
      .topbar{align-items:flex-start}
    }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">진도 보기</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>
    <div class="row" id="navRow"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">최신 진도 / 상담 기록</div>
        <span class="pill soft" id="latestCountPill">0건</span>
      </div>
      <div class="rightgroup">
        <span class="muted">주차 · 과목별 체크 · 코멘트</span>
      </div>
    </div>
    <div class="entry-list" id="latestArea" style="margin-top:12px;"></div>

    <details class="rounds" id="prevWrap">
      <summary>이전 기록 보기</summary>
      <div class="entry-list" id="prevArea" style="margin-top:10px;"></div>
    </details>
  </div>
</div>

<script>
(() => {
  // =========================
  // 설정값
  // =========================
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN"; // ✅ 실제 관리자 토큰으로 교체
  const LS_KEY = "__ADMIN_TOKEN__";

  // =========================
  // 공통 유틸 / 보안 분기
  // =========================
  function getQS() {
    return new URLSearchParams(location.search);
  }

  function safeStr(v) {
    return (v == null) ? "" : String(v);
  }

  function getAuthContext() {
    const qs = getQS();

    const t = safeStr(qs.get("t") || qs.get("token")).trim();
    const id = safeStr(qs.get("id")).trim();
    const admin = safeStr(qs.get("admin")).trim() || safeStr(localStorage.getItem(LS_KEY)).trim();

    // 🔒 t가 있으면 무조건 학생모드
    if (t) {
      return { mode: "student", token: t, id: "", admin: "", isAdmin: false };
    }

    if (id && admin) {
      return { mode: "admin", token: "", id, admin, isAdmin: false };
    }

    return { mode: "guest", token: "", id: "", admin: "", isAdmin: false };
  }

  function buildPageLink(page, auth, student) {
    // 🔒 학생모드는 무조건 t=
    if (auth && auth.mode === "student") {
      return `${page}?t=${encodeURIComponent(auth.token)}`;
    }

    // 관리자모드는 검증 완료 시에만 id+admin
    if (auth && auth.mode === "admin" && auth.isAdmin) {
      const sid = pickId(student) || auth.id;
      return `${page}?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(auth.admin)}`;
    }

    return page;
  }

  function resolveStudentByAuth(students, auth) {
    if (!Array.isArray(students)) return null;

    if (auth.mode === "student") {
      return students.find(s => safeStr(pickToken(s)).trim() === auth.token) || null;
    }

    if (auth.mode === "admin" && auth.isAdmin) {
      return students.find(s => safeStr(pickId(s)).trim() === auth.id) || null;
    }

    return null;
  }

  // =========================
  // DOM / 유틸
  // =========================
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
  const norm = (v)=>String(v ?? "").trim();

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  }

  function parseNum(v){
    if(v == null || v === "") return null;
    const n = Number(String(v).replace(/[^\d.-]/g,""));
    return Number.isFinite(n) ? n : null;
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  async function loadJsonSafe(path, fallback){
    try{ return await loadJson(path); }catch(_e){ return fallback; }
  }

  function truthyLike(v){
    if (typeof v === "boolean") return v;
    const s = String(v ?? "").trim().toLowerCase();
    if (!s) return null;
    if (["y","yes","true","1","완료","done","ok","o","체크","pass"].includes(s)) return true;
    if (["n","no","false","0","미완료","todo","x","미체크"].includes(s)) return false;
    return null;
  }

  // =========================
  // 학생 데이터 키 유틸
  // =========================
  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["ID"] ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  // =========================
  // flags (생기부 버튼 노출용 옵션)
  // =========================
  function getRecordFlag(flags, studentId) {
    if (!flags) return {};
    if (Array.isArray(flags)) {
      return flags.find(x => String(x?.id) === String(studentId)) || {};
    }
    return flags[studentId] || {};
  }

  function canViewRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;
    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  function canViewRawRecord(flag, auth) {
    return canViewRecord(flag, auth);
  }

  // =========================
  // 네비 / 상단 렌더
  // =========================
  function renderNoAccess(message){
    $("#app").innerHTML = `
      <div class="card">
        <div class="title">접근 권한이 없습니다.</div>
        <div class="warn">${esc(message || "진도 보기 페이지 접근 권한이 없습니다.")}</div>
        <div class="muted" style="margin-top:8px">
          관리자: progress_detail.html?id=학생ID&admin=관리자토큰 / 학생·학부모: progress_detail.html?t=개별토큰
        </div>
      </div>
    `;
  }

  function renderError(title, message){
    $("#app").innerHTML = `
      <div class="card">
        <div class="title">${esc(title || "오류")}</div>
        <div class="warn">${esc(message || "문제가 발생했습니다.")}</div>
      </div>
    `;
  }

  function renderStudentMeta(student, auth){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student.school, student["학교"]);
    const career = pickText(student.career, student["진로"]);
    const adm = pickText(student.admission, student["전형"]);

    $("#hdr").innerHTML = `${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = auth.isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student, auth, recordFlag){
    const nav = [];

    if (auth.isAdmin) {
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(auth.admin)}">학생 목록</a>`);
    }

    nav.push(`<a class="btn" href="${buildPageLink("./student.html", auth, student)}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./univ_list.html", auth, student)}">대학 상향/적정</a>`);

    if (canViewRecord(recordFlag, auth)) {
      nav.push(`<a class="btn" href="${buildPageLink("./record_detail.html", auth, student)}">생기부 분석 보기</a>`);
    } else {
      nav.push(`<span class="btn disabled">생기부 분석 보기</span>`);
    }

    if (canViewRawRecord(recordFlag, auth)) {
      nav.push(`<a class="btn" href="${buildPageLink("./record_raw_detail.html", auth, student)}">생기부 원문 보기</a>`);
    } else {
      nav.push(`<span class="btn disabled">생기부 원문 보기</span>`);
    }

    $("#navRow").innerHTML = nav.join("");
  }

  // =========================
  // progress 데이터 파싱
  // =========================
  function getProgressDataForStudent(rawData, sid){
    if (!rawData) return null;

    // 1) 배열형
    if (Array.isArray(rawData)) {
      // 1-1) 학생 wrapper 배열 [{id, notes:[...]}, ...]
      const wrapper = rawData.find(x =>
        norm(x?.id ?? x?.studentId ?? x?.["학생ID"]) === norm(sid) &&
        (Array.isArray(x?.entries) || Array.isArray(x?.notes) || Array.isArray(x?.progress) || Array.isArray(x?.items))
      );
      if (wrapper) return wrapper;

      // 1-2) flat row 배열 [{id, week, subject, task...}, ...]
      const flatRows = rawData.filter(x => norm(x?.id ?? x?.studentId ?? x?.["학생ID"]) === norm(sid));
      if (flatRows.length) return { entries: flatRows };

      return null;
    }

    // 2) 객체형 keyed by sid
    if (rawData[sid] != null) return rawData[sid];

    // 3) wrapper 객체
    if (Array.isArray(rawData.items)) {
      const x = rawData.items.find(v => norm(v?.id ?? v?.studentId ?? v?.["학생ID"]) === norm(sid));
      if (x) return x;
    }
    if (Array.isArray(rawData.data)) {
      const x = rawData.data.find(v => norm(v?.id ?? v?.studentId ?? v?.["학생ID"]) === norm(sid));
      if (x) return x;
    }

    return null;
  }

  function unwrapProgressPayload(studentProgress){
    if (!studentProgress) return null;
    return (
      studentProgress.progress ||
      studentProgress.notes ||
      studentProgress.entries ||
      studentProgress.items ||
      studentProgress.data ||
      studentProgress
    );
  }

  function pickEntryTitle(e){
    return pickText(
      e.title, e.제목, e.label, e.라벨,
      (parseNum(e.week ?? e["주차"]) != null ? `${parseNum(e.week ?? e["주차"])}주차` : ""),
      (parseNum(e.round ?? e["회차"]) != null ? `${parseNum(e.round ?? e["회차"])}회차` : ""),
      "진도 기록"
    );
  }

  function pickEntryDate(e){
    return pickText(e.date, e.Date, e["날짜"], e["일자"]);
  }

  function pickEntryWeek(e){
    return parseNum(e.week ?? e["주차"]);
  }

  function pickEntryRound(e){
    return parseNum(e.round ?? e["회차"] ?? e["차수"]);
  }

  function pickEntryMemo(e){
    return pickText(
      e.memo, e.note, e.notes, e["메모"], e["상담메모"], e["상담 메모"], e.summary, e["요약"]
    );
  }

  function pickCoachComment(e){
    return pickText(
      e.coachComment, e.teacherComment, e.adminComment,
      e["코치코멘트"], e["교사코멘트"], e["관리자코멘트"], e["피드백"]
    );
  }

  function pickStudentComment(e){
    return pickText(
      e.studentComment, e.selfComment, e.userComment,
      e["학생코멘트"], e["학생메모"], e["자기점검"], e["자기평가"]
    );
  }

  function normalizeTask(t, fallbackSubject){
    const taskText = pickText(
      t.task, t.todo, t.assignment, t.content, t.text,
      t["과제"], t["내용"], t["학습내용"]
    );

    const subject = pickText(
      t.subject, t.course, t.name,
      t["과목"], t["과목명"],
      fallbackSubject
    ) || "기록";

    const doneVal = (
      t.done ?? t.checked ?? t.complete ?? t.completed ??
      t["완료"] ?? t["체크"] ?? t["진행여부"]
    );
    const done = truthyLike(doneVal);

    const comment = pickText(
      t.comment, t.memo, t.note,
      t["메모"], t["비고"], t["코멘트"]
    );

    // 과제 text가 없는 항목은 subject/comment만으로 최소 렌더 가능
    return {
      subject,
      task: taskText,
      done,
      comment
    };
  }

  function collectTasksFromEntry(e){
    // 1) tasks/subjects/items 배열
    const arr = (
      (Array.isArray(e.tasks) && e.tasks) ||
      (Array.isArray(e.subjects) && e.subjects) ||
      (Array.isArray(e.items) && e.items) ||
      (Array.isArray(e.checklist) && e.checklist) ||
      null
    );
    if (arr) {
      return arr.map(x => normalizeTask(x)).filter(t => t.subject || t.task || t.comment);
    }

    // 2) subjects 객체형 {국어:{...}, 수학:{...}}
    if (e.subjects && typeof e.subjects === "object" && !Array.isArray(e.subjects)) {
      return Object.entries(e.subjects)
        .map(([k,v]) => normalizeTask(v || {}, k))
        .filter(t => t.subject || t.task || t.comment);
    }

    // 3) flat row 1개가 task 역할을 하는 구조
    const directSubject = pickText(e.subject, e.course, e["과목"], e["과목명"]);
    const directTask = pickText(e.task, e.todo, e.assignment, e["과제"], e["내용"], e["학습내용"]);
    const directComment = pickText(e.taskComment, e.subjectComment, e["과제메모"]);
    const directDone = truthyLike(e.done ?? e.checked ?? e.complete ?? e["완료"] ?? e["체크"]);

    if (directSubject || directTask || directComment || directDone != null) {
      return [{
        subject: directSubject || "기록",
        task: directTask,
        done: directDone,
        comment: directComment
      }];
    }

    return [];
  }

  function normalizeEntry(e){
    const week = pickEntryWeek(e);
    const round = pickEntryRound(e);
    const date = pickEntryDate(e);

    return {
      title: pickEntryTitle(e),
      week,
      round,
      date,
      memo: pickEntryMemo(e),
      coachComment: pickCoachComment(e),
      studentComment: pickStudentComment(e),
      tasks: collectTasksFromEntry(e),
      sortDateTs: Number.isFinite(Date.parse(date || "")) ? Date.parse(date) : null
    };
  }

  function groupFlatRowsIntoEntries(rows){
    // flat row들을 week/round/date/title 기준으로 묶어서 entry로 변환
    const map = new Map();

    for (const r of rows) {
      const week = pickEntryWeek(r);
      const round = pickEntryRound(r);
      const date = pickEntryDate(r);
      const title = pickText(r.groupTitle, r["그룹"], r["묶음제목"], "") || pickEntryTitle(r);

      const key = [
        week != null ? `w:${week}` : "",
        round != null ? `r:${round}` : "",
        date ? `d:${date}` : "",
        title ? `t:${title}` : ""
      ].join("|") || JSON.stringify(r);

      if (!map.has(key)) {
        map.set(key, {
          title,
          week,
          round,
          date,
          memo: "",
          coachComment: "",
          studentComment: "",
          tasks: [],
          sortDateTs: Number.isFinite(Date.parse(date || "")) ? Date.parse(date) : null
        });
      }

      const entry = map.get(key);

      // row 레벨 메모/코멘트는 비어있을 때만 채움
      if (!entry.memo) entry.memo = pickEntryMemo(r);
      if (!entry.coachComment) entry.coachComment = pickCoachComment(r);
      if (!entry.studentComment) entry.studentComment = pickStudentComment(r);

      const task = collectTasksFromEntry(r);
      if (task.length) entry.tasks.push(...task);
      else {
        // task도 없으면 최소 메모 카드라도 유지 (빈 행 방지)
      }
    }

    return [...map.values()];
  }

  function collectEntriesFromPayload(payload){
    if (!payload) return [];

    let list = [];

    // payload가 배열이면 바로 해석
    if (Array.isArray(payload)) {
      const looksFlat = payload.some(x =>
        x && (("subject" in x) || ("과목" in x) || ("task" in x) || ("과제" in x))
      );
      list = looksFlat ? groupFlatRowsIntoEntries(payload) : payload.map(normalizeEntry);
      return list;
    }

    // payload.entries/notes/progress/items 배열
    const arrCandidate = (
      (Array.isArray(payload.entries) && payload.entries) ||
      (Array.isArray(payload.notes) && payload.notes) ||
      (Array.isArray(payload.progress) && payload.progress) ||
      (Array.isArray(payload.items) && payload.items) ||
      (Array.isArray(payload.data) && payload.data) ||
      null
    );
    if (arrCandidate) {
      const looksFlat = arrCandidate.some(x =>
        x && (("subject" in x) || ("과목" in x) || ("task" in x) || ("과제" in x))
      );
      list = looksFlat ? groupFlatRowsIntoEntries(arrCandidate) : arrCandidate.map(normalizeEntry);
      return list;
    }

    // payload.weeks 객체 / payload.records 객체
    const objCandidate =
      (payload.weeks && typeof payload.weeks === "object" ? payload.weeks : null) ||
      (payload.records && typeof payload.records === "object" ? payload.records : null);

    if (objCandidate) {
      list = Object.entries(objCandidate).map(([k,v]) => {
        const base = (v && typeof v === "object") ? { ...v } : { memo: String(v ?? "") };
        if (parseNum(base.week ?? base["주차"]) == null) base.week = parseNum(k);
        if (!base.title && !base["제목"]) base.title = `${k}주차`;
        return normalizeEntry(base);
      });
      return list;
    }

    // payload 자체가 단일 entry인 경우
    if (typeof payload === "object") {
      list = [normalizeEntry(payload)];
      return list;
    }

    return [];
  }

  function sortEntries(entries){
    return (entries || []).slice().sort((a,b)=>{
      // 1) round desc
      if (a.round != null && b.round != null && a.round !== b.round) return b.round - a.round;
      // 2) week desc
      if (a.week != null && b.week != null && a.week !== b.week) return b.week - a.week;
      // 3) date desc
      if (a.sortDateTs != null && b.sortDateTs != null && a.sortDateTs !== b.sortDateTs) return b.sortDateTs - a.sortDateTs;
      return 0;
    });
  }

  // =========================
  // 렌더링 (진도 카드)
  // =========================
  function entryHeadLabel(e){
    const chips = [];
    if (e.round != null) chips.push(`${e.round}회차`);
    if (e.week != null) chips.push(`${e.week}주차`);
    if (e.date) chips.push(e.date);

    return {
      title: pickText(e.title, chips[0], "진도 기록"),
      meta: chips.join(" · ")
    };
  }

  function statusBadgeHtml(done){
    if (done === true) return `<span class="task-status done">완료</span>`;
    if (done === false) return `<span class="task-status todo">미완료</span>`;
    return `<span class="task-status na">상태 미표기</span>`;
  }

  function taskHtml(t){
    const showTask = !!norm(t.task);
    const showComment = !!norm(t.comment);

    return `
      <div class="task">
        <div class="task-top">
          <div class="task-subject">${esc(t.subject || "기록")}</div>
          ${statusBadgeHtml(t.done)}
        </div>

        ${showTask ? `
          <div class="section" style="margin-top:8px;padding-top:8px;">
            <div class="section-label">과제 / 학습 내용</div>
            <div class="text">${esc(t.task)}</div>
          </div>
        ` : ""}

        ${showComment ? `
          <div class="section" style="margin-top:8px;padding-top:8px;">
            <div class="section-label">비고</div>
            <div class="text">${esc(t.comment)}</div>
          </div>
        ` : ""}
      </div>
    `;
  }

  function entryCardHtml(e){
    const head = entryHeadLabel(e);

    const hasMemo = !!norm(e.memo);
    const hasCoach = !!norm(e.coachComment);
    const hasStudent = !!norm(e.studentComment);
    const tasks = Array.isArray(e.tasks) ? e.tasks.filter(t => t && (norm(t.subject) || norm(t.task) || norm(t.comment) || t.done != null)) : [];
    const hasTasks = tasks.length > 0;

    // 빈값 자동 숨김 반영
    return `
      <div class="entry-card">
        <div class="entry-head">
          <div>
            <div class="entry-title">${esc(head.title)}</div>
            ${head.meta ? `<div class="entry-meta">${esc(head.meta)}</div>` : ``}
          </div>
          <div class="chips">
            ${e.round != null ? `<span class="chip">${esc(e.round)}회차</span>` : ``}
            ${e.week != null ? `<span class="chip">${esc(e.week)}주차</span>` : ``}
            ${e.date ? `<span class="chip">${esc(e.date)}</span>` : ``}
            ${hasTasks ? `<span class="chip">과목/과제 ${tasks.length}건</span>` : ``}
          </div>
        </div>

        ${hasTasks ? `
          <div class="section">
            <div class="section-label">과목별 과제 체크</div>
            <div class="task-grid">
              ${tasks.map(taskHtml).join("")}
            </div>
          </div>
        ` : ""}

        ${hasMemo ? `
          <div class="section">
            <div class="section-label">상담 메모 / 요약</div>
            <div class="text">${esc(e.memo)}</div>
          </div>
        ` : ""}

        ${hasCoach ? `
          <div class="section">
            <div class="section-label">코치 코멘트</div>
            <div class="text">${esc(e.coachComment)}</div>
          </div>
        ` : ""}

        ${hasStudent ? `
          <div class="section">
            <div class="section-label">학생 메모 / 자기점검</div>
            <div class="text">${esc(e.studentComment)}</div>
          </div>
        ` : ""}

        ${(!hasTasks && !hasMemo && !hasCoach && !hasStudent) ? `
          <div class="section">
            <div class="muted">표시할 내용이 없습니다.</div>
          </div>
        ` : ""}
      </div>
    `;
  }

  function renderEntries(entries){
    const list = sortEntries(entries);
    const latestArea = $("#latestArea");
    const prevArea = $("#prevArea");
    const prevWrap = $("#prevWrap");
    const countPill = $("#latestCountPill");

    if (!list.length) {
      countPill.textContent = "0건";
      latestArea.innerHTML = `<div class="empty">진도/상담 기록이 없습니다. <span class="muted">(progress_notes.json 또는 progress.json 확인)</span></div>`;
      prevWrap.open = false;
      prevArea.innerHTML = `<div class="muted">이전 기록이 없습니다.</div>`;
      return;
    }

    const latest = list[0];
    const prev = list.slice(1);

    countPill.textContent = `${list.length}건`;

    latestArea.innerHTML = entryCardHtml(latest);

    if (!prev.length) {
      prevWrap.open = false;
      prevArea.innerHTML = `<div class="muted">이전 기록이 없습니다.</div>`;
      return;
    }

    prevArea.innerHTML = prev.map(entryCardHtml).join("");
  }

  // =========================
  // 메인
  // =========================
  async function main(){
    // 1) auth
    const auth = getAuthContext();

    // 2) admin 검증
    if (auth.mode === "admin") {
      auth.isAdmin = (auth.admin === ADMIN_TOKEN);
      if (!auth.isAdmin) {
        return renderNoAccess("관리자 토큰이 올바르지 않습니다.");
      }
      try { localStorage.setItem(LS_KEY, auth.admin); } catch(_e) {}
    }

    // 3) 학생 조회
    const students = await loadJson("./students.json");
    if (!Array.isArray(students)) throw new Error("students.json is not an array");

    const student = resolveStudentByAuth(students, auth);
    if (!student) return renderNoAccess("학생을 찾을 수 없습니다.");

    const sid = norm(pickId(student));

    // 4) 생기부 버튼 노출용 flags(선택)
    const flagsData = await loadJsonSafe("./school_record_flags.json", null);
    const recordFlag = getRecordFlag(flagsData, sid);

    // 5) 상단
    renderStudentMeta(student, auth);
    renderNav(student, auth, recordFlag);

    // 6) progress 로드 (progress_notes.json 우선)
    let progressRaw = await loadJsonSafe("./progress_notes.json", null);
    if (!progressRaw) {
      progressRaw = await loadJsonSafe("./progress.json", null);
    }

    if (!progressRaw) {
      renderEntries([]);
      return;
    }

    // 7) 학생 진도 데이터 추출
    const studentProgress = getProgressDataForStudent(progressRaw, sid);
    if (!studentProgress) {
      renderEntries([]);
      return;
    }

    const payload = unwrapProgressPayload(studentProgress);
    const entries = collectEntriesFromPayload(payload);

    renderEntries(entries);
  }

  main().catch(err => {
    renderError("오류", `로딩 오류: ${err.message}`);
  });
})();
</script>
</body>
</html>
