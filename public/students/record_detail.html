<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>학생 생활기록부</title>
<style>
body{font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;margin:0;background:#f6f8fc}
.wrap{max-width:900px;margin:0 auto;padding:24px}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:12px}
.title{font-size:22px;font-weight:900;margin-bottom:10px}
.meta{color:#555;margin-bottom:10px}
.section{margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title" id="name">학생 이름</div>
    <div class="meta" id="school"></div>
  </div>

  <div class="card">
    <div class="title">생활기록부 요약</div>
    <div id="summary">데이터 없음</div>
  </div>

  <div id="subjects"></div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const sid = qs.get("student_id");

fetch("../students.json?v="+Date.now())
.then(r=>r.json())
.then(data=>{
  const student = (data.students||[]).find(s=>s.id===sid) || data.students[0];

  document.getElementById("name").textContent = student.name || student.student_name;
  document.getElementById("school").textContent = student.school || "";

  const wrap = document.getElementById("subjects");

  (student.subjects||[]).forEach(sub=>{
    const el = document.createElement("div");
    el.className="card";
    el.innerHTML = `
      <div class="title">${sub.subject}</div>
      <div>${sub.content || ""}</div>
    `;
    wrap.appendChild(el);
  });
});
</script>
</body>
</html>
