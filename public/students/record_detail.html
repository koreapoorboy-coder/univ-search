<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    :root{--bd:#e8e8e8;--txt:#111;--muted:#666;--bg:#fff;--soft:#fafafa}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:26px;background:var(--bg);padding:22px;margin:14px 0}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .badge,.pill{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted)}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap}
    .toggle,.mini-toggle{appearance:none;border:1px solid var(--bd);background:#fff;color:#111;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .toggle.is-on,.mini-toggle.is-on{background:#111;color:#fff;border-color:#111}
    .toggle:disabled{opacity:.45;cursor:default}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .one-line{font-size:18px;line-height:1.7;color:#333;margin-top:10px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .keyword-groups{display:grid;gap:12px}
    .keyword-group{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:14px 16px}
    .keyword-group-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
    .keyword-group-title{font-size:14px;font-weight:900;line-height:1.4}
    .keyword-group-desc{font-size:13px;color:var(--muted);line-height:1.6}
    .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:14px;font-weight:800;cursor:pointer}
    .chip.is-on{background:#111;color:#fff;border-color:#111}
    .keyword-help{color:var(--muted);font-size:14px;line-height:1.7;margin:0 0 12px 0}
    .keyword-meaning{margin-top:14px;border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .keyword-meaning-label{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .keyword-meaning-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .keyword-meaning-body{color:#333;line-height:1.75;margin-top:8px}

    .flow-intro{color:var(--muted);font-size:14px;line-height:1.75;margin:0 0 14px 0}
    .flow-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .flow-card{border:1px solid var(--bd);border-radius:22px;background:var(--soft);padding:18px 18px 16px}
    .flow-kicker{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .flow-title{font-size:18px;font-weight:900;line-height:1.45;margin:12px 0 8px 0}
    .flow-body{color:#333;line-height:1.75;font-size:14px;min-height:88px}
    .flow-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .flow-chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:13px;font-weight:800}
    @media (max-width: 980px){.flow-grid{grid-template-columns:1fr}.flow-body{min-height:auto}}

    .block{border:1px solid var(--bd);border-radius:22px;padding:20px;background:#fff}
    .block + .block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;margin:0 0 10px 0;color:#222}
    .inline-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .axis-item{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:8px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:#111;color:#fff;font-size:12px;margin-right:8px}
    .axis-text{color:#333;line-height:1.7;font-size:14px}
    .example-grid{display:grid;gap:10px;margin-top:12px}
    .example-item{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .example-type{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .example-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .example-body{color:#333;line-height:1.75;margin-top:10px}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    .guide{font-size:13px;color:var(--muted);margin:6px 2px}
    .year-layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .year-layout.is-summary-open{grid-template-columns:minmax(280px,420px) 1fr}
    .year-left{display:flex;flex-direction:column;justify-content:flex-start}
    .year-summary{border:1px solid var(--bd);border-radius:22px;background:var(--soft);padding:18px 20px}
    .year-summary[hidden]{display:none !important}
    .year-summary-title{font-size:16px;font-weight:900;line-height:1.45;margin:0 0 10px 0}
    .year-summary-desc{color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 12px 0}
    .year-summary-item + .year-summary-item{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
    .year-summary-label{font-size:14px;font-weight:900;line-height:1.45;margin:0 0 6px 0}
    .year-summary-body{color:#333;line-height:1.75;font-size:14px}
    @media (max-width: 980px){.axis-list{grid-template-columns:1fr}.hero-title{font-size:26px}.one-line{font-size:17px}.toggle{padding:9px 14px;font-size:14px}.year-layout,.year-layout.is-summary-open{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">데이터를 불러오는 중입니다.</div>
        </div>
        <div class="row"><span class="pill" id="previewBadge">실데이터</span></div>
      </div>
    </div>

    <div class="card" id="yearCard">
      <div class="year-layout">
        <div class="year-left">
          <div class="section-h">
            <div>
              <div class="section-title">학년 선택</div>
              <div class="section-desc">1학년 · 2학년 · 3학년 토글로 구분해서 확인</div>
            </div>
            <button class="mini-toggle" id="yearSummaryToggleBtn" type="button" aria-expanded="false" aria-controls="yearSummaryPanel">총평 보기</button>
          </div>
          <div class="toggle-wrap" id="yearToggles"></div>
        </div>
        <div class="year-summary" id="yearSummaryPanel" hidden></div>
      </div>
    </div>

    <div class="card" id="subjectCardTop">
      <div class="section-h">
        <div>
          <div class="section-title">과목 선택</div>
          <div class="section-desc">선택한 학년 안에서 과목별 분석만 표시</div>
        </div>
      </div>
      <div class="toggle-wrap" id="subjectToggles"></div>
    </div>

    <div class="guide" id="loadGuide"></div>
    <div class="card" id="analysisCard"></div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const qs = new URLSearchParams(location.search);

  const state = {
    student: null,
    yearIndex: 0,
    subjectIndex: 0,
    showExamples: false,
    selectedKeyword: '',
    showYearSummary: false,
  };

  const DEFAULT_YEAR_SUMMARIES = {};

  function defaultYearSummaryFor(studentId, yearLabel){
    return DEFAULT_YEAR_SUMMARIES[String(studentId || '').trim()]?.[String(yearLabel || '').trim()] || null;
  }

  function readYearSummaryFromStudent(student, yearLabel){
    const ys = student?.year_summaries;
    if (!ys) return null;
    if (Array.isArray(ys)) {
      const found = ys.find(v => String(v?.year || '').trim() === String(yearLabel || '').trim());
      if (!found) return null;
      return {
        academic: found.academic || found.academic_summary || '',
        career: found.career || found.career_summary || '',
        community: found.community || found.community_summary || '',
      };
    }
    const byKey = ys[String(yearLabel || '').trim()];
    if (!byKey) return null;
    return {
      academic: byKey.academic || byKey.academic_summary || '',
      career: byKey.career || byKey.career_summary || '',
      community: byKey.community || byKey.community_summary || '',
    };
  }

  function readYearSummaryFromYear(year){
    const overview = year?.summary_overview;
    if (!overview) return null;
    return {
      academic: overview.academic || overview.academic_summary || '',
      career: overview.career || overview.career_summary || '',
      community: overview.community || overview.community_summary || '',
    };
  }

  function getYearSummary(student, year){
    const yearLabel = typeof year === 'string' ? year : (year?.year || year?.year_label || '');
    const fromData = readYearSummaryFromStudent(student, yearLabel);
    if (fromData && (fromData.academic || fromData.career || fromData.community)) return fromData;
    const fromYear = typeof year === 'string' ? null : readYearSummaryFromYear(year);
    if (fromYear && (fromYear.academic || fromYear.career || fromYear.community)) return fromYear;
    return defaultYearSummaryFor(student?.student_id, yearLabel) || {
      academic: '',
      career: '',
      community: '',
    };
  }

  function renderYearSummary(year){
    const panel = $('#yearSummaryPanel');
    const layout = document.querySelector('#yearCard .year-layout');
    const toggleBtn = $('#yearSummaryToggleBtn');
    if (!panel) return;
    const summary = getYearSummary(state.student, year);
    const hasAny = Boolean(summary.academic || summary.career || summary.community);

    if (toggleBtn) {
      toggleBtn.textContent = state.showYearSummary ? '총평 닫기' : '총평 보기';
      toggleBtn.classList.toggle('is-on', state.showYearSummary);
      toggleBtn.setAttribute('aria-expanded', String(state.showYearSummary));
    }

    panel.hidden = !state.showYearSummary;
    if (layout) layout.classList.toggle('is-summary-open', state.showYearSummary);
    if (!state.showYearSummary) return;

    panel.innerHTML = hasAny ? `
      <div class="year-summary-title">${esc(year?.year || '')} 총평</div>
      <div class="year-summary-desc">대학 평가 기준인 학업역량 · 진로역량 · 공동체역량 관점에서 읽은 요약입니다.</div>
      <div class="year-summary-item">
        <div class="year-summary-label">학업역량</div>
        <div class="year-summary-body">${esc(summary.academic || '')}</div>
      </div>
      <div class="year-summary-item">
        <div class="year-summary-label">진로역량</div>
        <div class="year-summary-body">${esc(summary.career || '')}</div>
      </div>
      <div class="year-summary-item">
        <div class="year-summary-label">공동체역량</div>
        <div class="year-summary-body">${esc(summary.community || '')}</div>
      </div>
    ` : `
      <div class="year-summary-title">${esc(year?.year || '학년')} 총평</div>
      <div class="year-summary-desc">이 학년의 총평 데이터가 아직 없습니다.</div>
      <div class="empty">학업역량 · 진로역량 · 공동체역량 요약을 추가하면 이 영역에 함께 표시됩니다.</div>
    `;
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:'no-store' });
    if (!r.ok) throw new Error(`${path} (${r.status})`);
    return r.json();
  }

  async function loadRecordData(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./record_detail.json?${stamp}`,
      `record_detail.json?${stamp}`,
      `./data/record_detail.json?${stamp}`,
      `../record_detail.json?${stamp}`,
      `/record_detail.json?${stamp}`,
    ];
    const tried = [];
    for (const path of candidates) {
      try {
        const data = await loadJson(path);
        return { data, source: path, tried };
      } catch (e) {
        tried.push(path);
      }
    }
    throw new Error(`record_detail.json을 찾지 못했습니다. 시도한 경로: ${tried.join(', ')}`);
  }

  function pickTokenValue(row){
    return String(
      row?.token
      ?? row?.accessToken
      ?? row?.access_token
      ?? row?.studentToken
      ?? row?.student_token
      ?? row?.key
      ?? row?.['토큰']
      ?? ''
    ).trim();
  }

  function pickStudentIdValue(row){
    return String(
      row?.id
      ?? row?.student_id
      ?? row?.studentId
      ?? row?.studentID
      ?? row?.['학생ID']
      ?? ''
    ).trim();
  }

  async function loadStudentsIndex(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./students.json?${stamp}`,
      `students.json?${stamp}`,
      `./data/students.json?${stamp}`,
      `../students.json?${stamp}`,
      `/students.json?${stamp}`,
    ];
    for (const path of candidates) {
      try {
        return await loadJson(path);
      } catch (_e) {}
    }
    return null;
  }

  function readStoredStudentId(){
    const keys = ['student_id', 'currentStudentId', 'selectedStudentId', 'record_student_id', 'sid'];
    for (const key of keys) {
      const fromSession = String(sessionStorage.getItem(key) || '').trim();
      if (fromSession) return fromSession;
      const fromLocal = String(localStorage.getItem(key) || '').trim();
      if (fromLocal) return fromLocal;
    }
    return '';
  }

  function readHashStudentId(){
    const hash = String(location.hash || '').replace(/^#/, '').trim();
    if (!hash) return '';
    if (hash.includes('=')) {
      const h = new URLSearchParams(hash);
      return String(h.get('id') || h.get('student_id') || h.get('sid') || '').trim();
    }
    if (/^shstudy\d+/i.test(hash)) return hash;
    return '';
  }

  async function resolveStudentId(){
    const directId = String(qs.get('student_id') || qs.get('id') || qs.get('sid') || '').trim();
    if (directId) return directId;

    const storedId = readStoredStudentId();
    if (storedId) return storedId;

    const hashId = readHashStudentId();
    if (hashId) return hashId;

    const token = String(qs.get('t') || qs.get('token') || '').trim();
    if (token) {
      const studentsIndex = await loadStudentsIndex();
      const rows = Array.isArray(studentsIndex?.students)
        ? studentsIndex.students
        : Array.isArray(studentsIndex)
          ? studentsIndex
          : [];
      const found = rows.find(row => pickTokenValue(row) === token);
      const sid = pickStudentIdValue(found);
      if (sid) {
        try { sessionStorage.setItem('student_id', sid); } catch(_e) {}
        try { localStorage.setItem('student_id', sid); } catch(_e) {}
        return sid;
      }
    }

    try {
      const ref = document.referrer ? new URL(document.referrer) : null;
      const refId = String(ref?.searchParams.get('student_id') || ref?.searchParams.get('id') || ref?.searchParams.get('sid') || '').trim();
      if (refId) return refId;
    } catch (_e) {}

    return '';
  }

  async function pickStudent(data){
    const students = safeArr(data?.students);
    if (!students.length) return null;
    const wantedId = await resolveStudentId();
    if (wantedId) {
      return students.find(s => String(s.student_id || '').trim() === wantedId) || null;
    }
    return students[0];
  }

  function bindYearSummaryToggle(){
    const btn = $('#yearSummaryToggleBtn');
    if (!btn) return;
    btn.onclick = () => {
      state.showYearSummary = !state.showYearSummary;
      const years = safeArr(state.student?.years);
      const year = years[state.yearIndex] || years[0] || { year: '학년' };
      renderYearSummary(year);
    };
  }

  function renderYearToggles(years){
    $('#yearToggles').innerHTML = years.length
      ? years.map((y, i) => `<button class="toggle ${i===state.yearIndex ? 'is-on' : ''}" data-year-idx="${i}">${esc(y.year || `${i+1}학년`)}</button>`).join('')
      : '<button class="toggle" disabled>학년 없음</button>';
    $('#yearToggles').querySelectorAll('[data-year-idx]').forEach(btn => {
      btn.onclick = () => {
        state.yearIndex = Number(btn.dataset.yearIdx || 0);
        state.subjectIndex = 0;
        state.showExamples = false;
        state.selectedKeyword = '';
        rerender();
      };
    });
  }

  function renderSubjectToggles(subjects){
    $('#subjectToggles').innerHTML = subjects.length
      ? subjects.map((s, i) => `<button class="toggle ${i===state.subjectIndex ? 'is-on' : ''}" data-subject-idx="${i}">${esc(s.subject || '과목')}</button>`).join('')
      : '<button class="toggle" disabled>과목 없음</button>';
    $('#subjectToggles').querySelectorAll('[data-subject-idx]').forEach(btn => {
      btn.onclick = () => {
        state.subjectIndex = Number(btn.dataset.subjectIdx || 0);
        state.showExamples = false;
        state.selectedKeyword = '';
        renderSubjectToggles(subjects);
        rerenderAnalysis();
      };
    });
  }

  function axisHtml(axisList){
    const list = safeArr(axisList);
    if (!list.length) return '<div class="empty">역량 축 데이터가 없습니다.</div>';
    return `<div class="axis-list">${list.map(item => `
      <div class="axis-item">
        <div class="axis-head"><span class="axis-no">${esc(item.no || '')}</span>${esc(item.title || '')}</div>
        <div class="axis-text">${esc(item.content || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function examplesHtml(activityExamples){
    const list = safeArr(activityExamples);
    if (!list.length) return '<div class="empty">활동예시 데이터가 없습니다.</div>';
    return `<div class="example-grid">${list.map(opt => `
      <div class="example-item">
        <span class="example-type">${esc(opt.type || '활동예시')}</span>
        <div class="example-title">${esc(opt.title || '')}</div>
        <div class="example-body">${esc(opt.description || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function keywordList(keywords){
    return safeArr(keywords).map(k => String(k || '').trim()).filter(Boolean);
  }

  function uniqueMerge(...arrays){
    const out = [];
    const seen = new Set();
    arrays.flat().forEach(v => {
      const key = String(v || '').trim();
      if (!key || seen.has(key)) return;
      seen.add(key);
      out.push(key);
    });
    return out;
  }

  function pickByRegex(list, regex, used, limit = 6){
    const out = [];
    for (const item of list) {
      if (out.length >= limit) break;
      if (used.has(item)) continue;
      if (!regex.test(item)) continue;
      out.push(item);
      used.add(item);
    }
    return out;
  }

  function pickRemaining(list, used, limit = 6){
    const out = [];
    for (const item of list) {
      if (out.length >= limit) break;
      if (used.has(item)) continue;
      out.push(item);
      used.add(item);
    }
    return out;
  }

  function pickAxisContent(axisList, regex){
    const hit = safeArr(axisList).find(item => regex.test(`${item?.title || ''} ${item?.content || ''}`));
    return hit?.content || '';
  }

  function flowCardsFor(subject){
    const subjectName = String(subject?.subject || '').trim();
    const summary = String(subject?.summary || '').trim();
    const axisList = safeArr(subject?.axis_list);
    const keywords = keywordList(subject?.extension_keywords);
    const used = new Set();

    const TOPIC_RE = /(개념|이해|원리|법칙|공식|구조|현상|문제|배터리|에너지|자동차|보안|블록체인|알고리즘|인공지능|AI|데이터|기후|행복|교육|전염병|의료|자율주행|충격량|운동량|관성|프랙탈|전고체|리튬|심전도|탄소|역사|경제|사회|독서|주제|가치|윤리|장치|모빌리티|스포츠|당구|배드민턴)/;
    const METHOD_RE = /(분석|해석|설계|실험|발표|토론|그래프|시각화|자료|근거|비교|조사|탐구|독해|글쓰기|논리|모델링|표현|구조화|도식화|문헌|계획|정리|판단|설명|검증|제시|구상|활용|적용)/;
    const EXPAND_RE = /(실생활|진로|사회|공동체|협업|리더십|확장|융합|적용|문제 해결|창의|대안|미래|환경|지속가능|안전|직업|기여|정책|현대|세계|국제|운영|멘토링|소통|스포츠)/;

    let topicKeywords = pickByRegex(keywords, TOPIC_RE, used, 6);
    let methodKeywords = pickByRegex(keywords, METHOD_RE, used, 6);
    let expandKeywords = pickByRegex(keywords, EXPAND_RE, used, 6);

    if (!topicKeywords.length) topicKeywords = pickRemaining(keywords, used, 5);
    if (!methodKeywords.length) methodKeywords = pickRemaining(keywords, used, 5);
    if (!expandKeywords.length) expandKeywords = uniqueMerge(pickRemaining(keywords, used, 5), keywords.slice(-3)).slice(0, 6);

    const topicBody = pickAxisContent(axisList, /(개념|이해|원리|내용|핵심|주제|법칙|공식|분야|탐구)/)
      || summary
      || `${subjectName || '이 활동'}에서 다룬 핵심 개념과 문제의식을 중심으로 탐구의 축이 드러납니다.`;

    const methodBody = pickAxisContent(axisList, /(분석|해석|설명|표현|실험|그래프|자료|설계|문헌|모델링|발표|토론|비교|구조|도식|독해|서술|조사|판단)/)
      || '자료 해석, 설명, 실험, 설계, 비교 등 학생이 실제로 사용한 탐구 방식이 확인됩니다.';

    const expandBody = pickAxisContent(axisList, /(실생활|확장|융합|적용|문제 해결|창의|진로|사회|공동체|리더십|협업|기여|스포츠|안전|환경|대안)/)
      || '교과 개념을 실생활, 진로, 다른 사례로 넓혀 보는 확장성이 나타납니다.';

    return [
      {
        kicker: '핵심 주제',
        title: '무엇을 다뤘는지',
        body: topicBody,
        keywords: topicKeywords,
      },
      {
        kicker: '탐구 방식',
        title: '어떻게 접근했는지',
        body: methodBody,
        keywords: methodKeywords,
      },
      {
        kicker: '확장 방향',
        title: '어디로 이어지는지',
        body: expandBody,
        keywords: expandKeywords,
      }
    ];
  }

  function flowCardsHtml(subject){
    const cards = flowCardsFor(subject);
    if (!cards.length) return '<div class="empty">탐구 흐름 데이터가 없습니다.</div>';
    return `
      <div class="flow-grid">${cards.map(card => `
        <div class="flow-card">
          <span class="flow-kicker">${esc(card.kicker || '')}</span>
          <div class="flow-title">${esc(card.title || '')}</div>
          <div class="flow-body">${esc(card.body || '')}</div>
          ${safeArr(card.keywords).length ? `<div class="flow-chips">${safeArr(card.keywords).map(k => `<span class="flow-chip">${esc(k)}</span>`).join('')}</div>` : ''}
        </div>
      `).join('')}</div>
    `;
  }

  function rerenderAnalysis(){
    const years = safeArr(state.student?.years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999) || String(a.subject).localeCompare(String(b.subject),'ko'));
    if (state.subjectIndex > subjects.length - 1) state.subjectIndex = 0;
    const subject = subjects[state.subjectIndex] || null;

    $('#analysisCard').innerHTML = subject ? `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">${esc(year.year || '')} · ${esc(subject.subject || '')}</div>
        </div>
        <span class="badge">역량 축 ${safeArr(subject.axis_list).length}개</span>
      </div>

      <div class="block">
        <h2 class="hero-title">${esc(subject.subject || '과목')}</h2>
        <div class="one-line">${esc(subject.summary || '')}</div>
      </div>

      <div class="block">
        <div class="mini-title">역량 축 분석</div>
        ${axisHtml(subject.axis_list)}
      </div>

      <div class="block">
        <div class="inline-head">
          <div class="mini-title" style="margin:0;">탐구 흐름 정리</div>
          <button type="button" class="mini-toggle ${state.showExamples ? 'is-on' : ''}" id="toggleExamplesBtn">${state.showExamples ? '활동예시 닫기' : '활동예시 보기'}</button>
        </div>
        <div class="flow-intro">키워드를 단순 나열하지 않고, 이 활동에서 학생이 무엇을 다뤘고 어떻게 접근했으며 어디까지 확장했는지를 읽기 쉽게 정리한 영역입니다.</div>
        ${flowCardsHtml(subject)}
        ${state.showExamples ? `
          <div style="margin-top:16px;">
            <div class="mini-title">관련 활동 보기</div>
            ${examplesHtml(subject.activity_examples)}
          </div>
        ` : ''}
      </div>
    ` : `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">선택된 과목 데이터가 없습니다.</div>
        </div>
      </div>
      <div class="empty">학년과 과목을 먼저 선택해 주세요.</div>
    `;

    const btn = document.getElementById('toggleExamplesBtn');
    if (btn) {
      btn.onclick = () => {
        state.showExamples = !state.showExamples;
        rerenderAnalysis();
      };
    }
  }

  function rerender(){
    const years = safeArr(state.student?.years);
    renderYearToggles(years);
    const year = years[state.yearIndex] || years[0] || {};
    renderYearSummary(year);
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999) || String(a.subject).localeCompare(String(b.subject),'ko'));
    renderSubjectToggles(subjects);
    rerenderAnalysis();
  }

  async function boot(){
    bindYearSummaryToggle();
    const loaded = await loadRecordData();
    const student = await pickStudent(loaded.data);
    if (!student) {
      $('#studentMeta').textContent = '학생 데이터가 없습니다.';
      $('#analysisCard').innerHTML = '<div class="empty">record_detail.json 안에 students 데이터가 없습니다.</div>';
      return;
    }
    state.student = student;
    $('#studentMeta').textContent = [student.student_name, student.school_name, student.student_id].filter(Boolean).join(' · ');
    $('#previewBadge').textContent = '실데이터';
    $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
    rerender();
  }

  boot().catch(err => {
    $('#studentMeta').textContent = '데이터를 불러오지 못했습니다.';
    $('#previewBadge').textContent = '오류';
    $('#analysisCard').innerHTML = `<div class="empty">${esc(err?.message || err)}</div>`;
  });
})();
</script>
</body>
</html>
