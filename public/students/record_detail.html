<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    :root{--bd:#e7e7e7;--txt:#111;--muted:#666;--bg:#fff;--soft:#fafafa}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:24px;background:var(--bg);padding:22px;margin:14px 0}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);line-height:1.7;margin-top:8px}
    .pill,.badge,.chip-sm{display:inline-flex;align-items:center;padding:7px 12px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800;font-size:13px}
    .section-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .section-title{font-size:18px;font-weight:900;line-height:1.45}
    .section-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-top:4px}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap}
    .toggle,.mini-toggle{appearance:none;border:1px solid var(--bd);background:#fff;color:#111;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .toggle.is-on,.mini-toggle.is-on{background:#111;color:#fff;border-color:#111}
    .toggle:disabled,.mini-toggle:disabled{opacity:.45;cursor:default}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .one-line{font-size:18px;line-height:1.75;color:#333;margin-top:10px}
    .block{border:1px solid var(--bd);border-radius:22px;background:#fff;padding:18px}
    .block+.block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;line-height:1.45;margin:0 0 10px}
    .flow-intro{font-size:14px;color:var(--muted);line-height:1.75;margin:0 0 12px}
    .goal-chips,.flow-chips{display:flex;gap:8px;flex-wrap:wrap}
    .goal-chip,.flow-chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:var(--soft);font-size:13px;font-weight:800}
    .priority-list{display:grid;gap:8px;margin-top:14px}
    .priority-row{display:grid;grid-template-columns:110px 1fr 42px;gap:10px;align-items:center}
    .priority-label{font-size:13px;font-weight:800;color:#333}
    .priority-track{height:9px;border:1px solid var(--bd);border-radius:999px;background:#f1f1f1;overflow:hidden}
    .priority-fill{height:100%;background:#111}
    .priority-value{font-size:12px;color:var(--muted);font-weight:800;text-align:right}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .axis-item,.example-item,.counsel-item{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:8px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:#111;color:#fff;font-size:12px;margin-right:8px}
    .axis-text,.example-body,.judgment-body,.counsel-body{font-size:14px;line-height:1.75;color:#333}
    .example-grid,.counsel-grid{display:grid;gap:10px}
    .example-type,.judgment-label,.flow-kicker,.counsel-label{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .example-title,.judgment-title,.flow-title,.counsel-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .flow-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .flow-card{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .flow-body{font-size:14px;line-height:1.75;color:#333;margin-top:8px}
    .inline-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .judgment-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .judgment-item{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .empty{border:1px dashed var(--bd);border-radius:18px;background:#fff;padding:18px;color:var(--muted);line-height:1.7}
    .guide{font-size:13px;color:var(--muted);margin:6px 2px}
    .year-layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .year-layout.is-summary-open{grid-template-columns:minmax(280px,420px) 1fr}
    .year-left{display:flex;flex-direction:column;gap:12px}
    .year-summary{border:1px solid var(--bd);border-radius:22px;background:var(--soft);padding:18px 20px}
    .year-summary[hidden]{display:none !important}
    .year-summary-item+.year-summary-item{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
    .year-summary-label{font-size:14px;font-weight:900;margin-bottom:6px}
    .year-summary-body{font-size:14px;line-height:1.75;color:#333}
    .grade-shell{display:grid;gap:16px}
    .grade-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .grade-summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .grade-stat{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .grade-label{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
    .grade-value{font-size:24px;font-weight:900;line-height:1.3}
    .grade-sub{font-size:13px;line-height:1.7;color:var(--muted);margin-top:6px}
    .grade-panel{border:1px solid var(--bd);border-radius:22px;background:#fff;padding:18px}
    .grade-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .grade-panel-title{font-size:16px;font-weight:900;line-height:1.45}
    .grade-panel-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-top:4px}
    .grade-table-wrap{overflow:auto;border:1px solid var(--bd);border-radius:18px;background:#fff}
    table.grade-table{width:100%;border-collapse:collapse;min-width:640px}
    .grade-table th,.grade-table td{padding:12px 14px;border-bottom:1px solid var(--bd);text-align:left;font-size:14px;line-height:1.55;vertical-align:top}
    .grade-table th{background:var(--soft);font-weight:900;position:sticky;top:0}
    .grade-table td.num,.grade-table th.num{text-align:center;white-space:nowrap}
    .grade-table tr:last-child td{border-bottom:none}
    .memo{font-size:12px;color:var(--muted);line-height:1.6;margin-top:4px}
    .counsel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
    .counsel-meta{font-size:13px;color:var(--muted);line-height:1.6;margin-top:4px}
    .counsel-section{margin-top:12px}
    .counsel-section-label{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:6px}
    .counsel-bullets{display:grid;gap:6px}
    .counsel-bullet{font-size:14px;line-height:1.7;color:#333;padding-left:12px;position:relative}
    .counsel-bullet:before{content:'•';position:absolute;left:0;top:0;color:#111}
    @media (max-width:980px){
      .axis-list,.flow-grid{grid-template-columns:1fr}
      .hero-title{font-size:26px}
      .one-line{font-size:17px}
      .toggle,.mini-toggle{padding:9px 14px;font-size:14px}
      .year-layout,.year-layout.is-summary-open{grid-template-columns:1fr}
      .priority-row{grid-template-columns:96px 1fr 36px}
      .judgment-grid{display:flex;overflow-x:auto;scroll-snap-type:x proximity;padding-bottom:2px}
      .judgment-item{min-width:78vw;scroll-snap-align:start}
    }
    @media (max-width:640px){table.grade-table{min-width:560px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">데이터를 불러오는 중입니다.</div>
        </div>
        <div class="row"><span class="pill" id="previewBadge">실데이터</span></div>
      </div>
    </div>

    <div class="card" id="gradeCard"></div>
    <div class="card" id="yearCard">
      <div class="year-layout">
        <div class="year-left">
          <div class="section-h">
            <div>
              <div class="section-title">학년 선택</div>
              <div class="section-desc">1학년 · 2학년 · 3학년 토글로 구분해서 확인</div>
            </div>
            <button class="mini-toggle" id="yearSummaryToggleBtn" type="button">총평 보기</button>
          </div>
          <div class="toggle-wrap" id="yearToggles"></div>
        </div>
        <div class="year-summary" id="yearSummaryPanel" hidden></div>
      </div>
    </div>
    <div class="card" id="subjectCardTop">
      <div class="section-h">
        <div>
          <div class="section-title">과목 선택</div>
          <div class="section-desc">선택한 학년 안에서 과목별 분석만 표시</div>
        </div>
      </div>
      <div class="toggle-wrap" id="subjectToggles"></div>
    </div>
    <div class="guide" id="loadGuide"></div>
    <div class="card" id="analysisCard"></div>
    <div class="card" id="counselingCard" hidden></div>
  </div>
<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const qs = new URLSearchParams(location.search);
  const state = { student:null, profileRow:null, yearIndex:0, subjectIndex:0, showExamples:false, showYearSummary:false, gradeTab:'summary', accessMode:'none', counseling:[] };

  function loadJson(path){ return fetch(path, {cache:'no-store'}).then(r => { if(!r.ok) throw new Error(`${path} (${r.status})`); return r.json(); }); }
  async function tryLoad(paths){ for (const path of paths){ try { return { data: await loadJson(path), source:path }; } catch(_e){} } return { data:null, source:'' }; }
  async function loadRecordData(){
    const stamp=`v=${Date.now()}`;
    const res = await tryLoad([`./record_detail.json?${stamp}`,`record_detail.json?${stamp}`,`./data/record_detail.json?${stamp}`,`../record_detail.json?${stamp}`,`/record_detail.json?${stamp}`]);
    if (!res.data) throw new Error('record_detail.json을 찾지 못했습니다.');
    return res;
  }
  async function loadStudentsIndex(){
    const stamp=`v=${Date.now()}`;
    return (await tryLoad([`./students.json?${stamp}`,`students.json?${stamp}`,`./data/students.json?${stamp}`,`../students.json?${stamp}`,`/students.json?${stamp}`])).data;
  }
  async function loadCounselingData(){
    const stamp=`v=${Date.now()}`;
    return (await tryLoad([`./counseling_logs.json?${stamp}`,`counseling_logs.json?${stamp}`,`./data/counseling_logs.json?${stamp}`,`../counseling_logs.json?${stamp}`,`/counseling_logs.json?${stamp}`])).data;
  }

  function readStoredStudentId(){
    const keys=['student_id','currentStudentId','selectedStudentId','record_student_id','sid'];
    for (const key of keys){
      const s = String(sessionStorage.getItem(key)||'').trim(); if (s) return s;
      const l = String(localStorage.getItem(key)||'').trim(); if (l) return l;
    }
    return '';
  }
  function readHashStudentId(){
    const hash = String(location.hash||'').replace(/^#/,'').trim();
    if (!hash) return '';
    if (hash.includes('=')) return String(new URLSearchParams(hash).get('id') || new URLSearchParams(hash).get('student_id') || new URLSearchParams(hash).get('sid') || '').trim();
    return /^shstudy\d+/i.test(hash) ? hash : '';
  }
  function pickTokenValue(row){ return String(row?.token ?? row?.accessToken ?? row?.access_token ?? row?.studentToken ?? row?.student_token ?? row?.key ?? row?.['토큰'] ?? '').trim(); }
  function pickStudentIdValue(row){ return String(row?.id ?? row?.student_id ?? row?.studentId ?? row?.studentID ?? row?.['학생ID'] ?? '').trim(); }
  function findProfileRow(index, studentId){ const rows = Array.isArray(index?.students) ? index.students : Array.isArray(index) ? index : []; return rows.find(r => pickStudentIdValue(r)===String(studentId||'').trim()) || null; }

  async function resolveStudentSelection(){
    const directId = String(qs.get('student_id') || qs.get('id') || qs.get('sid') || '').trim();
    if (directId) return { id:directId, mode:'direct', strict:true };
    const token = String(qs.get('t') || qs.get('token') || '').trim();
    if (token){
      const idx = await loadStudentsIndex();
      const rows = Array.isArray(idx?.students) ? idx.students : Array.isArray(idx) ? idx : [];
      const found = rows.find(r => pickTokenValue(r)===token);
      const sid = pickStudentIdValue(found);
      if (sid) return { id:sid, mode:'token', strict:true };
      return { id:'', mode:'token', strict:true, invalidToken:true };
    }
    const stored = readStoredStudentId(); if (stored) return { id:stored, mode:'stored', strict:false };
    const hashId = readHashStudentId(); if (hashId) return { id:hashId, mode:'hash', strict:false };
    return { id:'', mode:'none', strict:false };
  }

  async function pickStudent(data){
    const students = safeArr(data?.students);
    const selection = await resolveStudentSelection();
    if (!students.length) return { student:null, selection };
    if (selection.id){
      const match = students.find(s => String(s?.student_id || '').trim()===selection.id) || null;
      return { student:match, selection };
    }
    return { student: selection.strict ? null : (students[0]||null), selection };
  }

  function formatOverallGrade(v){ const n = Number(v); return Number.isFinite(n) ? n.toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1') : String(v||''); }
  function getYearSummary(student, year){
    const ys = student?.year_summaries;
    const yearLabel = String(year?.year || year?.year_label || year || '').trim();
    if (ys && !Array.isArray(ys) && ys[yearLabel]) return ys[yearLabel];
    if (Array.isArray(ys)) return ys.find(v => String(v?.year || '').trim()===yearLabel) || {};
    return year?.summary_overview || {};
  }

  function renderYearSummary(year){
    const panel = $('#yearSummaryPanel');
    const layout = document.querySelector('#yearCard .year-layout');
    const btn = $('#yearSummaryToggleBtn');
    const sum = getYearSummary(state.student, year);
    const hasAny = Boolean(sum?.academic || sum?.career || sum?.community);
    btn.textContent = state.showYearSummary ? '총평 닫기' : '총평 보기';
    btn.classList.toggle('is-on', state.showYearSummary);
    panel.hidden = !state.showYearSummary;
    layout.classList.toggle('is-summary-open', state.showYearSummary);
    if (!state.showYearSummary) return;
    panel.innerHTML = hasAny ? `
      <div class="section-title">${esc(year?.year || '')} 총평</div>
      <div class="section-desc">대학 평가 기준인 학업역량 · 진로역량 · 공동체역량 관점에서 읽은 요약입니다.</div>
      <div class="year-summary-item"><div class="year-summary-label">학업역량</div><div class="year-summary-body">${esc(sum.academic || '')}</div></div>
      <div class="year-summary-item"><div class="year-summary-label">진로역량</div><div class="year-summary-body">${esc(sum.career || '')}</div></div>
      <div class="year-summary-item"><div class="year-summary-label">공동체역량</div><div class="year-summary-body">${esc(sum.community || '')}</div></div>
    ` : `<div class="empty">이 학년 총평 데이터가 아직 없습니다.</div>`;
  }

  function renderYearToggles(years){
    $('#yearToggles').innerHTML = years.length ? years.map((y,i)=>`<button class="toggle ${i===state.yearIndex?'is-on':''}" data-year-idx="${i}">${esc(y.year || y.year_label || `${i+1}학년`)}</button>`).join('') : '<button class="toggle" disabled>학년 없음</button>';
    $('#yearToggles').querySelectorAll('[data-year-idx]').forEach(btn => btn.onclick = () => { state.yearIndex = Number(btn.dataset.yearIdx || 0); state.subjectIndex = 0; state.showExamples = false; rerender(); });
  }
  function renderSubjectToggles(subjects){
    $('#subjectToggles').innerHTML = subjects.length ? subjects.map((s,i)=>`<button class="toggle ${i===state.subjectIndex?'is-on':''}" data-subject-idx="${i}">${esc(s.subject || s.subject_name || '과목')}</button>`).join('') : '<button class="toggle" disabled>과목 없음</button>';
    $('#subjectToggles').querySelectorAll('[data-subject-idx]').forEach(btn => btn.onclick = () => { state.subjectIndex = Number(btn.dataset.subjectIdx || 0); state.showExamples = false; rerenderAnalysis(); renderSubjectToggles(subjects); });
  }

  function axisHtml(list){ list = safeArr(list); return list.length ? `<div class="axis-list">${list.map(item => `<div class="axis-item"><div class="axis-head"><span class="axis-no">${esc(item.no || '')}</span>${esc(item.title || '')}</div><div class="axis-text">${esc(item.content || '')}</div></div>`).join('')}</div>` : '<div class="empty">역량 축 데이터가 없습니다.</div>'; }
  function examplesHtml(list){ list = safeArr(list); return list.length ? `<div class="example-grid">${list.map(opt => `<div class="example-item"><span class="example-type">${esc(opt.type || '활동예시')}</span><div class="example-title">${esc(opt.title || '')}</div><div class="example-body">${esc(opt.description || '')}</div></div>`).join('')}</div>` : '<div class="empty">활동예시 데이터가 없습니다.</div>'; }

  function goalFocusHtml(subject){
    const goals = safeArr(subject?.subject_goal_focus);
    const priorities = safeArr(subject?.evaluation_priority);
    if (!goals.length && !priorities.length) return '';
    return `
      <div class="block">
        <div class="mini-title">과목 고유 목표 기준</div>
        <div class="flow-intro">이 과목은 진로 키워드보다 먼저, 과목 자체의 목표와 탐구 과정이 얼마나 분명하게 드러나는지를 우선해서 읽습니다.</div>
        ${goals.length ? `<div class="goal-chips">${goals.map(g => `<span class="goal-chip">${esc(g)}</span>`).join('')}</div>` : ''}
        ${priorities.length ? `<div class="priority-list">${priorities.map(item => `<div class="priority-row"><div class="priority-label">${esc(item.label || '')}</div><div class="priority-track"><div class="priority-fill" style="width:${Math.max(0, Math.min(100, Number(item.weight || 0)))}%"></div></div><div class="priority-value">${esc(item.weight || 0)}%</div></div>`).join('')}</div>` : ''}
      </div>`;
  }

  function flowCardsFromInquiry(subject){
    const flow = subject?.inquiry_flow || {};
    const rows = [
      ['수업 출발점','무엇에서 출발했는지', flow.class_start],
      ['핵심 질문','어떤 문제를 잡았는지', flow.core_question],
      ['탐구 방식','어떻게 접근했는지', flow.inquiry_method],
      ['심화·확장','어디까지 넓혔는지', flow.deepening],
      ['도출 인식','무엇을 남겼는지', flow.insight],
    ].filter(([, , body]) => String(body || '').trim());
    return rows.map(([kicker,title,body]) => ({ kicker, title, body: String(body || '').trim() }));
  }
  function fallbackFlowCards(subject){
    const summary = String(subject?.summary || '').trim();
    const current = String(subject?.current_activity_basis || '').trim();
    return [
      { kicker:'핵심 주제', title:'무엇을 다뤘는지', body: current || summary || '핵심 주제가 아직 정리되지 않았습니다.' },
      { kicker:'탐구 방식', title:'어떻게 접근했는지', body: String(subject?.analysis_basis || '').trim() || '탐구 방식 데이터가 아직 없습니다.' },
      { kicker:'확장 방향', title:'어디로 이어지는지', body: safeArr(subject?.activity_examples).map(v => v?.title).filter(Boolean).join(' / ') || '추가 심화 방향 데이터가 아직 없습니다.' },
    ];
  }
  function flowCardsHtml(subject){
    const cards = flowCardsFromInquiry(subject);
    const finalCards = cards.length ? cards : fallbackFlowCards(subject);
    return `<div class="flow-grid">${finalCards.map(card => `<div class="flow-card"><span class="flow-kicker">${esc(card.kicker)}</span><div class="flow-title">${esc(card.title)}</div><div class="flow-body">${esc(card.body)}</div></div>`).join('')}</div>`;
  }

  function subjectJudgmentText(subject){
    const direct = String(subject?.judgment_block?.subject_judgment || '').trim();
    if (direct) return direct;
    const basis = String(subject?.analysis_basis || '').trim();
    if (basis) return basis;
    const goals = safeArr(subject?.subject_goal_focus).join('·');
    const current = String(subject?.current_activity_basis || subject?.summary || '').trim();
    if (goals && current) return `${goals}이 우선적으로 드러나며, 현재 기록에서는 ${current} 내용이 핵심 근거로 읽힌다.`;
    return '이 과목의 고유 목표를 기준으로 읽을 수 있는 판단 문장이 아직 없습니다.';
  }
  function overallOpinionText(subject){
    const direct = String(subject?.judgment_block?.overall_opinion || '').trim();
    if (direct) return direct;
    const basis = String(subject?.analysis_basis || '').trim();
    if (basis) return basis;
    return '현재 강점과 보완 포인트를 정리한 종합 의견 데이터가 아직 없습니다.';
  }
  function extensionInterpretationText(subject){
    const direct = String(subject?.judgment_block?.extension_interpretation || '').trim();
    if (direct) return direct;
    const family = String(subject?.subject_family || '').trim();
    if (/국어|영어|사회|역사/.test(family)) return '이 과목은 특정 전공과의 직접 연결보다, 읽기·해석·논증·표현처럼 교과 고유 역량이 실제로 드러나는지를 우선해서 판단하는 것이 적절하다.';
    if (/수학/.test(family)) return '이 과목은 전공 직결 여부보다 개념 이해·추론·구조화 같은 수학 고유 역량을 먼저 판단하는 것이 적절하다.';
    if (/과학/.test(family)) return '이 과목은 탐구·원리 설명·자료 해석·검증 과정이 얼마나 선명한지가 핵심이며, 진로 해석은 그 위에 보조적으로 붙는 것이 적절하다.';
    if (/정보/.test(family)) return '정보 과목은 알고리즘·구현·데이터 처리·시스템 이해 같은 교과 고유 역량이 먼저 확인되어야 한다.';
    return '이 과목은 특정 진로에 맞춰 해석하기보다, 교과 고유 역량이 실제 기록에서 어떻게 드러나는지를 먼저 판단하는 것이 적절하다.';
  }
  function judgmentHtml(subject){
    return `<div class="judgment-grid">
      <div class="judgment-item"><span class="judgment-label">과목 판단</span><div class="judgment-title">이 과목의 고유 목표가 어떻게 드러나는지</div><div class="judgment-body">${esc(subjectJudgmentText(subject))}</div></div>
      <div class="judgment-item"><span class="judgment-label">종합 의견</span><div class="judgment-title">현재 강점과 다음 보완 포인트</div><div class="judgment-body">${esc(overallOpinionText(subject))}</div></div>
      <div class="judgment-item"><span class="judgment-label">확장 해석</span><div class="judgment-title">진로보다 먼저 읽어야 할 보조 해석</div><div class="judgment-body">${esc(extensionInterpretationText(subject))}</div></div>
    </div>`;
  }

  function parseNumber(v){ const n = Number(String(v ?? '').replace(/,/g,'')); return Number.isFinite(n) ? n : null; }
  function gradeTableHtml(term){
    const rows = safeArr(term?.subjects);
    if (!rows.length) return '<div class="empty">과목별 성적 데이터가 없습니다.</div>';
    return `
      <div class="grade-table-wrap"><table class="grade-table"><thead><tr>
        <th>과목</th><th class="num">원점수/과목평균</th><th class="num">인원수</th><th class="num">등급</th><th class="num">성취도</th><th class="num">이수단위</th>
      </tr></thead><tbody>
        ${rows.map(r => `<tr>
          <td>${esc(r.subject || '')}${r.memo ? `<div class="memo">${esc(r.memo)}</div>` : ''}</td>
          <td class="num">${esc(r.raw_vs_avg || (r.raw_score && r.subject_average ? `${r.raw_score}/${r.subject_average}` : '-'))}</td>
          <td class="num">${esc(r.student_count || '-')}</td>
          <td class="num">${esc(r.grade || '-')}</td>
          <td class="num">${esc(r.achievement || '-')}</td>
          <td class="num">${esc(r.units || '-')}</td>
        </tr>`).join('')}
      </tbody></table></div>`;
  }
  function renderGradeCard(){
    const target = $('#gradeCard');
    const grade = state.student?.grade_info || {};
    const summary = grade.summary || {};
    const terms = safeArr(grade.terms);
    const currentTerm = terms.find(v => String(v.key||'')===state.gradeTab) || terms[0] || null;
    target.innerHTML = `
      <div class="section-h"><div><div class="section-title">성적 보기</div><div class="section-desc">종합 / 학기별 기준으로 내신과 과목별 성적을 함께 확인합니다.</div></div></div>
      <div class="grade-shell">
        <div class="grade-tabs">
          <button class="toggle ${state.gradeTab==='summary'?'is-on':''}" data-grade-tab="summary">종합</button>
          ${terms.map(term => `<button class="toggle ${state.gradeTab===term.key?'is-on':''}" data-grade-tab="${esc(term.key)}">${esc(term.label || '')}</button>`).join('')}
        </div>
        ${state.gradeTab==='summary' ? `<div class="grade-summary-grid">
          <div class="grade-stat"><div class="grade-label">종합 내신</div><div class="grade-value">${esc(formatOverallGrade(summary.overall || '-'))}</div><div class="grade-sub">${esc(summary.basis || '')}</div></div>
          <div class="grade-stat"><div class="grade-label">반영 이수단위</div><div class="grade-value">${esc(summary.reflected_units || '-')}</div><div class="grade-sub">${esc(summary.memo || '')}</div></div>
        </div>` : currentTerm ? `<div class="grade-summary-grid">
          <div class="grade-stat"><div class="grade-label">학기 내신</div><div class="grade-value">${esc(formatOverallGrade(currentTerm.overall || '-'))}</div><div class="grade-sub">${esc(currentTerm.label || '')}</div></div>
          <div class="grade-stat"><div class="grade-label">반영 이수단위</div><div class="grade-value">${esc(currentTerm.reflected_units || '-')}</div><div class="grade-sub">${esc(currentTerm.memo || '')}</div></div>
        </div>
        <div class="grade-panel"><div class="grade-panel-head"><div><div class="grade-panel-title">${esc(currentTerm.label || '')} 과목별 성적</div><div class="grade-panel-desc">원점수/과목평균, 인원수, 등급, 성취도, 이수단위를 한 화면에서 확인합니다.</div></div><span class="chip-sm">${safeArr(currentTerm.subjects).length}과목</span></div>${gradeTableHtml(currentTerm)}</div>` : `<div class="empty">성적 데이터가 아직 없습니다.</div>`}
      </div>`;
    target.querySelectorAll('[data-grade-tab]').forEach(btn => btn.addEventListener('click', () => { state.gradeTab = btn.getAttribute('data-grade-tab') || 'summary'; renderGradeCard(); }));
  }

  function renderCounseling(){
    const card = $('#counselingCard');
    const rows = safeArr(state.counseling).filter(r => String(r?.student_id || '').trim()===String(state.student?.student_id || '').trim());
    if (!rows.length){ card.hidden = true; card.innerHTML = ''; return; }
    card.hidden = false;
    card.innerHTML = `<div class="section-h"><div><div class="section-title">상담 기록</div><div class="section-desc">현재 학생과 연결된 상담 요약 데이터입니다.</div></div><span class="badge">${rows.length}건</span></div>
      <div class="counsel-grid">${rows.map(row => {
        const actions = String(row.action_items || '').split('|').map(v => v.trim()).filter(Boolean);
        const checks = String(row.next_check_items || '').split('|').map(v => v.trim()).filter(Boolean);
        return `<div class="counsel-item"><div class="counsel-head"><div><div class="counsel-title">${esc(row.title || row.record_view_title || row.key_topic || '상담 기록')}</div><div class="counsel-meta">${esc(row.display_date || row.counseling_at || '')}${row.counseling_type ? ' · '+esc(row.counseling_type) : ''}${row.counseling_stage ? ' · '+esc(row.counseling_stage) : ''}</div></div><div class="row">${row.priority ? `<span class="chip-sm">우선도 ${esc(row.priority)}</span>` : ''}${row.status ? `<span class="chip-sm">${esc(row.status)}</span>` : ''}</div></div>
        ${row.summary_line || row.current_assessment ? `<div class="counsel-section"><div class="counsel-section-label">현재 판단</div><div class="counsel-body">${esc(row.summary_line || row.current_assessment || '')}</div></div>` : ''}
        ${row.summary ? `<div class="counsel-section"><div class="counsel-section-label">상담 요약</div><div class="counsel-body">${esc(row.summary)}</div></div>` : ''}
        ${actions.length ? `<div class="counsel-section"><div class="counsel-section-label">실행 과제</div><div class="counsel-bullets">${actions.map(a => `<div class="counsel-bullet">${esc(a)}</div>`).join('')}</div></div>` : ''}
        ${checks.length ? `<div class="counsel-section"><div class="counsel-section-label">다음 확인 항목</div><div class="counsel-bullets">${checks.map(a => `<div class="counsel-bullet">${esc(a)}</div>`).join('')}</div></div>` : ''}
        </div>`;
      }).join('')}</div>`;
  }

  function sortSubjects(list){ return safeArr(list).slice().sort((a,b) => (a.display_order||999)-(b.display_order||999) || String(a.subject||a.subject_name||'').localeCompare(String(b.subject||b.subject_name||''),'ko')); }

  function rerenderAnalysis(){
    const years = safeArr(state.student?.years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = sortSubjects(year.subjects);
    if (state.subjectIndex > subjects.length - 1) state.subjectIndex = 0;
    const subject = subjects[state.subjectIndex] || null;
    const rawExcerpt = String(subject?.raw_excerpt || '').trim();
    $('#analysisCard').innerHTML = subject ? `
      <div class="section-h"><div><div class="section-title">과목 분석</div><div class="section-desc">${esc(year.year || year.year_label || '')} · ${esc(subject.subject || subject.subject_name || '')}</div></div><span class="badge">역량 축 ${safeArr(subject.axis_list).length}개</span></div>
      <div class="block"><h2 class="hero-title">${esc(subject.subject || subject.subject_name || '과목')}</h2><div class="one-line">${esc(subject.one_line || subject.summary || '')}</div></div>
      ${goalFocusHtml(subject)}
      <div class="block"><div class="mini-title">현재 활동 기반</div><div class="flow-intro">원문과 요약을 바탕으로, 지금 기록에서 실제로 확인되는 활동의 핵심을 먼저 정리한 영역입니다.</div><div class="one-line" style="font-size:16px;margin-top:0;">${esc(subject.current_activity_basis || subject.summary || '')}</div></div>
      ${rawExcerpt ? `<div class="block"><div class="mini-title">원문 발췌</div><div class="flow-intro">분석의 근거가 되는 실제 생활기록부 원문 일부입니다.</div><div class="one-line" style="font-size:16px;margin-top:0;white-space:pre-wrap;">${esc(rawExcerpt)}</div></div>` : ''}
      <div class="block"><div class="mini-title">역량 축 분석</div>${axisHtml(subject.axis_list)}</div>
      <div class="block"><div class="inline-head"><div class="mini-title" style="margin:0;">탐구 흐름 정리</div><button type="button" class="mini-toggle ${state.showExamples?'is-on':''}" id="toggleExamplesBtn">${state.showExamples?'활동예시 닫기':'활동예시 보기'}</button></div><div class="flow-intro">단순 키워드가 아니라, 수업 출발점·핵심 질문·탐구 방식·심화 확장까지 학생이 실제로 밟은 흐름을 기준으로 정리한 영역입니다.</div>${flowCardsHtml(subject)}${state.showExamples ? `<div style="margin-top:16px;"><div class="mini-title">다음 단계 활동 예시</div>${examplesHtml(subject.activity_examples)}</div>` : ''}</div>
      <div class="block"><div class="mini-title">판단 결과</div><div class="flow-intro">이 학생을 특정 진로에 억지로 맞추는 대신, 과목 고유 목표와 현재 기록의 밀도를 기준으로 객관적으로 읽은 결과입니다.</div>${judgmentHtml(subject)}</div>
    ` : `<div class="empty">학년과 과목을 먼저 선택해 주세요.</div>`;
    const btn = document.getElementById('toggleExamplesBtn');
    if (btn) btn.onclick = () => { state.showExamples = !state.showExamples; rerenderAnalysis(); };
  }

  function rerender(){
    renderGradeCard();
    const years = safeArr(state.student?.years);
    renderYearToggles(years);
    const year = years[state.yearIndex] || years[0] || {};
    renderYearSummary(year);
    const subjects = sortSubjects(year.subjects);
    renderSubjectToggles(subjects);
    rerenderAnalysis();
    renderCounseling();
  }

  async function boot(){
    $('#yearSummaryToggleBtn').onclick = () => { state.showYearSummary = !state.showYearSummary; const years = safeArr(state.student?.years); const year = years[state.yearIndex] || years[0] || {}; renderYearSummary(year); };
    const [loaded, studentsIndex, counselingRaw] = await Promise.all([loadRecordData(), loadStudentsIndex(), loadCounselingData()]);
    const normalizedCounseling = Array.isArray(counselingRaw?.record_view_import) ? counselingRaw.record_view_import : Array.isArray(counselingRaw?.platform_import) ? counselingRaw.platform_import : Array.isArray(counselingRaw) ? counselingRaw : [];
    state.counseling = normalizedCounseling;
    const picked = await pickStudent(loaded.data);
    const student = picked.student;
    if (!student){
      $('#studentMeta').textContent = picked.selection.invalidToken ? '학생 토큰과 연결된 데이터를 찾지 못했습니다.' : '학생 데이터가 없습니다.';
      $('#previewBadge').textContent = picked.selection.invalidToken ? '토큰 오류' : '오류';
      $('#analysisCard').innerHTML = `<div class="empty">${picked.selection.invalidToken ? 'students.json의 토큰과 record_detail.json의 student_id 연결을 확인해주세요.' : 'record_detail.json 안에 해당 학생 데이터가 없습니다.'}</div>`;
      $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
      return;
    }
    state.student = student;
    state.profileRow = findProfileRow(studentsIndex, student.student_id);
    state.accessMode = picked.selection.mode || 'none';
    const gradeSummary = student?.grade_info?.summary || {};
    $('#studentMeta').textContent = [student.student_name || student.name, student.school_name || student.school, student.student_id, gradeSummary.overall ? `종합 내신 ${formatOverallGrade(gradeSummary.overall)}` : '내신 미입력'].filter(Boolean).join(' · ');
    $('#previewBadge').textContent = picked.selection.mode === 'token' ? '학생모드' : '실데이터';
    $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
    rerender();
  }

  boot().catch(err => {
    $('#studentMeta').textContent = '데이터를 불러오지 못했습니다.';
    $('#previewBadge').textContent = '오류';
    $('#analysisCard').innerHTML = `<div class="empty">${esc(err?.message || err)}</div>`;
  });
})();
</script>
</body>
</html>
