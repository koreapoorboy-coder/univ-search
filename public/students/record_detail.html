<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    :root{--bd:#e8e8e8;--txt:#111;--muted:#666;--bg:#fff;--soft:#fafafa}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:26px;background:var(--bg);padding:22px;margin:14px 0}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .badge,.pill{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted)}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap}
    .toggle,.mini-toggle{appearance:none;border:1px solid var(--bd);background:#fff;color:#111;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .toggle.is-on,.mini-toggle.is-on{background:#111;color:#fff;border-color:#111}
    .toggle:disabled{opacity:.45;cursor:default}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .one-line{font-size:18px;line-height:1.7;color:#333;margin-top:10px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:14px;font-weight:800}
    .block{border:1px solid var(--bd);border-radius:22px;padding:20px;background:#fff}
    .block + .block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;margin:0 0 10px 0;color:#222}
    .inline-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .axis-item{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:8px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:#111;color:#fff;font-size:12px;margin-right:8px}
    .axis-text{color:#333;line-height:1.7;font-size:14px}
    .example-grid{display:grid;gap:10px;margin-top:12px}
    .example-item{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .example-type{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .example-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .example-body{color:#333;line-height:1.75;margin-top:10px}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    .guide{font-size:13px;color:var(--muted);margin:6px 2px}
    @media (max-width: 980px){.axis-list{grid-template-columns:1fr}.hero-title{font-size:26px}.one-line{font-size:17px}.toggle{padding:9px 14px;font-size:14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">데이터를 불러오는 중입니다.</div>
        </div>
        <div class="row"><span class="pill" id="previewBadge">실데이터</span></div>
      </div>
    </div>

    <div class="card" id="yearCard">
      <div class="section-h">
        <div>
          <div class="section-title">학년 선택</div>
          <div class="section-desc">1학년 · 2학년 · 3학년 토글로 구분해서 확인</div>
        </div>
      </div>
      <div class="toggle-wrap" id="yearToggles"></div>
    </div>

    <div class="card" id="subjectCardTop">
      <div class="section-h">
        <div>
          <div class="section-title">과목 선택</div>
          <div class="section-desc">선택한 학년 안에서 과목별 분석만 표시</div>
        </div>
      </div>
      <div class="toggle-wrap" id="subjectToggles"></div>
    </div>

    <div class="guide" id="loadGuide"></div>
    <div class="card" id="analysisCard"></div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const qs = new URLSearchParams(location.search);

  const state = {
    student: null,
    yearIndex: 0,
    subjectIndex: 0,
    showExamples: false,
  };

  async function loadJson(path){
    const r = await fetch(path, { cache:'no-store' });
    if (!r.ok) throw new Error(`${path} (${r.status})`);
    return r.json();
  }

  async function loadRecordData(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./record_detail.json?${stamp}`,
      `record_detail.json?${stamp}`,
      `./data/record_detail.json?${stamp}`,
      `../record_detail.json?${stamp}`,
      `/record_detail.json?${stamp}`,
    ];
    const tried = [];
    for (const path of candidates) {
      try {
        const data = await loadJson(path);
        return { data, source: path, tried };
      } catch (e) {
        tried.push(path);
      }
    }
    throw new Error(`record_detail.json을 찾지 못했습니다. 시도한 경로: ${tried.join(', ')}`);
  }

  function pickStudent(data){
    const students = safeArr(data?.students);
    if (!students.length) return null;
    const wantedId = (qs.get('id') || qs.get('student_id') || '').trim();
    if (wantedId) {
      return students.find(s => String(s.student_id || '').trim() === wantedId) || null;
    }
    return students[0];
  }

  function renderYearToggles(years){
    $('#yearToggles').innerHTML = years.length
      ? years.map((y, i) => `<button class="toggle ${i===state.yearIndex ? 'is-on' : ''}" data-year-idx="${i}">${esc(y.year || `${i+1}학년`)}</button>`).join('')
      : '<button class="toggle" disabled>학년 없음</button>';
    $('#yearToggles').querySelectorAll('[data-year-idx]').forEach(btn => {
      btn.onclick = () => {
        state.yearIndex = Number(btn.dataset.yearIdx || 0);
        state.subjectIndex = 0;
        state.showExamples = false;
        rerender();
      };
    });
  }

  function renderSubjectToggles(subjects){
    $('#subjectToggles').innerHTML = subjects.length
      ? subjects.map((s, i) => `<button class="toggle ${i===state.subjectIndex ? 'is-on' : ''}" data-subject-idx="${i}">${esc(s.subject || '과목')}</button>`).join('')
      : '<button class="toggle" disabled>과목 없음</button>';
    $('#subjectToggles').querySelectorAll('[data-subject-idx]').forEach(btn => {
      btn.onclick = () => {
        state.subjectIndex = Number(btn.dataset.subjectIdx || 0);
        state.showExamples = false;
        renderSubjectToggles(subjects);
        rerenderAnalysis();
      };
    });
  }

  function axisHtml(axisList){
    const list = safeArr(axisList);
    if (!list.length) return '<div class="empty">역량 축 데이터가 없습니다.</div>';
    return `<div class="axis-list">${list.map(item => `
      <div class="axis-item">
        <div class="axis-head"><span class="axis-no">${esc(item.no || '')}</span>${esc(item.title || '')}</div>
        <div class="axis-text">${esc(item.content || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function examplesHtml(activityExamples){
    const list = safeArr(activityExamples);
    if (!list.length) return '<div class="empty">활동예시 데이터가 없습니다.</div>';
    return `<div class="example-grid">${list.map(opt => `
      <div class="example-item">
        <span class="example-type">${esc(opt.type || '활동예시')}</span>
        <div class="example-title">${esc(opt.title || '')}</div>
        <div class="example-body">${esc(opt.description || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function rerenderAnalysis(){
    const years = safeArr(state.student?.years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999) || String(a.subject).localeCompare(String(b.subject),'ko'));
    if (state.subjectIndex > subjects.length - 1) state.subjectIndex = 0;
    const subject = subjects[state.subjectIndex] || null;

    $('#analysisCard').innerHTML = subject ? `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">${esc(year.year || '')} · ${esc(subject.subject || '')}</div>
        </div>
        <span class="badge">역량 축 ${safeArr(subject.axis_list).length}개</span>
      </div>

      <div class="block">
        <h2 class="hero-title">${esc(subject.subject || '과목')}</h2>
        <div class="one-line">${esc(subject.summary || '')}</div>
      </div>

      <div class="block">
        <div class="mini-title">역량 축 분석</div>
        ${axisHtml(subject.axis_list)}
      </div>

      <div class="block">
        <div class="inline-head">
          <div class="mini-title" style="margin:0;">확장 키워드</div>
          <button type="button" class="mini-toggle ${state.showExamples ? 'is-on' : ''}" id="toggleExamplesBtn">${state.showExamples ? '활동예시 닫기' : '활동예시 보기'}</button>
        </div>
        <div class="chips">${safeArr(subject.extension_keywords).map(k => `<span class="chip">${esc(k)}</span>`).join('')}</div>
        ${state.showExamples ? `
          <div style="margin-top:16px;">
            <div class="mini-title">활동예시</div>
            ${examplesHtml(subject.activity_examples)}
          </div>
        ` : ''}
      </div>
    ` : `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">선택된 과목 데이터가 없습니다.</div>
        </div>
      </div>
      <div class="empty">학년과 과목을 먼저 선택해 주세요.</div>
    `;

    const btn = document.getElementById('toggleExamplesBtn');
    if (btn) {
      btn.onclick = () => {
        state.showExamples = !state.showExamples;
        rerenderAnalysis();
      };
    }
  }

  function rerender(){
    const years = safeArr(state.student?.years);
    renderYearToggles(years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999) || String(a.subject).localeCompare(String(b.subject),'ko'));
    renderSubjectToggles(subjects);
    rerenderAnalysis();
  }

  async function boot(){
    const loaded = await loadRecordData();
    const student = pickStudent(loaded.data);
    if (!student) {
      $('#studentMeta').textContent = '학생 데이터가 없습니다.';
      $('#analysisCard').innerHTML = '<div class="empty">record_detail.json 안에 students 데이터가 없습니다.</div>';
      return;
    }
    state.student = student;
    $('#studentMeta').textContent = [student.student_name, student.school_name, student.student_id].filter(Boolean).join(' · ');
    $('#previewBadge').textContent = '실데이터';
    $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
    rerender();
  }

  boot().catch(err => {
    $('#studentMeta').textContent = '데이터를 불러오지 못했습니다.';
    $('#previewBadge').textContent = '오류';
    $('#analysisCard').innerHTML = `<div class="empty">${esc(err?.message || err)}</div>`;
  });
})();
</script>
</body>
</html>
