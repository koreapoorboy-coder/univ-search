<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .subttl{font-size:16px;font-weight:900;margin:0}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .btn.secondary{border-color:#ddd}
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .section-title{
      font-size:15px;font-weight:900;margin:0 0 10px;display:flex;align-items:center;gap:8px
    }
    .section-title .dot{
      width:8px;height:8px;border-radius:999px;background:#111;display:inline-block
    }

    .subject-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:12px;
    }
    @media(max-width: 760px){ .subject-grid{grid-template-columns: 1fr;} }

    .subject-card{
      border:1px solid #eee;border-radius:16px;padding:14px;background:#fff
    }
    .subject-head{
      display:flex;justify-content:space-between;gap:8px;align-items:flex-start;flex-wrap:wrap
    }
    .subject-name{
      font-weight:900;font-size:16px;line-height:1.3
    }
    .subject-badge{
      border:1px solid #ddd;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900
    }

    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{
      display:inline-flex;align-items:center;
      border:1px solid #ddd;border-radius:999px;padding:6px 10px;
      font-size:12px;font-weight:900;background:#fff;
      max-width:100%;
      word-break:break-word;
    }

    .analysis-block{margin-top:12px;border-top:1px dashed #eee;padding-top:10px}
    .analysis-item + .analysis-item{margin-top:10px}
    .analysis-label{
      font-size:12px;font-weight:900;opacity:.75;margin-bottom:4px
    }
    .analysis-text{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.55;
      font-size:14px;
    }

    .empty{
      border:1px dashed #ddd;border-radius:14px;padding:14px;background:#fff;
      color:#555
    }

    .force-hidden{display:none !important;}
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">생기부 분석 보기</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>
    <div class="row" id="navRow"></div>
  </div>

  <!-- 호환용 패널: 요청사항에 따라 숨김 -->
  <div class="card" id="panelDisplaySetting" style="display:none;">
    <div class="section-title"><span class="dot"></span>표시 설정</div>
    <div class="muted">요청사항에 따라 숨김 처리됩니다.</div>
  </div>

  <div class="card" id="panelAllKeywords" style="display:none;">
    <div class="section-title"><span class="dot"></span>전체 추출 키워드</div>
    <div class="muted">요청사항에 따라 숨김 처리됩니다.</div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">과목별 키워드</div>
        <span class="pill" id="subjectCountPill">과목 0개</span>
      </div>
      <div class="rightgroup">
        <span class="muted">과목별 키워드만 표시</span>
      </div>
    </div>
    <div class="subject-grid" id="subjectKeywordArea" style="margin-top:12px;"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">과목 핵심 분석</div>
      </div>
      <div class="rightgroup">
        <span class="muted">핵심 해석 · 강점 · 보완</span>
      </div>
    </div>
    <div class="subject-grid" id="subjectAnalysisArea" style="margin-top:12px;"></div>
  </div>

  <div class="card" id="panelDetailRecords" style="display:none;">
    <div class="section-title"><span class="dot"></span>세부 기록</div>
    <div class="muted">요청사항에 따라 숨김 처리됩니다.</div>
  </div>
</div>

<script>
(() => {
  // =========================
  // 설정값
  // =========================
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN";   // ✅ 실제 토큰으로 변경
  const LS_KEY = "__ADMIN_TOKEN__";        // 관리자 토큰 저장 키 (페이지 이동 편의)

  // =========================
  // DOM / 공통 유틸
  // =========================
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
  const norm = (v)=>String(v ?? "").trim();

  function getQS() {
    return new URLSearchParams(location.search);
  }
  function safeStr(v) {
    return (v == null) ? "" : String(v);
  }
  function hideIfExists(id){
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  }

  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["ID"] ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if (s) return s;
    }
    return "";
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if (!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  async function loadJsonSafe(path, fallback){
    try{
      return await loadJson(path);
    }catch(_e){
      return fallback;
    }
  }

  // =========================
  // 보안: auth 컨텍스트 (t 우선)
  // =========================
  function getAuthContext() {
    const qs = getQS();

    const t = safeStr(qs.get("t") || qs.get("token")).trim();
    const id = safeStr(qs.get("id")).trim();
    const adminParam = safeStr(qs.get("admin")).trim();
    const adminSaved = safeStr(localStorage.getItem(LS_KEY)).trim();
    const admin = adminParam || adminSaved;

    // 🔒 t가 있으면 무조건 학생모드 (id/admin 무시)
    if (t) {
      return {
        mode: "student",
        token: t,
        id: "",
        admin: "",
        isAdmin: false
      };
    }

    // 관리자 후보 (검증 포함)
    if (id && admin) {
      const ok = (admin === ADMIN_TOKEN);
      if (adminParam && ok) localStorage.setItem(LS_KEY, adminParam);

      return {
        mode: "admin",
        token: "",
        id,
        admin,
        isAdmin: ok
      };
    }

    return {
      mode: "guest",
      token: "",
      id: "",
      admin: "",
      isAdmin: false
    };
  }

  function buildPageLink(page, auth, student) {
    // 🔒 학생모드면 절대 id/admin 링크 만들지 않음
    if (auth?.mode === "student") {
      return `${page}?t=${encodeURIComponent(auth.token)}`;
    }

    // 관리자모드(검증된 경우만)
    if (auth?.mode === "admin" && auth.isAdmin) {
      const sid = norm(pickId(student) || auth.id);
      return `${page}?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(auth.admin)}`;
    }

    // guest fallback
    return page;
  }

  function resolveStudentByAuth(students, auth) {
    if (!Array.isArray(students)) return null;

    if (auth.mode === "student") {
      // 🔒 학생모드에서는 token으로만 매칭
      return students.find(s => norm(pickToken(s)) === auth.token) || null;
    }

    if (auth.mode === "admin" && auth.isAdmin) {
      // 관리자모드에서만 id 매칭 허용
      return students.find(s => norm(pickId(s)) === auth.id) || null;
    }

    return null;
  }

  // =========================
  // flags / 접근 정책
  // =========================
  function getRecordFlag(flags, studentId) {
    if (!flags) return {};
    if (Array.isArray(flags)) {
      return flags.find(x => String(x?.id) === String(studentId)) || {};
    }
    return flags[studentId] || {};
  }

  function canViewRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true; // flags 없으면 기본 허용
    if (flag.recordEnabled === false) return false;

    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  function canViewRawRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;

    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  // =========================
  // school_record_detail.json 파싱 (유연 대응)
  // =========================
  function getRecordDetail(detailData, studentId) {
    if (!detailData) return null;

    // 배열형 [{id, ...}]
    if (Array.isArray(detailData)) {
      return detailData.find(x => String(x?.id) === String(studentId)) || null;
    }

    // 객체형 { "학생ID": {...} }
    if (detailData[studentId]) return detailData[studentId];

    // 래퍼형
    if (Array.isArray(detailData.items)) {
      return detailData.items.find(x => String(x?.id) === String(studentId)) || null;
    }
    if (Array.isArray(detailData.data)) {
      return detailData.data.find(x => String(x?.id) === String(studentId)) || null;
    }

    return null;
  }

  function unwrapRecordPayload(record) {
    if (!record) return null;
    return (
      record.detail ||
      record.record ||
      record.analysis ||
      record.payload ||
      record.data ||
      record
    );
  }

  function normalizeKeywords(v) {
    if (Array.isArray(v)) {
      return [...new Set(v.map(x => String(x ?? "").trim()).filter(Boolean))];
    }
    const s = String(v ?? "").trim();
    if (!s) return [];
    return [...new Set(
      s.split(/[,\/·\n|]/g).map(x => x.trim()).filter(Boolean)
    )];
  }

  function pickFirst(...vals) {
    for (const v of vals) {
      if (v == null) continue;
      if (typeof v === "string" && v.trim() === "") continue;
      return v;
    }
    return null;
  }

  function normalizeSubjectEntry(entry, fallbackName) {
    const e = entry || {};
    const subjectName = pickText(
      e.subject, e.name, e.course, e.과목, e.과목명, fallbackName
    ) || "과목";

    const keywords = normalizeKeywords(
      pickFirst(
        e.keywords, e.keywordList, e.keyword_list,
        e.키워드, e.추출키워드, e.과목별키워드
      )
    );

    const core = pickText(
      e.coreAnalysis, e.core, e.core_summary, e.analysis,
      e.핵심해석, e.핵심분석, e["핵심 분석"]
    );

    const strength = pickText(
      e.strength, e.강점, e.장점
    );

    const improve = pickText(
      e.improve, e.보완, e.보완점, e.약점, e.개선점
    );

    return {
      subject: subjectName,
      keywords,
      core,
      strength,
      improve
    };
  }

  function collectSubjectsFromPayload(payload) {
    if (!payload) return [];

    // 1) 배열 필드 후보
    const arrCandidate = pickFirst(
      Array.isArray(payload.subjects) ? payload.subjects : null,
      Array.isArray(payload.items) ? payload.items : null,
      Array.isArray(payload.records) ? payload.records : null,
      Array.isArray(payload.subject_analysis) ? payload.subject_analysis : null,
      Array.isArray(payload.subjectAnalyses) ? payload.subjectAnalyses : null,
      Array.isArray(payload.과목분석) ? payload.과목분석 : null
    );
    if (Array.isArray(arrCandidate)) {
      return arrCandidate.map((x, i) => normalizeSubjectEntry(x, `과목 ${i+1}`));
    }

    // 2) 객체형 과목 맵
    const objCandidate = pickFirst(
      (payload.subjects && !Array.isArray(payload.subjects) && typeof payload.subjects === "object") ? payload.subjects : null,
      (payload.과목 && !Array.isArray(payload.과목) && typeof payload.과목 === "object") ? payload.과목 : null
    );
    if (objCandidate && typeof objCandidate === "object") {
      return Object.entries(objCandidate).map(([k, v]) => normalizeSubjectEntry(v, k));
    }

    // 3) payload 자체가 과목명 키 객체
    const blacklist = new Set([
      "id","studentId","studentID","학생ID","name","studentName",
      "summary","요약","meta","metadata","createdAt","updatedAt"
    ]);

    const objectLikeEntries = Object.entries(payload).filter(([k,v]) => {
      if (blacklist.has(k)) return false;
      return v && typeof v === "object" && !Array.isArray(v);
    });

    if (objectLikeEntries.length) {
      return objectLikeEntries.map(([k,v]) => normalizeSubjectEntry(v, k));
    }

    return [];
  }

  // =========================
  // 렌더링
  // =========================
  function renderError(title, message){
    const app = $("#app") || document.body;
    app.innerHTML = `
      <div class="card">
        <div class="title">${esc(title || "오류")}</div>
        <div class="warn">${esc(message || "문제가 발생했습니다.")}</div>
      </div>
    `;
  }

  function renderNoAccess(message){
    const app = $("#app") || document.body;
    app.innerHTML = `
      <div class="card">
        <div class="title">접근 권한이 없습니다.</div>
        <div class="warn">${esc(message || "생기부 분석 페이지 접근 권한이 없습니다.")}</div>
        <div class="muted" style="margin-top:8px">
          관리자: record_detail.html?id=학생ID&admin=관리자토큰 / 학생·학부모: record_detail.html?t=개별토큰
        </div>
      </div>
    `;
  }

  function renderStudentMeta(student, auth){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student?.school, student?.["학교"]);
    const career = pickText(student?.career, student?.["진로"]);
    const adm = pickText(student?.admission, student?.["전형"]);

    $("#hdr").innerHTML = `${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = auth.isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student, auth, recordFlag){
    const nav = [];

    if (auth.isAdmin) {
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(auth.admin)}">학생 목록</a>`);
    }

    nav.push(`<a class="btn" href="${buildPageLink("./student.html", auth, student)}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./univ_list.html", auth, student)}">대학 상향/적정</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./progress_detail.html", auth, student)}">진도 보기</a>`);

    if (canViewRawRecord(recordFlag, auth)) {
      nav.push(`<a class="btn" href="${buildPageLink("./record_raw_detail.html", auth, student)}">생기부 원문 보기</a>`);
    }

    $("#navRow").innerHTML = nav.join("");
  }

  function keywordCardHtml(sub) {
    const keywords = Array.isArray(sub.keywords) ? sub.keywords : [];
    return `
      <div class="subject-card">
        <div class="subject-head">
          <div class="subject-name">${esc(sub.subject || "과목")}</div>
          <div class="subject-badge">키워드 ${keywords.length}개</div>
        </div>
        ${
          keywords.length
            ? `<div class="chips">${keywords.map(k => `<span class="chip">${esc(k)}</span>`).join("")}</div>`
            : `<div class="muted" style="margin-top:10px;">키워드 데이터가 없습니다.</div>`
        }
      </div>
    `;
  }

  function analysisCardHtml(sub) {
    const hasAny = !!(sub.core || sub.strength || sub.improve);

    return `
      <div class="subject-card">
        <div class="subject-head">
          <div class="subject-name">${esc(sub.subject || "과목")}</div>
          <div class="subject-badge">핵심 분석</div>
        </div>

        ${
          hasAny ? `
            <div class="analysis-block">
              ${
                sub.core ? `
                  <div class="analysis-item">
                    <div class="analysis-label">핵심 해석</div>
                    <div class="analysis-text">${esc(sub.core)}</div>
                  </div>
                ` : ""
              }
              ${
                sub.strength ? `
                  <div class="analysis-item">
                    <div class="analysis-label">강점</div>
                    <div class="analysis-text">${esc(sub.strength)}</div>
                  </div>
                ` : ""
              }
              ${
                sub.improve ? `
                  <div class="analysis-item">
                    <div class="analysis-label">보완</div>
                    <div class="analysis-text">${esc(sub.improve)}</div>
                  </div>
                ` : ""
              }
            </div>
          ` : `<div class="muted" style="margin-top:10px;">핵심 분석 데이터가 없습니다.</div>`
        }
      </div>
    `;
  }

  function renderSubjectKeywordCards(subjects){
    const root = $("#subjectKeywordArea");
    const pill = $("#subjectCountPill");
    if (!root) return;

    const list = Array.isArray(subjects) ? subjects : [];
    if (pill) pill.textContent = `과목 ${list.length}개`;

    if (!list.length) {
      root.innerHTML = `<div class="empty">과목별 키워드 데이터가 없습니다. <span class="muted">(school_record_detail.json 구조 확인)</span></div>`;
      return;
    }

    root.innerHTML = list.map(keywordCardHtml).join("");
  }

  function renderSubjectCoreAnalysis(subjects){
    const root = $("#subjectAnalysisArea");
    if (!root) return;

    const list = Array.isArray(subjects) ? subjects : [];
    if (!list.length) {
      root.innerHTML = `<div class="empty">과목 핵심 분석 데이터가 없습니다. <span class="muted">(school_record_detail.json 구조 확인)</span></div>`;
      return;
    }

    root.innerHTML = list.map(analysisCardHtml).join("");
  }

  // =========================
  // 메인
  // =========================
  async function main() {
    const auth = getAuthContext();

    // 관리자 모드인데 토큰 틀린 경우
    if (auth.mode === "admin" && !auth.isAdmin) {
      return renderNoAccess("관리자 토큰이 올바르지 않습니다.");
    }

    // 학생 로드
    const students = await loadJson("./students.json");
    if (!Array.isArray(students)) throw new Error("students.json is not an array");

    const student = resolveStudentByAuth(students, auth);
    if (!student) {
      return renderNoAccess("학생을 찾을 수 없습니다.");
    }

    const sid = norm(pickId(student));

    // flags 로드 / 권한 체크
    const flagsData = await loadJsonSafe("./school_record_flags.json", null);
    const recordFlag = getRecordFlag(flagsData, sid);

    if (!canViewRecord(recordFlag, auth)) {
      return renderNoAccess("생기부 분석 페이지 접근 권한이 없습니다.");
    }

    // 상단 렌더
    renderStudentMeta(student, auth);
    renderNav(student, auth, recordFlag);

    // 요청사항: 표시 설정 / 전체 키워드 / 세부 기록 숨김
    hideIfExists("panelDisplaySetting");
    hideIfExists("panelAllKeywords");
    hideIfExists("panelDetailRecords");

    // detail 데이터 로드
    const detailData = await loadJsonSafe("./school_record_detail.json", null);
    if (!detailData) {
      renderSubjectKeywordCards([]);
      renderSubjectCoreAnalysis([]);
      return;
    }

    const record = getRecordDetail(detailData, sid);
    if (!record) {
      renderSubjectKeywordCards([]);
      renderSubjectCoreAnalysis([]);
      return;
    }

    const payload = unwrapRecordPayload(record);
    const subjects = collectSubjectsFromPayload(payload);

    renderSubjectKeywordCards(subjects);
    renderSubjectCoreAnalysis(subjects);
  }

  main().catch(err => {
    renderError("오류", `로딩 오류: ${err.message}`);
  });
})();
</script>
</body>
</html>
