<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생활기록부 · 포트폴리오</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1180px;margin:0 auto}
    .card{
      border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff;
    }
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .meta{opacity:.85;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .pill{
      display:inline-flex;align-items:center;border:2px solid #111;border-radius:999px;padding:7px 12px;font-weight:900
    }
    .badge{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:6px 10px;font-weight:900;background:#fff
    }
    .chip{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:5px 10px;font-weight:800;background:#fff;font-size:12px
    }
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .btn.small{padding:7px 10px;border-radius:10px;font-size:13px}
    .btn.blue{border-color:#2563eb;color:#2563eb}
    .btn.orange{border-color:#b26a00;color:#b26a00}
    .btn.gray{border-color:#999;color:#444}

    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    select{
      border:1px solid #ddd;border-radius:12px;padding:10px 12px;background:#fff;font-weight:900;
      max-width: 100%;
    }

    .section-title{
      font-size:18px;font-weight:900;margin:0 0 8px;
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    }
    .section-sub{opacity:.7;font-size:13px;line-height:1.5;margin-bottom:8px}

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }
    @media(max-width: 900px){
      .grid{grid-template-columns: 1fr;}
    }

    .box{
      border:1px solid #eee;border-radius:14px;padding:12px;background:#fff;
    }

    .kv{
      display:grid;
      grid-template-columns: 94px 1fr;
      gap:8px 10px;
      margin-top:10px;
      line-height:1.55;
    }
    .k{opacity:.65;font-weight:900}
    .v{font-weight:800;white-space:pre-line;word-break:break-word}

    .hr{height:1px;background:#eee;margin:10px 0}

    .subject-card{
      border:1px solid #ddd;border-radius:16px;padding:14px;background:#fff;
    }
    .subject-head{
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap
    }
    .subject-name{font-weight:900;font-size:17px}
    .subject-sub{opacity:.7;font-size:13px;margin-top:4px}
    .subject-actions{display:flex;gap:8px;flex-wrap:wrap}

    .subject-summary-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    @media(max-width: 900px){
      .subject-summary-grid{grid-template-columns:1fr;}
    }

    .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

    .detail-item{
      border:1px solid #eee;border-radius:14px;padding:12px;background:#fff;margin-top:10px;
    }
    .detail-top{
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap
    }
    .detail-title{font-weight:900}
    .detail-sub{opacity:.7;font-size:13px;margin-top:4px}

    .toggle-wrap{
      display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap
    }
    .toggle-btn{
      border:1px solid #ddd;background:#fff;border-radius:999px;padding:7px 12px;font-weight:900;cursor:pointer
    }
    .toggle-btn:hover{background:#fafafa}

    .hidden{display:none !important}

    .note{
      font-size:13px;line-height:1.5;opacity:.78
    }

    .badge-good{border-color:#2563eb;color:#2563eb}
    .badge-review{border-color:#b26a00;color:#b26a00}
    .badge-off{border-color:#b00020;color:#b00020}

    .empty{
      border:1px dashed #ddd;border-radius:12px;padding:14px;color:#666;background:#fafafa
    }

    .debug{
      margin-top:10px;padding:12px;border-radius:12px;border:1px dashed #bbb;background:#fafafa;
      font-size:13px;line-height:1.5;
    }
    .debug pre{
      margin:8px 0 0;white-space:pre-wrap;word-break:break-word;
      background:#fff;border:1px solid #eee;border-radius:10px;padding:10px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title" id="hdr">생활기록부 · 포트폴리오</div>
    <div class="meta" id="meta"></div>

    <div class="row" id="modeRow"></div>

    <div class="topbar" style="margin-top:10px">
      <div class="leftgroup" id="navRow"></div>

      <div class="rightgroup">
        <div id="semWrap" style="display:none; gap:8px; align-items:center;">
          <span class="badge">학기</span>
          <select id="semSel"></select>
        </div>
      </div>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
(() => {
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN";
  const LS_KEY = "__ADMIN_TOKEN__";
  const norm = (v) => String(v ?? "").trim();

  const qs = new URLSearchParams(location.search);
  const adminParam = qs.get("admin");
  const adminSaved = localStorage.getItem(LS_KEY);
  const admin = adminParam || adminSaved;

  const idParam = qs.get("id");
  const tParam  = qs.get("t") || qs.get("token");

  const debugParam = qs.get("debug");
  const debugOn = (debugParam === "1" || debugParam === "true");

  const isAdmin = (norm(admin) === norm(ADMIN_TOKEN));
  if (adminParam && isAdmin) localStorage.setItem(LS_KEY, adminParam);

  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s??"").replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path+" load failed ("+r.status+")");
    return r.json();
  }

  function pickName(s){ return s.studentName ?? s.studentname ?? s.name ?? s["학생명"] ?? s["이름"] ?? s["성명"] ?? s.id ?? "-"; }
  function pickId(s){ return s.id ?? s.studentId ?? s.studentID ?? s["ID"] ?? s["학생ID"] ?? s["학번"] ?? null; }
  function pickToken(s){ return s.token ?? s.accessToken ?? s.key ?? s["token"] ?? s["토큰"] ?? null; }

  const pickText = (...vals) => {
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  };

  function normalizeArrayish(x){
    if(Array.isArray(x)) return x.slice();
    if(!x || typeof x!=="object") return [];
    for(const k of ["records","rows","items","data","notes","progress","list"]){
      if(Array.isArray(x[k])) return x[k].slice();
    }
    const out = [];
    for(const [k,v] of Object.entries(x)){
      if(Array.isArray(v)) out.push(...v.map(r => ({...r, id:(r?.id ?? k)})));
      else if(v && typeof v==="object") out.push({...v, id:(v?.id ?? k)});
    }
    return out;
  }

  function semesterKeyOf(x){
    const g = pickText(x.grade, x["학년"]);
    const t = pickText(x.term, x["학기"]);
    if(g && t) return `${g} · ${t}`;
    if(g) return g;
    if(t) return t;
    return "미지정";
  }

  function parseGradeNum(g){
    const m = String(g||"").match(/고?\s*(\d)/);
    return m ? Number(m[1]) : 99;
  }
  function parseTermNum(t){
    const m = String(t||"").match(/(\d)/);
    return m ? Number(m[1]) : 99;
  }

  function sortSemesterKeys(keys){
    return keys.slice().sort((a,b)=>{
      if(a==="미지정" && b!=="미지정") return 1;
      if(b==="미지정" && a!=="미지정") return -1;

      const [ga, ta] = String(a).split("·").map(s=>s.trim());
      const [gb, tb] = String(b).split("·").map(s=>s.trim());

      const gDiff = parseGradeNum(ga) - parseGradeNum(gb);
      if(gDiff !== 0) return gDiff;

      const tDiff = parseTermNum(ta) - parseTermNum(tb);
      if(tDiff !== 0) return tDiff;

      return String(a).localeCompare(String(b),"ko");
    });
  }

  function getSemesterRows(list, semKey){
    if(semKey === "미지정"){
      return list.filter(r => semesterKeyOf(r) === "미지정");
    }
    return list.filter(r => semesterKeyOf(r) === semKey);
  }

  function splitKeywords(s){
    return String(s||"")
      .split(/[,/|·\n]+/)
      .map(v=>v.trim())
      .filter(Boolean);
  }

  function uniq(arr){
    return [...new Set(arr.filter(Boolean))];
  }

  function tagHtml(text){
    return `<span class="chip">${esc(text)}</span>`;
  }

  // displayMode 해석:
  // - summary_only: 과목 핵심 분석은 보임 / 세부 기록 숨김
  // - full: 모두 표시
  // - off/hide: 전체 숨김(안내만)
  function parseDisplayMode(flagRow){
    const raw = pickText(flagRow?.displayMode, flagRow?.display_mode).toLowerCase();
    if(!raw) return "full";
    if(raw === "summary_only") return "summary_only";
    if(raw === "off" || raw === "hide" || raw === "hidden") return "off";
    return "full";
  }

  function renderDebugBox(state){
    if(!debugOn) return "";
    return `
      <div class="card">
        <div class="section-title">디버그 상태</div>
        <div class="debug">
          <pre>${esc(JSON.stringify(state, null, 2))}</pre>
        </div>
      </div>
    `;
  }

  function buildRawLink({ sid, stok, isAdmin, adminToken, semKey, subject }){
    const p = new URLSearchParams();
    if(isAdmin){
      p.set("id", sid);
      p.set("admin", adminToken);
    }else{
      p.set("t", stok);
    }
    if(semKey && semKey !== "미지정"){
      // "고1 · 1학기" -> grade, term
      const parts = semKey.split("·").map(s=>s.trim());
      if(parts[0]) p.set("grade", parts[0]);
      if(parts[1]) p.set("term", parts[1]);
    }
    if(subject) p.set("subject", subject);
    return `./record_raw_detail.html?${p.toString()}`;
  }

  function renderPage(ctx){
    const {
      student, sid, stok, isAdmin, admin,
      flagsAll, summaryAll, detailAll, currentSemKey
    } = ctx;

    const semSummaryRows = getSemesterRows(summaryAll, currentSemKey);
    const semDetailRows  = getSemesterRows(detailAll, currentSemKey);

    // flags는 학생 공통이 기본일 가능성이 큼 + 학기별 row가 있으면 우선
    const semesterFlag = flagsAll.find(r => semesterKeyOf(r) === currentSemKey)
                    || flagsAll.find(r => semesterKeyOf(r) === "미지정")
                    || flagsAll[0]
                    || null;

    const recordEnabled = pickText(semesterFlag?.recordEnabled, semesterFlag?.record_enabled).toUpperCase() || "Y";
    const displayMode = parseDisplayMode(semesterFlag);
    const reviewStatus = pickText(semesterFlag?.review_status, semesterFlag?.reviewStatus) || "-";
    const lastReviewed = pickText(semesterFlag?.last_reviewed, semesterFlag?.lastReviewed) || "-";
    const reason = pickText(semesterFlag?.reason, semesterFlag?.memo, semesterFlag?.notes) || "";

    // summary row는 학기당 1행 가정 (없으면 빈객체)
    const summary = semSummaryRows[0] || {};

    // 과목별 그룹핑 (세부기록 기준)
    const bySubject = new Map();
    for(const d of semDetailRows){
      const subject = pickText(d.subject, d["과목"]) || "기타";
      if(!bySubject.has(subject)) bySubject.set(subject, []);
      bySubject.get(subject).push(d);
    }

    // 과목 카드 데이터 생성
    const subjectCards = [...bySubject.entries()].map(([subject, rows]) => {
      const allKeywords = uniq(rows.flatMap(r => splitKeywords(pickText(r.keywords, r["키워드"]))));
      const categories = uniq(rows.map(r => pickText(r.category, r["구분"], r["카테고리"])).filter(Boolean));
      const coachSummaries = rows.map(r => pickText(r.coach_summary, r["분석 요약"])).filter(Boolean);
      const strengths = rows.map(r => pickText(r.strength_comment, r["강점 코멘트"])).filter(Boolean);
      const supplements = rows.map(r => pickText(r.supplement_comment, r["보완 코멘트"])).filter(Boolean);

      const mergedCoach = coachSummaries.length ? uniq(coachSummaries).join(" / ") : "";
      const mergedStrength = strengths.length ? uniq(strengths).join(" / ") : "";
      const mergedSupplement = supplements.length ? uniq(supplements).join(" / ") : "";

      return {
        subject,
        count: rows.length,
        categories,
        keywords: allKeywords,
        coach: mergedCoach,
        strength: mergedStrength,
        supplement: mergedSupplement,
        rows
      };
    }).sort((a,b)=> a.subject.localeCompare(b.subject, "ko"));

    // summary 기반 키워드 + detail 기반 키워드 합치기
    const summaryKeywords = splitKeywords(pickText(summary.subject_fit_keywords, summary.keywords));
    const detailKeywords = uniq(subjectCards.flatMap(s => s.keywords));
    const mergedKeywords = uniq([...summaryKeywords, ...detailKeywords]);

    const rawAllHref = buildRawLink({ sid, stok, isAdmin, adminToken:admin, semKey:currentSemKey });

    // 표시 여부
    const pageBlocked = (recordEnabled === "N" || displayMode === "off");
    const showDetailList = (displayMode !== "summary_only"); // summary_only면 세부기록 숨김, 과목핵심분석은 표시
    const hasAnySubjectAnalysis = subjectCards.length > 0;
    const hasAnySummary = !!(pickText(summary.overall_strength, summary.overall_weakness, summary.next_action, summary.updated_at, summary.subject_fit_keywords));

    // flags badge
    const statusBadgeCls =
      reviewStatus.toLowerCase().includes("review") ? "badge badge-review"
      : reviewStatus.toLowerCase().includes("done") ? "badge badge-good"
      : "badge";

    const settingsCard = `
      <div class="card">
        <div class="section-title">표시 설정</div>
        <div class="row" style="margin-top:0">
          <span class="chip ${recordEnabled==='Y' ? 'badge-good':''}">기록표시 ${esc(recordEnabled || '-')}</span>
          <span class="chip">표시모드 ${esc(displayMode)}</span>
          <span class="${statusBadgeCls}">검토상태 ${esc(reviewStatus)}</span>
          <span class="chip">검토일 ${esc(lastReviewed)}</span>
          ${reason ? `<span class="chip">비고 ${esc(reason)}</span>` : ``}
        </div>
        <div class="note" style="margin-top:8px">
          ${displayMode === "summary_only"
            ? "※ summary_only 모드여도 과목별 핵심 분석은 표시됩니다. 세부 기록은 숨김 처리됩니다."
            : "※ 과목별 핵심 분석을 우선으로 보여주고, 세부 기록/학기 요약은 보조 정보로 제공합니다."}
        </div>
      </div>
    `;

    const blockedCard = `
      <div class="card">
        <div class="warn">이 학생의 생활기록부 기록 표시가 비활성화되어 있습니다.</div>
        <div class="muted" style="margin-top:6px">school_record_flags.json의 recordEnabled / displayMode 설정을 확인하세요.</div>
        <div class="row">
          <a class="btn small blue" href="${esc(rawAllHref)}">원본 보기(관리/점검용)</a>
        </div>
      </div>
    `;

    // 학기 종합 진단 (기본 숨김)
    const semesterSummaryCard = `
      <div class="card">
        <div class="toggle-wrap">
          <div>
            <div class="section-title" style="margin:0">학기 종합 진단 <span class="chip">보조 영역</span></div>
            <div class="section-sub">세특 분석 이후 참고용입니다. 기본은 접어둡니다.</div>
          </div>
          <button type="button" class="toggle-btn" id="btnToggleSemSummary">학기 종합 진단 보기</button>
        </div>

        <div id="semSummaryBody" class="hidden" style="margin-top:8px">
          ${
            hasAnySummary ? `
              <div class="box">
                <div class="row" style="margin-top:0">
                  ${pickText(summary.updated_at) ? `<span class="chip">업데이트일 ${esc(summary.updated_at)}</span>` : ``}
                  ${currentSemKey ? `<span class="chip">${esc(currentSemKey)}</span>` : ``}
                </div>

                <div class="subject-summary-grid">
                  ${
                    pickText(summary.overall_strength)
                    ? `<div class="box">
                        <div class="section-sub" style="margin:0 0 4px;font-weight:900;opacity:1">강점 정리</div>
                        <div class="v">${esc(summary.overall_strength)}</div>
                      </div>` : ``
                  }
                  ${
                    pickText(summary.overall_weakness)
                    ? `<div class="box">
                        <div class="section-sub" style="margin:0 0 4px;font-weight:900;opacity:1">보완 포인트</div>
                        <div class="v">${esc(summary.overall_weakness)}</div>
                      </div>` : ``
                  }
                </div>

                ${
                  pickText(summary.next_action)
                  ? `<div class="box" style="margin-top:10px">
                      <div class="section-sub" style="margin:0 0 4px;font-weight:900;opacity:1">다음 단계</div>
                      <div class="v">${esc(summary.next_action)}</div>
                    </div>` : ``
                }

                ${
                  mergedKeywords.length
                  ? `<div class="hr"></div>
                     <div class="section-sub" style="margin:0 0 6px;font-weight:900;opacity:1">추출 키워드 (요약 + 세부기록 통합)</div>
                     <div class="tagrow">${mergedKeywords.map(tagHtml).join("")}</div>`
                  : ``
                }
              </div>
            ` : `
              <div class="empty">해당 학기의 요약(summary) 데이터가 없습니다.</div>
            `
          }
        </div>
      </div>
    `;

    // 과목별 핵심 분석 (메인)
    const subjectAnalysisCard = `
      <div class="card">
        <div class="section-title">과목별 핵심 분석 <span class="chip">메인 영역</span></div>
        <div class="section-sub">
          세특/활동 기록을 과목 기준으로 묶어 핵심 내용과 추출 키워드를 먼저 확인합니다.
        </div>

        <div class="row" style="margin-top:0">
          <a class="btn small blue" href="${esc(rawAllHref)}">원본 전체 보기</a>
        </div>

        ${
          hasAnySubjectAnalysis
          ? `<div class="grid">
              ${subjectCards.map(s => {
                const subjectRawHref = buildRawLink({ sid, stok, isAdmin, adminToken:admin, semKey:currentSemKey, subject:s.subject });
                return `
                  <div class="subject-card">
                    <div class="subject-head">
                      <div>
                        <div class="subject-name">${esc(s.subject)}</div>
                        <div class="subject-sub">
                          세부 기록 ${esc(String(s.count))}개
                          ${s.categories.length ? ` · ${esc(s.categories.join(", "))}` : ``}
                        </div>
                      </div>
                      <div class="subject-actions">
                        <a class="btn small blue" href="${esc(subjectRawHref)}">원본 보기</a>
                      </div>
                    </div>

                    ${s.keywords.length ? `<div class="tagrow" style="margin-top:10px">${s.keywords.map(tagHtml).join("")}</div>` : ``}

                    <div class="kv">
                      ${s.coach ? `<div class="k">핵심 해석</div><div class="v">${esc(s.coach)}</div>` : ``}
                      ${s.strength ? `<div class="k">강점</div><div class="v">${esc(s.strength)}</div>` : ``}
                      ${s.supplement ? `<div class="k">보완</div><div class="v">${esc(s.supplement)}</div>` : ``}
                      ${!s.coach && !s.strength && !s.supplement ? `<div class="k">안내</div><div class="v">분석 코멘트가 아직 없습니다. 세부 기록을 직접 확인해주세요.</div>` : ``}
                    </div>
                  </div>
                `;
              }).join("")}
             </div>`
          : `<div class="empty">해당 학기의 세부 기록(detail) 데이터가 없어 과목별 분석을 표시할 수 없습니다.</div>`
        }
      </div>
    `;

    // 세부 기록
    const detailCard = `
      <div class="card">
        <div class="section-title">세부 기록</div>
        <div class="section-sub">
          입력된 항목만 표시됩니다.
          ${showDetailList ? "" : " (summary_only 모드로 숨김 처리됨)"}
        </div>

        ${
          showDetailList
          ? (semDetailRows.length
              ? semDetailRows.map(d => {
                  const subject = pickText(d.subject, d["과목"]) || "기타";
                  const cat = pickText(d.category, d["카테고리"], d["구분"]);
                  const title = pickText(d.activity_title, d["활동명"], d["제목"]);
                  const subjectRawHref = buildRawLink({ sid, stok, isAdmin, adminToken:admin, semKey:currentSemKey, subject });
                  const evLink = pickText(d.evidence_link, d["evidence_link"], d["증빙링크"]);

                  const rows = [];
                  if(title) rows.push(`<div class="k">활동명</div><div class="v">${esc(title)}</div>`);
                  const originalText = pickText(d.original_text, d["원문"]);
                  if(originalText) rows.push(`<div class="k">원문</div><div class="v">${esc(originalText)}</div>`);
                  const coach = pickText(d.coach_summary, d["분석 요약"]);
                  if(coach) rows.push(`<div class="k">분석 요약</div><div class="v">${esc(coach)}</div>`);
                  const strong = pickText(d.strength_comment, d["강점 코멘트"]);
                  if(strong) rows.push(`<div class="k">강점 코멘트</div><div class="v">${esc(strong)}</div>`);
                  const sup = pickText(d.supplement_comment, d["보완 코멘트"]);
                  if(sup) rows.push(`<div class="k">보완 코멘트</div><div class="v">${esc(sup)}</div>`);
                  const kw = pickText(d.keywords, d["키워드"]);
                  if(kw) rows.push(`<div class="k">키워드</div><div class="v">${esc(kw)}</div>`);

                  return `
                    <div class="detail-item">
                      <div class="detail-top">
                        <div>
                          <div class="detail-title">${esc(subject)}</div>
                          <div class="detail-sub">
                            ${cat ? `${esc(cat)} · ` : ``}${title ? esc(title) : `세부기록`}
                          </div>
                        </div>
                        <div class="subject-actions">
                          <a class="btn small blue" href="${esc(subjectRawHref)}">원본(과목)</a>
                          ${evLink ? `<a class="btn small gray" href="${esc(evLink)}" target="_blank" rel="noopener noreferrer">증빙</a>` : ``}
                          ${cat ? `<span class="chip">${esc(cat)}</span>` : ``}
                        </div>
                      </div>
                      <div class="kv">${rows.join("")}</div>
                    </div>
                  `;
                }).join("")
              : `<div class="empty">해당 학기의 세부 기록(detail) 데이터가 없습니다.</div>`)
          : `<div class="empty">표시모드 설정(summary_only)으로 세부 기록이 숨겨져 있습니다. 상단 원본 보기 또는 표시모드(full)로 확인하세요.</div>`
        }
      </div>
    `;

    // 화면 합성
    let html = "";
    html += settingsCard;

    if(pageBlocked){
      html += blockedCard;
    }else{
      // ✅ 사용자 요청 반영: 학기 종합 진단보다 과목별 분석을 먼저
      html += subjectAnalysisCard;
      html += detailCard;
      html += semesterSummaryCard;
    }

    // 디버그
    html += renderDebugBox({
      student: { id: sid, name: pickName(student), tokenExists: !!stok },
      currentSemKey,
      flagsAllCount: flagsAll.length,
      summaryAllCount: summaryAll.length,
      detailAllCount: detailAll.length,
      flagsSemesterCount: getSemesterRows(flagsAll, currentSemKey).length,
      summarySemesterCount: semSummaryRows.length,
      detailSemesterCount: semDetailRows.length,
      semesterFlag,
      displayMode,
      recordEnabled,
      subjectCount: subjectCards.length
    });

    $("#content").innerHTML = html;

    // 학기 종합 진단 토글
    const btnToggle = $("#btnToggleSemSummary");
    const semBody = $("#semSummaryBody");
    if(btnToggle && semBody){
      let opened = false;
      btnToggle.addEventListener("click", () => {
        opened = !opened;
        semBody.classList.toggle("hidden", !opened);
        btnToggle.textContent = opened ? "학기 종합 진단 숨기기" : "학기 종합 진단 보기";
      });
    }
  }

  async function main(){
    // 1) students.json에서 학생 매칭
    const students = await loadJson("./students.json");
    if(!Array.isArray(students)) throw new Error("students.json is not an array");

    let student = null;
    if(isAdmin && idParam){
      student = students.find(s => norm(pickId(s)) === norm(idParam));
    }
    if(!student && tParam){
      student = students.find(s => norm(pickToken(s)) === norm(tParam));
    }

    if(!student){
      $("#hdr").textContent = "접근 권한이 없습니다.";
      $("#meta").innerHTML = `
        <div class="warn">학생을 찾을 수 없습니다.</div>
        <div class="muted">관리자: record_detail.html?id=학생ID&admin=관리자토큰 / 학생: record_detail.html?t=개별토큰</div>
      `;
      return;
    }

    const sid  = norm(pickId(student));
    const stok = norm(pickToken(student));
    const name = pickName(student);

    $("#hdr").textContent = `생활기록부 · 포트폴리오 · ${name}${sid?` (${sid})`:``}`;

    // 학생 메타
    const metaRows = [];
    const school = pickText(student.school, student["학교"]);
    const career = pickText(student.career, student["진로"]);
    const adm    = pickText(student.admission, student["전형"]);
    if(school) metaRows.push(`학교: ${esc(school)}`);
    if(career) metaRows.push(`진로: ${esc(career)}`);
    if(adm)    metaRows.push(`전형: ${esc(adm)}`);
    $("#meta").innerHTML = metaRows.length ? metaRows.join("<br>") : `<span class="muted">학생 메타 정보 없음</span>`;

    $("#modeRow").innerHTML = isAdmin
      ? `<span class="pill">관리자 모드</span><span class="muted">id 접근</span>`
      : `<span class="pill">학부모/학생 모드</span><span class="muted">토큰 접근</span>`;

    // 네비 링크
    const studentHref = isAdmin
      ? `./student.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}`
      : `./student.html?t=${encodeURIComponent(stok)}`;

    const univHref = isAdmin
      ? `./univ_list.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}`
      : `./univ_list.html?t=${encodeURIComponent(stok)}`;

    const progHref = isAdmin
      ? `./progress_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}`
      : `./progress_detail.html?t=${encodeURIComponent(stok)}`;

    const rawHref = isAdmin
      ? `./record_raw_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(admin)}`
      : `./record_raw_detail.html?t=${encodeURIComponent(stok)}`;

    const nav = [];
    nav.push(`<a class="btn" href="${studentHref}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${univHref}">대학 상향/적정</a>`);
    nav.push(`<a class="btn" href="${progHref}">진도 보기</a>`);
    nav.push(`<a class="btn blue" href="${rawHref}">원본 보기</a>`);
    if(isAdmin){
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(admin)}">학생 목록</a>`);
    }
    $("#navRow").innerHTML = nav.join("");

    // 2) 생기부 JSON 로딩
    let rawFlags = [], rawSummary = [], rawDetail = [];
    try { rawFlags = normalizeArrayish(await loadJson("./school_record_flags.json")); } catch(e){ rawFlags = []; }
    try { rawSummary = normalizeArrayish(await loadJson("./school_record_summary.json")); } catch(e){ rawSummary = []; }
    try { rawDetail = normalizeArrayish(await loadJson("./school_record_detail.json")); } catch(e){ rawDetail = []; }

    const flagsAll = rawFlags.filter(r => norm(r?.id) === sid);
    const summaryAll = rawSummary.filter(r => norm(r?.id) === sid);
    const detailAll = rawDetail.filter(r => norm(r?.id) === sid);

    // 학기 목록 구성 (summary + detail union)
    const semKeys = sortSemesterKeys(uniq([
      ...summaryAll.map(semesterKeyOf),
      ...detailAll.map(semesterKeyOf)
    ]));

    if(!semKeys.length){
      $("#content").innerHTML = `
        <div class="card">
          <div class="warn">생활기록부 데이터 없음</div>
          <div class="muted">school_record_summary.json / school_record_detail.json 에 id=${esc(sid)} 데이터가 없습니다.</div>
          <div class="row">
            <a class="btn small blue" href="${esc(rawHref)}">원본 보기(먼저 확인)</a>
          </div>
        </div>
        ${renderDebugBox({
          sid, flagsAllCount: flagsAll.length, summaryAllCount: summaryAll.length, detailAllCount: detailAll.length
        })}
      `;
      return;
    }

    // 학기 selector 표시
    const semWrap = $("#semWrap");
    const semSel = $("#semSel");
    semWrap.style.display = "inline-flex";
    semSel.innerHTML = semKeys.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join("");

    // URL grade/term 파라미터 있으면 그 학기 우선 선택
    const qGrade = pickText(qs.get("grade"));
    const qTerm = pickText(qs.get("term"));
    const qSem = qGrade && qTerm ? `${qGrade} · ${qTerm}` : "";

    if(qSem && semKeys.includes(qSem)) semSel.value = qSem;
    else semSel.value = semKeys[0];

    const render = () => renderPage({
      student, sid, stok, isAdmin, admin,
      flagsAll, summaryAll, detailAll,
      currentSemKey: semSel.value
    });

    semSel.addEventListener("change", render);
    render();
  }

  main().catch(err=>{
    $("#hdr").textContent = "오류";
    $("#meta").innerHTML = `<div class="warn">로딩 오류</div><div class="muted">${esc(err.message)}</div>`;
  });
})();
</script>
</body>
</html>
