<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    :root{--bd:#e8e8e8;--txt:#111;--muted:#666;--bg:#fff;--soft:#fafafa}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:26px;background:var(--bg);padding:22px;margin:14px 0}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .badge,.pill{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted)}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap}
    .toggle,.mini-toggle{appearance:none;border:1px solid var(--bd);background:#fff;color:#111;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .toggle.is-on,.mini-toggle.is-on{background:#111;color:#fff;border-color:#111}
    .toggle:disabled{opacity:.45;cursor:default}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .one-line{font-size:18px;line-height:1.7;color:#333;margin-top:10px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .keyword-groups{display:grid;gap:12px}
    .keyword-group{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:14px 16px}
    .keyword-group-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
    .keyword-group-title{font-size:14px;font-weight:900;line-height:1.4}
    .keyword-group-desc{font-size:13px;color:var(--muted);line-height:1.6}
    .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:14px;font-weight:800;cursor:pointer}
    .chip.is-on{background:#111;color:#fff;border-color:#111}
    .keyword-help{color:var(--muted);font-size:14px;line-height:1.7;margin:0 0 12px 0}
    .keyword-meaning{margin-top:14px;border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .keyword-meaning-label{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .keyword-meaning-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .keyword-meaning-body{color:#333;line-height:1.75;margin-top:8px}

    .flow-intro{color:var(--muted);font-size:14px;line-height:1.75;margin:0 0 14px 0}
    .flow-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .flow-card{border:1px solid var(--bd);border-radius:22px;background:var(--soft);padding:18px 18px 16px}
    .flow-kicker{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .flow-title{font-size:18px;font-weight:900;line-height:1.45;margin:12px 0 8px 0}
    .flow-body{color:#333;line-height:1.75;font-size:14px;min-height:88px}
    .flow-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .flow-chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:13px;font-weight:800}
    @media (max-width: 980px){.flow-grid{grid-template-columns:1fr}.flow-body{min-height:auto}}

    .block{border:1px solid var(--bd);border-radius:22px;padding:20px;background:#fff}
    .block + .block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;margin:0 0 10px 0;color:#222}
    .inline-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .axis-item{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:8px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:#111;color:#fff;font-size:12px;margin-right:8px}
    .axis-text{color:#333;line-height:1.7;font-size:14px}
    .example-grid{display:grid;gap:10px;margin-top:12px}
    .example-item{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .example-type{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .example-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .example-body{color:#333;line-height:1.75;margin-top:10px}
    .judgment-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .judgment-desc{color:var(--muted);font-size:14px;line-height:1.7;margin:0 0 14px 0}
    .goal-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .goal-chip{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:12px;font-weight:900}
    .judgment-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}
    .judgment-card{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .judgment-kicker{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .judgment-title{font-size:16px;font-weight:900;line-height:1.45;margin-top:10px}
    .judgment-body{color:#333;line-height:1.8;font-size:14px;margin-top:10px}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    .guide{font-size:13px;color:var(--muted);margin:6px 2px}
    .year-layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .year-layout.is-summary-open{grid-template-columns:minmax(280px,420px) 1fr}
    .year-left{display:flex;flex-direction:column;justify-content:flex-start}
    .year-summary{border:1px solid var(--bd);border-radius:22px;background:var(--soft);padding:18px 20px}
    .year-summary[hidden]{display:none !important}
    .year-summary-title{font-size:16px;font-weight:900;line-height:1.45;margin:0 0 10px 0}
    .year-summary-desc{color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 12px 0}
    .year-summary-item + .year-summary-item{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
    .year-summary-label{font-size:14px;font-weight:900;line-height:1.45;margin:0 0 6px 0}
    .year-summary-body{color:#333;line-height:1.75;font-size:14px}
    .grade-shell{display:grid;gap:16px}
    .grade-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .grade-stat{border:1px solid var(--bd);border-radius:18px;background:var(--soft);padding:16px 18px}
    .grade-label{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
    .grade-value{font-size:24px;font-weight:900;line-height:1.35;color:#111}
    .grade-sub{font-size:13px;line-height:1.7;color:var(--muted);margin-top:6px}
    .grade-panel{border:1px solid var(--bd);border-radius:22px;background:#fff;padding:18px}
    .grade-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .grade-panel-title{font-size:16px;font-weight:900;line-height:1.45;margin:0}
    .grade-panel-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-top:4px}
    .grade-table-wrap{overflow:auto;border:1px solid var(--bd);border-radius:18px;background:#fff}
    table.grade-table{width:100%;border-collapse:collapse;min-width:640px}
    .grade-table th,.grade-table td{padding:12px 14px;border-bottom:1px solid var(--bd);text-align:left;font-size:14px;line-height:1.55;vertical-align:top}
    .grade-table th{background:var(--soft);font-weight:900;color:#222;position:sticky;top:0}
    .grade-table tr:last-child td{border-bottom:none}
    .grade-table td.num,.grade-table th.num{text-align:center;white-space:nowrap}
    .grade-chip{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:12px;font-weight:900}
    .grade-help{font-size:13px;color:var(--muted);line-height:1.7}
    @media (max-width: 980px){.axis-list{grid-template-columns:1fr}.hero-title{font-size:26px}.one-line{font-size:17px}.toggle{padding:9px 14px;font-size:14px}.year-layout,.year-layout.is-summary-open{grid-template-columns:1fr}.grade-summary-grid{grid-template-columns:1fr}.judgment-grid{grid-template-columns:1fr}}
    @media (max-width: 640px){table.grade-table{min-width:560px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">데이터를 불러오는 중입니다.</div>
        </div>
        <div class="row"><span class="pill" id="previewBadge">실데이터</span></div>
      </div>
    </div>

    <div class="card" id="gradeCard"></div>

    <div class="card" id="yearCard">
      <div class="year-layout">
        <div class="year-left">
          <div class="section-h">
            <div>
              <div class="section-title">학년 선택</div>
              <div class="section-desc">1학년 · 2학년 · 3학년 토글로 구분해서 확인</div>
            </div>
            <button class="mini-toggle" id="yearSummaryToggleBtn" type="button" aria-expanded="false" aria-controls="yearSummaryPanel">총평 보기</button>
          </div>
          <div class="toggle-wrap" id="yearToggles"></div>
        </div>
        <div class="year-summary" id="yearSummaryPanel" hidden></div>
      </div>
    </div>

    <div class="card" id="subjectCardTop">
      <div class="section-h">
        <div>
          <div class="section-title">과목 선택</div>
          <div class="section-desc">선택한 학년 안에서 과목별 분석만 표시</div>
        </div>
      </div>
      <div class="toggle-wrap" id="subjectToggles"></div>
    </div>

    <div class="guide" id="loadGuide"></div>
    <div class="card" id="analysisCard"></div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const qs = new URLSearchParams(location.search);

  const state = {
    student: null,
    profileRow: null,
    yearIndex: 0,
    subjectIndex: 0,
    showExamples: false,
    selectedKeyword: '',
    showYearSummary: false,
    gradeTab: 'summary',
    accessMode: 'none',
  };

  const DEFAULT_YEAR_SUMMARIES = {};

  function defaultYearSummaryFor(studentId, yearLabel){
    return DEFAULT_YEAR_SUMMARIES[String(studentId || '').trim()]?.[String(yearLabel || '').trim()] || null;
  }

  function readYearSummaryFromStudent(student, yearLabel){
    const ys = student?.year_summaries;
    if (!ys) return null;
    if (Array.isArray(ys)) {
      const found = ys.find(v => String(v?.year || '').trim() === String(yearLabel || '').trim());
      if (!found) return null;
      return {
        academic: found.academic || found.academic_summary || '',
        career: found.career || found.career_summary || '',
        community: found.community || found.community_summary || '',
      };
    }
    const byKey = ys[String(yearLabel || '').trim()];
    if (!byKey) return null;
    return {
      academic: byKey.academic || byKey.academic_summary || '',
      career: byKey.career || byKey.career_summary || '',
      community: byKey.community || byKey.community_summary || '',
    };
  }

  function readYearSummaryFromYear(year){
    const overview = year?.summary_overview;
    if (!overview) return null;
    return {
      academic: overview.academic || overview.academic_summary || '',
      career: overview.career || overview.career_summary || '',
      community: overview.community || overview.community_summary || '',
    };
  }

  function getYearSummary(student, year){
    const yearLabel = typeof year === 'string' ? year : (year?.year || year?.year_label || '');
    const fromData = readYearSummaryFromStudent(student, yearLabel);
    if (fromData && (fromData.academic || fromData.career || fromData.community)) return fromData;
    const fromYear = typeof year === 'string' ? null : readYearSummaryFromYear(year);
    if (fromYear && (fromYear.academic || fromYear.career || fromYear.community)) return fromYear;
    return defaultYearSummaryFor(student?.student_id, yearLabel) || {
      academic: '',
      career: '',
      community: '',
    };
  }

  function renderYearSummary(year){
    const panel = $('#yearSummaryPanel');
    const layout = document.querySelector('#yearCard .year-layout');
    const toggleBtn = $('#yearSummaryToggleBtn');
    if (!panel) return;
    const summary = getYearSummary(state.student, year);
    const hasAny = Boolean(summary.academic || summary.career || summary.community);

    if (toggleBtn) {
      toggleBtn.textContent = state.showYearSummary ? '총평 닫기' : '총평 보기';
      toggleBtn.classList.toggle('is-on', state.showYearSummary);
      toggleBtn.setAttribute('aria-expanded', String(state.showYearSummary));
    }

    panel.hidden = !state.showYearSummary;
    if (layout) layout.classList.toggle('is-summary-open', state.showYearSummary);
    if (!state.showYearSummary) return;

    panel.innerHTML = hasAny ? `
      <div class="year-summary-title">${esc(year?.year || '')} 총평</div>
      <div class="year-summary-desc">대학 평가 기준인 학업역량 · 진로역량 · 공동체역량 관점에서 읽은 요약입니다.</div>
      <div class="year-summary-item">
        <div class="year-summary-label">학업역량</div>
        <div class="year-summary-body">${esc(summary.academic || '')}</div>
      </div>
      <div class="year-summary-item">
        <div class="year-summary-label">진로역량</div>
        <div class="year-summary-body">${esc(summary.career || '')}</div>
      </div>
      <div class="year-summary-item">
        <div class="year-summary-label">공동체역량</div>
        <div class="year-summary-body">${esc(summary.community || '')}</div>
      </div>
    ` : `
      <div class="year-summary-title">${esc(year?.year || '학년')} 총평</div>
      <div class="year-summary-desc">이 학년의 총평 데이터가 아직 없습니다.</div>
      <div class="empty">학업역량 · 진로역량 · 공동체역량 요약을 추가하면 이 영역에 함께 표시됩니다.</div>
    `;
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:'no-store' });
    if (!r.ok) throw new Error(`${path} (${r.status})`);
    return r.json();
  }

  async function loadRecordData(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./record_detail.json?${stamp}`,
      `record_detail.json?${stamp}`,
      `./data/record_detail.json?${stamp}`,
      `../record_detail.json?${stamp}`,
      `/record_detail.json?${stamp}`,
    ];
    const tried = [];
    for (const path of candidates) {
      try {
        const data = await loadJson(path);
        return { data, source: path, tried };
      } catch (e) {
        tried.push(path);
      }
    }
    throw new Error(`detail.json 또는 record_detail.json을 찾지 못했습니다. 시도한 경로: ${tried.join(', ')}`);
  }

  function pickTokenValue(row){
    return String(
      row?.token
      ?? row?.accessToken
      ?? row?.access_token
      ?? row?.studentToken
      ?? row?.student_token
      ?? row?.key
      ?? row?.['토큰']
      ?? ''
    ).trim();
  }

  function pickStudentIdValue(row){
    return String(
      row?.id
      ?? row?.student_id
      ?? row?.studentId
      ?? row?.studentID
      ?? row?.['학생ID']
      ?? ''
    ).trim();
  }

  async function loadStudentsIndex(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./students.json?${stamp}`,
      `students.json?${stamp}`,
      `./data/students.json?${stamp}`,
      `../students.json?${stamp}`,
      `/students.json?${stamp}`,
    ];
    for (const path of candidates) {
      try {
        return await loadJson(path);
      } catch (_e) {}
    }
    return null;
  }

  function toRows(index){
    return Array.isArray(index?.students) ? index.students : Array.isArray(index) ? index : [];
  }

  function isFilled(v){
    return !(v === undefined || v === null || String(v).trim() === '');
  }

  function firstFilled(...values){
    for (const v of values) {
      if (isFilled(v)) return String(v).trim();
    }
    return '';
  }

  function findProfileRow(index, studentId){
    const sid = String(studentId || '').trim();
    if (!sid) return null;
    return toRows(index).find(row => pickStudentIdValue(row) === sid) || null;
  }


  function normalizeSubjectGrade(item){
    return {
      subject: firstFilled(item?.subject, item?.course, item?.name, item?.과목),
      rawScore: firstFilled(item?.raw_score, item?.rawScore, item?.score, item?.원점수),
      subjectAverage: firstFilled(item?.subject_average, item?.subjectAverage, item?.average, item?.avg, item?.과목평균),
      rawVsAvg: firstFilled(item?.raw_vs_avg, item?.rawVsAvg, item?.score_vs_avg, item?.원점수과목평균, item?.['원점수/과목평균']),
      studentCount: firstFilled(item?.student_count, item?.studentCount, item?.count, item?.인원수),
      grade: firstFilled(item?.grade, item?.등급),
      achievement: firstFilled(item?.achievement, item?.attainment, item?.성취도),
      units: firstFilled(item?.units, item?.credit, item?.이수단위),
      memo: firstFilled(item?.memo, item?.note, item?.메모),
    };
  }

  function parseNumber(value){
    if (value === null || value === undefined) return null;
    const raw = String(value).trim();
    if (!raw) return null;
    const normalized = raw.replace(/,/g, '');
    const num = Number(normalized);
    return Number.isFinite(num) ? num : null;
  }

  function formatNumber(value, digits = 2){
    const num = parseNumber(value);
    if (num === null) return '';
    return Number.isInteger(num) ? String(num) : num.toFixed(digits).replace(/\.0+$/, '').replace(/(\.\d*[1-9])0+$/, '$1');
  }

  function computeGradeStats(subjects){
    let weightedSum = 0;
    let reflectedUnits = 0;
    let countedSubjects = 0;
    safeArr(subjects).forEach(row => {
      const grade = parseNumber(row?.grade);
      const units = parseNumber(row?.units);
      if (grade !== null && units !== null) {
        weightedSum += grade * units;
        reflectedUnits += units;
        countedSubjects += 1;
      }
    });
    return {
      overall: reflectedUnits > 0 ? (weightedSum / reflectedUnits) : null,
      reflectedUnits,
      countedSubjects,
    };
  }

  function buildRawVsAvg(row){
    const joined = firstFilled(row?.rawVsAvg, row?.raw_vs_avg);
    if (joined) return joined;
    const raw = firstFilled(row?.rawScore, row?.raw_score);
    const avg = firstFilled(row?.subjectAverage, row?.subject_average);
    return raw && avg ? `${raw}/${avg}` : raw || avg || '';
  }

  function formatOverallGrade(value){
    const num = parseNumber(value);
    if (num === null) return '미산출';
    return `${num.toFixed(2)}등급`;
  }

  function formatUnitsLabel(value){
    const num = parseNumber(value);
    if (num === null) return '미산출';
    return `${formatNumber(num, 0)}단위`;
  }

  function countVisibleSubjects(subjects){
    return safeArr(subjects).filter(row => row?.subject || row?.rawScore || row?.subjectAverage || row?.studentCount || row?.grade || row?.achievement || row?.units).length;
  }



  function normalizeGradeData(student, profileRow){
    const direct = student?.grade_info || student?.grades || {};
    const profile = profileRow?.grade_info || profileRow?.grades || {};
    const summarySource = direct?.summary || profile?.summary || {};

    const termRows = safeArr(direct.terms || direct.grade_terms || direct.semesters || profile.terms || profile.grade_terms || profile.semesters)
      .map((term, idx) => {
        const subjects = safeArr(term?.subjects || term?.courses || term?.items).map(normalizeSubjectGrade)
          .filter(v => v.subject || v.rawScore || v.subjectAverage || v.studentCount || v.grade || v.achievement || v.units || v.memo);
        const computed = computeGradeStats(subjects);
        const providedOverall = firstFilled(term?.overall, term?.overall_grade, term?.gpa, term?.grade_average, term?.average_grade, term?.avg_grade, term?.['내신'], term?.['등급']);
        const providedUnits = firstFilled(term?.reflected_units, term?.reflectedUnits, term?.units_total, term?.total_units, term?.credits, term?.['반영이수단위']);
        return {
          key: firstFilled(term?.key, term?.term, term?.semester, term?.label, term?.name, `term_${idx+1}`),
          label: firstFilled(term?.label, term?.term, term?.semester, term?.name, `학기 ${idx+1}`),
          overall: providedOverall || formatNumber(computed.overall, 2),
          reflectedUnits: providedUnits || formatNumber(computed.reflectedUnits, 0),
          memo: firstFilled(term?.memo, term?.note, term?.['메모']) || '등급·이수단위가 있는 과목만 산출에 반영 / 성취도-only 과목은 산출 제외',
          subjects,
          countedSubjects: computed.countedSubjects,
        };
      })
      .filter(v => v.label || v.subjects.length || v.overall || v.reflectedUnits || v.memo);

    const mergedSubjects = termRows.flatMap(term => safeArr(term.subjects));
    const computedSummary = computeGradeStats(mergedSubjects);
    const summary = {
      overall: firstFilled(
        summarySource.overall, summarySource.overall_grade, summarySource.gpa,
        direct.overall, direct.overall_grade, direct.gpa, direct.grade, direct['내신'], direct['내신등급'],
        profileRow?.overall, profileRow?.overall_grade, profileRow?.gpa, profileRow?.grade, profileRow?.['내신'], profileRow?.['내신등급']
      ) || formatNumber(computedSummary.overall, 2),
      basis: firstFilled(
        summarySource.basis, summarySource.latest_term,
        direct.basis, direct.latest_term, direct.term, direct['기준'],
        profileRow?.basis, profileRow?.latest_term, profileRow?.term, profileRow?.['기준']
      ) || (termRows.length ? '입력 학기 전체 기준' : ''),
      reflectedUnits: firstFilled(
        summarySource.reflected_units, summarySource.reflectedUnits, summarySource.units, summarySource.total_units,
        direct.reflected_units, direct.reflectedUnits, direct.units, direct.total_units,
        profileRow?.reflected_units, profileRow?.reflectedUnits, profileRow?.units, profileRow?.total_units
      ) || formatNumber(computedSummary.reflectedUnits, 0),
      memo: firstFilled(
        summarySource.memo, summarySource.note,
        direct.memo, direct.note, direct['메모'],
        profileRow?.memo, profileRow?.note, profileRow?.['메모']
      ) || '[(각 과목 이수단위 × 해당 과목 등급)의 총합] ÷ [총 이수 단위수] 방식으로 계산합니다.',
      countedSubjects: computedSummary.countedSubjects,
    };

    return { summary, terms: termRows };
  }

  function readStoredStudentId(){
    const keys = ['student_id', 'currentStudentId', 'selectedStudentId', 'record_student_id', 'sid'];
    for (const key of keys) {
      const fromSession = String(sessionStorage.getItem(key) || '').trim();
      if (fromSession) return fromSession;
      const fromLocal = String(localStorage.getItem(key) || '').trim();
      if (fromLocal) return fromLocal;
    }
    return '';
  }

  function readHashStudentId(){
    const hash = String(location.hash || '').replace(/^#/, '').trim();
    if (!hash) return '';
    if (hash.includes('=')) {
      const h = new URLSearchParams(hash);
      return String(h.get('id') || h.get('student_id') || h.get('sid') || '').trim();
    }
    if (/^shstudy\d+/i.test(hash)) return hash;
    return '';
  }

  async function resolveStudentSelection(){
    const directId = String(qs.get('student_id') || qs.get('id') || qs.get('sid') || '').trim();
    if (directId) {
      try { sessionStorage.setItem('student_id', directId); } catch(_e) {}
      try { localStorage.setItem('student_id', directId); } catch(_e) {}
      return { id: directId, mode: 'direct', strict: true };
    }

    const token = String(qs.get('t') || qs.get('token') || '').trim();
    if (token) {
      const studentsIndex = await loadStudentsIndex();
      const rows = Array.isArray(studentsIndex?.students)
        ? studentsIndex.students
        : Array.isArray(studentsIndex)
          ? studentsIndex
          : [];
      const found = rows.find(row => pickTokenValue(row) === token);
      const sid = pickStudentIdValue(found);
      if (sid) {
        try { sessionStorage.setItem('student_id', sid); } catch(_e) {}
        try { localStorage.setItem('student_id', sid); } catch(_e) {}
        return { id: sid, mode: 'token', strict: true };
      }
      try { sessionStorage.removeItem('student_id'); } catch(_e) {}
      try { localStorage.removeItem('student_id'); } catch(_e) {}
      return { id: '', mode: 'token', strict: true, invalidToken: true };
    }

    const storedId = readStoredStudentId();
    if (storedId) return { id: storedId, mode: 'stored', strict: false };

    const hashId = readHashStudentId();
    if (hashId) return { id: hashId, mode: 'hash', strict: false };

    try {
      const ref = document.referrer ? new URL(document.referrer) : null;
      const refId = String(ref?.searchParams.get('student_id') || ref?.searchParams.get('id') || ref?.searchParams.get('sid') || '').trim();
      if (refId) return { id: refId, mode: 'referrer', strict: false };
    } catch (_e) {}

    return { id: '', mode: 'none', strict: false };
  }

  async function pickStudent(data){
    const students = safeArr(data?.students);
    if (!students.length) return { student: null, selection: { id: '', mode: 'none', strict: false } };
    const selection = await resolveStudentSelection();
    if (selection.id) {
      return {
        student: students.find(s => String(s.student_id || '').trim() === selection.id) || null,
        selection
      };
    }
    if (selection.strict) {
      return { student: null, selection };
    }
    return { student: students[0], selection };
  }

  function keywordList(keywords){
    return safeArr(keywords).map(k => String(k || '').trim()).filter(Boolean);
  }

  function uniqueMerge(...arrays){
    const out = [];
    const seen = new Set();
    arrays.flat().forEach(v => {
      const key = String(v || '').trim();
      if (!key || seen.has(key)) return;
      seen.add(key);
      out.push(key);
    });
    return out;
  }

  function pickByRegex(list, regex, used, limit = 6){
    const out = [];
    for (const item of list) {
      if (out.length >= limit) break;
      if (used.has(item)) continue;
      if (!regex.test(item)) continue;
      out.push(item);
      used.add(item);
    }
    return out;
  }

  function pickRemaining(list, used, limit = 6){
    const out = [];
    for (const item of list) {
      if (out.length >= limit) break;
      if (used.has(item)) continue;
      out.push(item);
      used.add(item);
    }
    return out;
  }

  function pickAxisContent(axisList, regex){
    const hit = safeArr(axisList).find(item => regex.test(`${item?.title || ''} ${item?.content || ''}`));
    return hit?.content || '';
  }

  function flowCardsFor(subject){
    const subjectName = String(subject?.subject || '').trim();
    const summary = String(subject?.summary || '').trim();
    const axisList = safeArr(subject?.axis_list);
    const keywords = keywordList(subject?.extension_keywords);
    const used = new Set();

    const TOPIC_RE = /(개념|이해|원리|법칙|공식|구조|현상|문제|배터리|에너지|자동차|보안|블록체인|알고리즘|인공지능|AI|데이터|기후|행복|교육|전염병|의료|자율주행|충격량|운동량|관성|프랙탈|전고체|리튬|심전도|탄소|역사|경제|사회|독서|주제|가치|윤리|장치|모빌리티|스포츠|당구|배드민턴)/;
    const METHOD_RE = /(분석|해석|설계|실험|발표|토론|그래프|시각화|자료|근거|비교|조사|탐구|독해|글쓰기|논리|모델링|표현|구조화|도식화|문헌|계획|정리|판단|설명|검증|제시|구상|활용|적용)/;
    const EXPAND_RE = /(실생활|진로|사회|공동체|협업|리더십|확장|융합|적용|문제 해결|창의|대안|미래|환경|지속가능|안전|직업|기여|정책|현대|세계|국제|운영|멘토링|소통|스포츠)/;

    let topicKeywords = pickByRegex(keywords, TOPIC_RE, used, 6);
    let methodKeywords = pickByRegex(keywords, METHOD_RE, used, 6);
    let expandKeywords = pickByRegex(keywords, EXPAND_RE, used, 6);

    if (!topicKeywords.length) topicKeywords = pickRemaining(keywords, used, 5);
    if (!methodKeywords.length) methodKeywords = pickRemaining(keywords, used, 5);
    if (!expandKeywords.length) expandKeywords = uniqueMerge(pickRemaining(keywords, used, 5), keywords.slice(-3)).slice(0, 6);

    const topicBody = pickAxisContent(axisList, /(개념|이해|원리|내용|핵심|주제|법칙|공식|분야|탐구)/)
      || summary
      || `${subjectName || '이 활동'}에서 다룬 핵심 개념과 문제의식을 중심으로 탐구의 축이 드러납니다.`;

    const methodBody = pickAxisContent(axisList, /(분석|해석|설명|표현|실험|그래프|자료|설계|문헌|모델링|발표|토론|비교|구조|도식|독해|서술|조사|판단)/)
      || '자료 해석, 설명, 실험, 설계, 비교 등 학생이 실제로 사용한 탐구 방식이 확인됩니다.';

    const expandBody = pickAxisContent(axisList, /(실생활|확장|융합|적용|문제 해결|창의|진로|사회|공동체|리더십|협업|기여|스포츠|안전|환경|대안)/)
      || '교과 개념을 실생활, 진로, 다른 사례로 넓혀 보는 확장성이 나타납니다.';

    return [
      {
        kicker: '핵심 주제',
        title: '무엇을 다뤘는지',
        body: topicBody,
        keywords: topicKeywords,
      },
      {
        kicker: '탐구 방식',
        title: '어떻게 접근했는지',
        body: methodBody,
        keywords: methodKeywords,
      },
      {
        kicker: '확장 방향',
        title: '어디로 이어지는지',
        body: expandBody,
        keywords: expandKeywords,
      }
    ];
  }

  function flowCardsHtml(subject){
    const cards = flowCardsFor(subject);
    if (!cards.length) return '<div class="empty">탐구 흐름 데이터가 없습니다.</div>';
    return `
      <div class="flow-grid">${cards.map(card => `
        <div class="flow-card">
          <span class="flow-kicker">${esc(card.kicker || '')}</span>
          <div class="flow-title">${esc(card.title || '')}</div>
          <div class="flow-body">${esc(card.body || '')}</div>
          ${safeArr(card.keywords).length ? `<div class="flow-chips">${safeArr(card.keywords).map(k => `<span class="flow-chip">${esc(k)}</span>`).join('')}</div>` : ''}
        </div>
      `).join('')}</div>
    `;
  }

  function detectSubjectFamily(subjectName){
    const n = String(subjectName || '');
    if (/(국어|문학|독서)/.test(n)) return '국어';
    if (/(영어|일본어|중국어|독일어|프랑스어)/.test(n)) return '영어/외국어';
    if (/(수학|확률과통계|미적분|기하)/.test(n)) return '수학';
    if (/(물리|화학|생명|지구과학|과학탐구실험|통합과학|과학)/.test(n)) return '과학';
    if (/(사회|한국사|역사|지리|윤리|정법|정치|경제|문화)/.test(n)) return '사회';
    if (/(정보|기술가정|기술·가정|기술|교육학)/.test(n)) return '정보/기술';
    if (/(미술|음악|체육)/.test(n)) return '예술/체육';
    if (/(자율|동아리|진로|행동특성|행특)/.test(n)) return '창체/행특';
    return '기타';
  }

  function subjectGoalFocusFor(subject){
    const family = subject?.subject_family || detectSubjectFamily(subject?.subject || subject?.subject_name);
    const map = {
      '국어':['철학적 사고','언어적 표현력','비판적 독해','해석과 논증'],
      '영어/외국어':['언어 이해','맥락 해석','의사소통','표현의 정확성'],
      '수학':['개념 이해','추론과 구조화','문제 해결','모델링과 적용'],
      '과학':['과학적 탐구','근거 기반 설명','자료 해석','실험·설계'],
      '사회':['쟁점 분석','가치 판단','자료 해석','비판적 사회 인식'],
      '정보/기술':['알고리즘적 사고','구현과 설계','데이터·시스템 이해','정보윤리'],
      '예술/체육':['표현과 감상','창의성','수행과 참여','협업과 태도'],
      '창체/행특':['자기이해와 성장','협업과 공동체성','주도성','기록의 일관성'],
      '기타':['교과 이해','자기주도성','표현과 설명','확장 가능성']
    };
    return safeArr(subject?.subject_goal_focus).length ? safeArr(subject.subject_goal_focus) : (map[family] || map['기타']);
  }

  function detectCareerArea(subject){
    const text = [subject?.summary || '', ...(safeArr(subject?.extension_keywords)), ...(safeArr(subject?.axis_list).map(v => v?.content || ''))].join(' ');
    const rules = [
      ['컴퓨터공학·데이터·AI',['알고리즘','데이터','인공지능','AI','보안','암호','블록체인','코딩','프로그래밍','디지털','정보처리','소프트웨어']],
      ['전기전자·반도체·에너지',['배터리','전기','전자','반도체','전고체','리튬','에너지','모빌리티','충전','회로','트랜지스터','센서']],
      ['의생명·보건',['의학','의료','심전도','생명','세포','질병','약물','백신','면역','보건']],
      ['환경·지속가능성',['환경','기후','탄소','지속가능','자원 고갈','에너지 과소비','열폭주']],
      ['교육·인문사회',['교육','역사','철학','사회','윤리','정의','경제','정치','문학']]
    ];
    for (const [label, kws] of rules){
      if (kws.some(k => text.includes(k))) return label;
    }
    return '';
  }

  function deriveJudgmentBlock(subject){
    const family = subject?.subject_family || detectSubjectFamily(subject?.subject || subject?.subject_name);
    const goalFocus = subjectGoalFocusFor(subject);
    const titles = safeArr(subject?.axis_list).map(v => String(v?.title || '').trim()).filter(Boolean);
    const evText = titles.length >= 2 ? `${titles[0]} 및 ${titles[1]}` : (titles[0] || '과목 활동의 핵심 장면');
    const existing = subject?.judgment_block || {};
    const subjectJudgment = existing.subject_judgment || (() => {
      if (family === '국어') return `국어의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 읽은 내용을 해석하고 자기 언어로 표현하는 힘이 비교적 선명하게 드러난다.`;
      if (family === '영어/외국어') return `영어/외국어 교과의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 자료를 이해하고 맥락에 맞게 표현하는 능력이 비교적 분명하게 보인다.`;
      if (family === '수학') return `수학의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 개념을 구조화하고 문제 상황에 적용하는 힘이 비교적 선명하다.`;
      if (family === '과학') return `과학의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 개념을 근거와 연결해 설명하고 탐구로 확장하는 역량이 드러난다.`;
      if (family === '사회') return `사회 교과의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 자료를 해석하고 관점을 세우는 비판적 사회 인식이 비교적 잘 드러난다.`;
      if (family === '정보/기술') return `정보/기술 교과의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 원리 이해를 실제 설계·구현 관점으로 연결하는 힘이 보인다.`;
      if (family === '예술/체육') return `예술·체육 교과의 고유 목표인 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 표현·참여·협업의 과정이 비교적 자연스럽게 드러난다.`;
      if (family === '창체/행특') return `창체·행동특성 영역에서는 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 주도성과 공동체 기여가 비교적 선명하게 드러난다.`;
      return `이 과목에서는 ${goalFocus.slice(0,3).join('·')}이 우선적으로 평가되며, 현재 기록에서는 ${evText}이 확인되어 교과 이해와 자기주도적 확장 가능성이 드러난다.`;
    })();
    const summary = String(subject?.summary || '').trim();
    const improveMap = {
      '국어':'관점 비교나 반론 검토를 더 분명히 드러내고, 읽은 내용을 자기 언어로 정교하게 표현하는 장면이 보강되면 더 강한 세특으로 읽힐 수 있다',
      '영어/외국어':'영어 자료를 해석한 뒤 자신의 생각을 더 길게 조직하거나 맥락 비교까지 나아가면 교과 고유 역량이 한층 선명해질 수 있다',
      '수학':'정의·조건·구조를 더 엄밀하게 다루거나 풀이 선택의 이유를 비교하는 장면이 추가되면 상위권 평가에서도 더 강하게 읽힐 수 있다',
      '과학':'탐구 설계의 근거, 변인 통제, 결과 해석의 정밀도가 더 구체적으로 드러나면 과학 과목다운 힘이 더 커질 수 있다',
      '사회':'자료 간 비교와 가치 판단의 기준을 더 분명히 드러내면 사회 교과의 비판적 사고력이 더욱 설득력 있게 읽힐 수 있다',
      '정보/기술':'구현 과정에서 선택한 방법의 이유, 알고리즘의 한계, 윤리적 고려까지 함께 드러나면 정보 교과의 깊이가 더 잘 보일 수 있다',
      '예술/체육':'표현 의도와 감상·수행의 과정을 더 구체적으로 남기면 교과 고유의 성장이 더욱 살아날 수 있다',
      '창체/행특':'활동의 과정과 역할, 그로 인해 달라진 점이 더 구체적으로 드러나면 기록의 설득력이 높아질 수 있다',
      '기타':'활동의 과정과 근거를 조금 더 구체적으로 드러내면 현재 강점이 더 선명하게 읽힐 수 있다'
    };
    const overallOpinion = existing.overall_opinion || `${summary || '현재 활동의 방향은 비교적 분명하다.'} 특히 ${evText}이 강점으로 읽힌다. 다만 ${improveMap[family] || improveMap['기타']}.`;
    const careerLink = existing.career_link || existing.career_judgment || (() => {
      const area = detectCareerArea(subject);
      if (area) return `과목 고유 역량이 바탕이 된 상태에서 ${area} 분야와의 자연스러운 연결 가능성이 읽힌다.`;
      if (family === '국어' || family === '영어/외국어' || family === '사회') return `이 과목은 진로 연결을 앞세우기보다 ${family.split('/')[0]} 교과 고유의 사고력과 표현력을 충실히 보여 주는 것이 더 중요하며, 현재 기록도 그 방향에서 의미가 있다.`;
      return '진로 연결은 과목 고유 역량이 충분히 드러난 뒤에 보조적으로 읽는 것이 적절하며, 현재 기록은 우선 해당 교과의 기본기와 성장 가능성을 확인할 수 있는 편이다.';
    })();
    return { subject_judgment: subjectJudgment, overall_opinion: overallOpinion, career_link: careerLink };
  }

  function judgmentHtml(subject){
    const goalFocus = subjectGoalFocusFor(subject);
    const jb = deriveJudgmentBlock(subject);
    return `
      <div class="block">
        <div class="judgment-head">
          <div>
            <div class="mini-title" style="margin:0;">판단점</div>
            <div class="judgment-desc">진로 키워드보다 먼저, 이 과목의 고유 목표가 실제 기록에서 어떻게 드러나는지 중심으로 읽은 결과입니다.</div>
          </div>
          <span class="badge">과목 고유 목표 우선</span>
        </div>
        ${goalFocus.length ? `<div class="goal-chips">${goalFocus.map(v => `<span class="goal-chip">${esc(v)}</span>`).join('')}</div>` : ''}
        <div class="judgment-grid">
          <div class="judgment-card">
            <span class="judgment-kicker">과목 판단</span>
            <div class="judgment-title">이 과목의 고유 목표가 어떻게 드러나는지</div>
            <div class="judgment-body">${esc(jb.subject_judgment || '')}</div>
          </div>
          <div class="judgment-card">
            <span class="judgment-kicker">종합 의견</span>
            <div class="judgment-title">현재 강점과 다음 보완 포인트</div>
            <div class="judgment-body">${esc(jb.overall_opinion || '')}</div>
          </div>
          <div class="judgment-card">
            <span class="judgment-kicker">진로 연결</span>
            <div class="judgment-title">과목 고유 역량이 바탕이 될 때의 연결 가능성</div>
            <div class="judgment-body">${esc(jb.career_link || '')}</div>
          </div>
        </div>
      </div>
    `;
  }

  function rerenderAnalysis(){
    const years = safeArr(state.student?.years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999) || String(a.subject).localeCompare(String(b.subject),'ko'));
    if (state.subjectIndex > subjects.length - 1) state.subjectIndex = 0;
    const subject = subjects[state.subjectIndex] || null;

    $('#analysisCard').innerHTML = subject ? `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">${esc(year.year || '')} · ${esc(subject.subject || '')}</div>
        </div>
        <span class="badge">역량 축 ${safeArr(subject.axis_list).length}개</span>
      </div>

      <div class="block">
        <h2 class="hero-title">${esc(subject.subject || '과목')}</h2>
        <div class="one-line">${esc(subject.summary || '')}</div>
      </div>

      <div class="block">
        <div class="mini-title">역량 축 분석</div>
        ${axisHtml(subject.axis_list)}
      </div>

      <div class="block">
        <div class="inline-head">
          <div class="mini-title" style="margin:0;">탐구 흐름 정리</div>
          <button type="button" class="mini-toggle ${state.showExamples ? 'is-on' : ''}" id="toggleExamplesBtn">${state.showExamples ? '활동예시 닫기' : '활동예시 보기'}</button>
        </div>
        <div class="flow-intro">키워드를 단순 나열하지 않고, 이 활동에서 학생이 무엇을 다뤘고 어떻게 접근했으며 어디까지 확장했는지를 읽기 쉽게 정리한 영역입니다.</div>
        ${flowCardsHtml(subject)}
        ${state.showExamples ? `
          <div style="margin-top:16px;">
            <div class="mini-title">관련 활동 보기</div>
            ${examplesHtml(subject.activity_examples)}
          </div>
        ` : ''}
      </div>

      ${judgmentHtml(subject)}
    ` : `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">선택된 과목 데이터가 없습니다.</div>
        </div>
      </div>
      <div class="empty">학년과 과목을 먼저 선택해 주세요.</div>
    `;

    const btn = document.getElementById('toggleExamplesBtn');
    if (btn) {
      btn.onclick = () => {
        state.showExamples = !state.showExamples;
        rerenderAnalysis();
      };
    }
  }

  function rerender(){
    renderGradeCard();
    const years = safeArr(state.student?.years);
    renderYearToggles(years);
    const year = years[state.yearIndex] || years[0] || {};
    renderYearSummary(year);
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999) || String(a.subject).localeCompare(String(b.subject),'ko'));
    renderSubjectToggles(subjects);
    rerenderAnalysis();
  }

  async function boot(){
    bindYearSummaryToggle();
    const loaded = await loadRecordData();
    const picked = await pickStudent(loaded.data);
    const student = picked?.student || null;
    const selection = picked?.selection || { id: '', mode: 'none', strict: false };
    if (!student) {
      $('#studentMeta').textContent = selection.invalidToken
        ? '학생 토큰과 연결된 데이터를 찾지 못했습니다.'
        : '학생 데이터가 없습니다.';
      $('#previewBadge').textContent = selection.invalidToken ? '토큰 오류' : '오류';
      $('#analysisCard').innerHTML = `<div class="empty">${selection.invalidToken
        ? 'students.json의 토큰과 detail.json의 student_id 연결을 확인해주세요.'
        : 'detail.json 안에 해당 학생 데이터가 없습니다.'}</div>`;
      $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
      return;
    }
    state.student = student;
    state.accessMode = selection.mode || 'none';
    const studentsIndex = await loadStudentsIndex();
    state.profileRow = findProfileRow(studentsIndex, student.student_id);
    const grade = normalizeGradeData(student, state.profileRow);
    $('#studentMeta').textContent = [student.student_name, student.school_name, student.student_id, grade.summary.overall ? `종합 내신 ${formatOverallGrade(grade.summary.overall)}` : '내신 미입력'].filter(Boolean).join(' · ');
    $('#previewBadge').textContent = selection.mode === 'token' ? '학생모드' : '실데이터';
    $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
    rerender();
  }

  boot().catch(err => {
    $('#studentMeta').textContent = '데이터를 불러오지 못했습니다.';
    $('#previewBadge').textContent = '오류';
    $('#analysisCard').innerHTML = `<div class="empty">${esc(err?.message || err)}</div>`;
  });
})();
</script>
</body>
</html>
