<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기 · 심화형</title>
  <style>
    :root{
      --bd:#dfe6f2; --txt:#122033; --muted:#5f7085; --bg:#f7faff; --soft:#f2f7ff;
      --soft2:#fff8ef; --soft3:#f4fbf5; --card:#ffffff; --accent:#4c7dff; --accent2:#ffb454;
      --accent3:#52b788; --danger:#ff7a7a; --shadow:0 10px 28px rgba(28,54,90,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1240px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:26px;background:var(--card);padding:22px;margin:14px 0;box-shadow:var(--shadow)}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.7}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill,.badge{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .pill.primary{background:#eef4ff;border-color:#d6e3ff;color:#2d55d3}
    .pill.warm{background:#fff5e7;border-color:#ffe0ae;color:#a86100}
    .pill.good{background:#effbf3;border-color:#cbeed4;color:#1d7a48}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted);line-height:1.7}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap}
    .toggle,.mini-toggle{appearance:none;border:1px solid var(--bd);background:#fff;color:var(--txt);border-radius:999px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .toggle.is-on,.mini-toggle.is-on{background:var(--accent);color:#fff;border-color:var(--accent)}
    .toggle:disabled{opacity:.45;cursor:default}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:14px;font-weight:800}
    .block{border:1px solid var(--bd);border-radius:22px;padding:20px;background:#fff}
    .block + .block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;margin:0 0 10px 0;color:#223}
    .inline-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    .guide{font-size:13px;color:var(--muted);margin:6px 2px}
    .year-layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .year-layout.is-summary-open{grid-template-columns:minmax(280px,420px) 1fr}
    .year-left{display:flex;flex-direction:column;justify-content:flex-start}
    .year-summary{border:1px solid var(--bd);border-radius:22px;background:linear-gradient(180deg,#f8fbff,#f1f7ff);padding:18px 20px}
    .year-summary[hidden]{display:none !important}
    .year-summary-title{font-size:16px;font-weight:900;line-height:1.45;margin:0 0 10px 0}
    .year-summary-desc{color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 12px 0}
    .year-summary-item + .year-summary-item{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
    .year-summary-label{font-size:14px;font-weight:900;line-height:1.45;margin:0 0 6px 0}
    .year-summary-body{color:#333;line-height:1.75;font-size:14px}
    .grade-shell{display:grid;gap:16px}
    .grade-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .grade-stat{border:1px solid var(--bd);border-radius:18px;background:linear-gradient(180deg,#ffffff,#f7fbff);padding:16px 18px}
    .grade-label{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
    .grade-value{font-size:24px;font-weight:900;line-height:1.35;color:#111}
    .grade-sub{font-size:13px;line-height:1.7;color:var(--muted);margin-top:6px}
    .grade-panel{border:1px solid var(--bd);border-radius:22px;background:#fff;padding:18px}
    .grade-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .grade-panel-title{font-size:16px;font-weight:900;line-height:1.45;margin:0}
    .grade-panel-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-top:4px}
    .grade-table-wrap{overflow:auto;border:1px solid var(--bd);border-radius:18px;background:#fff}
    table.grade-table{width:100%;border-collapse:collapse;min-width:640px}
    .grade-table th,.grade-table td{padding:12px 14px;border-bottom:1px solid var(--bd);text-align:left;font-size:14px;line-height:1.55;vertical-align:top}
    .grade-table th{background:#f5f9ff;font-weight:900;color:#223;position:sticky;top:0}
    .grade-table tr:last-child td{border-bottom:none}
    .grade-table td.num,.grade-table th.num{text-align:center;white-space:nowrap}
    .grade-chip{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:12px;font-weight:900}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .axis-item{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:8px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:var(--accent);color:#fff;font-size:12px;margin-right:8px}
    .axis-text{color:#334;line-height:1.7;font-size:14px}
    .focus-grid,.deep-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .focus-item{border:1px solid var(--bd);border-radius:18px;background:#fbfdff;padding:16px 18px}
    .focus-label{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
    .focus-body{font-size:14px;line-height:1.75;color:#222}
    .priority-list{margin:0;padding-left:18px;color:#333;line-height:1.75}
    .priority-list li+li{margin-top:6px}
    .flow-intro{color:var(--muted);font-size:14px;line-height:1.75;margin:0 0 14px 0}
    .flow-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .flow-card{border:1px solid var(--bd);border-radius:22px;background:linear-gradient(180deg,#ffffff,#f6faff);padding:18px 18px 16px}
    .flow-kicker{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .flow-title{font-size:18px;font-weight:900;line-height:1.45;margin:12px 0 8px 0}
    .flow-body{color:#333;line-height:1.75;font-size:14px;min-height:88px}
    .flow-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .flow-chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:13px;font-weight:800}
    .judgment-scroll{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .judgment-card{border:1px solid var(--bd);border-radius:18px;background:linear-gradient(180deg,#ffffff,#f9fbff);padding:16px 18px}
    .summary-box{display:grid;gap:12px}
    .summary-item{border:1px solid var(--bd);border-radius:18px;padding:16px 18px;background:linear-gradient(180deg,#ffffff,#fbfdff)}
    .summary-kicker{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
    .summary-body{font-size:15px;line-height:1.8;color:#222}
    .analysis-layout{display:grid;gap:14px}
    .soft-blue{background:linear-gradient(180deg,#f9fbff,#f2f7ff)}
    .soft-warm{background:linear-gradient(180deg,#fffaf4,#fff4e8)}
    .soft-green{background:linear-gradient(180deg,#f8fdf9,#eefaf1)}
    @media (max-width: 980px){
      .axis-list,.focus-grid,.deep-grid,.flow-grid,.judgment-scroll,.grade-summary-grid{grid-template-columns:1fr}
      .hero-title{font-size:26px}
      .year-layout,.year-layout.is-summary-open{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">데이터를 불러오는 중입니다.</div>
        </div>
        <div class="row"><span class="pill primary" id="previewBadge">실데이터</span></div>
      </div>
    </div>

    <div class="card">
      <div class="between">
        <div>
          <h2 class="title" style="font-size:22px;">확장 활동 설계</h2>
          <div class="sub">기본 상담 구조는 유지하고, 선택과목 기반 다음 단계 활동은 별도 화면으로 분리해 봅니다.</div>
        </div>
        <div class="row">
          <a href="./record_detail_extension.html?student_id=shstudy09" class="mini-toggle" style="text-decoration:none;">확장 활동 보기</a>
        </div>
      </div>
    </div>

    <div class="card" id="gradeCard"></div>

    <div class="card" id="yearCard">
      <div class="year-layout">
        <div class="year-left">
          <div class="section-h">
            <div>
              <div class="section-title">학년 선택</div>
              <div class="section-desc">1학년 · 2학년 · 3학년 토글로 구분해서 확인</div>
            </div>
            <button class="mini-toggle" id="yearSummaryToggleBtn" type="button" aria-expanded="false" aria-controls="yearSummaryPanel">총평 보기</button>
          </div>
          <div class="toggle-wrap" id="yearToggles"></div>
        </div>
        <div class="year-summary" id="yearSummaryPanel" hidden></div>
      </div>
    </div>

    <div class="card" id="subjectCardTop">
      <div class="section-h">
        <div>
          <div class="section-title">과목 선택</div>
          <div class="section-desc">선택한 학년 안에서 과목별 근거 카드만 표시</div>
        </div>
      </div>
      <div class="toggle-wrap" id="subjectToggles"></div>
    </div>

    <div class="guide" id="loadGuide"></div>
    <div class="card" id="analysisCard"></div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s)=> String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const qs = new URLSearchParams(location.search);

  const state = {
    student: null,
    profileRow: null,
    yearIndex: 0,
    subjectIndex: 0,
    showYearSummary: false,
    gradeTab: 'summary',
    accessMode: 'none',
  };

  async function loadJson(path){
    const r = await fetch(path, { cache:'no-store' });
    if (!r.ok) throw new Error(`${path} (${r.status})`);
    return r.json();
  }

  async function loadRecordData(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./record_detail.json?${stamp}`,
      `record_detail.json?${stamp}`,
      `./data/record_detail.json?${stamp}`,
      `../record_detail.json?${stamp}`,
      `/record_detail.json?${stamp}`,
    ];
    for (const path of candidates) {
      try { return { data: await loadJson(path), source: path }; } catch (_e) {}
    }
    throw new Error('record_detail.json을 찾지 못했습니다.');
  }

  function firstFilled(...values){
    for (const v of values) {
      if (v !== undefined && v !== null && String(v).trim() !== '') return String(v).trim();
    }
    return '';
  }

  function parseNumber(value){
    if (value === null || value === undefined) return null;
    const raw = String(value).trim();
    if (!raw) return null;
    const num = Number(raw.replace(/,/g, ''));
    return Number.isFinite(num) ? num : null;
  }

  function formatOverallGrade(value){
    const num = parseNumber(value);
    if (num === null) return '미산출';
    return `${num.toFixed(2)}등급`;
  }

  function formatUnitsLabel(value){
    const num = parseNumber(value);
    if (num === null) return '미산출';
    return `${Number.isInteger(num) ? num : num.toFixed(0)}단위`;
  }

  function normalizeSubjectGrade(item){
    return {
      subject: firstFilled(item?.subject, item?.course, item?.name, item?.과목),
      rawScore: firstFilled(item?.raw_score, item?.rawScore, item?.score, item?.원점수),
      subjectAverage: firstFilled(item?.subject_average, item?.subjectAverage, item?.average, item?.avg, item?.과목평균),
      studentCount: firstFilled(item?.student_count, item?.studentCount, item?.count, item?.인원수),
      grade: firstFilled(item?.grade, item?.등급),
      achievement: firstFilled(item?.achievement, item?.attainment, item?.성취도),
      units: firstFilled(item?.units, item?.credit, item?.이수단위),
      memo: firstFilled(item?.memo, item?.note, item?.메모),
    };
  }

  function computeGradeStats(subjects){
    let weightedSum = 0, reflectedUnits = 0, countedSubjects = 0;
    safeArr(subjects).forEach(row => {
      const grade = parseNumber(row?.grade);
      const units = parseNumber(row?.units);
      if (grade !== null && units !== null) {
        weightedSum += grade * units;
        reflectedUnits += units;
        countedSubjects += 1;
      }
    });
    return { overall: reflectedUnits > 0 ? (weightedSum / reflectedUnits) : null, reflectedUnits, countedSubjects };
  }

  function normalizeGradeData(student){
    const direct = student?.grade_info || student?.grades || {};
    const terms = safeArr(direct.terms || direct.grade_terms || direct.semesters).map((term, idx) => {
      const subjects = safeArr(term?.subjects || term?.courses || term?.items).map(normalizeSubjectGrade);
      const computed = computeGradeStats(subjects);
      return {
        key: firstFilled(term?.key, term?.term, term?.semester, term?.label, `term_${idx+1}`),
        label: firstFilled(term?.label, term?.term, term?.semester, `학기 ${idx+1}`),
        overall: firstFilled(term?.overall, term?.overall_grade, term?.gpa) || (computed.overall !== null ? computed.overall.toFixed(2) : ''),
        reflectedUnits: firstFilled(term?.reflected_units, term?.reflectedUnits, term?.units_total) || String(computed.reflectedUnits || ''),
        memo: firstFilled(term?.memo, term?.note) || '등급·이수단위가 있는 과목만 산출 반영',
        subjects,
        countedSubjects: computed.countedSubjects,
      };
    });
    const merged = terms.flatMap(v => v.subjects);
    const summaryStats = computeGradeStats(merged);
    return {
      summary: {
        overall: firstFilled(direct.overall, direct.overall_grade, direct.gpa) || (summaryStats.overall !== null ? summaryStats.overall.toFixed(2) : ''),
        basis: firstFilled(direct.basis, direct.latest_term) || (terms.length ? '입력 학기 전체 기준' : ''),
        reflectedUnits: firstFilled(direct.reflected_units, direct.reflectedUnits, direct.units) || String(summaryStats.reflectedUnits || ''),
        memo: firstFilled(direct.memo, direct.note) || '[(각 과목 이수단위 × 해당 과목 등급)의 총합] ÷ [총 이수 단위수]',
        countedSubjects: summaryStats.countedSubjects,
      },
      terms
    };
  }

  function buildRawVsAvg(row){
    const raw = firstFilled(row?.rawScore);
    const avg = firstFilled(row?.subjectAverage);
    return raw && avg ? `${raw}/${avg}` : raw || avg || '';
  }

  function gradeTableHtml(term){
    const subjects = safeArr(term?.subjects);
    if (!subjects.length) return '<div class="empty">이 학기의 과목별 성적 데이터가 아직 없습니다.</div>';
    return `
      <div class="grade-table-wrap">
        <table class="grade-table">
          <thead>
            <tr>
              <th>과목</th>
              <th class="num">원점수/과목평균</th>
              <th class="num">인원수</th>
              <th class="num">등급</th>
              <th class="num">성취도</th>
              <th class="num">이수단위</th>
            </tr>
          </thead>
          <tbody>
            ${subjects.map(row => `
              <tr>
                <td><div>${esc(row.subject || '-')}</div>${row.memo ? `<div class="grade-sub" style="margin-top:4px;">${esc(row.memo)}</div>` : ''}</td>
                <td class="num">${esc(buildRawVsAvg(row) || '-')}</td>
                <td class="num">${esc(row.studentCount || '-')}</td>
                <td class="num">${esc(row.grade || '-')}</td>
                <td class="num">${esc(row.achievement || '-')}</td>
                <td class="num">${esc(row.units || '-')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function getYearSummary(student, year){
    const ys = student?.year_summaries;
    if (Array.isArray(ys)) {
      const found = ys.find(v => String(v?.year || '').trim() === String(year?.year || '').trim());
      if (found) return {
        academic: found.academic || found.academic_summary || '',
        career: found.career || found.career_summary || '',
        community: found.community || found.community_summary || '',
      };
    }
    return { academic:'', career:'', community:'' };
  }

  function renderYearSummary(year){
    const panel = $('#yearSummaryPanel');
    const layout = document.querySelector('#yearCard .year-layout');
    const btn = $('#yearSummaryToggleBtn');
    if (!panel) return;
    const summary = getYearSummary(state.student, year);
    if (btn) {
      btn.textContent = state.showYearSummary ? '총평 닫기' : '총평 보기';
      btn.classList.toggle('is-on', state.showYearSummary);
      btn.setAttribute('aria-expanded', String(state.showYearSummary));
    }
    panel.hidden = !state.showYearSummary;
    if (layout) layout.classList.toggle('is-summary-open', state.showYearSummary);
    if (!state.showYearSummary) return;
    panel.innerHTML = `
      <div class="year-summary-title">${esc(year?.year || '')} 총평</div>
      <div class="year-summary-desc">대학 평가 기준인 학업역량 · 진로역량 · 공동체역량 관점에서 읽은 요약입니다.</div>
      <div class="year-summary-item"><div class="year-summary-label">학업역량</div><div class="year-summary-body">${esc(summary.academic || '데이터 입력 필요')}</div></div>
      <div class="year-summary-item"><div class="year-summary-label">진로역량</div><div class="year-summary-body">${esc(summary.career || '데이터 입력 필요')}</div></div>
      <div class="year-summary-item"><div class="year-summary-label">공동체역량</div><div class="year-summary-body">${esc(summary.community || '데이터 입력 필요')}</div></div>`;
  }

  function renderGradeCard(){
    const student = state.student;
    const target = $('#gradeCard');
    if (!student) { target.innerHTML = ''; return; }
    const grade = normalizeGradeData(student);
    const terms = grade.terms;
    const availableTabs = ['summary', ...terms.map(v => v.key)];
    if (!availableTabs.includes(state.gradeTab)) state.gradeTab = 'summary';
    const currentTerm = terms.find(v => v.key === state.gradeTab) || null;

    target.innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">성적 보기</div>
          <div class="section-desc">종합·학기별 토글로 확인하고, 과목별 원점수/과목평균 · 인원수 · 등급 · 성취도 · 이수단위를 함께 봅니다.</div>
        </div>
      </div>
      <div class="toggle-wrap" id="gradeToggles">
        <button type="button" class="toggle ${state.gradeTab === 'summary' ? 'is-on' : ''}" data-grade-tab="summary">종합</button>
        ${terms.map(term => `<button type="button" class="toggle ${state.gradeTab === term.key ? 'is-on' : ''}" data-grade-tab="${esc(term.key)}">${esc(term.label)}</button>`).join('')}
      </div>
      ${state.gradeTab === 'summary' ? `
        <div class="grade-shell" style="margin-top:16px;">
          <div class="grade-summary-grid">
            <div class="grade-stat"><div class="grade-label">종합 내신</div><div class="grade-value">${esc(formatOverallGrade(grade.summary.overall))}</div><div class="grade-sub">${esc(grade.summary.basis || '기준 미입력')}</div></div>
            <div class="grade-stat"><div class="grade-label">반영 이수단위</div><div class="grade-value">${esc(formatUnitsLabel(grade.summary.reflectedUnits))}</div><div class="grade-sub">등급과 이수단위가 함께 있는 과목만 반영</div></div>
            <div class="grade-stat"><div class="grade-label">반영 과목 수</div><div class="grade-value">${esc(grade.summary.countedSubjects ? `${grade.summary.countedSubjects}과목` : '미산출')}</div><div class="grade-sub">${esc(terms.length ? terms.map(v => v.label).join(' · ') : '학기별 데이터 추가 필요')}</div></div>
          </div>
          <div class="grade-panel">
            <div class="grade-panel-head">
              <div><div class="grade-panel-title">내신 성적 산출값</div><div class="grade-panel-desc">이수단위 반영 공식을 그대로 읽을 수 있게 정리한 카드입니다.</div></div>
              <span class="grade-chip">자동 계산</span>
            </div>
            <div class="summary-item soft-blue">
              <div class="summary-kicker">공식</div>
              <div class="summary-body">[(각 과목 이수단위 × 해당 과목 등급)의 총합] ÷ [총 이수 단위수]</div>
            </div>
            <div class="guide">${esc(grade.summary.memo || '')}</div>
          </div>
        </div>` : currentTerm ? `
        <div class="grade-shell" style="margin-top:16px;">
          <div class="grade-summary-grid">
            <div class="grade-stat"><div class="grade-label">학기</div><div class="grade-value">${esc(currentTerm.label || '-')}</div><div class="grade-sub">학기별 상세 성적</div></div>
            <div class="grade-stat"><div class="grade-label">학기 내신</div><div class="grade-value">${esc(formatOverallGrade(currentTerm.overall))}</div><div class="grade-sub">해당 학기 산출값</div></div>
            <div class="grade-stat"><div class="grade-label">반영 이수단위</div><div class="grade-value">${esc(formatUnitsLabel(currentTerm.reflectedUnits))}</div><div class="grade-sub">${esc(currentTerm.memo || '')}</div></div>
          </div>
          <div class="grade-panel">
            <div class="grade-panel-head">
              <div><div class="grade-panel-title">${esc(currentTerm.label || '')} 과목별 성적</div><div class="grade-panel-desc">원점수/과목평균, 인원수, 등급, 성취도, 이수단위를 한 화면에서 확인합니다.</div></div>
              <span class="grade-chip">${esc(`${safeArr(currentTerm.subjects).length}과목`)}</span>
            </div>
            ${gradeTableHtml(currentTerm)}
          </div>
        </div>` : ''}
    `;

    target.querySelectorAll('[data-grade-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.gradeTab = btn.getAttribute('data-grade-tab') || 'summary';
        renderGradeCard();
      });
    });
  }

  function renderYearToggles(years){
    $('#yearToggles').innerHTML = years.length
      ? years.map((y, i) => `<button class="toggle ${i===state.yearIndex ? 'is-on' : ''}" data-year-idx="${i}">${esc(y.year || `${i+1}학년`)}</button>`).join('')
      : '<button class="toggle" disabled>학년 없음</button>';
    $('#yearToggles').querySelectorAll('[data-year-idx]').forEach(btn => {
      btn.onclick = () => {
        state.yearIndex = Number(btn.dataset.yearIdx || 0);
        state.subjectIndex = 0;
        rerender();
      };
    });
  }

  function renderSubjectToggles(subjects){
    $('#subjectToggles').innerHTML = subjects.length
      ? subjects.map((s, i) => `<button class="toggle ${i===state.subjectIndex ? 'is-on' : ''}" data-subject-idx="${i}">${esc(s.subject || '과목')}</button>`).join('')
      : '<button class="toggle" disabled>과목 없음</button>';
    $('#subjectToggles').querySelectorAll('[data-subject-idx]').forEach(btn => {
      btn.onclick = () => {
        state.subjectIndex = Number(btn.dataset.subjectIdx || 0);
        rerenderAnalysis();
        renderSubjectToggles(subjects);
      };
    });
  }

  function renderPriorityList(items){
    const list = safeArr(items).filter(v => String(v || '').trim());
    if (!list.length) return '<div class="empty">평가 기준 데이터가 없습니다.</div>';
    return `<ul class="priority-list">${list.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`;
  }

  function normalizeFlowCards(subject){
    const list = safeArr(subject?.inquiry_flow).map(card => ({
      kicker: card?.kicker || '',
      title: card?.title || '',
      body: card?.body || card?.description || '',
      keywords: safeArr(card?.keywords),
    })).filter(v => v.title || v.body);
    return list;
  }

  function axisHtml(axisList){
    const list = safeArr(axisList);
    if (!list.length) return '<div class="empty">역량 축 데이터가 없습니다.</div>';
    return `<div class="axis-list">${list.map(item => `
      <div class="axis-item">
        <div class="axis-head"><span class="axis-no">${esc(item.no || '')}</span>${esc(item.title || '')}</div>
        <div class="axis-text">${esc(item.content || '')}</div>
      </div>`).join('')}</div>`;
  }

  function flowCardsHtml(subject){
    const cards = normalizeFlowCards(subject);
    if (!cards.length) return '<div class="empty">탐구 흐름 데이터가 없습니다.</div>';
    return `<div class="flow-grid">${cards.map(card => `
      <div class="flow-card">
        <span class="flow-kicker">${esc(card.kicker || '')}</span>
        <div class="flow-title">${esc(card.title || '')}</div>
        <div class="flow-body">${esc(card.body || '')}</div>
        ${safeArr(card.keywords).length ? `<div class="flow-chips">${safeArr(card.keywords).map(k => `<span class="flow-chip">${esc(k)}</span>`).join('')}</div>` : ''}
      </div>`).join('')}</div>`;
  }

  function judgmentBlockHtml(subject){
    const block = subject?.judgment_block || {};
    const cards = [
      { label:'입학사정관 판단점', text: String(block.subject_judgment || '').trim(), cls:'soft-blue' },
      { label:'생기부 판단점', text: String(block.overall_opinion || '').trim(), cls:'soft-warm' },
      { label:'구성/연결성 해석', text: String(block.extension_interpretation || '').trim(), cls:'soft-green' },
    ].filter(v => v.text);
    if (!cards.length) return '<div class="empty">심화 판단 데이터가 없습니다.</div>';
    return `<div class="judgment-scroll">${cards.map(card => `
      <div class="judgment-card ${card.cls}">
        <div class="summary-kicker">${esc(card.label)}</div>
        <div class="summary-body">${esc(card.text)}</div>
      </div>`).join('')}</div>`;
  }

  function deepAnalysisHtml(subject){
    const hasFocus = String(subject?.subject_goal_focus || '').trim();
    const hasBasis = String(subject?.current_activity_basis || '').trim();
    const hasFramework = safeArr(subject?.activity_framework).length;
    const hasPriority = safeArr(subject?.evaluation_priority).length;
    return `
      <div class="deep-grid">
        <div class="focus-item soft-blue">
          <div class="focus-label">과목 고유 목표</div>
          <div class="focus-body">${esc(subject.subject_goal_focus || '데이터 입력 필요')}</div>
        </div>
        <div class="focus-item soft-warm">
          <div class="focus-label">현재 활동 기반</div>
          <div class="focus-body">${esc(subject.current_activity_basis || '데이터 입력 필요')}</div>
        </div>
        <div class="focus-item soft-green">
          <div class="focus-label">입학사정관이 보게 되는 평가 우선</div>
          ${hasPriority ? renderPriorityList(subject.evaluation_priority) : '<div class="focus-body">평가 기준 데이터 입력 필요</div>'}
        </div>
        <div class="focus-item soft-blue">
          <div class="focus-label">생기부 구성상 읽히는 프레임</div>
          <div class="chips">${hasFramework ? safeArr(subject.activity_framework).map(v => `<span class="flow-chip">${esc(v)}</span>`).join('') : '<span class="flow-chip">데이터 입력 필요</span>'}</div>
        </div>
      </div>`;
  }

  function rerenderAnalysis(){
    const years = safeArr(state.student?.years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999));
    const subject = subjects[state.subjectIndex] || null;
    const area = $('#analysisCard');
    if (!subject) {
      area.innerHTML = '<div class="empty">선택된 과목 데이터가 없습니다.</div>';
      return;
    }

    area.innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">${esc(year.year || '')} · ${esc(subject.subject || '')}</div>
        </div>
        <span class="pill warm">심화 데이터 반영</span>
      </div>

      <div class="analysis-layout">
        <div class="block soft-blue">
          <h2 class="hero-title">${esc(subject.subject || '과목')}</h2>
          <div class="sub">${esc(subject.summary || '')}</div>
        </div>

        <div class="block">
          <div class="mini-title">생활기록부 핵심 해석</div>
          <div class="summary-box">
            <div class="summary-item soft-blue">
              <div class="summary-kicker">세특 핵심 근거</div>
              <div class="summary-body">${esc(subject.current_activity_basis || subject.summary || '데이터 입력 필요')}</div>
            </div>
            <div class="summary-item soft-warm">
              <div class="summary-kicker">기록에서 확인되는 수행</div>
              <div class="summary-body">${esc(subject.one_line || '현재 기록에서 확인되는 수행을 입력해 주세요.')}</div>
            </div>
            <div class="summary-item soft-green">
              <div class="summary-kicker">구조와 연결성 해석</div>
              <div class="summary-body">${esc(subject.subject_goal_focus || '이 과목이 학생부 전체에서 어떤 축으로 연결되는지 입력해 주세요.')}</div>
            </div>
          </div>
        </div>

        <div class="block">
          <div class="mini-title">입학사정관 판단점 · 생기부 판단점 · 구성 해석</div>
          ${judgmentBlockHtml(subject)}
        </div>

        <div class="block">
          <div class="mini-title">심화 해석 데이터</div>
          ${deepAnalysisHtml(subject)}
        </div>

        <div class="block">
          <div class="mini-title">역량 축 분석</div>
          ${axisHtml(subject.axis_list)}
        </div>

        <div class="block">
          <div class="inline-head">
            <div class="mini-title" style="margin:0;">탐구 흐름 정리</div>
            <span class="pill good">밝은 강조색 적용</span>
          </div>
          <div class="flow-intro">키워드 나열보다, 이 학생의 세특에서 실제로 어떤 탐구 흐름이 드러나는지 해석 중심으로 보여주는 영역입니다.</div>
          ${flowCardsHtml(subject)}
        </div>
      </div>
    `;
  }

  function rerender(){
    renderGradeCard();
    const years = safeArr(state.student?.years);
    renderYearToggles(years);
    const year = years[state.yearIndex] || years[0] || {};
    renderYearSummary(year);
    const subjects = safeArr(year.subjects).slice().sort((a,b) => (a.display_order||999) - (b.display_order||999));
    renderSubjectToggles(subjects);
    rerenderAnalysis();
  }

  async function boot(){
    const loaded = await loadRecordData();
    const students = safeArr(loaded.data?.students);
    const sid = String(qs.get('student_id') || qs.get('id') || 'shstudy09').trim();
    state.student = students.find(s => String(s.student_id || '').trim() === sid) || students[0] || null;
    if (!state.student) throw new Error('학생 데이터가 없습니다.');
    const grade = normalizeGradeData(state.student);
    $('#studentMeta').textContent = [state.student.student_name, state.student.school_name, state.student.student_id, grade.summary.overall ? `종합 내신 ${formatOverallGrade(grade.summary.overall)}` : '내신 미입력'].filter(Boolean).join(' · ');
    $('#loadGuide').textContent = `불러온 데이터 경로: ${loaded.source}`;
    $('#previewBadge').textContent = '심화형';
    const btn = $('#yearSummaryToggleBtn');
    if (btn) {
      btn.onclick = () => {
        state.showYearSummary = !state.showYearSummary;
        const years = safeArr(state.student?.years);
        const year = years[state.yearIndex] || years[0] || {};
        renderYearSummary(year);
      };
    }
    rerender();
  }

  boot().catch(err => {
    $('#studentMeta').textContent = '데이터를 불러오지 못했습니다.';
    $('#previewBadge').textContent = '오류';
    $('#analysisCard').innerHTML = `<div class="empty">${esc(err?.message || err)}</div>`;
  });
})();
</script>
</body>
</html>
