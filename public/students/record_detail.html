<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>shstudy09 선택과목 기반 다음 단계 설계</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #d9e1ec;
      --text: #16202a;
      --sub: #5c6b7a;
      --accent: #1f6feb;
      --accent-soft: #eaf2ff;
      --good: #0f766e;
      --warn: #b45309;
      --shadow: 0 10px 30px rgba(18, 35, 58, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #eef5ff 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 18px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }

    .hero-sub {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
      max-width: 760px;
    }

    .hero-meta {
      display: grid;
      gap: 8px;
      min-width: 240px;
    }

    .meta-box {
      background: rgba(255,255,255,.75);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .meta-value {
      font-size: 15px;
      font-weight: 800;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #cdd9ea;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .stack { display: grid; gap: 14px; }

    .track {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fcfdff;
    }

    .track .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .track-title {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 800;
    }

    .track-subjects {
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
    }

    .track-reason {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
    }

    .message {
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 14px;
      font-size: 14px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .subject-list {
      display: grid;
      gap: 16px;
    }

    .subject-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .subject-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(234,242,255,.85), rgba(255,255,255,.9));
    }

    .subject-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .subject-name {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .role-badge {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .subject-body {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .summary-box strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--sub);
    }

    .summary-box p {
      margin: 0;
      font-size: 15px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .bullet-list {
      margin: 0;
      padding-left: 18px;
    }

    .bullet-list li + li { margin-top: 8px; }

    .activity-table {
      display: grid;
      gap: 12px;
    }

    .activity-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fcfdff;
    }

    .activity-title {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px;
    }

    .mini strong {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--sub);
    }

    .mini p {
      margin: 0;
      font-size: 14px;
    }

    .status-good { color: var(--good); }
    .status-warn { color: var(--warn); }

    .record-box {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .record-year {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 12px;
    }

    .record-year summary {
      cursor: pointer;
      list-style: none;
      padding: 14px 16px;
      font-weight: 800;
      background: #f8fbff;
      border-bottom: 1px solid var(--line);
    }

    .record-year summary::-webkit-details-marker { display: none; }

    .record-grid {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .record-card h4 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .record-card p {
      margin: 0;
      font-size: 14px;
      color: #263444;
    }

    .empty {
      padding: 24px;
      text-align: center;
      border: 1px dashed #c8d4e4;
      border-radius: 16px;
      color: var(--sub);
      background: rgba(255,255,255,.8);
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .grid-2, .activity-grid { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
      .subject-name { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app" class="empty">데이터를 불러오는 중입니다...</div>
  </div>

  <script>
    const DATA_PATHS = [
      './record_detail_shstudy09_selected_subjects.json',
      './record_detail.json',
      './record_detail (1).json'
    ];
    const STUDENT_ID = 'shstudy09';

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function fetchJson() {
      for (const path of DATA_PATHS) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) continue;
          return await res.json();
        } catch (e) {}
      }
      throw new Error('JSON 파일을 찾지 못했습니다. detail.html과 record_detail_shstudy09_selected_subjects.json을 같은 폴더에 두고 열어주세요.');
    }

    function findStudent(data) {
      const students = Array.isArray(data?.students) ? data.students : [];
      let found = students.find(s => s.student_id === STUDENT_ID || s.id === STUDENT_ID);
      if (!found) {
        found = students.find(s => s.name === '이열음' || s.student_name === '이열음');
      }
      return found;
    }

    function renderChips(items = []) {
      if (!items.length) return '<div class="empty">선택과목 데이터가 없습니다.</div>';
      return `<div class="chips">${items.map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('')}</div>`;
    }

    function renderList(items = []) {
      if (!items || !items.length) return '<div class="empty">표시할 내용이 없습니다.</div>';
      return `<ul class="bullet-list">${items.map(v => `<li>${escapeHtml(v)}</li>`).join('')}</ul>`;
    }

    function renderActivities(items = []) {
      if (!items.length) return '<div class="empty">설계된 다음 단계 활동이 없습니다.</div>';
      return `<div class="activity-table">${items.map(item => `
        <div class="activity-card">
          <h4 class="activity-title">${escapeHtml(item.title)}</h4>
          <div class="activity-grid">
            <div class="mini">
              <strong>왜 필요한가</strong>
              <p>${escapeHtml(item.why_needed)}</p>
            </div>
            <div class="mini">
              <strong>구체적으로 무엇을 할까</strong>
              <p>${escapeHtml(item.activity_detail)}</p>
            </div>
            <div class="mini">
              <strong>기록이 어떻게 달라지나</strong>
              <p>${escapeHtml(item.expected_record_change)}</p>
            </div>
          </div>
        </div>
      `).join('')}</div>`;
    }

    function renderSubjectPlans(plan) {
      const list = Array.isArray(plan?.selection_subjects) ? plan.selection_subjects : [];
      if (!list.length) return '<div class="empty">선택과목 설계 데이터가 없습니다.</div>';
      return `
        <div class="subject-list">
          ${list.map(subject => `
            <section class="subject-card">
              <div class="subject-head">
                <div class="subject-top">
                  <div>
                    <h3 class="subject-name">${escapeHtml(subject.subject)}</h3>
                  </div>
                  <div class="role-badge">${escapeHtml(subject.course_role)}</div>
                </div>
              </div>
              <div class="subject-body">
                <div class="grid-2">
                  <div class="summary-box">
                    <strong>현재 기록 근거</strong>
                    ${renderList(subject.current_evidence)}
                  </div>
                  <div class="summary-box">
                    <strong>현재 강점</strong>
                    <p class="status-good">${escapeHtml(subject.current_strength)}</p>
                  </div>
                </div>
                <div class="grid-2">
                  <div class="summary-box">
                    <strong>보완 포인트</strong>
                    <p class="status-warn">${escapeHtml(subject.gap_point)}</p>
                  </div>
                  <div class="summary-box">
                    <strong>입학사정관 관점</strong>
                    <p>${escapeHtml(subject.admission_view)}</p>
                  </div>
                </div>
                <div class="summary-box">
                  <strong>다음 단계 활동 설계</strong>
                  ${renderActivities(subject.next_stage_activities || [])}
                </div>
              </div>
            </section>
          `).join('')}
        </div>
      `;
    }

    function renderRecords(student) {
      const years = Array.isArray(student?.years) ? student.years : [];
      if (!years.length) return '<div class="empty">표시할 과목 기록이 없습니다.</div>';

      return years.map(year => {
        const subjects = Array.isArray(year.subjects) ? year.subjects : [];
        return `
          <details class="record-year" ${years.length === 1 ? 'open' : ''}>
            <summary>${escapeHtml(year.year_label || year.year || '학년 기록')} · 현재 기록 기반 참고</summary>
            <div class="record-grid">
              ${subjects.map(subject => `
                <article class="record-card">
                  <h4>${escapeHtml(subject.subject_name || subject.subject)}</h4>
                  <p><strong>한 줄 요약:</strong> ${escapeHtml(subject.one_line || subject.summary || '')}</p>
                  <p style="margin-top:8px;"><strong>판단:</strong> ${escapeHtml(subject?.judgment_block?.subject_judgment || '')}</p>
                  <p style="margin-top:8px;"><strong>다음 방향:</strong> ${escapeHtml(subject?.judgment_block?.extension_interpretation || '')}</p>
                </article>
              `).join('')}
            </div>
          </details>
        `;
      }).join('');
    }

    function render(student) {
      const plan = student?.selected_subjects_plan || {};
      const integrated = plan?.integrated_direction || {};
      const secondary = plan?.secondary_track || {};

      return `
        <section class="hero">
          <div class="hero-top">
            <div>
              <div class="eyebrow">선택과목 기반 다음 단계 설계</div>
              <h1>${escapeHtml(student.name || student.student_name)} · ${escapeHtml(student.student_id || student.id || '')}</h1>
              <p class="hero-sub">${escapeHtml(plan.selection_design_note || '현재 기록을 기준으로 선택과목별 다음 단계 활동을 설계한 화면입니다.')}</p>
              ${renderChips(student.selected_subjects || [])}
            </div>
            <div class="hero-meta">
              <div class="meta-box">
                <div class="meta-label">학교</div>
                <div class="meta-value">${escapeHtml(student.school_name || student.school || '-')}</div>
              </div>
              <div class="meta-box">
                <div class="meta-label">트랙</div>
                <div class="meta-value">${escapeHtml(student.track || '-')}</div>
              </div>
            </div>
          </div>
        </section>

        <div class="layout">
          <aside class="stack">
            <section class="panel">
              <h2>전체 방향</h2>
              <div class="track">
                <div class="tag">주력 축</div>
                <h3 class="track-title">${escapeHtml(integrated.primary_track || '-')}</h3>
                <p class="track-subjects">${escapeHtml((integrated.subjects || []).join(' · '))}</p>
                <p class="track-reason">${escapeHtml(integrated.reason || '')}</p>
              </div>
              <div class="track" style="margin-top:12px;">
                <div class="tag">보조 축</div>
                <h3 class="track-title">${escapeHtml(secondary.secondary_track || '-')}</h3>
                <p class="track-subjects">${escapeHtml((secondary.subjects || []).join(' · '))}</p>
                <p class="track-reason">${escapeHtml(secondary.reason || '')}</p>
              </div>
            </section>

            <section class="panel">
              <h2>상담 메시지</h2>
              <div class="message">${escapeHtml(plan.counseling_message || '')}</div>
            </section>
          </aside>

          <main>
            <h2 class="section-title">과목별 다음 단계 활동 설계</h2>
            ${renderSubjectPlans(plan)}
          </main>
        </div>

        <section class="record-box">
          <h2 style="margin:0 0 10px;">현재 기록 참고</h2>
          <p style="margin:0; color: var(--sub); font-size: 14px;">선택과목 설계가 어떤 현재 기록을 바탕으로 만들어졌는지 함께 볼 수 있도록 기존 과목 분석 요약을 아래에 붙였습니다.</p>
          ${renderRecords(student)}
        </section>
      `;
    }

    (async () => {
      const app = document.getElementById('app');
      try {
        const data = await fetchJson();
        const student = findStudent(data);
        if (!student) {
          app.innerHTML = '<div class="empty">shstudy09 학생 데이터를 찾지 못했습니다.</div>';
          return;
        }
        app.outerHTML = render(student);
      } catch (error) {
        app.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
