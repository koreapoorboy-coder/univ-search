<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    :root{
      --bd:#e6e6e6;
      --txt:#111;
      --muted:#666;
      --bg:#fff;
      --soft:#f8f8f8;
      --chip:#fafafa;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:24px;background:var(--bg);padding:22px;margin:14px 0}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .between{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .pill{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .badge{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;background:var(--soft);border:1px solid var(--bd);font-weight:800}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted)}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--bd);background:var(--chip);font-size:13px;font-weight:800}
    .summary-grid{display:grid;grid-template-columns:1.2fr .9fr .9fr;gap:14px}
    .mini-card{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .mini-title{font-size:14px;font-weight:900;color:#333;margin-bottom:10px}
    .mini-list{margin:0;padding-left:18px;line-height:1.7}
    .block{border:1px solid var(--bd);border-radius:20px;padding:18px;background:#fff}
    .block + .block{margin-top:14px}
    .block-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
    .block-title{font-size:18px;font-weight:900;line-height:1.35;margin:0}
    .block-one{color:#333;line-height:1.6;margin-top:6px}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .axis-item{border:1px solid var(--bd);border-radius:16px;padding:14px;background:#fff}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:6px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:#111;color:#fff;font-size:12px;margin-right:8px}
    .axis-text{color:#333;line-height:1.65;font-size:14px}
    .option-grid{display:grid;grid-template-columns:repeat(3, minmax(0,1fr));gap:12px;margin-top:14px}
    .option-card{border:1px solid var(--bd);border-radius:16px;padding:14px;background:var(--soft)}
    .option-type{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;margin-bottom:8px}
    .option-title{font-weight:900;line-height:1.4;margin-bottom:6px}
    .option-desc{color:#333;line-height:1.6;font-size:14px;margin-bottom:8px}
    .option-outputs{display:flex;gap:6px;flex-wrap:wrap}
    .reading-grid{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:12px}
    .reading-card{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .reading-title{font-size:17px;font-weight:900;line-height:1.4}
    .reading-author{color:var(--muted);margin-top:6px}
    .reading-why{margin-top:12px;line-height:1.7;color:#333}
    .question{margin-top:12px;padding:12px;border-radius:14px;background:var(--soft);line-height:1.6}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    @media (max-width: 980px){
      .summary-grid,.option-grid,.reading-grid,.axis-list{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">가상 데이터 미리보기 구조</div>
        </div>
        <div class="row">
          <span class="pill" id="previewBadge">미리보기 데이터</span>
        </div>
      </div>
    </div>

    <div class="card" id="overviewCard"></div>
    <div class="card" id="subjectCard"></div>
    <div class="card" id="activityCard"></div>
    <div class="card" id="readingCard"></div>
  </div>

<script>
(() => {
  const $ = (sel) => document.querySelector(sel);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const getQS = () => new URLSearchParams(location.search);

  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  async function loadJson(path){
    const r = await fetch(path, { cache: 'no-store' });
    if(!r.ok) throw new Error(path + ' load failed (' + r.status + ')');
    return r.json();
  }
  async function loadJsonSafe(path, fallback=null){
    try { return await loadJson(path); } catch { return fallback; }
  }

  function resolveStudentByToken(students){
    const qs = getQS();
    const t = String(qs.get('t') || qs.get('token') || '').trim();
    const id = String(qs.get('id') || '').trim();
    if (!Array.isArray(students)) return null;
    if (t) return students.find(s => String(pickToken(s) || '').trim() === t) || null;
    if (id) return students.find(s => String(pickId(s) || '').trim() === id) || null;
    return null;
  }

  function pickRecord(data, students){
    const records = safeArr(data?.items);
    const matchedStudent = resolveStudentByToken(students);
    if (matchedStudent) {
      const sid = String(pickId(matchedStudent) || '').trim();
      const found = records.find(r => String(r?.id || '').trim() === sid);
      if (found) {
        $('#previewBadge').textContent = '실제 학생 매칭';
        return found;
      }
    }
    $('#previewBadge').textContent = '미리보기 데이터';
    return records[0] || null;
  }

  function renderOverview(record){
    const profile = record?.profile || {};
    const overview = record?.overview || {};
    $('#studentMeta').textContent = [profile.studentName, profile.school, profile.grade, profile.track].filter(Boolean).join(' · ');

    $('#overviewCard').innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">핵심 요약</div>
          <div class="section-desc">학생 전체 인상을 먼저 한 줄과 3개 묶음으로 확인하는 구조</div>
        </div>
        <span class="badge">${esc(profile.note || '구조 확인용')}</span>
      </div>
      <div class="block">
        <div class="block-title">${esc(overview.headline || '핵심 한 줄 요약')}</div>
        <div class="sub">${safeArr(overview.summary_lines).map(x => esc(x)).join('<br>')}</div>
        <div class="chips" style="margin-top:12px;">${safeArr(overview.strength_tags).map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>
      </div>
      <div class="summary-grid" style="margin-top:14px;">
        <div class="mini-card">
          <div class="mini-title">핵심 요약 문장</div>
          <ul class="mini-list">${safeArr(overview.summary_lines).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
        </div>
        <div class="mini-card">
          <div class="mini-title">현재 강하게 보이는 축</div>
          <div class="chips">${safeArr(overview.strength_tags).map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>
        </div>
        <div class="mini-card">
          <div class="mini-title">다음 보강 포인트</div>
          <ul class="mini-list">${safeArr(overview.next_focus).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
        </div>
      </div>
    `;
  }

  function axisListHtml(items){
    const list = safeArr(items);
    if (!list.length) return `<div class="empty">축 데이터가 없습니다.</div>`;
    return `<div class="axis-list">${list.map(it => `
      <div class="axis-item">
        <div class="axis-head"><span class="axis-no">${esc(it.no ?? '')}</span>${esc(it.title || '')}</div>
        <div class="axis-text">${esc(it.content || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function optionHtml(options){
    const list = safeArr(options);
    if (!list.length) return '';
    return `
      <div style="margin-top:16px;">
        <div class="mini-title">확장 옵션</div>
        <div class="option-grid">
          ${list.map(op => `
            <div class="option-card">
              <div class="option-type">${esc(op.type || '확장')}</div>
              <div class="option-title">${esc(op.title || '')}</div>
              <div class="option-desc">${esc(op.description || '')}</div>
              <div class="option-outputs">${safeArr(op.outputs).map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderSubjects(record){
    const list = safeArr(record?.subject_blocks);
    $('#subjectCard').innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">과목별 분석</div>
          <div class="section-desc">과목마다 1줄 요약 → 역량 축 → 앵커 키워드 → 확장 옵션 순서</div>
        </div>
        <span class="badge">과목 ${list.length}개</span>
      </div>
      ${list.length ? list.map(item => `
        <div class="block">
          <div class="block-top">
            <div>
              <div class="block-title">${esc(item.subject || '과목')}</div>
              <div class="block-one">${esc(item.one_line || '')}</div>
            </div>
            <span class="pill">역량 축 ${safeArr(item.axis_items).length}개</span>
          </div>
          ${axisListHtml(item.axis_items)}
          <div style="margin-top:16px;">
            <div class="mini-title">앵커 키워드</div>
            <div class="chips">${safeArr(item.anchor_keywords).map(k => `<span class="chip">${esc(k)}</span>`).join('')}</div>
          </div>
          ${optionHtml(item.extension_options)}
        </div>
      `).join('') : `<div class="empty">과목 분석 데이터가 없습니다.</div>`}
    `;
  }

  function renderActivities(record){
    const list = safeArr(record?.activity_blocks);
    $('#activityCard').innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">창체 연결 분석</div>
          <div class="section-desc">자율·동아리 같은 활동도 칩 나열 대신 분석형 블록으로 표시</div>
        </div>
        <span class="badge">창체 ${list.length}개</span>
      </div>
      ${list.length ? list.map(item => `
        <div class="block">
          <div class="block-top">
            <div>
              <div class="row"><span class="pill">${esc(item.area || '창체')}</span></div>
              <div class="block-title" style="margin-top:8px;">${esc(item.title || '')}</div>
              <div class="block-one">${esc(item.one_line || '')}</div>
            </div>
          </div>
          ${axisListHtml(item.axis_items)}
          <div style="margin-top:16px;">
            <div class="mini-title">연결 키워드</div>
            <div class="chips">${safeArr(item.anchor_keywords).map(k => `<span class="chip">${esc(k)}</span>`).join('')}</div>
          </div>
        </div>
      `).join('') : `<div class="empty">창체 분석 데이터가 없습니다.</div>`}
    `;
  }

  function renderReadings(record){
    const list = safeArr(record?.reading_blocks);
    $('#readingCard').innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">독서 연결</div>
          <div class="section-desc">도서명만 쌓지 않고 왜 읽었는지와 다음 질문까지 연결하는 구조</div>
        </div>
        <span class="badge">독서 ${list.length}권</span>
      </div>
      ${list.length ? `<div class="reading-grid">${list.map(b => `
        <div class="reading-card">
          <div class="reading-title">${esc(b.title || '')}</div>
          <div class="reading-author">${esc(b.author || '')}</div>
          <div class="reading-why">${esc(b.why || '')}</div>
          <div class="chips" style="margin-top:12px;">${safeArr(b.links).map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>
          <div class="question"><strong>다음 질문</strong><br>${esc(b.next_question || '')}</div>
        </div>
      `).join('')}</div>` : `<div class="empty">독서 연결 데이터가 없습니다.</div>`}
    `;
  }

  async function main(){
    const students = await loadJsonSafe('./students.json', []);
    const data = await loadJsonSafe('./school_record_detail.v2.mock.json', null)
      || await loadJsonSafe('./school_record_detail.json', null);

    if (!data) throw new Error('school_record_detail.json 파일을 불러오지 못했습니다.');

    const record = pickRecord(data, students);
    if (!record) throw new Error('표시할 미리보기 데이터가 없습니다.');

    renderOverview(record);
    renderSubjects(record);
    renderActivities(record);
    renderReadings(record);
  }

  main().catch(err => {
    document.getElementById('app').innerHTML = `<div class="card"><div class="title">오류</div><div class="sub">${esc(err.message)}</div></div>`;
  });
})();
</script>
</body>
</html>
