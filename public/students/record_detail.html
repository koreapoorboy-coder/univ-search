<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 분석 보기</title>
  <style>
    :root{
      --bd:#e8e8e8;
      --txt:#111;
      --muted:#666;
      --bg:#fff;
      --soft:#fafafa;
      --soft2:#f5f5f5;
      --chip:#fff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:26px;background:var(--bg);padding:22px;margin:14px 0}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .badge,.pill{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted)}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap}
    .toggle{
      appearance:none;border:1px solid var(--bd);background:#fff;color:#111;border-radius:999px;
      padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer;
    }
    .toggle.is-on{background:#111;color:#fff;border-color:#111}
    .toggle:disabled{opacity:.45;cursor:default}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .hero-line{margin-top:14px;color:#333;line-height:1.75;font-size:17px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:var(--chip);font-size:14px;font-weight:800}
    .block{border:1px solid var(--bd);border-radius:22px;padding:20px;background:#fff}
    .block + .block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;margin:0 0 10px 0;color:#222}
    .one-line{font-size:18px;line-height:1.7;color:#333;margin-top:10px}
    .axis-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .axis-item{border:1px solid var(--bd);border-radius:18px;padding:16px;background:#fff}
    .axis-head{font-weight:900;line-height:1.45;margin-bottom:8px}
    .axis-no{display:inline-flex;min-width:24px;height:24px;border-radius:999px;align-items:center;justify-content:center;background:#111;color:#fff;font-size:12px;margin-right:8px}
    .axis-text{color:#333;line-height:1.7;font-size:14px}
    .accordion{display:grid;gap:10px;margin-top:14px}
    .acc-item{border:1px solid var(--bd);border-radius:18px;background:var(--soft)}
    .acc-head{width:100%;border:0;background:transparent;padding:16px 18px;text-align:left;display:flex;justify-content:space-between;gap:12px;align-items:center;cursor:pointer}
    .acc-head-left{display:flex;flex-direction:column;gap:6px}
    .acc-type{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:900;width:max-content}
    .acc-title{font-size:16px;font-weight:900;line-height:1.45}
    .acc-sign{font-size:22px;line-height:1;font-weight:500;color:#666}
    .acc-body{display:none;padding:0 18px 18px 18px;color:#333;line-height:1.75}
    .acc-item.is-open .acc-body{display:block}
    .acc-item.is-open .acc-sign{transform:rotate(45deg)}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    .guide{font-size:13px;color:var(--muted);margin-top:8px}
    @media (max-width: 980px){
      .axis-list{grid-template-columns:1fr}
      .hero-title{font-size:26px}
      .one-line{font-size:17px}
      .toggle{padding:9px 14px;font-size:14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">생기부 분석 보기</h1>
          <div class="sub" id="studentMeta">실제 데이터 입력 전 구조 확인용 가상 예시</div>
        </div>
        <div class="row"><span class="pill" id="previewBadge">미리보기 데이터</span></div>
      </div>
    </div>

    <div class="card" id="yearCard">
      <div class="section-h">
        <div>
          <div class="section-title">학년 선택</div>
          <div class="section-desc">1학년 · 2학년 · 3학년 토글로 구분해서 확인</div>
        </div>
      </div>
      <div class="toggle-wrap" id="yearToggles"></div>
    </div>

    <div class="card" id="subjectCardTop">
      <div class="section-h">
        <div>
          <div class="section-title">과목 선택</div>
          <div class="section-desc">선택한 학년 안에서 과목별 분석만 표시</div>
        </div>
      </div>
      <div class="toggle-wrap" id="subjectToggles"></div>
    </div>

    <div class="card" id="analysisCard"></div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const getQS = () => new URLSearchParams(location.search);

  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.['학생ID'] ?? s?.['학번'] ?? null; }
  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.['학생명'] ?? s?.['이름'] ?? s?.['성명'] ?? s?.id ?? '-'; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.['token'] ?? s?.['토큰'] ?? null; }

  async function loadJson(path){
    const r = await fetch(path, { cache:'no-store' });
    if (!r.ok) throw new Error(path + ' load failed (' + r.status + ')');
    return r.json();
  }
  async function loadJsonSafe(path, fallback=null){ try { return await loadJson(path); } catch { return fallback; } }

  function resolveStudentByToken(students){
    const qs = getQS();
    const t = String(qs.get('t') || qs.get('token') || '').trim();
    const id = String(qs.get('id') || '').trim();
    if (!Array.isArray(students)) return null;
    if (t) return students.find(s => String(pickToken(s) || '').trim() === t) || null;
    if (id) return students.find(s => String(pickId(s) || '').trim() === id) || null;
    return null;
  }

  function pickRecord(data, students){
    const records = safeArr(data?.items);
    const matched = resolveStudentByToken(students);
    if (matched) {
      const sid = String(pickId(matched) || '').trim();
      const found = records.find(r => String(r?.id || '').trim() === sid);
      if (found) {
        $('#previewBadge').textContent = '실제 학생 매칭';
        return found;
      }
    }
    $('#previewBadge').textContent = '미리보기 데이터';
    return records[0] || null;
  }

  const state = { record:null, yearIndex:0, subjectIndex:0 };

  function renderYearToggles(years){
    $('#yearToggles').innerHTML = years.map((y, i) => `
      <button class="toggle ${i===state.yearIndex ? 'is-on' : ''}" data-year-idx="${i}">${esc(y.year_label || y.year || (i+1)+'학년')}</button>
    `).join('');
    $('#yearToggles').querySelectorAll('[data-year-idx]').forEach(btn => {
      btn.onclick = () => {
        state.yearIndex = Number(btn.dataset.yearIdx || 0);
        state.subjectIndex = 0;
        rerender();
      };
    });
  }

  function renderSubjectToggles(subjects){
    $('#subjectToggles').innerHTML = subjects.length ? subjects.map((s, i) => `
      <button class="toggle ${i===state.subjectIndex ? 'is-on' : ''}" data-subject-idx="${i}">${esc(s.subject || '과목')}</button>
    `).join('') : '<button class="toggle" disabled>과목 없음</button>';
    $('#subjectToggles').querySelectorAll('[data-subject-idx]').forEach(btn => {
      btn.onclick = () => {
        state.subjectIndex = Number(btn.dataset.subjectIdx || 0);
        rerenderAnalysis();
        renderSubjectToggles(subjects);
      };
    });
  }

  function axisHtml(axisItems){
    const list = safeArr(axisItems);
    if (!list.length) return `<div class="empty">역량 축 데이터가 없습니다.</div>`;
    return `<div class="axis-list">${list.map(item => `
      <div class="axis-item">
        <div class="axis-head"><span class="axis-no">${esc(item.no || '')}</span>${esc(item.title || '')}</div>
        <div class="axis-text">${esc(item.content || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function extensionHtml(options){
    const list = safeArr(options);
    if (!list.length) return `<div class="empty">확장 옵션 데이터가 없습니다.</div>`;
    return `
      <div class="accordion">${list.map((opt, idx) => `
        <div class="acc-item" data-acc-item>
          <button class="acc-head" type="button" data-acc-btn>
            <div class="acc-head-left">
              <span class="acc-type">${esc(opt.type || '확장')}</span>
              <span class="acc-title">${esc(opt.title || '')}</span>
            </div>
            <span class="acc-sign">+</span>
          </button>
          <div class="acc-body">${esc(opt.description || '')}</div>
        </div>
      `).join('')}</div>
    `;
  }

  function bindAccordion(){
    document.querySelectorAll('[data-acc-btn]').forEach(btn => {
      btn.onclick = () => {
        const item = btn.closest('[data-acc-item]');
        if (!item) return;
        item.classList.toggle('is-open');
      };
    });
  }

  function rerenderAnalysis(){
    const years = safeArr(state.record?.years);
    const year = years[state.yearIndex] || years[0] || {};
    const subjects = safeArr(year.subjects);
    if (state.subjectIndex > subjects.length - 1) state.subjectIndex = 0;
    const subject = subjects[state.subjectIndex] || null;

    $('#analysisCard').innerHTML = subject ? `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">${esc(year.year_label || '')} · ${esc(subject.subject || '')}</div>
        </div>
        <span class="badge">역량 축 ${safeArr(subject.axis_items).length}개</span>
      </div>

      <div class="block">
        <h2 class="hero-title">${esc(subject.subject || '과목')}</h2>
        <div class="one-line">${esc(subject.one_line || '')}</div>
      </div>

      <div class="block">
        <div class="mini-title">역량 축 분석</div>
        ${axisHtml(subject.axis_items)}
      </div>

      <div class="block">
        <div class="mini-title">확장 키워드</div>
        <div class="chips">${safeArr(subject.extension_keywords).map(k => `<span class="chip">${esc(k)}</span>`).join('')}</div>
      </div>

      <div class="block">
        <div class="section-h" style="margin-bottom:10px;">
          <div>
            <div class="mini-title" style="margin:0;">확장 옵션</div>
            <div class="guide">내용이 길어지지 않도록 클릭했을 때만 펼쳐집니다.</div>
          </div>
        </div>
        ${extensionHtml(subject.extension_options)}
      </div>
    ` : `
      <div class="section-h">
        <div>
          <div class="section-title">과목 분석</div>
          <div class="section-desc">선택된 과목 데이터가 없습니다.</div>
        </div>
      </div>
      <div class="empty">학년과 과목을 먼저 선택해 주세요.</div>
    `;
    bindAccordion();
  }

  function rerender(){
    const years = safeArr(state.record?.years);
    renderYearToggles(years);
    const year = years[state.yearIndex] || years[0] || {};
    renderSubjectToggles(safeArr(year.subjects));
    rerenderAnalysis();
  }

  async function boot(){
    const [students, data] = await Promise.all([
      loadJsonSafe('../students.json', []),
      loadJson('school_record_detail.v3.mock.json')
    ]);
    const record = pickRecord(data, students);
    if (!record) {
      $('#analysisCard').innerHTML = '<div class="empty">표시할 분석 데이터가 없습니다.</div>';
      return;
    }
    state.record = record;
    const p = record.profile || {};
    $('#studentMeta').textContent = [p.studentName, p.school, p.track, p.note].filter(Boolean).join(' · ');
    rerender();
  }

  boot().catch(err => {
    $('#analysisCard').innerHTML = `<div class="empty">데이터를 불러오지 못했습니다. ${esc(err?.message || err)}</div>`;
  });
})();
</script>
</body>
</html>
