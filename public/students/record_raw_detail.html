<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생활기록부 원문 전체 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .meta{opacity:.85;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .pill{display:inline-flex;align-items:center;border:2px solid #111;border-radius:999px;padding:7px 12px;font-weight:900}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff
    }
    .btn:hover{background:#fafafa}
    .badge{display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;padding:8px 12px;font-weight:900;background:#fff}
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}

    .topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    select{
      border:1px solid #ddd;border-radius:12px;padding:10px 12px;background:#fff;font-weight:900;
      max-width:100%;
    }

    .section-title{font-size:16px;font-weight:900;margin:0 0 10px}
    .subtle{font-size:13px;opacity:.75}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:860px){ .grid{grid-template-columns:1fr;} }

    .rawbox{border:1px solid #eee;border-radius:14px;padding:12px;background:#fff}
    .rawhead{display:flex;gap:8px;justify-content:space-between;align-items:flex-start}
    .rawtitle{font-weight:900;font-size:15px;line-height:1.3;white-space:normal}
    .rawmeta{font-size:12px;opacity:.72;margin-top:4px;line-height:1.4}
    .rawtext{
      margin-top:10px;padding:10px 12px;border:1px solid #f0f0f0;border-radius:12px;background:#fcfcfc;
      white-space:pre-wrap; line-height:1.65; font-size:14px;
      word-break:break-word;
    }
    .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
    .chip{display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;padding:5px 9px;font-weight:900;font-size:12px;background:#fff}
    .chip.k{opacity:.85}

    .kv{display:grid;grid-template-columns:100px 1fr;gap:8px 10px;line-height:1.55}
    .k{opacity:.65;font-weight:900}
    .v{font-weight:800;white-space:pre-line;word-break:break-word}
    @media(max-width:640px){ .kv{grid-template-columns:88px 1fr;} }

    .divider{height:1px;background:#f0f0f0;margin:10px 0}

    .tablebox{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid #eee;border-radius:14px}
    table{border-collapse:collapse;width:100%;min-width:720px}
    th,td{border-bottom:1px solid #eee;padding:10px;text-align:left;vertical-align:top;white-space:nowrap;font-size:13px}
    th{background:#fafafa;font-weight:900;position:sticky;top:0}
    td.wrap{white-space:normal;line-height:1.5}

    details summary{cursor:pointer;font-weight:900}
    details[open] summary{margin-bottom:10px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title" id="hdr">생활기록부 원문 전체 보기</div>
    <div class="meta" id="meta"></div>
    <div class="row" id="modeRow"></div>

    <div class="topbar" style="margin-top:10px">
      <div class="leftgroup" id="navRow"></div>
      <div class="rightgroup">
        <div id="semWrap" style="display:none; gap:8px; align-items:center;">
          <span class="badge">학기 선택</span>
          <select id="semSel"></select>
        </div>
      </div>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
(() => {
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN";
  const norm = (v) => String(v ?? "").trim();

  const qs = new URLSearchParams(location.search);
  const adminParam = qs.get("admin");
  const idParam = qs.get("id");
  const tParam = qs.get("t") || qs.get("token");
  const isAdmin = (norm(adminParam) === norm(ADMIN_TOKEN));

  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s??"").replace(/[&<>\"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  function pickName(s){ return s.studentName ?? s.studentname ?? s.name ?? s["학생명"] ?? s["이름"] ?? s["성명"] ?? s.id ?? "-"; }
  function pickId(s){ return s.id ?? s.studentId ?? s.studentID ?? s["ID"] ?? s["학생ID"] ?? s["학번"] ?? null; }
  function pickToken(s){ return s.token ?? s.accessToken ?? s.key ?? s["token"] ?? s["토큰"] ?? null; }
  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  }

  function arrify(x){
    if(Array.isArray(x)) return x.slice();
    if(!x || typeof x !== 'object') return [];
    for(const k of ['rows','items','data','records']){
      if(Array.isArray(x[k])) return x[k].slice();
    }
    return [];
  }

  // school_record_raw.json의 여러 형태 허용
  function parseRawBundle(raw){
    let metas = [];
    let sections = [];

    if(Array.isArray(raw)){
      // 혹시 단일 배열로 저장된 경우: type/category로 추정
      raw.forEach(r => {
        const kind = pickText(r.kind, r.type, r.dataset, r._type).toLowerCase();
        const hasText = !!pickText(r.raw_text, r.text, r.content, r.original_text);
        const hasSubject = !!pickText(r.subject, r["과목"]);
        if(kind.includes('meta') || (!hasSubject && hasText)) metas.push(r);
        else sections.push(r);
      });
      return { metas, sections };
    }

    if(raw && typeof raw === 'object'){
      if(Array.isArray(raw.meta)) metas = raw.meta.slice();
      else if(raw.meta && typeof raw.meta === 'object') metas = arrify(raw.meta);

      if(Array.isArray(raw.sections)) sections = raw.sections.slice();
      else if(raw.sections && typeof raw.sections === 'object') sections = arrify(raw.sections);

      // fallback 키들
      if(!metas.length){
        for(const k of ['meta_rows','metaData','semester_meta']){
          if(Array.isArray(raw[k])) { metas = raw[k].slice(); break; }
        }
      }
      if(!sections.length){
        for(const k of ['detail','raw','raw_rows','records']){
          if(Array.isArray(raw[k])) { sections = raw[k].slice(); break; }
        }
      }
    }

    return { metas, sections };
  }

  function semKeyOf(x){
    const g = pickText(x.grade, x["학년"]);
    const t = pickText(x.term, x["학기"]);
    if(g && t) return `${g} · ${t}`;
    if(g) return g;
    if(t) return t;
    return "미지정";
  }

  function parseGradeNum(v){
    const m = String(v||'').match(/고\s*(\d)/);
    return m ? Number(m[1]) : null;
  }
  function parseTermNum(v){
    const m = String(v||'').match(/(\d)\s*학기/);
    return m ? Number(m[1]) : null;
  }

  function sortSemKeys(keys){
    keys.sort((a,b)=>{
      if(a==='미지정' && b!=='미지정') return 1;
      if(b==='미지정' && a!=='미지정') return -1;
      const [ag,at] = String(a).split(' · ');
      const [bg,bt] = String(b).split(' · ');
      const ga = parseGradeNum(ag), gb = parseGradeNum(bg);
      const ta = parseTermNum(at), tb = parseTermNum(bt);
      if(ga!=null && gb!=null && ga!==gb) return ga-gb;
      if(ta!=null && tb!=null && ta!==tb) return ta-tb;
      return String(a).localeCompare(String(b),'ko');
    });
    return keys;
  }

  function buildSemesterMap(metas, sections, sid){
    const byKey = new Map();

    const ensure = (key, grade, term) => {
      if(!byKey.has(key)) byKey.set(key, { key, grade:grade||'', term:term||'', metas:[], sections:[] });
      return byKey.get(key);
    };

    metas.filter(x => norm(x.id)===sid).forEach(x => {
      const g = pickText(x.grade, x['학년']);
      const t = pickText(x.term, x['학기']);
      const key = semKeyOf(x);
      ensure(key,g,t).metas.push(x);
    });

    sections.filter(x => norm(x.id)===sid).forEach(x => {
      const g = pickText(x.grade, x['학년']);
      const t = pickText(x.term, x['학기']);
      const key = semKeyOf(x);
      ensure(key,g,t).sections.push(x);
    });

    return byKey;
  }

  function sectionOrder(cat, subj){
    const c = String(cat||'');
    const s = String(subj||'');
    const catMap = {
      '교과세특':1,'교과':1,
      '창체':2,'창의적 체험활동':2,
      '진로':3,'진로활동':3,
      '독서':4,'행특':5,'행동특성및종합의견':5,'행동특성':5,
      '수상':6,'봉사':7,'출결':8
    };
    const subMap = {'국어':1,'수학':2,'영어':3,'과학':4,'사회':5};
    return [catMap[c] ?? 99, subMap[s] ?? 99];
  }

  function renderMetaBlocks(sem){
    const metas = (sem.metas || []).slice();
    if(!metas.length){
      return `<div class="card"><div class="muted">이 학기의 원문 메타 데이터가 없습니다. (school_record_raw.json > meta)</div></div>`;
    }

    metas.sort((a,b)=>{
      const ka = pickText(a.category,a.block,a.section,a.label,a.type);
      const kb = pickText(b.category,b.block,b.section,b.label,b.type);
      return ka.localeCompare(kb,'ko');
    });

    return `<div class="grid">${metas.map(m => {
      const block = pickText(m.block, m.category, m.section, m.label, m.type, '학기 메타');
      const title = pickText(m.title, m.name);
      const rawText = pickText(m.raw_text, m.text, m.content, m.original_text);
      const source = pickText(m.source, m.updated_at, m.date);

      const kvRows = [];
      const ignore = new Set(['id','grade','term','block','category','section','label','type','title','name','raw_text','text','content','original_text']);
      for(const [k,v] of Object.entries(m)){
        if(ignore.has(k)) continue;
        const s = pickText(v);
        if(!s) continue;
        kvRows.push(`<div class="k">${esc(k)}</div><div class="v">${esc(s)}</div>`);
      }
      const kv = kvRows.length ? `<div class="divider"></div><div class="kv">${kvRows.join('')}</div>` : '';

      return `
        <div class="rawbox">
          <div class="rawhead">
            <div style="min-width:0">
              <div class="rawtitle">${esc(block)}</div>
              <div class="rawmeta">${title ? esc(title) + ' · ' : ''}${source ? esc(source) : ''}</div>
            </div>
            <span class="chip">메타</span>
          </div>
          ${rawText ? `<div class="rawtext">${esc(rawText)}</div>` : `<div class="muted" style="margin-top:10px">원문 텍스트 없음</div>`}
          ${kv}
        </div>
      `;
    }).join('')}</div>`;
  }

  function renderSectionBlocks(sem){
    const list = (sem.sections || []).slice();
    if(!list.length){
      return `<div class="card"><div class="muted">이 학기의 세부 원문 데이터가 없습니다. (school_record_raw.json > sections)</div></div>`;
    }

    list.sort((a,b)=>{
      const ca = pickText(a.category,a["영역"]), cb = pickText(b.category,b["영역"]);
      const sa = pickText(a.subject,a["과목"]), sb = pickText(b.subject,b["과목"]);
      const [oca,osa] = sectionOrder(ca,sa);
      const [ocb,osb] = sectionOrder(cb,sb);
      if(oca!==ocb) return oca-ocb;
      if(osa!==osb) return osa-osb;
      const ta = pickText(a.activity_title,a.title,a["활동명"],a["제목"]);
      const tb = pickText(b.activity_title,b.title,b["활동명"],b["제목"]);
      return ta.localeCompare(tb,'ko');
    });

    const cards = list.map(s => {
      const category = pickText(s.category, s["영역"], s.type);
      const subject = pickText(s.subject, s["과목"], '미지정 과목');
      const title = pickText(s.activity_title, s.title, s["활동명"], s["제목"]);
      const rawText = pickText(s.raw_text, s.original_text, s.text, s.content, s["원문"]);
      const source = pickText(s.source, s.updated_at, s.date);
      const teacher = pickText(s.teacher, s["담당교사"]);
      const keywords = pickText(s.keywords, s["키워드"]);

      const kvRows = [];
      const ignore = new Set(['id','grade','term','category','type','subject','activity_title','title','raw_text','original_text','text','content','source','updated_at','date']);
      for(const [k,v] of Object.entries(s)){
        if(ignore.has(k)) continue;
        const sv = pickText(v);
        if(!sv) continue;
        // evidence 같은 객체/배열은 문자열화
        if(typeof v === 'object' && v !== null){
          try { kvRows.push(`<div class="k">${esc(k)}</div><div class="v">${esc(JSON.stringify(v))}</div>`); }
          catch(_){}
          continue;
        }
        kvRows.push(`<div class="k">${esc(k)}</div><div class="v">${esc(sv)}</div>`);
      }

      const chips = [];
      if(category) chips.push(`<span class="chip">${esc(category)}</span>`);
      if(subject) chips.push(`<span class="chip">${esc(subject)}</span>`);
      if(teacher) chips.push(`<span class="chip">담당: ${esc(teacher)}</span>`);
      if(keywords) {
        String(keywords).split(',').map(x=>x.trim()).filter(Boolean).slice(0,6).forEach(k => {
          chips.push(`<span class="chip">#${esc(k)}</span>`);
        });
      }

      return `
        <div class="rawbox">
          <div class="rawhead">
            <div style="min-width:0">
              <div class="rawtitle">${esc(subject)}${title ? ' · ' + esc(title) : ''}</div>
              <div class="rawmeta">${category ? esc(category) + ' · ' : ''}${source ? esc(source) : ''}</div>
            </div>
          </div>
          ${chips.length ? `<div class="chips">${chips.join('')}</div>` : ''}
          ${rawText ? `<div class="rawtext">${esc(rawText)}</div>` : `<div class="muted" style="margin-top:10px">원문 텍스트 없음</div>`}
          ${kvRows.length ? `<details style="margin-top:10px"><summary>추가 필드 보기</summary><div class="kv">${kvRows.join('')}</div></details>` : ''}
        </div>
      `;
    }).join('');

    return `<div class="grid">${cards}</div>`;
  }

  function renderSemester(sem){
    const metaCount = (sem.metas||[]).length;
    const secCount = (sem.sections||[]).length;

    const summaryTableRows = [];
    const byCat = new Map();
    (sem.sections||[]).forEach(r => {
      const cat = pickText(r.category, r['영역'], r.type, '미분류');
      byCat.set(cat, (byCat.get(cat)||0)+1);
    });
    [...byCat.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([k,v]) => {
      summaryTableRows.push(`<tr><td>${esc(k)}</td><td>${v}</td></tr>`);
    });

    $('#content').innerHTML = `
      <div class="card">
        <div class="section-title">학기 원문 개요</div>
        <div class="row">
          <span class="badge">학기: ${esc(sem.key)}</span>
          <span class="badge">원문 메타 ${metaCount}건</span>
          <span class="badge">세부 원문 ${secCount}건</span>
        </div>
        ${summaryTableRows.length ? `
          <div class="tablebox" style="margin-top:12px">
            <table>
              <thead><tr><th>영역</th><th>건수</th></tr></thead>
              <tbody>${summaryTableRows.join('')}</tbody>
            </table>
          </div>` : `<div class="muted" style="margin-top:10px">세부 원문 카테고리 집계 없음</div>`}
      </div>

      <div class="card">
        <div class="section-title">학기 메타 원문</div>
        <div class="subtle">담임총평/행특/학기 전체 메모 등 학기 단위 원문 블록</div>
        <div style="margin-top:12px">${renderMetaBlocks(sem)}</div>
      </div>

      <div class="card">
        <div class="section-title">항목별 원문 전체</div>
        <div class="subtle">교과세특/창체/진로 등 항목별 원문을 입력된 값 그대로 표시</div>
        <div style="margin-top:12px">${renderSectionBlocks(sem)}</div>
      </div>
    `;
  }

  async function main(){
    // 1) 학생 매칭
    const students = await loadJson('./students.json');
    if(!Array.isArray(students)) throw new Error('students.json is not an array');

    let student = null;
    if(isAdmin && idParam){
      student = students.find(s => norm(pickId(s)) === norm(idParam));
    }
    if(!student && tParam){
      student = students.find(s => norm(pickToken(s)) === norm(tParam));
    }

    if(!student){
      $('#hdr').textContent = '접근 권한이 없습니다.';
      $('#meta').innerHTML = `
        <div class="warn">학생을 찾을 수 없습니다.</div>
        <div class="muted">관리자: record_raw_detail.html?id=학생ID&admin=관리자토큰 / 학생: record_raw_detail.html?t=개별토큰</div>
      `;
      return;
    }

    const sid = norm(pickId(student));
    const stok = norm(pickToken(student));
    const name = pickName(student);

    $('#hdr').textContent = `생활기록부 원문 전체 · ${name}${sid ? ` (${sid})` : ''}`;
    const metaLines = [];
    const school = pickText(student.school, student['학교']);
    const career = pickText(student.career, student['진로']);
    const adm = pickText(student.admission, student['전형']);
    if(school) metaLines.push(`학교: ${esc(school)}`);
    if(career) metaLines.push(`진로: ${esc(career)}`);
    if(adm) metaLines.push(`전형: ${esc(adm)}`);
    $('#meta').innerHTML = metaLines.length ? metaLines.join('<br>') : `<span class="muted">학생 메타 정보 없음</span>`;

    $('#modeRow').innerHTML = isAdmin
      ? `<span class="pill">관리자 모드</span><span class="muted">id 접근</span>`
      : `<span class="pill">학부모/학생 모드</span><span class="muted">토큰 접근</span>`;

    // 2) 네비
    const studentHref = isAdmin
      ? `./student.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(adminParam)}`
      : `./student.html?t=${encodeURIComponent(stok)}`;
    const univHref = isAdmin
      ? `./univ_list.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(adminParam)}`
      : `./univ_list.html?t=${encodeURIComponent(stok)}`;
    const progHref = isAdmin
      ? `./progress_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(adminParam)}`
      : `./progress_detail.html?t=${encodeURIComponent(stok)}`;
    const recordAnalyzedHref = isAdmin
      ? `./record_detail.html?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(adminParam)}`
      : `./record_detail.html?t=${encodeURIComponent(stok)}`;

    const nav = [
      `<a class="btn" href="${studentHref}">학생 성적</a>`,
      `<a class="btn" href="${univHref}">대학 상향/적정</a>`,
      `<a class="btn" href="${progHref}">진도 보기</a>`,
      `<a class="btn" href="${recordAnalyzedHref}">생기부 분석 보기</a>`
    ];
    if(isAdmin){
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(adminParam)}">학생 목록</a>`);
    }
    $('#navRow').innerHTML = nav.join('');

    // 3) 원문 데이터 로딩
    const raw = await loadJson('./school_record_raw.json');
    const parsed = parseRawBundle(raw);

    const bySem = buildSemesterMap(parsed.metas, parsed.sections, sid);
    const semKeys = sortSemKeys([...bySem.keys()]);

    if(!semKeys.length){
      $('#content').innerHTML = `
        <div class="card">
          <div class="warn">원문 데이터 없음</div>
          <div class="muted">school_record_raw.json에서 id=${esc(sid)} 데이터를 찾지 못했습니다.</div>
          <div class="muted" style="margin-top:8px">파일 구조: { meta:[...], sections:[...] } 권장</div>
        </div>
      `;
      return;
    }

    const semWrap = $('#semWrap');
    const semSel = $('#semSel');
    if(semKeys.length >= 2){
      semWrap.style.display = 'inline-flex';
      semSel.innerHTML = semKeys.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join('');
      semSel.value = semKeys[0];
      semSel.addEventListener('change', ()=> renderSemester(bySem.get(semSel.value)));
      renderSemester(bySem.get(semSel.value));
    }else{
      semWrap.style.display = 'none';
      renderSemester(bySem.get(semKeys[0]));
    }
  }

  main().catch(err => {
    $('#hdr').textContent = '오류';
    $('#meta').innerHTML = `<div class="warn">로딩 오류</div><div class="muted">${esc(err.message)}</div>`;
    $('#content').innerHTML = `
      <div class="card">
        <div class="muted">확인 포인트</div>
        <ul>
          <li><code>record_raw_detail.html</code>와 <code>school_record_raw.json</code>가 같은 폴더(루트)인지</li>
          <li><code>students.json</code> / <code>school_record_raw.json</code> 404 여부</li>
          <li>접속 URL이 <code>?id=...&admin=...</code> 또는 <code>?t=...</code> 형태인지</li>
        </ul>
      </div>
    `;
  });
})();
</script>
</body>
</html>
