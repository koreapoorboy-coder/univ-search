<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 원문 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .subttl{font-size:16px;font-weight:900;margin:0}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .section-title{
      font-size:15px;font-weight:900;margin:0 0 10px;display:flex;align-items:center;gap:8px
    }
    .section-title .dot{
      width:8px;height:8px;border-radius:999px;background:#111;display:inline-block
    }

    .kv-grid{
      display:grid;
      grid-template-columns: 180px 1fr;
      gap:8px 12px;
      align-items:start;
    }
    @media(max-width: 760px){
      .kv-grid{grid-template-columns:1fr}
    }

    .kv-k{
      font-weight:900;
      color:#222;
      padding-top:2px;
    }
    .kv-v{
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      color:#111;
    }

    .raw-block{
      border:1px solid #eee;border-radius:14px;padding:14px;background:#fff;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.65;
      font-size:14px;
    }

    .item-list{display:grid;gap:10px}
    .item-card{
      border:1px solid #eee;border-radius:14px;padding:12px;background:#fff;
    }
    .item-head{
      display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center;
      margin-bottom:8px;
    }
    .item-title{
      font-weight:900;font-size:14px;line-height:1.4;
    }
    .item-badge{
      border:1px solid #ddd;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;
    }

    details.section{
      border:1px solid #eee;border-radius:14px;padding:10px 12px;background:#fff;
    }
    details.section > summary{
      cursor:pointer;font-weight:900;list-style:none;
      display:flex;justify-content:space-between;gap:10px;align-items:center;
    }
    details.section > summary::-webkit-details-marker{display:none}
    .summary-right{font-size:12px;opacity:.7;font-weight:900}
    .details-body{margin-top:10px}

    .empty{
      border:1px dashed #ddd;border-radius:14px;padding:14px;background:#fff;color:#555
    }

    .hidden-note{
      font-size:12px;color:#666;margin-top:8px;
    }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">생기부 원문 보기</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>
    <div class="row" id="navRow"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">원문 메타 정보</div>
      </div>
      <div class="rightgroup">
        <span class="muted">학생/학부모 모드에서는 비공개 항목이 숨김 처리될 수 있습니다.</span>
      </div>
    </div>
    <div id="metaArea" style="margin-top:12px;"></div>
  </div>

  <div class="card">
    <div class="section-title"><span class="dot"></span>전체 원문</div>
    <div id="fullRawArea"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">항목별 원문</div>
        <span class="pill" id="itemCountPill">항목 0개</span>
      </div>
      <div class="rightgroup">
        <span class="muted">원문/메타/항목별 기록 확인용</span>
      </div>
    </div>
    <div id="itemArea" style="margin-top:12px;"></div>
  </div>
</div>

<script>
(() => {
  // =========================
  // 설정값
  // =========================
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN"; // ✅ 실제 관리자 토큰으로 변경
  const LS_KEY = "__ADMIN_TOKEN__";

  // =========================
  // DOM / 공통 유틸
  // =========================
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
  const norm = (v)=>String(v ?? "").trim();

  function getQS() {
    return new URLSearchParams(location.search);
  }
  function safeStr(v) {
    return (v == null) ? "" : String(v);
  }

  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["ID"] ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if (s) return s;
    }
    return "";
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if (!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  async function loadJsonSafe(path, fallback){
    try{
      return await loadJson(path);
    }catch(_e){
      return fallback;
    }
  }

  // =========================
  // 보안: auth 컨텍스트 (t 우선)
  // =========================
  function getAuthContext() {
    const qs = getQS();

    const t = safeStr(qs.get("t") || qs.get("token")).trim();
    const id = safeStr(qs.get("id")).trim();
    const adminParam = safeStr(qs.get("admin")).trim();
    const adminSaved = safeStr(localStorage.getItem(LS_KEY)).trim();
    const admin = adminParam || adminSaved;

    // 🔒 t가 있으면 학생모드 우선
    if (t) {
      return {
        mode: "student",
        token: t,
        id: "",
        admin: "",
        isAdmin: false
      };
    }

    // 관리자 후보
    if (id && admin) {
      const ok = (admin === ADMIN_TOKEN);
      if (adminParam && ok) localStorage.setItem(LS_KEY, adminParam);

      return {
        mode: "admin",
        token: "",
        id,
        admin,
        isAdmin: ok
      };
    }

    return {
      mode: "guest",
      token: "",
      id: "",
      admin: "",
      isAdmin: false
    };
  }

  function buildPageLink(page, auth, student) {
    if (auth?.mode === "student") {
      return `${page}?t=${encodeURIComponent(auth.token)}`;
    }
    if (auth?.mode === "admin" && auth.isAdmin) {
      const sid = norm(pickId(student) || auth.id);
      return `${page}?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(auth.admin)}`;
    }
    return page;
  }

  function resolveStudentByAuth(students, auth) {
    if (!Array.isArray(students)) return null;

    if (auth.mode === "student") {
      // 🔒 학생모드는 token으로만 찾기
      return students.find(s => norm(pickToken(s)) === auth.token) || null;
    }

    if (auth.mode === "admin" && auth.isAdmin) {
      return students.find(s => norm(pickId(s)) === auth.id) || null;
    }

    return null;
  }

  // =========================
  // flags / 접근 정책
  // =========================
  function getRecordFlag(flags, studentId) {
    if (!flags) return {};
    if (Array.isArray(flags)) {
      return flags.find(x => String(x?.id) === String(studentId)) || {};
    }
    return flags[studentId] || {};
  }

  function canViewRawRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;

    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  // =========================
  // school_record_raw.json 파싱 (유연 대응)
  // =========================
  function getRawRecord(rawData, studentId) {
    if (!rawData) return null;

    // 배열형 [{id, ...}]
    if (Array.isArray(rawData)) {
      return rawData.find(x => String(x?.id) === String(studentId)) || null;
    }

    // 객체형 {"shstudy01": {...}}
    if (rawData[studentId]) return rawData[studentId];

    // 래퍼형
    if (Array.isArray(rawData.items)) {
      return rawData.items.find(x => String(x?.id) === String(studentId)) || null;
    }
    if (Array.isArray(rawData.data)) {
      return rawData.data.find(x => String(x?.id) === String(studentId)) || null;
    }

    return null;
  }

  function unwrapRawPayload(record) {
    if (!record) return null;
    return (
      record.raw ||
      record.record ||
      record.payload ||
      record.data ||
      record.detail ||
      record
    );
  }

  function isObject(v){
    return !!v && typeof v === "object" && !Array.isArray(v);
  }

  function toPrettyString(v){
    if (v == null) return "";
    if (typeof v === "string") return v;
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    try{
      return JSON.stringify(v, null, 2);
    }catch(_e){
      return String(v);
    }
  }

  // ✅ labelizeKey 오류 방지용 핵심 함수
  function labelizeKey(key) {
    const s = String(key ?? "").trim();
    if (!s) return "항목";

    // snake_case, camelCase, kebab-case -> 보기 좋게
    let t = s
      .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
      .replace(/[_-]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    // 흔한 키 한글화(필요한 것만)
    const lower = t.toLowerCase();
    const map = {
      "id": "ID",
      "student id": "학생 ID",
      "studentid": "학생 ID",
      "student name": "학생명",
      "studentname": "학생명",
      "school": "학교",
      "grade": "학년",
      "semester": "학기",
      "year": "연도",
      "source": "출처",
      "note": "메모",
      "memo": "메모",
      "raw text": "전체 원문",
      "rawtext": "전체 원문",
      "full text": "전체 원문",
      "fulltext": "전체 원문",
      "text": "원문",
      "content": "내용",
      "visibility": "공개 범위",
      "record enabled": "기록 사용 여부",
      "review status": "검토 상태",
      "created at": "생성일시",
      "updated at": "수정일시"
    };
    if (map[lower]) return map[lower];

    return t;
  }

  // =========================
  // 필드 visibility 필터 (학생모드에서 admin_only 숨김)
  // =========================
  function isAdminOnlyValue(v) {
    if (!isObject(v)) return false;

    const vis = String(
      v.visibility ?? v.view ?? v.access ?? ""
    ).toLowerCase();

    if (vis === "admin_only") return true;
    if (v.adminOnly === true) return true;
    if (v.isAdminOnly === true) return true;

    return false;
  }

  function filterObjectByVisibility(obj, auth) {
    if (!isObject(obj)) return obj;
    if (auth.isAdmin) return obj;

    const out = {};
    for (const [k, v] of Object.entries(obj)) {
      if (isAdminOnlyValue(v)) continue;
      out[k] = v;
    }
    return out;
  }

  function filterArrayItemsByVisibility(arr, auth) {
    if (!Array.isArray(arr)) return [];
    if (auth.isAdmin) return arr;

    return arr.filter(item => !isAdminOnlyValue(item));
  }

  // =========================
  // raw payload 정규화
  // =========================
  function normalizeRawPayload(payload, auth) {
    const p = payload || {};

    // 전체 원문 후보
    let fullText = pickText(
      p.fullRawText, p.rawText, p.full_text, p.text, p.content,
      p.전체원문, p.원문전체, p.원문, p.raw
    );

    // 메타 후보
    let metaObj = null;
    if (isObject(p.meta)) metaObj = p.meta;
    else if (isObject(p.metadata)) metaObj = p.metadata;
    else if (isObject(p.기본정보)) metaObj = p.기본정보;
    else if (isObject(p.rawMeta)) metaObj = p.rawMeta;

    metaObj = filterObjectByVisibility(metaObj || {}, auth);

    // 항목 배열 후보
    let items = null;
    const arrCandidates = [
      p.items, p.records, p.entries, p.sections, p.rawItems, p.항목들, p.세부항목, p.기록목록
    ];
    for (const a of arrCandidates) {
      if (Array.isArray(a)) { items = a; break; }
    }
    items = filterArrayItemsByVisibility(items || [], auth);

    // 항목 배열이 없으면 payload 내부 객체들을 항목화
    if (!items.length) {
      const blacklist = new Set([
        "id","studentId","studentID","학생ID","name","studentName",
        "fullRawText","rawText","full_text","text","content","원문","전체원문","원문전체",
        "meta","metadata","기본정보","rawMeta",
        "items","records","entries","sections","rawItems","항목들","세부항목","기록목록",
        "visibility","adminOnly","isAdminOnly"
      ]);

      const entries = Object.entries(filterObjectByVisibility(p, auth)).filter(([k,v]) => {
        if (blacklist.has(k)) return false;
        return v != null;
      });

      items = entries.map(([k,v]) => {
        if (isObject(v)) {
          const vv = { ...v };
          const title = pickText(vv.title, vv.name, vv.label, vv.항목명, vv.제목, k) || k;
          const content = pickText(vv.text, vv.content, vv.raw, vv.원문, vv.value, "");
          const meta = isObject(vv.meta) ? filterObjectByVisibility(vv.meta, auth) : null;

          return {
            title,
            content: content || toPrettyString(vv),
            meta
          };
        }

        return {
          title: k,
          content: toPrettyString(v)
        };
      });
    } else {
      // 배열형 항목 정규화
      items = items.map((it, idx) => {
        const x = isObject(it) ? it : { value: it };

        const title = pickText(
          x.title, x.name, x.label, x.key, x.subject, x.항목명, x.제목,
          `항목 ${idx + 1}`
        );

        const content = pickText(
          x.text, x.content, x.raw, x.value, x.원문, x.내용
        ) || toPrettyString(x);

        const meta = filterObjectByVisibility(
          isObject(x.meta) ? x.meta : (isObject(x.metadata) ? x.metadata : {}),
          auth
        );

        return { title, content, meta };
      });
    }

    // fullText가 비어 있으면 items를 합쳐서 임시 생성
    if (!fullText && items.length) {
      fullText = items.map(it => {
        const t = String(it.title || "항목").trim();
        const c = String(it.content || "").trim();
        return `[${t}]\n${c}`;
      }).join("\n\n");
    }

    // metaObj가 비어 있으면 payload 상위 primitive들로 구성
    if (!Object.keys(metaObj || {}).length) {
      const fallbackMeta = {};
      const sourceObj = filterObjectByVisibility(p, auth);

      for (const [k,v] of Object.entries(sourceObj)) {
        if (v == null) continue;
        if (Array.isArray(v) || isObject(v)) continue;

        // 원문으로 쓰인 텍스트는 메타에서 제외
        if (["fullRawText","rawText","full_text","text","content","원문","전체원문","원문전체"].includes(k)) continue;

        fallbackMeta[k] = v;
      }

      metaObj = fallbackMeta;
    }

    return { fullText, metaObj, items };
  }

  // =========================
  // 렌더링
  // =========================
  function renderError(title, message){
    const app = $("#app") || document.body;
    app.innerHTML = `
      <div class="card">
        <div class="title">${esc(title || "오류")}</div>
        <div class="warn">${esc(message || "문제가 발생했습니다.")}</div>
      </div>
    `;
  }

  function renderNoAccess(message){
    const app = $("#app") || document.body;
    app.innerHTML = `
      <div class="card">
        <div class="title">접근 권한이 없습니다.</div>
        <div class="warn">${esc(message || "생기부 원문 페이지 접근 권한이 없습니다.")}</div>
        <div class="muted" style="margin-top:8px">
          관리자: record_raw_detail.html?id=학생ID&admin=관리자토큰 / 학생·학부모: record_raw_detail.html?t=개별토큰
        </div>
      </div>
    `;
  }

  function renderStudentMeta(student, auth){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student?.school, student?.["학교"]);
    const career = pickText(student?.career, student?.["진로"]);
    const adm = pickText(student?.admission, student?.["전형"]);

    $("#hdr").innerHTML = `${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = auth.isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student, auth){
    const nav = [];

    if (auth.isAdmin) {
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(auth.admin)}">학생 목록</a>`);
    }

    nav.push(`<a class="btn" href="${buildPageLink("./student.html", auth, student)}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./univ_list.html", auth, student)}">대학 상향/적정</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./progress_detail.html", auth, student)}">진도 보기</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./record_detail.html", auth, student)}">생기부 분석 보기</a>`);

    $("#navRow").innerHTML = nav.join("");
  }

  function renderMetaArea(metaObj, hiddenCount) {
    const root = $("#metaArea");
    if (!root) return;

    const entries = Object.entries(metaObj || {}).filter(([_,v]) => {
      return v != null && String(v).trim() !== "";
    });

    if (!entries.length) {
      root.innerHTML = `<div class="empty">메타 정보가 없습니다.</div>`;
      return;
    }

    root.innerHTML = `
      <div class="kv-grid">
        ${entries.map(([k,v]) => `
          <div class="kv-k">${esc(labelizeKey(k))}</div>
          <div class="kv-v">${esc(toPrettyString(v))}</div>
        `).join("")}
      </div>
      ${hiddenCount > 0 ? `<div class="hidden-note">※ 학생/학부모 모드에서 비공개 메타 ${hiddenCount}개 항목이 숨김 처리되었습니다.</div>` : ``}
    `;
  }

  function renderFullRawArea(fullText) {
    const root = $("#fullRawArea");
    if (!root) return;

    const txt = String(fullText || "").trim();
    if (!txt) {
      root.innerHTML = `<div class="empty">전체 원문 데이터가 없습니다.</div>`;
      return;
    }

    root.innerHTML = `<div class="raw-block">${esc(txt)}</div>`;
  }

  function renderItemArea(items, hiddenItemCount) {
    const root = $("#itemArea");
    const pill = $("#itemCountPill");
    if (!root) return;

    const list = Array.isArray(items) ? items : [];
    if (pill) pill.textContent = `항목 ${list.length}개`;

    if (!list.length) {
      root.innerHTML = `<div class="empty">항목별 원문 데이터가 없습니다.</div>`;
      return;
    }

    root.innerHTML = `
      <div class="item-list">
        ${list.map((item, idx) => {
          const metaEntries = Object.entries(item.meta || {}).filter(([_,v]) => v != null && String(v).trim() !== "");
          const contentText = String(item.content || "").trim();

          return `
            <details class="section" ${idx < 2 ? "open" : ""}>
              <summary>
                <span>${esc(item.title || `항목 ${idx+1}`)}</span>
                <span class="summary-right">${metaEntries.length ? `메타 ${metaEntries.length}개` : `원문`}</span>
              </summary>
              <div class="details-body">
                <div class="item-card">
                  <div class="item-head">
                    <div class="item-title">${esc(item.title || `항목 ${idx+1}`)}</div>
                    <div class="item-badge">원문</div>
                  </div>
                  <div class="kv-v">${contentText ? esc(contentText) : `<span class="muted">내용 없음</span>`}</div>
                </div>

                ${
                  metaEntries.length ? `
                    <div class="item-card" style="margin-top:8px;">
                      <div class="item-head">
                        <div class="item-title">메타 정보</div>
                        <div class="item-badge">부가 정보</div>
                      </div>
                      <div class="kv-grid">
                        ${metaEntries.map(([k,v]) => `
                          <div class="kv-k">${esc(labelizeKey(k))}</div>
                          <div class="kv-v">${esc(toPrettyString(v))}</div>
                        `).join("")}
                      </div>
                    </div>
                  ` : ""
                }
              </div>
            </details>
          `;
        }).join("")}
      </div>
      ${hiddenItemCount > 0 ? `<div class="hidden-note">※ 학생/학부모 모드에서 비공개 항목 ${hiddenItemCount}개가 숨김 처리되었습니다.</div>` : ``}
    `;
  }

  // =========================
  // 메인
  // =========================
  async function main() {
    const auth = getAuthContext();

    if (auth.mode === "admin" && !auth.isAdmin) {
      return renderNoAccess("관리자 토큰이 올바르지 않습니다.");
    }

    const students = await loadJson("./students.json");
    if (!Array.isArray(students)) throw new Error("students.json is not an array");

    const student = resolveStudentByAuth(students, auth);
    if (!student) {
      return renderNoAccess("학생을 찾을 수 없습니다.");
    }

    const sid = norm(pickId(student));

    // flags 체크
    const flagsData = await loadJsonSafe("./school_record_flags.json", null);
    const recordFlag = getRecordFlag(flagsData, sid);

    if (!canViewRawRecord(recordFlag, auth)) {
      return renderNoAccess("생기부 원문 페이지 접근 권한이 없습니다.");
    }

    renderStudentMeta(student, auth);
    renderNav(student, auth);

    // raw 데이터 로드
    const rawData = await loadJsonSafe("./school_record_raw.json", null);
    if (!rawData) {
      renderMetaArea({}, 0);
      renderFullRawArea("");
      renderItemArea([], 0);
      return;
    }

    const rec = getRawRecord(rawData, sid);
    if (!rec) {
      renderMetaArea({}, 0);
      renderFullRawArea("");
      renderItemArea([], 0);
      return;
    }

    const payload = unwrapRawPayload(rec);

    // 숨김 카운트(학생모드 안내용)
    let hiddenMetaCount = 0;
    let hiddenItemCount = 0;

    if (!auth.isAdmin && payload && typeof payload === "object") {
      // 메타 후보 숨김 수 추정
      const metaCandidate = (payload.meta && typeof payload.meta === "object" && !Array.isArray(payload.meta)) ? payload.meta
                        : (payload.metadata && typeof payload.metadata === "object" && !Array.isArray(payload.metadata)) ? payload.metadata
                        : (payload.기본정보 && typeof payload.기본정보 === "object" && !Array.isArray(payload.기본정보)) ? payload.기본정보
                        : null;

      if (metaCandidate) {
        hiddenMetaCount = Object.values(metaCandidate).filter(v => isAdminOnlyValue(v)).length;
      }

      // 항목 배열 숨김 수 추정
      const arrCandidate = [payload.items, payload.records, payload.entries, payload.sections, payload.rawItems, payload.항목들, payload.세부항목, payload.기록목록]
        .find(v => Array.isArray(v));

      if (Array.isArray(arrCandidate)) {
        hiddenItemCount = arrCandidate.filter(it => isAdminOnlyValue(it)).length;
      }
    }

    const normalized = normalizeRawPayload(payload, auth);

    renderMetaArea(normalized.metaObj, hiddenMetaCount);
    renderFullRawArea(normalized.fullText);
    renderItemArea(normalized.items, hiddenItemCount);
  }

  main().catch(err => {
    renderError("오류", `로딩 오류: ${err.message}`);
  });
})();
</script>
</body>
</html>
