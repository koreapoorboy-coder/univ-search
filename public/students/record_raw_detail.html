<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 원문 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .subttl{font-size:16px;font-weight:900;margin:0}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .btn.secondary{border-color:#ddd}
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .section-title{
      font-size:15px;font-weight:900;margin:0 0 10px;display:flex;align-items:center;gap:8px
    }
    .section-title .dot{
      width:8px;height:8px;border-radius:999px;background:#111;display:inline-block
    }

    .summary-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
      margin-top:10px;
    }
    @media(max-width: 820px){ .summary-grid{grid-template-columns: 1fr;} }

    .summary-item{
      border:1px solid #eee;border-radius:14px;padding:12px;background:#fff;
    }
    .summary-item .k{font-size:12px;font-weight:900;opacity:.7}
    .summary-item .v{font-size:14px;font-weight:900;margin-top:4px;word-break:break-word}

    .json-wrap{
      border:1px solid #eee;border-radius:16px;background:#fff;
      padding:12px;
    }

    .node{
      border-left:2px solid #f0f0f0;
      margin-left:8px;
      padding-left:10px;
      margin-top:8px;
    }

    .entry{
      border:1px solid #eee;border-radius:12px;padding:10px;margin-top:8px;background:#fff;
    }

    .entry-head{
      display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      margin-bottom:6px;
    }

    .entry-key{
      font-weight:900;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .entry-meta{
      display:flex;gap:6px;flex-wrap:wrap;align-items:center;
    }

    .mini-badge{
      display:inline-flex;align-items:center;
      border:1px solid #ddd;border-radius:999px;padding:3px 8px;
      font-size:11px;font-weight:900;background:#fff;
    }
    .mini-badge.hidden{
      border-color:#f3c6cc;color:#b00020;background:#fff5f6;
    }

    .value-box{
      border:1px solid #f1f1f1;border-radius:10px;
      background:#fafafa;
      padding:10px;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.55;
      font-size:14px;
    }

    .list{
      display:grid;
      gap:8px;
    }

    .collapsed-note{
      font-size:12px;color:#666;margin-top:4px;
    }

    details.block{
      border:1px solid #eee;border-radius:14px;padding:10px 12px;background:#fff;margin-top:10px;
    }
    details.block > summary{
      cursor:pointer;font-weight:900;list-style:none;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    details.block > summary::-webkit-details-marker{display:none}

    .empty{
      border:1px dashed #ddd;border-radius:14px;padding:14px;background:#fff;color:#555;
    }

    .hidden-placeholder{
      border:1px dashed #f0c9ce;border-radius:10px;padding:10px;
      background:#fff7f8;color:#9a3c46;
      font-size:13px;font-weight:900;
    }

    pre.code{
      margin:0;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:12px; line-height:1.5;
      background:#fafafa;border:1px solid #eee;border-radius:12px;padding:12px;
    }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">생기부 원문 보기</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>
    <div class="row" id="navRow"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">원문 데이터 요약</div>
      </div>
      <div class="rightgroup">
        <span class="muted">학생모드에서는 숨김 정책 반영</span>
      </div>
    </div>

    <div class="summary-grid" id="summaryGrid">
      <div class="summary-item"><div class="k">원문 상태</div><div class="v" id="sumStatus">-</div></div>
      <div class="summary-item"><div class="k">업데이트 일시</div><div class="v" id="sumUpdatedAt">-</div></div>
      <div class="summary-item"><div class="k">표시 정책</div><div class="v" id="sumVisibility">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title"><span class="dot"></span>생기부 원문 전체</div>
    <div id="rawRoot"></div>
  </div>

  <div class="card">
    <details class="block" id="debugWrap">
      <summary>
        <span>디버그(JSON 원문 확인)</span>
        <span class="muted" style="font-size:12px;">필요할 때만 열기</span>
      </summary>
      <div style="margin-top:10px;">
        <pre class="code" id="debugJson">-</pre>
      </div>
    </details>
  </div>
</div>

<script>
(() => {
  // =========================
  // 설정값
  // =========================
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN"; // ✅ 실제 관리자 토큰으로 변경

  // =========================
  // 공통 유틸 / 보안 분기
  // =========================
  function getQS() {
    return new URLSearchParams(location.search);
  }

  function safeStr(v) {
    return (v == null) ? "" : String(v);
  }

  function getAuthContext() {
    const qs = getQS();
    const t = safeStr(qs.get("t") || qs.get("token")).trim();
    const id = safeStr(qs.get("id")).trim();
    const admin = safeStr(qs.get("admin")).trim();

    // 🔒 t 우선 규칙
    if (t) {
      return { mode: "student", token: t, id: "", admin: "", isAdmin: false };
    }
    if (id && admin) {
      return { mode: "admin", token: "", id, admin, isAdmin: false };
    }
    return { mode: "guest", token: "", id: "", admin: "", isAdmin: false };
  }

  function buildPageLink(page, auth, student) {
    if (auth && auth.mode === "student") {
      return `${page}?t=${encodeURIComponent(auth.token)}`;
    }
    if (auth && auth.mode === "admin" && auth.isAdmin) {
      const sid = pickId(student) || auth.id;
      return `${page}?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(auth.admin)}`;
    }
    return page;
  }

  function resolveStudentByAuth(students, auth) {
    if (!Array.isArray(students)) return null;

    if (auth.mode === "student") {
      return students.find(s => safeStr(pickToken(s)).trim() === auth.token) || null;
    }
    if (auth.mode === "admin" && auth.isAdmin) {
      return students.find(s => safeStr(pickId(s)).trim() === auth.id) || null;
    }
    return null;
  }

  // =========================
  // DOM 유틸
  // =========================
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
  const norm = (v)=>String(v ?? "").trim();

  // =========================
  // 데이터 키 유틸
  // =========================
  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["ID"] ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  }

  function parseNum(v){
    if(v === null || v === undefined || v === "") return null;
    const n = Number(String(v).replace(/[^\d.-]/g,""));
    return Number.isFinite(n) ? n : null;
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  async function loadJsonSafe(path, fallback){
    try{
      return await loadJson(path);
    }catch(_e){
      return fallback;
    }
  }

  // =========================
  // labelizeKey (오류 재발 방지)
  // =========================
  function labelizeKey(key) {
    const s = String(key ?? "").trim();
    if (!s) return "-";
    // snake_case / camelCase / kebab-case 정리
    return s
      .replace(/[_-]+/g, " ")
      .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
      .replace(/\s+/g, " ")
      .trim();
  }

  // =========================
  // flags / 접근 정책
  // =========================
  function getRecordFlag(flags, studentId) {
    if (!flags) return {};
    if (Array.isArray(flags)) {
      return flags.find(x => String(x?.id) === String(studentId)) || {};
    }
    return flags[studentId] || {};
  }

  function canViewRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;

    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  function canViewRawRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;

    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  // =========================
  // school_record_raw 파싱 (유연 대응)
  // =========================
  function getRawRecord(rawData, studentId) {
    if (!rawData) return null;

    // 배열형 [{id, ...}]
    if (Array.isArray(rawData)) {
      return rawData.find(x => String(x?.id) === String(studentId)) || null;
    }

    // 객체형 {"학생ID": {...}}
    if (rawData[studentId]) return rawData[studentId];

    // 래퍼형
    if (Array.isArray(rawData.items)) {
      return rawData.items.find(x => String(x?.id) === String(studentId)) || null;
    }
    if (Array.isArray(rawData.data)) {
      return rawData.data.find(x => String(x?.id) === String(studentId)) || null;
    }

    return null;
  }

  function unwrapRawPayload(record) {
    if (!record) return null;
    return (
      record.raw ||
      record.record ||
      record.payload ||
      record.data ||
      record.content ||
      record
    );
  }

  // =========================
  // field visibility (학생모드에서 필드 단위 숨김)
  // =========================
  function isHiddenForStudentByMeta(obj) {
    if (!obj || typeof obj !== "object") return false;

    // 다양한 표현 허용
    if (obj.adminOnly === true) return true;
    if (obj.studentVisible === false) return true;
    if (obj.visible === false) return true;

    const vis = String(obj.visibility ?? "").toLowerCase().trim();
    if (vis === "admin_only" || vis === "hidden" || vis === "private") return true;

    return false;
  }

  function isPrimitive(v) {
    return v == null || ["string","number","boolean"].includes(typeof v);
  }

  function looksLikeFieldWrapper(obj) {
    if (!obj || typeof obj !== "object" || Array.isArray(obj)) return false;
    // { value, visibility } 류 wrapper 감지
    if ("value" in obj && (
      "visibility" in obj || "studentVisible" in obj || "adminOnly" in obj || "visible" in obj || "type" in obj || "label" in obj
    )) return true;
    return false;
  }

  function formatPrimitive(v) {
    if (v === null) return "null";
    if (v === undefined) return "undefined";
    if (typeof v === "boolean") return v ? "true" : "false";
    return String(v);
  }

  function prettyJson(v) {
    try { return JSON.stringify(v, null, 2); }
    catch(_e){ return String(v); }
  }

  // =========================
  // 렌더링 유틸
  // =========================
  function renderError(title, message){
    const app = $("#app") || document.body;
    app.innerHTML = `
      <div class="card">
        <div class="title">${esc(title || "오류")}</div>
        <div class="warn">${esc(message || "문제가 발생했습니다.")}</div>
      </div>
    `;
  }

  function renderNoAccess(message){
    const app = $("#app") || document.body;
    app.innerHTML = `
      <div class="card">
        <div class="title">접근 권한이 없습니다.</div>
        <div class="warn">${esc(message || "생기부 원문 페이지 접근 권한이 없습니다.")}</div>
        <div class="muted" style="margin-top:8px">
          관리자: record_raw_detail.html?id=학생ID&admin=관리자토큰 / 학생·학부모: record_raw_detail.html?t=개별토큰
        </div>
      </div>
    `;
  }

  function renderStudentMeta(student, auth){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student.school, student["학교"]);
    const career = pickText(student.career, student["진로"]);
    const adm = pickText(student.admission, student["전형"]);

    $("#hdr").innerHTML = `${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = auth.isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student, auth, recordFlag){
    const nav = [];

    if (auth.isAdmin) {
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(auth.admin)}">학생 목록</a>`);
    }

    nav.push(`<a class="btn" href="${buildPageLink("./student.html", auth, student)}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./univ_list.html", auth, student)}">대학 상향/적정</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./progress_detail.html", auth, student)}">진도 보기</a>`);

    if (canViewRecord(recordFlag, auth)) {
      nav.push(`<a class="btn" href="${buildPageLink("./record_detail.html", auth, student)}">생기부 분석 보기</a>`);
    }

    $("#navRow").innerHTML = nav.join("");
  }

  function setSummary(rawRecord, payload, flag, auth){
    const status = pickText(
      rawRecord?.status, rawRecord?.recordStatus, rawRecord?.["상태"],
      payload?.status, payload?.["상태"]
    ) || "정상";

    const updated = pickText(
      rawRecord?.updatedAt, rawRecord?.updated_at, rawRecord?.["수정일시"], rawRecord?.["업데이트일시"],
      payload?.updatedAt, payload?.updated_at
    ) || "-";

    let visibilityText = "학생 표시";
    if (flag && Object.keys(flag).length) {
      const vis = String(flag.visibility || "student");
      visibilityText = vis;
      if (flag.recordEnabled === false) visibilityText = "비활성";
    }
    if (auth.isAdmin) visibilityText += " (관리자 전체 표시)";

    $("#sumStatus").textContent = status;
    $("#sumUpdatedAt").textContent = updated;
    $("#sumVisibility").textContent = visibilityText;
  }

  function countVisibleHidden(obj, auth) {
    let visible = 0;
    let hidden = 0;

    function walk(node) {
      if (isPrimitive(node)) return;

      if (Array.isArray(node)) {
        for (const v of node) walk(v);
        return;
      }

      if (looksLikeFieldWrapper(node)) {
        const hiddenForStudent = isHiddenForStudentByMeta(node);
        if (auth.isAdmin || !hiddenForStudent) visible++;
        else hidden++;
        walk(node.value);
        return;
      }

      for (const [k, v] of Object.entries(node)) {
        if (!auth.isAdmin && v && typeof v === "object" && isHiddenForStudentByMeta(v) && looksLikeFieldWrapper(v)) {
          hidden++;
          continue;
        }
        walk(v);
      }
    }

    walk(obj);
    return { visible, hidden };
  }

  // =========================
  // 재귀 렌더 (원문 전체)
  // =========================
  function renderNode(node, keyPath, auth, depth = 0) {
    // primitive
    if (isPrimitive(node)) {
      return `
        <div class="entry">
          <div class="entry-head">
            <div class="entry-key">${esc(labelizeKey(lastKey(keyPath)))}</div>
            <div class="entry-meta"><span class="mini-badge">${esc(typeName(node))}</span></div>
          </div>
          <div class="value-box">${esc(formatPrimitive(node))}</div>
        </div>
      `;
    }

    // array
    if (Array.isArray(node)) {
      if (!node.length) {
        return `
          <div class="entry">
            <div class="entry-head">
              <div class="entry-key">${esc(labelizeKey(lastKey(keyPath)))}</div>
              <div class="entry-meta"><span class="mini-badge">array(0)</span></div>
            </div>
            <div class="value-box">[]</div>
          </div>
        `;
      }

      const items = node.map((item, idx) => {
        if (isPrimitive(item)) {
          return `
            <div class="entry">
              <div class="entry-head">
                <div class="entry-key">[${idx}]</div>
                <div class="entry-meta"><span class="mini-badge">${esc(typeName(item))}</span></div>
              </div>
              <div class="value-box">${esc(formatPrimitive(item))}</div>
            </div>
          `;
        }
        return `
          <details class="block" ${depth < 1 ? "open" : ""}>
            <summary><span>[${idx}]</span><span class="muted" style="font-size:12px;">펼치기</span></summary>
            <div class="node">
              ${renderObjectLike(item, keyPath.concat(String(idx)), auth, depth + 1)}
            </div>
          </details>
        `;
      }).join("");

      return `
        <div class="entry">
          <div class="entry-head">
            <div class="entry-key">${esc(labelizeKey(lastKey(keyPath)))}</div>
            <div class="entry-meta"><span class="mini-badge">array(${node.length})</span></div>
          </div>
          <div class="list">${items}</div>
        </div>
      `;
    }

    // field wrapper
    if (looksLikeFieldWrapper(node)) {
      const label = pickText(node.label, node.name, node.key, lastKey(keyPath));
      const hiddenForStudent = isHiddenForStudentByMeta(node);

      if (!auth.isAdmin && hiddenForStudent) {
        return `
          <div class="entry">
            <div class="entry-head">
              <div class="entry-key">${esc(labelizeKey(label))}</div>
              <div class="entry-meta">
                <span class="mini-badge hidden">숨김</span>
                ${node.type ? `<span class="mini-badge">${esc(String(node.type))}</span>` : ""}
              </div>
            </div>
            <div class="hidden-placeholder">학생/학부모 모드에서는 숨김 처리된 항목입니다.</div>
          </div>
        `;
      }

      const val = node.value;
      const valueHtml = isPrimitive(val)
        ? `<div class="value-box">${esc(formatPrimitive(val))}</div>`
        : `<div class="node">${renderObjectLike(val, keyPath.concat("value"), auth, depth + 1)}</div>`;

      return `
        <div class="entry">
          <div class="entry-head">
            <div class="entry-key">${esc(labelizeKey(label))}</div>
            <div class="entry-meta">
              ${node.visibility != null ? `<span class="mini-badge">${esc(String(node.visibility))}</span>` : ""}
              ${node.type ? `<span class="mini-badge">${esc(String(node.type))}</span>` : `<span class="mini-badge">${esc(typeName(val))}</span>`}
            </div>
          </div>
          ${valueHtml}
        </div>
      `;
    }

    // object
    return `
      <details class="block" ${depth < 1 ? "open" : ""}>
        <summary>
          <span>${esc(labelizeKey(lastKey(keyPath)))}</span>
          <span class="muted" style="font-size:12px;">object</span>
        </summary>
        <div class="node">
          ${renderObjectLike(node, keyPath, auth, depth + 1)}
        </div>
      </details>
    `;
  }

  function renderObjectLike(obj, keyPath, auth, depth = 0) {
    if (obj == null) {
      return `<div class="value-box">null</div>`;
    }

    if (isPrimitive(obj) || Array.isArray(obj) || looksLikeFieldWrapper(obj)) {
      return renderNode(obj, keyPath, auth, depth);
    }

    const entries = Object.entries(obj);
    if (!entries.length) {
      return `<div class="value-box">{}</div>`;
    }

    // 메타/원문 순서 정리 (가독성 개선)
    const preferredFirst = ["summary","요약","학적","인적사항","교과학습발달상황","창의적체험활동상황","세부능력및특기사항","진로활동","독서활동상황"];
    entries.sort((a,b) => {
      const ai = preferredFirst.indexOf(a[0]);
      const bi = preferredFirst.indexOf(b[0]);
      if (ai !== -1 || bi !== -1) {
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      }
      return String(a[0]).localeCompare(String(b[0]), "ko");
    });

    return entries.map(([k, v]) => {
      // 학생모드에서 field-wrapper 형태 숨김 처리
      if (!auth.isAdmin && looksLikeFieldWrapper(v) && isHiddenForStudentByMeta(v)) {
        return `
          <div class="entry">
            <div class="entry-head">
              <div class="entry-key">${esc(labelizeKey(k))}</div>
              <div class="entry-meta"><span class="mini-badge hidden">숨김</span></div>
            </div>
            <div class="hidden-placeholder">학생/학부모 모드에서는 숨김 처리된 항목입니다.</div>
          </div>
        `;
      }

      // 일반 key-value
      if (isPrimitive(v)) {
        return `
          <div class="entry">
            <div class="entry-head">
              <div class="entry-key">${esc(labelizeKey(k))}</div>
              <div class="entry-meta"><span class="mini-badge">${esc(typeName(v))}</span></div>
            </div>
            <div class="value-box">${esc(formatPrimitive(v))}</div>
          </div>
        `;
      }

      if (Array.isArray(v)) {
        return renderNode(v, keyPath.concat(k), auth, depth);
      }

      if (looksLikeFieldWrapper(v)) {
        return renderNode({ ...v, key: v.key || k }, keyPath.concat(k), auth, depth);
      }

      // 일반 object
      return `
        <details class="block" ${depth < 1 ? "open" : ""}>
          <summary>
            <span>${esc(labelizeKey(k))}</span>
            <span class="muted" style="font-size:12px;">object</span>
          </summary>
          <div class="node">
            ${renderObjectLike(v, keyPath.concat(k), auth, depth + 1)}
          </div>
        </details>
      `;
    }).join("");
  }

  function lastKey(pathArr) {
    if (!Array.isArray(pathArr) || !pathArr.length) return "원문";
    return pathArr[pathArr.length - 1];
  }

  function typeName(v) {
    if (v === null) return "null";
    if (Array.isArray(v)) return "array";
    return typeof v;
  }

  // =========================
  // 메인
  // =========================
  async function main() {
    // 1) auth 확정
    const auth = getAuthContext();

    // 2) 관리자 토큰 검증
    if (auth.mode === "admin") {
      auth.isAdmin = (auth.admin === ADMIN_TOKEN);
      if (!auth.isAdmin) {
        return renderNoAccess("관리자 토큰이 올바르지 않습니다.");
      }
    }

    // 3) 학생 조회
    const students = await loadJson("./students.json");
    if (!Array.isArray(students)) throw new Error("students.json is not an array");

    const student = resolveStudentByAuth(students, auth);
    if (!student) {
      return renderNoAccess("학생을 찾을 수 없습니다.");
    }

    const sid = norm(pickId(student));

    // 4) flags 로드 / 권한 체크
    const flagsData = await loadJsonSafe("./school_record_flags.json", null);
    const recordFlag = getRecordFlag(flagsData, sid);

    if (!canViewRawRecord(recordFlag, auth)) {
      return renderNoAccess("생기부 원문 페이지 접근 권한이 없습니다.");
    }

    // 5) 상단 렌더
    renderStudentMeta(student, auth);
    renderNav(student, auth, recordFlag);

    // 6) raw 데이터 로드
    const rawData = await loadJsonSafe("./school_record_raw.json", null);
    if (!rawData) {
      $("#rawRoot").innerHTML = `<div class="empty">school_record_raw.json 파일을 불러오지 못했습니다.</div>`;
      $("#debugJson").textContent = "-";
      return;
    }

    const rawRecord = getRawRecord(rawData, sid);
    if (!rawRecord) {
      $("#rawRoot").innerHTML = `<div class="empty">해당 학생의 원문 데이터가 없습니다. <span class="muted">(school_record_raw.json에서 id 매칭 확인)</span></div>`;
      $("#debugJson").textContent = "-";
      return;
    }

    const payload = unwrapRawPayload(rawRecord);
    setSummary(rawRecord, payload, recordFlag, auth);

    // 가시성 요약 보강
    const count = countVisibleHidden(payload, auth);
    const curVis = $("#sumVisibility");
    if (curVis) {
      const base = curVis.textContent || "";
      curVis.textContent = `${base} / 표시 ${count.visible} · 숨김 ${count.hidden}`;
    }

    // 원문 렌더
    if (payload == null) {
      $("#rawRoot").innerHTML = `<div class="empty">원문 payload가 비어 있습니다.</div>`;
    } else {
      $("#rawRoot").innerHTML = renderObjectLike(payload, ["원문"], auth, 0);
    }

    // 디버그 JSON
    try {
      $("#debugJson").textContent = JSON.stringify(rawRecord, null, 2);
    } catch(_e) {
      $("#debugJson").textContent = String(rawRecord);
    }
  }

  main().catch(err => {
    renderError("오류", `로딩 오류: ${err.message}`);
  });
})();
</script>
</body>
</html>
