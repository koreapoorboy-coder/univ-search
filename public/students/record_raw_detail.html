<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 원문 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .badge{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:6px 10px;font-weight:900;background:#fff
    }
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .controls{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px
    }
    input, select{
      border:1px solid #ddd;border-radius:12px;padding:10px 12px;background:#fff;font-weight:900;
    }
    input{min-width:240px;flex:1}

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tab{
      border:1px solid #111;border-radius:999px;padding:8px 12px;background:#fff;cursor:pointer;font-weight:900
    }
    .tab[aria-selected="true"]{background:#111;color:#fff}

    .tablebox{border:1px solid #eee;border-radius:14px;padding:12px;overflow:auto;-webkit-overflow-scrolling:touch}
    table{border-collapse:collapse;width:100%;min-width:980px}
    th,td{border-bottom:1px solid #eee;padding:10px;text-align:left;font-size:14px;vertical-align:top}
    th{background:#fafafa;font-weight:900;position:sticky;top:0;white-space:nowrap}
    .num{text-align:right}
    .pre{white-space:pre-wrap;word-break:break-word;line-height:1.6}

    .chip{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:4px 8px;font-size:12px;font-weight:900;background:#fff;margin-right:6px;margin-bottom:6px
    }
    .chip.kv .k{opacity:.7;margin-right:4px}

    .mobile-list{display:none}
    .mcard{border:1px solid #eee;border-radius:16px;padding:14px;background:#fff;margin:12px 0}
    .mtop{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}
    .mtitle{font-weight:900;font-size:15px;line-height:1.35}
    .msub{opacity:.75;margin-top:4px;font-size:13px;line-height:1.45}
    .divider{height:1px;background:#f0f0f0;margin:10px 0}
    .mtext{white-space:pre-wrap;word-break:break-word;line-height:1.6;font-size:14px}
    .emptyBox{
      border:1px dashed #ddd;border-radius:14px;padding:16px;background:#fff;color:#666
    }

    @media(max-width: 860px){
      .tablebox{display:none}
      .mobile-list{display:block}
      .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
      .tabs::-webkit-scrollbar{display:none}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">생기부 원문 보기</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>
    <div class="row" id="navRow"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="title" style="font-size:16px;margin:0">원문/기록 목록</div>
        <span class="badge" id="countBadge">0건</span>
      </div>
      <div class="rightgroup">
        <span class="muted" id="updatedText">-</span>
      </div>
    </div>

    <div class="controls">
      <input id="q" placeholder="카테고리/과목/항목/내용 검색" />
      <select id="termSel">
        <option value="">전체 학기</option>
      </select>
    </div>

    <div class="tabs" id="tabs"></div>

    <div id="content" style="margin-top:12px"></div>
  </div>
</div>

<script>
(() => {
  // =========================
  // 설정값
  // =========================
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN";
  const LS_KEY = "__ADMIN_TOKEN__";

  // =========================
  // 공통 유틸
  // =========================
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
  const norm = (v)=>String(v ?? "").trim();

  function safeStr(v){ return (v == null) ? "" : String(v); }
  function getQS(){ return new URLSearchParams(location.search); }

  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["ID"] ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  async function loadJsonSafe(path, fallback){
    try{ return await loadJson(path); } catch(_e){ return fallback; }
  }

  // =========================
  // 인증/권한
  // =========================
  function getAuthContext() {
    const qs = getQS();

    const t = safeStr(qs.get("t") || qs.get("token")).trim();
    const id = safeStr(qs.get("id") || qs.get("student_id") || qs.get("sid")).trim();
    const adminParam = safeStr(qs.get("admin")).trim();
    const adminSaved = safeStr(localStorage.getItem(LS_KEY)).trim();
    const admin = adminParam || adminSaved;

    if (t) {
      return { mode:"student", token:t, id:"", admin:"", isAdmin:false };
    }

    if (id && admin) {
      const ok = (admin === ADMIN_TOKEN);
      if (adminParam && ok) localStorage.setItem(LS_KEY, adminParam);
      return { mode:"admin", token:"", id, admin, isAdmin:ok };
    }

    return { mode:"guest", token:"", id:"", admin:"", isAdmin:false };
  }

  function buildPageLink(page, auth, student) {
    if (auth?.mode === "student") {
      return `${page}?t=${encodeURIComponent(auth.token)}`;
    }
    if (auth?.mode === "admin" && auth.isAdmin) {
      const sid = norm(pickId(student) || auth.id);
      return `${page}?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(auth.admin)}`;
    }
    const sid = norm(pickId(student));
    return sid ? `${page}?student_id=${encodeURIComponent(sid)}` : page;
  }

  function pickTokenValue(row){
    return String(
      row?.token ?? row?.accessToken ?? row?.access_token ?? row?.studentToken ?? row?.student_token ?? row?.key ?? row?.['token'] ?? row?.['토큰'] ?? ''
    ).trim();
  }

  function pickStudentIdValue(row){
    return String(
      row?.id ?? row?.student_id ?? row?.studentId ?? row?.studentID ?? row?.['ID'] ?? row?.['학생ID'] ?? row?.['학번'] ?? ''
    ).trim();
  }

  function readStoredStudentId(){
    const keys = ['student_id', 'currentStudentId', 'selectedStudentId', 'record_student_id', 'sid'];
    for (const key of keys) {
      const a = String(sessionStorage.getItem(key) || '').trim();
      if (a) return a;
      const b = String(localStorage.getItem(key) || '').trim();
      if (b) return b;
    }
    return '';
  }

  function readHashStudentId(){
    const hash = String(location.hash || '').replace(/^#/, '').trim();
    if (!hash) return '';
    if (hash.includes('=')) {
      const h = new URLSearchParams(hash);
      return String(h.get('id') || h.get('student_id') || h.get('sid') || '').trim();
    }
    if (/^shstudy\d+/i.test(hash)) return hash;
    return '';
  }

  async function loadStudentsIndex(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./students.json?${stamp}`,
      `students.json?${stamp}`,
      `./data/students.json?${stamp}`,
      `../students.json?${stamp}`,
      `/students.json?${stamp}`,
    ];
    for (const path of candidates) {
      try {
        const data = await loadJson(path);
        if (Array.isArray(data)) return data;
        if (Array.isArray(data?.students)) return data.students;
      } catch (_e) {}
    }
    return [];
  }

  async function loadRecordDetailIndex(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./record_detail.json?${stamp}`,
      `record_detail.json?${stamp}`,
      `./data/record_detail.json?${stamp}`,
      `../record_detail.json?${stamp}`,
      `/record_detail.json?${stamp}`,
    ];
    for (const path of candidates) {
      try {
        const data = await loadJson(path);
        if (Array.isArray(data?.students)) return data.students;
      } catch (_e) {}
    }
    return [];
  }

  async function resolveStudentByAuth(students, auth) {
    if (!Array.isArray(students)) return { student: null, invalidToken: false, mode: auth?.mode || 'guest' };

    if (auth.mode === "admin" && auth.isAdmin) {
      return { student: students.find(s => norm(pickId(s)) === auth.id) || null, invalidToken: false, mode: 'admin' };
    }

    const directId = safeStr(getQS().get('student_id') || getQS().get('id') || getQS().get('sid')).trim();
    if (directId) {
      return { student: students.find(s => norm(pickId(s)) === directId) || null, invalidToken: false, mode: 'direct' };
    }

    if (auth.mode === "student") {
      let found = students.find(s => pickTokenValue(s) === auth.token) || null;
      if (!found) {
        const merged = [...await loadStudentsIndex(), ...await loadRecordDetailIndex()];
        const idByToken = pickStudentIdValue(merged.find(r => pickTokenValue(r) === auth.token) || null);
        if (idByToken) found = students.find(s => norm(pickId(s)) === idByToken) || null;
      }
      if (found) {
        const sid = norm(pickId(found));
        try { sessionStorage.setItem('student_id', sid); } catch(_e) {}
        try { localStorage.setItem('student_id', sid); } catch(_e) {}
        return { student: found, invalidToken: false, mode: 'token' };
      }
      try { sessionStorage.removeItem('student_id'); } catch(_e) {}
      try { localStorage.removeItem('student_id'); } catch(_e) {}
      return { student: null, invalidToken: true, mode: 'token' };
    }

    const storedId = readStoredStudentId();
    if (storedId) {
      const found = students.find(s => norm(pickId(s)) === storedId) || null;
      if (found) return { student: found, invalidToken: false, mode: 'stored' };
    }

    const hashId = readHashStudentId();
    if (hashId) {
      const found = students.find(s => norm(pickId(s)) === hashId) || null;
      if (found) return { student: found, invalidToken: false, mode: 'hash' };
    }

    try {
      const ref = document.referrer ? new URL(document.referrer) : null;
      const refId = String(ref?.searchParams.get('student_id') || ref?.searchParams.get('id') || ref?.searchParams.get('sid') || '').trim();
      if (refId) {
        return { student: students.find(s => norm(pickId(s)) === refId) || null, invalidToken: false, mode: 'referrer' };
      }
    } catch (_e) {}

    return { student: null, invalidToken: false, mode: 'none' };
  }

  function getRecordFlag(flags, studentId) {
    if (!flags) return {};
    if (Array.isArray(flags)) {
      return flags.find(x => String(x?.id) === String(studentId)) || {};
    }
    return flags[studentId] || {};
  }

  function canViewRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;

    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  function canViewRawRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;

    // ✅ rawVisibility 우선
    const visibility = String(flag.rawVisibility || flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  // =========================
  // raw 데이터 파싱 (레거시 + 신규 rows 모두 대응)
  // =========================
  function normalizeRawRows(rawPayload){
    // 1) object keyed by id 에서 꺼낸 1명 payload 가 들어온다고 가정
    // 지원형식:
    // A) { rows:[...] , raw:"..." }
    // B) { raw:"문자열" }
    // C) { sections:[...] } (예전 호환)
    // D) { items:[...] } / array 자체
    let rows = [];

    if(Array.isArray(rawPayload)){
      rows = rawPayload.slice();
    }else if(rawPayload && typeof rawPayload === "object"){
      if(Array.isArray(rawPayload.rows)) rows = rawPayload.rows.slice();
      else if(Array.isArray(rawPayload.items)) rows = rawPayload.items.slice();
      else if(Array.isArray(rawPayload.sections)) rows = rawPayload.sections.slice();
      else if(typeof rawPayload.raw === "string" && rawPayload.raw.trim()){
        rows = rawPayload.raw.split(/\n+/).map(line => ({
          term: "", category: "", subject: "", item: "",
          text: line.trim(), visibility: "student", source: "legacy-raw"
        })).filter(x => x.text);
      }
    }

    return rows.map(x => ({
      term: pickText(x?.term, x?.semester, x?.학기),
      category: pickText(x?.category, x?.분류),
      subject: pickText(x?.subject, x?.과목),
      item: pickText(x?.item, x?.항목, x?.title),
      text: pickText(x?.text, x?.content, x?.내용, x?.raw),
      visibility: String(x?.visibility || x?.visible || "student"),
      source: pickText(x?.source, x?.출처),
      memo: pickText(x?.memo, x?.note, x?.메모),
      author: pickText(x?.author),
      type: pickText(x?.type),
      topicKeyword: pickText(x?.topicKeyword),
      evidenceLevel: pickText(x?.evidenceLevel),
      year: pickText(x?.year),
    }));
  }

  function isVisibleRow(row, auth){
    const v = String(row?.visibility || "student").toLowerCase();
    if(v === "admin_only" || v === "admin-only") return !!auth.isAdmin;
    return true;
  }

  function groupKeyOf(x){
    return x.category || "기타";
  }

  function renderNoAccess(msg){
    $(".wrap").innerHTML = `
      <div class="card">
        <div class="title">접근 권한이 없습니다.</div>
        <div class="warn">${esc(msg || "학생을 찾을 수 없습니다.")}</div>
        <div class="muted" style="margin-top:8px">
          관리자: record_raw_detail.html?id=학생ID&admin=관리자토큰 / 학생·학부모: record_raw_detail.html?t=개별토큰 또는 student_id 전달
        </div>
      </div>
    `;
  }

  function renderStudentMeta(student, auth){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student?.school, student?.["학교"]);
    const career = pickText(student?.career, student?.["진로"]);
    const adm = pickText(student?.admission, student?.["전형"]);

    $("#hdr").innerHTML = `생기부 원문 보기 · ${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = auth.isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student, auth, recordFlag){
    const nav = [];

    if(auth.isAdmin){
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(auth.admin)}">학생 목록</a>`);
    }

    nav.push(`<a class="btn" href="${buildPageLink("./student.html", auth, student)}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./univ_list.html", auth, student)}">대학 상향/적정</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./progress_detail.html", auth, student)}">진도 보기</a>`);

    if (canViewRecord(recordFlag, auth)) {
      nav.push(`<a class="btn" href="${buildPageLink("./record_detail.html", auth, student)}">생기부 분석 보기</a>`);
    }

    $("#navRow").innerHTML = nav.join("");
  }

  // =========================
  // 화면 렌더
  // =========================
  let ALL_ROWS = [];
  let ACTIVE_TAB = "all";

  function makeTabs(categories){
    const tabs = [{key:"all", label:"전체"}].concat(categories.map(c=>({key:c, label:c})));
    const el = $("#tabs");
    el.innerHTML = tabs.map(t => `
      <button class="tab" data-key="${esc(t.key)}" aria-selected="${t.key===ACTIVE_TAB ? "true" : "false"}">
        ${esc(t.label)}
      </button>
    `).join("");

    el.querySelectorAll(".tab").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        ACTIVE_TAB = btn.dataset.key || "all";
        renderRows();
      });
    });
  }

  function rowChipsHtml(x){
    const chips = [];
    if(x.term) chips.push(`<span class="chip kv"><span class="k">학기</span>${esc(x.term)}</span>`);
    if(x.category) chips.push(`<span class="chip kv"><span class="k">분류</span>${esc(x.category)}</span>`);
    if(x.subject) chips.push(`<span class="chip kv"><span class="k">과목</span>${esc(x.subject)}</span>`);
    if(x.item) chips.push(`<span class="chip kv"><span class="k">항목</span>${esc(x.item)}</span>`);
    if(x.author) chips.push(`<span class="chip kv"><span class="k">저자</span>${esc(x.author)}</span>`);
    if(x.type) chips.push(`<span class="chip kv"><span class="k">유형</span>${esc(x.type)}</span>`);
    if(x.topicKeyword) chips.push(`<span class="chip kv"><span class="k">주제키워드</span>${esc(x.topicKeyword)}</span>`);
    if(x.evidenceLevel) chips.push(`<span class="chip kv"><span class="k">근거수준</span>${esc(x.evidenceLevel)}</span>`);
    if(x.source) chips.push(`<span class="chip kv"><span class="k">출처</span>${esc(x.source)}</span>`);
    return chips.join("");
  }

  function renderRows(){
    const q = norm($("#q").value).toLowerCase();
    const term = norm($("#termSel").value);

    let rows = ALL_ROWS.slice();

    if(ACTIVE_TAB !== "all"){
      rows = rows.filter(x => groupKeyOf(x) === ACTIVE_TAB);
    }

    if(term){
      rows = rows.filter(x => norm(x.term) === term);
    }

    if(q){
      rows = rows.filter(x => {
        const blob = [
          x.term, x.category, x.subject, x.item, x.text, x.memo, x.author, x.type, x.topicKeyword
        ].map(v=>String(v||"")).join(" ").toLowerCase();
        return blob.includes(q);
      });
    }

    // 정렬: term > category > subject
    rows.sort((a,b)=>{
      const ta = String(a.term||""), tb = String(b.term||"");
      if(ta !== tb) return ta.localeCompare(tb, "ko");
      const ca = String(a.category||""), cb = String(b.category||"");
      if(ca !== cb) return ca.localeCompare(cb, "ko");
      const sa = String(a.subject||""), sb = String(b.subject||"");
      if(sa !== sb) return sa.localeCompare(sb, "ko");
      return 0;
    });

    $("#countBadge").textContent = `${rows.length}건`;

    if(!rows.length){
      $("#content").innerHTML = `<div class="emptyBox">표시할 데이터가 없습니다.</div>`;
      return;
    }

    const rowsHtml = rows.map(x => `
      <tr>
        <td>${esc(x.term || "-")}</td>
        <td>${esc(x.category || "-")}</td>
        <td>${esc(x.subject || "-")}</td>
        <td>${esc(x.item || "-")}</td>
        <td>
          ${rowChipsHtml(x)}
          ${x.memo ? `<div class="muted" style="margin-top:6px">메모: ${esc(x.memo)}</div>` : ``}
        </td>
        <td><div class="pre">${esc(x.text || "-")}</div></td>
      </tr>
    `).join("");

    const cardsHtml = rows.map(x => `
      <div class="mcard">
        <div class="mtop">
          <div style="min-width:0">
            <div class="mtitle">${esc(x.item || x.category || "기록")}</div>
            <div class="msub">${esc(x.term || "-")} · ${esc(x.category || "-")} · ${esc(x.subject || "-")}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div>${rowChipsHtml(x)}</div>
        ${x.memo ? `<div class="msub" style="margin-top:8px">메모: ${esc(x.memo)}</div>` : ``}
        <div class="divider"></div>
        <div class="mtext">${esc(x.text || "-")}</div>
      </div>
    `).join("");

    $("#content").innerHTML = `
      <div class="mobile-list">${cardsHtml}</div>
      <div class="tablebox">
        <table>
          <thead>
            <tr>
              <th>학기</th>
              <th>분류</th>
              <th>과목</th>
              <th>항목</th>
              <th>보조정보</th>
              <th>내용</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    `;
  }

  // =========================
  // 메인
  // =========================
  async function main(){
    const auth = getAuthContext();

    if (auth.mode === "admin" && !auth.isAdmin) {
      return renderNoAccess("관리자 토큰이 올바르지 않습니다.");
    }

    const studentsPayload = await loadJsonSafe("./students.json", null);
    const students = Array.isArray(studentsPayload)
      ? studentsPayload
      : Array.isArray(studentsPayload?.students)
        ? studentsPayload.students
        : [];
    if(!students.length) throw new Error("students.json에 학생 데이터가 없습니다.");

    const resolved = await resolveStudentByAuth(students, auth);
    const student = resolved?.student || null;
    if(!student){
      return renderNoAccess(resolved?.invalidToken ? "학생 토큰과 연결된 원문 데이터를 찾을 수 없습니다." : "학생을 찾을 수 없습니다.");
    }

    const sid = norm(pickId(student));
    renderStudentMeta(student, auth);

    const flagsData = await loadJsonSafe("./school_record_flags.json", null);
    const recordFlag = getRecordFlag(flagsData, sid);

    if (!canViewRawRecord(recordFlag, auth)) {
      return renderNoAccess("생기부 원문 보기는 현재 비공개 상태입니다.");
    }

    renderNav(student, auth, recordFlag);

    const rawJson = await loadJsonSafe("./school_record_raw.json", {});
    let payload = null;

    if (Array.isArray(rawJson)) {
      payload = rawJson.find(x => norm(x?.id) === sid) || null;
    } else if (rawJson && typeof rawJson === "object") {
      payload = rawJson[sid] || null;
    }

    if(!payload){
      $("#updatedText").textContent = "원문 데이터 없음";
      ALL_ROWS = [];
      makeTabs([]);
      renderRows();
      return;
    }

    const updatedAt = pickText(payload.updatedAt, payload.updated_at, payload.date) || "-";
    $("#updatedText").textContent = `업데이트: ${updatedAt}`;

    ALL_ROWS = normalizeRawRows(payload).filter(x => isVisibleRow(x, auth));

    const terms = [...new Set(ALL_ROWS.map(x => norm(x.term)).filter(Boolean))];
    $("#termSel").innerHTML = `<option value="">전체 학기</option>` + terms.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
    $("#termSel").addEventListener("change", renderRows);

    $("#q").addEventListener("input", renderRows);

    const categories = [...new Set(ALL_ROWS.map(x => groupKeyOf(x)).filter(Boolean))];
    makeTabs(categories);
    renderRows();
  }

  main().catch(err => {
    $(".wrap").innerHTML = `
      <div class="card">
        <div class="title">오류</div>
        <div class="warn">로딩 오류</div>
        <div class="muted" style="margin-top:8px">${esc(err.message)}</div>
      </div>
    `;
  });
})();
</script>
</body>
</html>
