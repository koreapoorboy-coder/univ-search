<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생기부 원문 보기</title>
  <style>
    html,body{width:100%;overflow-x:hidden}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
      margin:14px;background:#fff;color:#111;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{border:1px solid #ddd;border-radius:18px;padding:16px;margin:12px 0;background:#fff}
    .title{font-size:20px;font-weight:900;margin:0 0 8px}
    .subttl{font-size:16px;font-weight:900;margin:0}
    .meta{opacity:.9;line-height:1.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .leftgroup,.rightgroup{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:7px 12px;font-weight:900;background:#fff
    }
    .pill.mode{border:2px solid #111}
    .btn{
      display:inline-block;border:1px solid #111;border-radius:12px;
      padding:10px 14px;text-decoration:none;color:#111;background:#fff;font-weight:900
    }
    .btn:hover{background:#fafafa}
    .warn{color:#b00020;font-weight:900}
    .muted{opacity:.7}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    .tabs{
      display:flex;gap:8px;flex-wrap:wrap;margin-top:10px
    }
    .tab{
      border:1px solid #111;border-radius:999px;padding:8px 12px;background:#fff;
      cursor:pointer;font-weight:900
    }
    .tab.active{background:#111;color:#fff}
    .panel{display:none}
    .panel.active{display:block}

    .count-pill{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:6px 10px;font-weight:900;background:#fff
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;margin-top:12px;
    }
    @media(max-width:860px){ .grid{grid-template-columns:1fr;} }

    .raw-card{
      border:1px solid #eee;border-radius:16px;padding:14px;background:#fff
    }
    .raw-head{
      display:flex;justify-content:space-between;gap:8px;align-items:flex-start;flex-wrap:wrap
    }
    .raw-title{
      font-weight:900;font-size:16px;line-height:1.35;word-break:break-word
    }
    .raw-sub{
      margin-top:4px;font-size:13px;color:#444;line-height:1.45
    }
    .badge{
      display:inline-flex;align-items:center;border:1px solid #ddd;border-radius:999px;
      padding:4px 8px;font-size:12px;font-weight:900;background:#fff;white-space:nowrap
    }

    .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .chip{
      border:1px solid #ddd;border-radius:999px;padding:5px 9px;background:#fff;
      font-size:12px;font-weight:900
    }

    .block{
      margin-top:10px;border-top:1px dashed #eee;padding-top:10px
    }
    .label{
      font-size:12px;font-weight:900;opacity:.75;margin-bottom:4px
    }
    .text{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      line-height:1.58;
      font-size:14px;
    }

    .empty{
      border:1px dashed #ddd;border-radius:14px;padding:14px;background:#fff;color:#555
    }

    .hint{
      margin-top:8px;font-size:13px;color:#444
    }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="card">
    <div class="topbar">
      <div>
        <div class="title" id="hdr">생기부 원문 보기</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="rightgroup" id="modeRow"></div>
    </div>
    <div class="row" id="navRow"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <div class="leftgroup">
        <div class="subttl">원문 콘텐츠</div>
      </div>
      <div class="rightgroup">
        <span class="muted">과목 세특 원문 / 독서록</span>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button type="button" class="tab active" data-tab="subjectRaw">과목 세특 원문</button>
      <button type="button" class="tab" data-tab="readingRaw">독서록 / 독서 원문</button>
    </div>
  </div>

  <!-- 과목 세특 원문 -->
  <div class="panel active" id="panelSubjectRaw">
    <div class="card">
      <div class="topbar">
        <div class="leftgroup">
          <div class="subttl">과목별 세특 원문</div>
          <span class="count-pill" id="subjectRawCount">0건</span>
        </div>
        <div class="rightgroup">
          <span class="muted">학생별 입력 원문 기반</span>
        </div>
      </div>
      <div class="grid" id="subjectRawArea"></div>
      <div class="hint">※ 과목명/학년/학기/세부영역이 있으면 함께 표시됩니다.</div>
    </div>
  </div>

  <!-- 독서록 -->
  <div class="panel" id="panelReadingRaw">
    <div class="card">
      <div class="topbar">
        <div class="leftgroup">
          <div class="subttl">독서 활동 / 독서록</div>
          <span class="count-pill" id="readingRawCount">0건</span>
        </div>
        <div class="rightgroup">
          <span class="muted">중학생 포트폴리오 연계 가능</span>
        </div>
      </div>
      <div class="grid" id="readingRawArea"></div>
      <div class="hint">※ 도서명·저자·한줄요약·소감·포트폴리오 연계 내용을 함께 볼 수 있습니다.</div>
    </div>
  </div>
</div>

<script>
(() => {
  // =========================
  // 설정값
  // =========================
  const ADMIN_TOKEN = "CHANGE_ME_ADMIN";

  // =========================
  // 공통 유틸
  // =========================
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s ?? "").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
  const norm = (v)=>String(v ?? "").trim();

  function getQS(){ return new URLSearchParams(location.search); }
  function safeStr(v){ return (v == null) ? "" : String(v); }

  function pickName(s){ return s?.studentName ?? s?.studentname ?? s?.name ?? s?.["학생명"] ?? s?.["이름"] ?? s?.["성명"] ?? s?.id ?? "-"; }
  function pickId(s){ return s?.id ?? s?.studentId ?? s?.studentID ?? s?.["ID"] ?? s?.["학생ID"] ?? s?.["학번"] ?? null; }
  function pickToken(s){ return s?.token ?? s?.accessToken ?? s?.key ?? s?.["token"] ?? s?.["토큰"] ?? null; }

  function pickText(...vals){
    for(const v of vals){
      const s = String(v ?? "").trim();
      if(s) return s;
    }
    return "";
  }

  function normalizeKeywords(v){
    if(Array.isArray(v)) return v.map(x=>String(x??"").trim()).filter(Boolean);
    const s = String(v ?? "").trim();
    if(!s) return [];
    return s.split(/[,/\n|·]/g).map(x=>x.trim()).filter(Boolean);
  }

  async function loadJson(path){
    const r = await fetch(path, { cache:"no-store" });
    if(!r.ok) throw new Error(path + " load failed (" + r.status + ")");
    return r.json();
  }

  async function loadJsonSafe(path, fallback){
    try{
      return await loadJson(path);
    }catch(_e){
      return fallback;
    }
  }

  async function loadFirstJson(paths, fallback){
    for(const p of paths){
      try{
        return await loadJson(p);
      }catch(_e){}
    }
    return fallback;
  }

  // =========================
  // 보안/접근 로직 (student.html과 동일 패턴)
  // =========================
  function getAuthContext() {
    const qs = getQS();
    const t = safeStr(qs.get("t") || qs.get("token")).trim();
    const id = safeStr(qs.get("id")).trim();
    const admin = safeStr(qs.get("admin")).trim();

    // 🔒 t 우선
    if (t) {
      return { mode: "student", token: t, id: "", admin: "", isAdmin: false };
    }

    if (id && admin) {
      return { mode: "admin", token: "", id, admin, isAdmin: false };
    }

    return { mode: "guest", token: "", id: "", admin: "", isAdmin: false };
  }

  function buildPageLink(page, auth, student) {
    if (auth?.mode === "student") {
      return `${page}?t=${encodeURIComponent(auth.token)}`;
    }
    if (auth?.mode === "admin" && auth.isAdmin) {
      const sid = norm(pickId(student) || auth.id);
      return `${page}?id=${encodeURIComponent(sid)}&admin=${encodeURIComponent(auth.admin)}`;
    }
    return page;
  }

  function resolveStudentByAuth(students, auth) {
    if (!Array.isArray(students)) return null;

    if (auth.mode === "student") {
      return students.find(s => norm(pickToken(s)) === auth.token) || null;
    }

    if (auth.mode === "admin" && auth.isAdmin) {
      return students.find(s => norm(pickId(s)) === auth.id) || null;
    }

    return null;
  }

  // =========================
  // flags (선택)
  // =========================
  function getRecordFlag(flags, studentId) {
    if (!flags) return {};
    if (Array.isArray(flags)) {
      return flags.find(x => String(x?.id) === String(studentId)) || {};
    }
    return flags[studentId] || {};
  }

  function canViewRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;
    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  function canViewRawRecord(flag, auth) {
    if (!flag || Object.keys(flag).length === 0) return true;
    if (flag.recordEnabled === false) return false;
    const visibility = String(flag.visibility || "student").toLowerCase();
    if (visibility === "admin_only") return !!auth.isAdmin;
    return true;
  }

  function canViewByVisibility(visibility, auth){
    const v = String(visibility || "student").toLowerCase();
    if (v === "admin_only") return !!auth?.isAdmin;
    return true;
  }

  // =========================
  // 공통 렌더
  // =========================
  function renderNoAccess(msg){
    $("#app").innerHTML = `
      <div class="card">
        <div class="title">접근 권한이 없습니다.</div>
        <div class="warn">${esc(msg || "학생을 찾을 수 없습니다.")}</div>
        <div class="muted" style="margin-top:8px">
          관리자: record_raw_detail.html?id=학생ID&admin=관리자토큰 / 학생·학부모: record_raw_detail.html?t=개별토큰
        </div>
      </div>
    `;
  }

  function renderError(msg){
    $("#app").innerHTML = `
      <div class="card">
        <div class="title">오류</div>
        <div class="warn">로딩 오류</div>
        <div class="muted" style="margin-top:8px">${esc(msg || "알 수 없는 오류")}</div>
      </div>
    `;
  }

  function renderStudentMeta(student, auth){
    const sid = norm(pickId(student));
    const name = pickName(student);
    const school = pickText(student?.school, student?.["학교"]);
    const career = pickText(student?.career, student?.["진로"]);
    const adm = pickText(student?.admission, student?.["전형"]);

    $("#hdr").innerHTML = `${esc(name)} <span class="mono">(${esc(sid)})</span>`;
    $("#meta").innerHTML = `
      학교&nbsp;&nbsp;&nbsp;&nbsp;${esc(school || "-")}<br>
      진로&nbsp;&nbsp;&nbsp;&nbsp;${esc(career || "-")}<br>
      전형&nbsp;&nbsp;&nbsp;&nbsp;${esc(adm || "-")}
    `;

    $("#modeRow").innerHTML = auth.isAdmin
      ? `<span class="pill mode">관리자</span><span class="pill">id 접속</span>`
      : `<span class="pill mode">학생/학부모</span><span class="pill">token 접속</span>`;
  }

  function renderNav(student, auth, recordFlag){
    const nav = [];

    if(auth.isAdmin){
      nav.push(`<a class="btn" href="./index.html?admin=${encodeURIComponent(auth.admin)}">학생 목록</a>`);
    }
    nav.push(`<a class="btn" href="${buildPageLink("./student.html", auth, student)}">학생 성적</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./univ_list.html", auth, student)}">대학 상향/적정</a>`);
    nav.push(`<a class="btn" href="${buildPageLink("./progress_detail.html", auth, student)}">진도 보기</a>`);

    if (canViewRecord(recordFlag, auth)) {
      nav.push(`<a class="btn" href="${buildPageLink("./record_detail.html", auth, student)}">생기부 분석 보기</a>`);
    }

    $("#navRow").innerHTML = nav.join("");
  }

  function bindTabs(){
    const tabs = document.querySelectorAll(".tab");
    const panelSubjectRaw = $("#panelSubjectRaw");
    const panelReadingRaw = $("#panelReadingRaw");

    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.tab;
        tabs.forEach(b => b.classList.toggle("active", b === btn));
        const isSubject = (key === "subjectRaw");
        panelSubjectRaw?.classList.toggle("active", isSubject);
        panelReadingRaw?.classList.toggle("active", !isSubject);
      });
    });
  }

  // =========================
  // 과목 원문 데이터 파서 (유연 대응)
  // =========================
  function getRawBundle(rawData, studentId){
    if (!rawData) return null;

    if (Array.isArray(rawData)) {
      return rawData.find(x => String(x?.id) === String(studentId)) || null;
    }
    if (rawData[studentId]) return rawData[studentId];

    if (Array.isArray(rawData.items)) {
      return rawData.items.find(x => String(x?.id) === String(studentId)) || null;
    }
    if (Array.isArray(rawData.data)) {
      return rawData.data.find(x => String(x?.id) === String(studentId)) || null;
    }

    return null;
  }

  function pickFirst(...vals){
    for(const v of vals){
      if(v == null) continue;
      if(typeof v === "string" && !v.trim()) continue;
      return v;
    }
    return null;
  }

  function normalizeRawSubjectItem(item, fallbackSubject){
    const e = item || {};
    return {
      subject: pickText(e.subject, e.과목, e.과목명, e.name, fallbackSubject) || "과목 미지정",
      category: pickText(e.category, e.영역, e.section, e.세부영역),
      year: pickText(e.year, e.학년),
      semester: pickText(e.semester, e.학기),
      teacher: pickText(e.teacher, e.교사, e.담당교사),
      text: pickText(
        e.text, e.content, e.raw, e.original, e.body,
        e.세특, e.세특원문, e.원문, e.기록, e.내용
      ),
      keywords: normalizeKeywords(pickFirst(e.keywords, e.키워드)),
      visibility: pickText(e.visibility, e.공개범위) || "student",
      status: pickText(e.status, e.상태),
      sortOrder: Number(e.sortOrder ?? e.sort ?? 9999)
    };
  }

  function collectRawSubjectItems(bundle){
    if (!bundle) return [];

    // 1) 명시 배열
    const arr = (
      Array.isArray(bundle.subjects) ? bundle.subjects :
      Array.isArray(bundle.items) ? bundle.items :
      Array.isArray(bundle.records) ? bundle.records :
      Array.isArray(bundle.raws) ? bundle.raws :
      Array.isArray(bundle.subject_raw) ? bundle.subject_raw :
      Array.isArray(bundle.subjectRaw) ? bundle.subjectRaw :
      null
    );
    if (arr) return arr.map((x,i)=>normalizeRawSubjectItem(x, `과목 ${i+1}`));

    // 2) 객체 맵
    const obj = (
      (bundle.subjects && !Array.isArray(bundle.subjects) && typeof bundle.subjects === "object") ? bundle.subjects :
      (bundle.과목 && !Array.isArray(bundle.과목) && typeof bundle.과목 === "object") ? bundle.과목 :
      null
    );
    if (obj) {
      return Object.entries(obj).map(([k,v])=>normalizeRawSubjectItem(v,k));
    }

    // 3) bundle 자체가 과목명 객체 묶음일 가능성
    const blacklist = new Set(["id","studentId","studentID","학생ID","name","meta","metadata","updatedAt"]);
    const entries = Object.entries(bundle).filter(([k,v]) => !blacklist.has(k) && v && typeof v === "object");
    if (entries.length) return entries.map(([k,v]) => normalizeRawSubjectItem(v,k));

    return [];
  }

  function filterVisibleRawSubjects(items, auth){
    return (items || []).filter(x => canViewByVisibility(x.visibility, auth));
  }

  // =========================
  // 독서 데이터 파서 (record_detail과 호환)
  // =========================
  function getReadingBundle(readingData, studentId){
    if (!readingData) return null;

    if (Array.isArray(readingData)) {
      return readingData.find(x => String(x?.id) === String(studentId)) || null;
    }
    if (readingData[studentId]) return readingData[studentId];

    if (Array.isArray(readingData.items)) {
      return { items: readingData.items.filter(x => String(x?.id) === String(studentId)) };
    }
    if (Array.isArray(readingData.data)) {
      return readingData.data.find(x => String(x?.id) === String(studentId)) || null;
    }

    return null;
  }

  function normalizeReadingItem(entry){
    const e = entry || {};
    return {
      title: pickText(e.title, e.도서명, e.bookTitle) || "도서명 미입력",
      author: pickText(e.author, e.저자),
      publisher: pickText(e.publisher, e.출판사),
      category: pickText(e.category, e.분류),
      activityType: pickText(e.activityType, e.활동유형),
      year: pickText(e.year, e.학년),
      semester: pickText(e.semester, e.학기),
      date: pickText(e.date, e.일자, e.readDate),
      oneLineSummary: pickText(e.oneLineSummary, e.one_line_summary, e.한줄요약),
      impression: pickText(e.impression, e.소감, e.느낀점),
      quote: pickText(e.quote, e.인상깊은구절),
      connectionToPortfolio: pickText(e.connectionToPortfolio, e.portfolioConnection, e.포트폴리오연계),
      evidenceKeyword: normalizeKeywords(pickFirst(e.evidenceKeyword, e.evidence_keyword, e.근거키워드, e.keywords, e.키워드)),
      memo: pickText(e.memo, e.메모),
      raw: pickText(e.raw, e.original, e.text, e.content, e.원문),
      visibility: pickText(e.visibility, e.공개범위) || "student",
      status: pickText(e.status, e.상태),
      sortOrder: Number(e.sortOrder ?? e.sort ?? 9999)
    };
  }

  function collectReadingItems(bundle){
    if (!bundle) return [];
    const base = Array.isArray(bundle.items) ? bundle.items
               : Array.isArray(bundle.readings) ? bundle.readings
               : Array.isArray(bundle.records) ? bundle.records
               : [];
    return base.map(normalizeReadingItem);
  }

  function filterVisibleReadings(items, auth){
    return (items || []).filter(x => canViewByVisibility(x.visibility, auth));
  }

  // =========================
  // 카드 렌더
  // =========================
  function subjectRawCardHtml(it){
    const metaParts = [];
    if (it.category) metaParts.push(it.category);
    if (it.year || it.semester) metaParts.push([it.year, it.semester].filter(Boolean).join(" "));
    if (it.teacher) metaParts.push(`교사 ${it.teacher}`);

    const body = it.text || "";

    return `
      <div class="raw-card">
        <div class="raw-head">
          <div style="min-width:0;flex:1">
            <div class="raw-title">${esc(it.subject)}</div>
            <div class="raw-sub">
              ${metaParts.length ? metaParts.map((x,i)=>`${i?`<span style="opacity:.35"> · </span>`:""}${esc(x)}`).join("") : `<span class="muted">메타 정보 없음</span>`}
            </div>
          </div>
          <div class="badge">세특 원문</div>
        </div>

        ${
          it.keywords.length
            ? `<div class="chips">${it.keywords.map(k=>`<span class="chip">${esc(k)}</span>`).join("")}</div>`
            : ``
        }

        <div class="block">
          <div class="label">원문</div>
          <div class="text">${body ? esc(body) : `<span class="muted">원문 내용이 없습니다.</span>`}</div>
        </div>
      </div>
    `;
  }

  function readingRawCardHtml(it){
    const metaParts = [];
    if (it.author) metaParts.push(`저자 ${it.author}`);
    if (it.publisher) metaParts.push(it.publisher);
    if (it.category) metaParts.push(it.category);
    if (it.activityType) metaParts.push(it.activityType);
    if (it.year || it.semester) metaParts.push([it.year, it.semester].filter(Boolean).join(" "));
    if (it.date) metaParts.push(it.date);

    return `
      <div class="raw-card">
        <div class="raw-head">
          <div style="min-width:0;flex:1">
            <div class="raw-title">${esc(it.title)}</div>
            <div class="raw-sub">
              ${metaParts.length ? metaParts.map((x,i)=>`${i?`<span style="opacity:.35"> · </span>`:""}${esc(x)}`).join("") : `<span class="muted">메타 정보 없음</span>`}
            </div>
          </div>
          <div class="badge">독서록</div>
        </div>

        ${
          it.evidenceKeyword.length
            ? `<div class="chips">${it.evidenceKeyword.map(k=>`<span class="chip">${esc(k)}</span>`).join("")}</div>`
            : ``
        }

        ${it.oneLineSummary ? `
          <div class="block">
            <div class="label">한줄 요약</div>
            <div class="text">${esc(it.oneLineSummary)}</div>
          </div>` : ``}

        ${it.quote ? `
          <div class="block">
            <div class="label">인상 깊은 구절</div>
            <div class="text">${esc(it.quote)}</div>
          </div>` : ``}

        ${it.impression ? `
          <div class="block">
            <div class="label">소감 / 느낀점</div>
            <div class="text">${esc(it.impression)}</div>
          </div>` : ``}

        ${it.connectionToPortfolio ? `
          <div class="block">
            <div class="label">포트폴리오 연계</div>
            <div class="text">${esc(it.connectionToPortfolio)}</div>
          </div>` : ``}

        ${(it.raw || it.memo) ? `
          <div class="block">
            <div class="label">원문/메모</div>
            <div class="text">${esc(it.raw || it.memo)}</div>
          </div>` : ``}
      </div>
    `;
  }

  function renderSubjectRaw(items){
    const area = $("#subjectRawArea");
    const count = $("#subjectRawCount");
    const list = Array.isArray(items) ? items.slice() : [];
    list.sort((a,b)=> (a.sortOrder - b.sortOrder) || String(a.subject).localeCompare(String(b.subject),"ko"));

    count.textContent = `${list.length}건`;

    if(!list.length){
      area.innerHTML = `<div class="empty">과목 세특 원문 데이터가 없습니다. <span class="muted">(school_record_raw_detail.json / school_record_raw.json 확인)</span></div>`;
      return;
    }
    area.innerHTML = list.map(subjectRawCardHtml).join("");
  }

  function renderReadingRaw(items){
    const area = $("#readingRawArea");
    const count = $("#readingRawCount");
    const list = Array.isArray(items) ? items.slice() : [];
    list.sort((a,b)=> (a.sortOrder - b.sortOrder) || String(a.title).localeCompare(String(b.title),"ko"));

    count.textContent = `${list.length}건`;

    if(!list.length){
      area.innerHTML = `<div class="empty">독서 활동 데이터가 없습니다. <span class="muted">(school_record_reading.json 없거나 해당 학생 데이터 없음)</span></div>`;
      return;
    }
    area.innerHTML = list.map(readingRawCardHtml).join("");
  }

  // =========================
  // 메인
  // =========================
  async function main(){
    const auth = getAuthContext();

    // 관리자 검증
    if (auth.mode === "admin") {
      auth.isAdmin = (auth.admin === ADMIN_TOKEN);
      if (!auth.isAdmin) return renderNoAccess("관리자 토큰이 올바르지 않습니다.");
    }

    const students = await loadJson("./students.json");
    if (!Array.isArray(students)) throw new Error("students.json is not an array");

    const student = resolveStudentByAuth(students, auth);
    if (!student) return renderNoAccess("학생을 찾을 수 없습니다.");

    const sid = norm(pickId(student));

    // flags 체크
    const flagsData = await loadJsonSafe("./school_record_flags.json", null);
    const recordFlag = getRecordFlag(flagsData, sid);

    if (!canViewRawRecord(recordFlag, auth)) {
      return renderNoAccess("생기부 원문 보기 권한이 없습니다.");
    }

    // 상단
    renderStudentMeta(student, auth);
    renderNav(student, auth, recordFlag);
    bindTabs();

    // 1) 과목 세특 원문 데이터 로드 (파일명 여러 버전 대응)
    const rawData = await loadFirstJson(
      [
        "./school_record_raw_detail.json",
        "./school_record_raw.json",
        "./record_raw_detail.json",
        "./school_record_detail_raw.json"
      ],
      null
    );

    let rawSubjectItems = [];
    if (rawData) {
      const rawBundle = getRawBundle(rawData, sid);
      if (rawBundle) rawSubjectItems = collectRawSubjectItems(rawBundle);
    }
    rawSubjectItems = filterVisibleRawSubjects(rawSubjectItems, auth);
    renderSubjectRaw(rawSubjectItems);

    // 2) 독서 데이터 로드 (record_detail과 동일 파일 재사용)
    const readingData = await loadJsonSafe("./school_record_reading.json", null);

    let readingItems = [];
    if (readingData) {
      const readingBundle = getReadingBundle(readingData, sid);
      if (readingBundle) readingItems = collectReadingItems(readingBundle);
    }
    readingItems = filterVisibleReadings(readingItems, auth);
    renderReadingRaw(readingItems);
  }

  main().catch(err => {
    renderError(err.message);
  });
})();
</script>
</body>
</html>
