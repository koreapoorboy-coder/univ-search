<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_extension</title>
<style>
:root{
 --bg:#f6f8fb;--card:#fff;--line:#d9e1ec;--text:#16202a;--sub:#5c6b7a;
 --accent:#1f6feb;--soft:#eaf2ff;--shadow:0 8px 24px rgba(18,35,58,.08);--radius:18px;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;padding:24px 16px 48px}
.hero,.section,.acc-item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:24px;margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:30px}
.sub{color:var(--sub);line-height:1.7}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}
.meta .box{border:1px solid var(--line);border-radius:14px;padding:12px}
.label{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:4px}
.value{font-weight:800}
.section{padding:20px;margin-top:18px}
.section-title{font-size:22px;font-weight:900;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 12px;border-radius:999px;background:var(--soft);border:1px solid #cdd9ea;font-size:13px;font-weight:700}
.nav-row{margin-top:14px;padding-top:12px;border-top:1px solid #edf1f6}
.nav-links{display:flex;gap:10px;flex-wrap:wrap}
.nav-links a{display:inline-block;padding:9px 12px;border-radius:12px;text-decoration:none;border:1px solid #cdd9ea;color:var(--text);font-weight:800;background:#fff}
.nav-links a.active{background:var(--soft);color:var(--accent)}
.notice,.empty{padding:14px 16px;border:1px dashed #cdd9ea;border-radius:14px;background:#fbfdff;color:var(--sub)}
.kv{border-top:1px solid #edf1f6;padding-top:12px;margin-top:12px}
.kv span{display:block;font-size:12px;color:var(--sub);font-weight:800;margin-bottom:4px}
.kv p,.kv ul{margin:0;line-height:1.75}
.acc-wrap{display:grid;gap:14px}
.acc-item{overflow:hidden}
.acc-head{width:100%;border:0;background:#fff;text-align:left;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.acc-title{font-size:22px;font-weight:900}
.acc-sub{margin-top:6px;color:var(--sub)}
.acc-arrow{font-size:22px;font-weight:900}
.acc-body{display:none;padding:0 20px 20px;border-top:1px solid #edf1f6}
.acc-item.open .acc-body{display:block}
.next-card{border:1px solid #e5ebf3;border-radius:14px;padding:14px;margin:10px 0;background:#fbfdff}
.act-title{font-size:16px;font-weight:900}
.top-tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.tool-btn{border:1px solid #cdd9ea;background:#fff;border-radius:12px;padding:8px 12px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">

<section class="hero">
<h1 id="heroName">확장 활동 설계</h1>
<div class="sub">과목별로 접고 펼치는 구조입니다.</div>
<div class="meta" id="heroMeta"></div>
<div class="nav-row">
<div class="nav-links">
<a href="./record_detail.html">기본 상담 보기</a>
<a class="active">확장 활동 보기</a>
</div>
</div>
</section>

<section class="section">
<div class="section-title">선택과목 기반 전체 방향</div>
<div class="chips" id="chips"></div>
<div class="kv"><span>주력 축</span><p id="primaryTrack"></p></div>
<div class="kv"><span>보조 축</span><p id="secondaryTrack"></p></div>
<div class="kv"><span>설계 메모</span><p id="designNote"></p></div>
<div class="kv"><span>상담 메시지</span><p id="counselingMessage"></p></div>
</section>

<section class="section">
<div class="section-title">선택과목별 다음 단계 설계</div>
<div class="top-tools">
<button class="tool-btn" id="openAllBtn">전체 펼치기</button>
<button class="tool-btn" id="closeAllBtn">전체 접기</button>
</div>
<div class="acc-wrap" id="accWrap"></div>
</section>

</div>

<script>
const qs=new URLSearchParams(location.search);
const sid=qs.get("student_id")||"shstudy09";

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]))}

async function load(){
 const paths=[
  `record_detail_extension_${sid}.json`,
  `record_detail_shstudy09_selected_subjects.json`
 ];
 for(const p of paths){
  try{
   const r=await fetch(p+"?v="+Date.now());
   if(r.ok) return await r.json();
  }catch(e){}
 }
 throw new Error("확장 JSON을 찾지 못했습니다.");
}

function pickStudent(d){
 return (d.students||[]).find(x=>x.student_id===sid)||d.students?.[0];
}

function card(item,i){
 const acts=(item.next_stage_activities||[]).map(a=>`
  <div class="next-card">
   <div class="act-title">${esc(a.title)}</div>
   <div class="kv"><span>왜 필요한가</span><p>${esc(a.why_needed)}</p></div>
   <div class="kv"><span>활동 내용</span><p>${esc(a.activity_detail)}</p></div>
   <div class="kv"><span>기록 변화</span><p>${esc(a.expected_record_change)}</p></div>
  </div>`).join("");
 return `
 <div class="acc-item ${i===0?"open":""}">
 <button class="acc-head">
  <div>
   <div class="acc-title">${esc(item.subject)}</div>
   <div class="acc-sub">${esc(item.course_role)}</div>
  </div>
  <div class="acc-arrow">${i===0?"−":"+"}</div>
 </button>
 <div class="acc-body">
  <div class="kv"><span>현재 강점</span><p>${esc(item.current_strength)}</p></div>
  <div class="kv"><span>보완 지점</span><p>${esc(item.gap_point)}</p></div>
  <div class="kv"><span>입시 관점</span><p>${esc(item.admission_view)}</p></div>
  ${acts}
 </div>
 </div>`;
}

function bind(){
 document.querySelectorAll(".acc-head").forEach(h=>{
  h.onclick=()=>{
   const p=h.parentElement;
   const open=p.classList.toggle("open");
   h.querySelector(".acc-arrow").textContent=open?"−":"+";
  }
 });
 document.getElementById("openAllBtn").onclick=()=>{
  document.querySelectorAll(".acc-item").forEach(x=>{
   x.classList.add("open");
   x.querySelector(".acc-arrow").textContent="−";
  });
 };
 document.getElementById("closeAllBtn").onclick=()=>{
  document.querySelectorAll(".acc-item").forEach(x=>{
   x.classList.remove("open");
   x.querySelector(".acc-arrow").textContent="+";
  });
 };
}

async function main(){
 const data=await load();
 const s=pickStudent(data);
 document.getElementById("heroName").textContent=`${s.student_name} (${s.student_id})`;
 document.getElementById("heroMeta").innerHTML=`
  <div class="box"><div class="label">학교</div><div class="value">${esc(s.school_name)}</div></div>
  <div class="box"><div class="label">트랙</div><div class="value">${esc(s.track)}</div></div>`;

 const sp=s.selected_subjects_plan||{};
 const subs=s.selected_subjects||[];
 document.getElementById("chips").innerHTML=subs.map(x=>`<span class="chip">${esc(x)}</span>`).join("");
 document.getElementById("primaryTrack").textContent=sp.integrated_direction?.primary_track||"";
 document.getElementById("secondaryTrack").textContent=sp.secondary_track?.secondary_track||"";
 document.getElementById("designNote").textContent=sp.selection_design_note||"";
 document.getElementById("counselingMessage").textContent=sp.counseling_message||"";

 const list=sp.selection_subjects||sp.subjects||[];
 document.getElementById("accWrap").innerHTML=list.map(card).join("");
 bind();
}

main();
</script>
</body>
</html>
