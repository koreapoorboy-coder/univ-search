<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_extension</title>
<style>
:root{
  --bg:#f5f8fd; --line:#dfe8f4; --text:#16202a; --sub:#5c6b7a; --shadow:0 12px 30px rgba(22,32,42,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1460px;margin:0 auto;padding:24px 18px 48px}
.hero{background:linear-gradient(135deg,#ffffff,#f7fbff);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:26px;margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:34px}
.sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--text);font-weight:900}
.nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;align-items:start}
.side{position:sticky;top:18px;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.side-title{font-size:20px;font-weight:900;margin:0 0 12px}
.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}
.side-box + .side-box{margin-top:12px}
.side-label{font-size:12px;color:var(--sub);font-weight:800;margin-bottom:5px}
.side-value{font-weight:900;line-height:1.75;word-break:keep-all}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:16px}
.ext-card{background:var(--card-bg);border:1px solid var(--line);border-left:8px solid var(--card-bd);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.ext-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px}
.ext-title{font-size:26px;font-weight:900;line-height:1.2}
.ext-sub{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}
.ext-tag{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:900;white-space:nowrap}
.score-badge{min-width:68px;height:68px;border-radius:20px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mini-box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
.mini-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:7px}
.mini-body{font-weight:800;line-height:1.8;word-break:keep-all}
.line-block{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
.evidence{margin:0;padding-left:18px;line-height:1.9;font-weight:800}
.activities{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.activity-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}
.activity-title{font-size:16px;font-weight:900;line-height:1.45;margin-bottom:10px}
.field + .field{margin-top:10px}
.field-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:4px}
.field-body{font-size:14px;line-height:1.7;font-weight:800;word-break:keep-all}
.reason-list{margin:0;padding-left:18px;line-height:1.85;font-weight:800}
.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:18px;line-height:1.8;color:var(--sub)}
@media (max-width:1200px){.activities{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}}
@media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.ext-title{font-size:22px}.dual{grid-template-columns:1fr}.activities{grid-template-columns:1fr}.score-badge{min-width:56px;height:56px;font-size:24px;border-radius:16px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="heroTitle">확장 활동 보기</h1>
    <div class="sub" id="heroSub">교과서 매핑 상위 결과를 기준으로 탐구 질문, 보고서 로드맵, 세특 문장 씨앗을 자동 설계한 화면입니다.</div>
    <div class="nav">
      <a id="goBasic" href="./record_detail.html">생활기록부 분석</a>
      <a id="goMapping" href="./record_detail_mapping.html">교과서 매핑 보기</a>
      <a class="active">확장 활동 보기</a>
    </div>
  </section>

  <div class="layout">
    <aside class="side">
      <h2 class="side-title">학생 요약</h2>
      <div class="side-box">
        <div class="side-label">학생</div>
        <div class="side-value" id="studentBasic">-</div>
      </div>
      <div class="side-box">
        <div class="side-label">진로 방향</div>
        <div class="side-value" id="directionValue">-</div>
      </div>
      <div class="side-box">
        <div class="side-label">선택과목</div>
        <div class="chips" id="subjectChips"></div>
      </div>
      <div class="side-box">
        <div class="side-label">핵심 키워드</div>
        <div class="chips" id="portfolioChips"></div>
      </div>
      <div class="side-box">
        <div class="side-label">설계 기준</div>
        <div class="side-value">교과서 매핑 상위 3개 결과를 자동 연결해 확장 활동으로 전환</div>
      </div>
    </aside>

    <main class="main" id="cards"></main>
  </div>
</div>

<script src="../univ-search/data/student_textbook_matcher.js"></script>
<script src="../univ-search/data/student_textbook_extension_engine.js"></script>

<script>
const COLORS = {
  "물리학":["#f6fbff","#4f8cc9"],
  "물리학Ⅰ":["#f6fbff","#4f8cc9"],
  "고급물리학":["#f5fbff","#4a82c2"],
  "화학":["#fff8f3","#e38b2c"],
  "화학Ⅰ":["#fff8f3","#e38b2c"],
  "화학실험":["#fff8f3","#e38b2c"],
  "고급화학":["#fff6f1","#d46f2d"],
  "생명과학":["#f7fcf7","#4da866"],
  "생명과학Ⅰ":["#f7fcf7","#4da866"],
  "생명과학Ⅱ":["#f7fcf7","#4da866"],
  "생명과학실험":["#f7fcf7","#4da866"],
  "고급생명과학":["#fff7fb","#c05693"],
  "대수":["#f8f6ff","#7e66d4"],
  "공통수학1":["#f8f6ff","#7e66d4"],
  "공통수학2":["#f8f6ff","#7e66d4"],
  "기하":["#f8f6ff","#7e66d4"],
  "통합과학":["#f7fbff","#5a7fb8"]
};

const esc = (s='') => String(s)
  .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
  .replaceAll('"','&quot;').replaceAll("'","&#39;");

function unique(arr){ return [...new Set((Array.isArray(arr)?arr:[]).filter(Boolean))]; }

function scoreColor(score){
  const n = Number(score || 0);
  if (n >= 40) return '#2f3f93';
  if (n >= 30) return '#6f57c7';
  return '#6d7786';
}

function extractCurrentYearSubjects(student){
  const years = Array.isArray(student?.years) ? student.years : [];
  const year = years[0] || {};
  return Array.isArray(year?.subjects) ? year.subjects : [];
}

function buildStudentTextbookInputFromStudent(student){
  const currentSubjects = extractCurrentYearSubjects(student);
  const selectedSubjects = unique([
    ...(Array.isArray(student?.selected_subjects) ? student.selected_subjects : []),
    ...currentSubjects.map(s => s.subject || s.subject_name).filter(Boolean)
  ]);

  const keywordPool = [];
  currentSubjects.forEach(item => {
    if (Array.isArray(item.keywords)) keywordPool.push(...item.keywords);
    if (item.summary) keywordPool.push(item.summary);
    if (item.subject_goal_focus) keywordPool.push(item.subject_goal_focus);
    if (item.current_activity_basis) keywordPool.push(item.current_activity_basis);
    if (item.analysis_basis) keywordPool.push(item.analysis_basis);

    const ef = item.evidence_first || {};
    if (ef.evidence_summary) keywordPool.push(ef.evidence_summary);
    if (ef.observed_performance) keywordPool.push(ef.observed_performance);
    if (ef.interpretation) keywordPool.push(ef.interpretation);
    if (ef.evaluation_meaning) keywordPool.push(ef.evaluation_meaning);
    if (ef.next_improvement) keywordPool.push(ef.next_improvement);

    const jb = item.judgment_block || {};
    if (jb.admission_officer_view) keywordPool.push(jb.admission_officer_view);
    if (jb.subject_judgment) keywordPool.push(jb.subject_judgment);
    if (jb.record_judgment) keywordPool.push(jb.record_judgment);
    if (jb.overall_opinion) keywordPool.push(jb.overall_opinion);
    if (jb.structure_interpretation) keywordPool.push(jb.structure_interpretation);
    if (jb.extension_interpretation) keywordPool.push(jb.extension_interpretation);

    if (Array.isArray(item.activity_framework)) keywordPool.push(...item.activity_framework);
    if (Array.isArray(item.evaluation_priority)) keywordPool.push(...item.evaluation_priority);
  });

  const joined = keywordPool.join(" ");
  const joinedLower = joined.toLowerCase();
  const trackKeywords = [];
  const styleKeywords = [];

  if (/배터리|이차전지|전고체|에너지|전기차|전기전자|전지|리튬/.test(joined)) trackKeywords.push("배터리","에너지","전기전자");
  if (/생명|의학|의생명|세포|유전|면역|항상성|단백질|효소/.test(joined)) trackKeywords.push("생명·의생명");
  if (/환경|기후|지구|해양|재해|탄소|지질|대기/.test(joined)) trackKeywords.push("환경·지구");
  if (/ai|인공지능|정보|보안|알고리즘|데이터|모델링/.test(joinedLower)) trackKeywords.push("AI·정보·보안");
  if (/반도체|전자기|회로|전자|광학|파동/.test(joined)) trackKeywords.push("반도체·전자");

  if (/실험|측정|변인|관찰|전해|반응|검증|조작/.test(joined)) styleKeywords.push("실험형");
  if (/데이터|그래프|해석|통계|시각화|수치/.test(joined)) styleKeywords.push("데이터형");
  if (/시스템|설계|구조|모델|최적화|회로/.test(joined)) styleKeywords.push("시스템형");
  if (/윤리|사회|책임|시민|영향|안전/.test(joined)) styleKeywords.push("윤리·사회형");

  const activityKeywords = unique(
    keywordPool
      .flatMap(v => String(v || "").split(/[,·/()]/))
      .map(v => v.trim())
      .filter(v => v && v.length >= 2)
  ).slice(0, 40);

  return {
    student_id: student?.student_id || student?.id || "",
    track_keywords: unique(trackKeywords),
    activity_keywords: activityKeywords,
    selected_subjects: selectedSubjects,
    style_keywords: unique(styleKeywords)
  };
}

async function loadBaseStudent(){
  const params = new URLSearchParams(location.search);
  const sid = params.get('student_id') || 'shstudy09';

  const basicLink = document.getElementById('goBasic');
  const mappingLink = document.getElementById('goMapping');
  if (basicLink) basicLink.href = `./record_detail.html?student_id=${encodeURIComponent(sid)}`;
  if (mappingLink) mappingLink.href = `./record_detail_mapping.html?student_id=${encodeURIComponent(sid)}`;

  const baseDir = location.pathname.replace(/[^/]*$/, '');
  const paths = [
    `${baseDir}record_detail.json`,
    `${baseDir}record_detail_concrete.json`,
    `${baseDir}record_detail (1).json`
  ];

  for(const path of paths){
    try{
      const res = await fetch(path + `?v=${Date.now()}`, {cache:'no-store'});
      if(!res.ok) continue;
      const data = await res.json();
      const arr = Array.isArray(data?.students) ? data.students : [];
      const student = arr.find(s => String(s.student_id||s.id||'') === sid) || arr[0];
      if(student) return student;
    }catch(e){}
  }
  return null;
}

function inferDirectionText(studentInput, plans){
  const profile = plans?.[0]?.track_profile?.main_track || "";
  const mapping = {
    "배터리·에너지형":"배터리·에너지 중심 탐구형",
    "생명·의생명형":"생명·의생명 중심 탐구형",
    "환경·지구형":"환경·지구 중심 탐구형",
    "AI·정보형":"AI·정보 중심 탐구형",
    "반도체·전자형":"반도체·전자 중심 탐구형",
    "일반 이공 탐구형":"일반 이공 탐구형"
  };
  return mapping[profile] || unique(studentInput.track_keywords).join(", ") || "-";
}

function buildMatchReasons(match, studentInput){
  const reasons = [];
  const mk = unique(match?.matched_keywords || []).slice(0, 6);
  if (mk.length) reasons.push(`학생 키워드 ${mk.join(", ")}가 ${match.subject}의 ${match.unit}·${match.subunit}과 직접 연결됩니다.`);
  const concepts = unique(match?.core_concepts || []).slice(0, 3);
  if (concepts.length) reasons.push(`핵심 개념 ${concepts.join(", ")}이 현재 학생의 탐구 방향과 연결되어 후속 활동 설계가 쉽습니다.`);
  const majors = unique(match?.major_links || []).slice(0, 3);
  if (majors.length) reasons.push(`관련 전공 ${majors.join(", ")}과 이어져 진로 설계 근거로 활용하기 좋습니다.`);
  if ((studentInput.track_keywords || []).length) reasons.push(`진로축 ${studentInput.track_keywords.join(", ")} 기준으로도 우선 추천 가능한 단원입니다.`);
  return reasons.slice(0, 4);
}

function fillSidebar(student, studentInput, plans){
  document.getElementById('heroTitle').textContent = `${student.student_name || student.name || ''} 확장 활동 보기`;
  document.getElementById('studentBasic').textContent = `${student.student_name || student.name || ''} · ${student.school_name || student.school || ''}`;
  document.getElementById('directionValue').textContent = inferDirectionText(studentInput, plans);
  document.getElementById('subjectChips').innerHTML = unique(studentInput.selected_subjects).slice(0,12).map(v=>`<span class="chip">${esc(v)}</span>`).join('');
  const portfolioChips = unique([...(studentInput.track_keywords || []), ...(plans?.[0]?.track_profile?.keywords || [])]).slice(0,10);
  document.getElementById('portfolioChips').innerHTML = portfolioChips.map(v=>`<span class="chip">${esc(v)}</span>`).join('');
}

function cardHTML(plan, studentInput){
  const subject = plan?.source_match?.subject || '';
  const pair = COLORS[subject] || ['#fff','#5c6b7a'];
  const bg = pair[0], bd = pair[1];
  const matchScore = Number(plan?.source_match?.score || 0);
  const reasons = buildMatchReasons(plan?.source_match || {}, studentInput);

  const evidence = [
    `${plan.source_match.unit || ''} / ${plan.source_match.subunit || ''}`.trim(),
    `매칭 키워드: ${(plan.source_match.matched_keywords || []).join(', ') || '-'}`,
    `첫 탐구 질문: ${(plan.inquiry_questions || [])[0] || '-'}`
  ].filter(Boolean);

  const activities = (plan.roadmap || []).map(step => `
    <div class="activity-card">
      <div class="activity-title">${esc(step.stage || '')} · ${esc(step.level || '')}</div>
      <div class="field"><div class="field-label">핵심 활동</div><div class="field-body">${esc(step.action || '')}</div></div>
      <div class="field"><div class="field-label">구체 예시</div><div class="field-body">${esc(step.example || '')}</div></div>
      <div class="field"><div class="field-label">기록 포인트</div><div class="field-body">${esc(step.report_point || '')}</div></div>
    </div>
  `).join('');

  return `
  <section class="ext-card" style="--card-bg:${bg};--card-bd:${bd}">
    <div class="ext-head">
      <div>
        <div class="ext-title">${esc(subject)}</div>
        <div class="ext-sub">${esc(plan.source_match.unit || '')} · ${esc(plan.source_match.subunit || '')}</div>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="score-badge" style="background:${scoreColor(matchScore)}">${esc(matchScore)}</div>
        <div class="ext-tag">상위 자동 추천</div>
      </div>
    </div>

    <div class="dual">
      <div class="mini-box">
        <div class="mini-label">현재 강점</div>
        <div class="mini-body">${esc(`${plan.track_profile?.main_track || ''} 관점에서 ${subject} 단원이 강하게 매칭되고, ${(plan.source_match.matched_keywords || []).slice(0,4).join(', ')} 축이 선명합니다.`)}</div>
      </div>
      <div class="mini-box">
        <div class="mini-label">보완 지점</div>
        <div class="mini-body">개념 정리형에서 끝내지 말고 사례 비교, 변수 분석, 보고서 문장화까지 연결해야 학생부 설득력이 커집니다.</div>
      </div>
    </div>

    <div class="line-block">
      <div class="mini-label">왜 이 활동이 추천되는가</div>
      <ul class="reason-list">${reasons.map(v => `<li>${esc(v)}</li>`).join('')}</ul>
    </div>

    <div class="line-block">
      <div class="mini-label">현재 기록 근거</div>
      <ul class="evidence">${evidence.map(v => `<li>${esc(v)}</li>`).join('')}</ul>
    </div>

    <div class="line-block">
      <div class="mini-label">출발 → 확장 → 심화 → 완성 로드맵</div>
      <div class="activities">${activities}</div>
    </div>

    <div class="dual">
      <div class="mini-box">
        <div class="mini-label">추천 산출물</div>
        <div class="mini-body">${esc((plan.recommended_outputs || []).slice(0,5).join(' · ') || '-')}</div>
      </div>
      <div class="mini-box">
        <div class="mini-label">세특 문장 씨앗</div>
        <div class="mini-body">${esc((plan.record_sentence_seeds || []).slice(0,2).join(' · ') || '-')}</div>
      </div>
    </div>

    <div class="line-block">
      <div class="mini-label">입시 관점 해석</div>
      <div class="mini-body">${esc(plan.consulting_comment || '')}</div>
    </div>
  </section>`;
}

async function boot(){
  const cards = document.getElementById('cards');

  if (!window.StudentTextbookMatcher) {
    cards.innerHTML = `<div class="empty">student_textbook_matcher.js가 로드되지 않았습니다.</div>`;
    return;
  }
  if (!window.StudentTextbookExtensionEngine) {
    cards.innerHTML = `<div class="empty">student_textbook_extension_engine.js가 로드되지 않았습니다.</div>`;
    return;
  }

  const student = await loadBaseStudent();
  if(!student){
    cards.innerHTML = `<div class="empty">학생 데이터를 불러오지 못했습니다.</div>`;
    return;
  }

  const studentInput = buildStudentTextbookInputFromStudent(student);

  try{
    // 핵심: 학생 데이터만으로 확장하지 않고, 먼저 매핑 결과를 만든 뒤 그 results를 확장 엔진에 넘김
    const results = await window.StudentTextbookMatcher.runStudentTextbookMatch(studentInput, {
      textbookPath: "../univ-search/data/textbook_master.json",
      keywordMapPath: "../univ-search/data/student_textbook_keyword_map.json",
      minScore: 6,
      topN: 3
    });

    if(!results.length){
      fillSidebar(student, studentInput, []);
      cards.innerHTML = `<div class="empty">교과서 매핑 결과가 없어 확장 설계를 생성하지 못했습니다.</div>`;
      return;
    }

    const plans = window.StudentTextbookExtensionEngine.generateExtensionPlans(studentInput, results, { topN: 3 });
    fillSidebar(student, studentInput, plans);
    cards.innerHTML = plans.map(plan => cardHTML(plan, studentInput)).join('');
  }catch(err){
    console.error(err);
    cards.innerHTML = `<div class="empty">확장 설계 생성 중 오류가 발생했습니다.</div>`;
  }
}
boot();
</script>
</body>
</html>
