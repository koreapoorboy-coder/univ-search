<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>확장 활동 설계 보기</title>
  <style>
    :root{--bd:#e8e8e8;--txt:#111;--muted:#666;--bg:#fff;--soft:#fafafa}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--txt);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
    body{padding:14px}
    .wrap{max-width:1180px;margin:0 auto}
    .card{border:1px solid var(--bd);border-radius:26px;background:var(--bg);padding:22px;margin:14px 0}
    .title{font-size:24px;font-weight:900;line-height:1.3;margin:0}
    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .between{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .badge,.pill{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--bd);border-radius:999px;background:#fff;font-weight:800}
    .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-title{font-size:18px;font-weight:900;margin:0}
    .section-desc{color:var(--muted)}
    .toggle-wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .toggle,.mini-toggle{appearance:none;border:1px solid var(--bd);background:#fff;color:#111;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer;text-decoration:none}
    .toggle.is-on,.mini-toggle.is-on{background:#111;color:#fff;border-color:#111}
    .hero-title{font-size:30px;font-weight:900;line-height:1.3;margin:0}
    .one-line{font-size:18px;line-height:1.7;color:#333;margin-top:10px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid var(--bd);background:#fff;font-size:14px;font-weight:800}
    .block{border:1px solid var(--bd);border-radius:22px;padding:20px;background:#fff}
    .block + .block{margin-top:14px}
    .mini-title{font-size:15px;font-weight:900;margin:0 0 10px 0;color:#222}
    .guide{font-size:13px;color:var(--muted);margin:6px 2px}
    .plan-grid{display:grid;gap:16px}
    .plan-card{border:1px solid var(--bd);border-radius:22px;background:var(--soft);padding:18px}
    .plan-title{font-size:22px;font-weight:900;line-height:1.4;margin:0}
    .plan-role{font-size:14px;color:#333;line-height:1.7;margin-top:10px}
    .stack{display:grid;gap:12px;margin-top:14px}
    .item{border:1px solid var(--bd);border-radius:18px;background:#fff;padding:14px 16px}
    .item-label{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:6px}
    .item-body{color:#222;line-height:1.75;font-size:14px}
    .act-card{border:1px solid var(--bd);border-radius:18px;background:#fff;padding:16px 18px}
    .act-title{font-size:16px;font-weight:900;line-height:1.45}
    .act-row{border-top:1px dashed var(--bd);padding-top:10px;margin-top:10px}
    .empty{border:1px dashed var(--bd);border-radius:18px;padding:18px;color:var(--muted);background:#fff}
    @media (max-width:980px){
      .hero-title{font-size:26px}
      .one-line{font-size:17px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="between">
        <div>
          <h1 class="title">확장 활동 설계 보기</h1>
          <div class="sub" id="studentMeta">데이터를 불러오는 중입니다.</div>
        </div>
        <div class="row">
          <a href="record_detail.html" class="mini-toggle">기본 상담 보기</a>
          <span class="pill" id="previewBadge">확장 설계</span>
        </div>
      </div>
    </div>

    <div class="card" id="introCard"></div>
    <div class="card" id="planCard"></div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const safeArr = (v) => Array.isArray(v) ? v : [];
  const qs = new URLSearchParams(location.search);

  const state = { student:null };

  async function loadJson(path){
    const r = await fetch(path, { cache:'no-store' });
    if (!r.ok) throw new Error(`${path} (${r.status})`);
    return r.json();
  }

  async function loadRecordData(){
    const stamp = `v=${Date.now()}`;
    const candidates = [
      `./record_detail.json?${stamp}`,
      `record_detail.json?${stamp}`,
      `./data/record_detail.json?${stamp}`,
      `../record_detail.json?${stamp}`,
      `/record_detail.json?${stamp}`,
    ];
    const tried = [];
    for (const path of candidates) {
      try {
        const data = await loadJson(path);
        return { data, source: path, tried };
      } catch(e) { tried.push(path); }
    }
    throw new Error(`record_detail.json을 찾지 못했습니다. 시도한 경로: ${tried.join(', ')}`);
  }

  function pickStudentId(){
    return String(
      qs.get('student_id') ||
      qs.get('id') ||
      sessionStorage.getItem('student_id') ||
      localStorage.getItem('student_id') ||
      'shstudy09'
    ).trim();
  }

  function renderIntro(student, source){
    const ssp = student?.selected_subjects_plan || {};
    const integrated = ssp.integrated_direction || {};
    const secondary = ssp.secondary_track || {};
    const subjects = safeArr(student?.selected_subjects);
    $('#studentMeta').textContent = [
      student?.student_name || '',
      student?.school_name || student?.school || '',
      student?.student_id || ''
    ].filter(Boolean).join(' · ');
    $('#introCard').innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">선택과목 기반 전체 방향</div>
          <div class="section-desc">기본 상담과 분리된 2차 확장 상담용 화면입니다.</div>
        </div>
      </div>

      <div class="block">
        <h2 class="hero-title">${esc(student?.student_name || '')} 확장 활동 설계</h2>
        <div class="one-line">${esc(ssp.counseling_message || '선택과목 기반 다음 단계 활동 설계를 보여주는 영역입니다.')}</div>
      </div>

      <div class="block">
        <div class="mini-title">선택과목</div>
        <div class="chips">${subjects.length ? subjects.map(s => `<span class="chip">${esc(s)}</span>`).join('') : '<div class="empty">선택과목 데이터가 없습니다.</div>'}</div>
      </div>

      <div class="block">
        <div class="mini-title">전체 방향</div>
        <div class="stack">
          <div class="item">
            <div class="item-label">주력 축</div>
            <div class="item-body">${esc(integrated.primary_track || '')}${integrated.reason ? ` - ${esc(integrated.reason)}` : ''}</div>
          </div>
          <div class="item">
            <div class="item-label">보조 축</div>
            <div class="item-body">${esc(secondary.secondary_track || '')}${secondary.reason ? ` - ${esc(secondary.reason)}` : ''}</div>
          </div>
          <div class="item">
            <div class="item-label">설계 메모</div>
            <div class="item-body">${esc(ssp.selection_design_note || '기본 상담에서 드러난 강점과 선택과목 흐름을 연결해 다음 단계 활동을 설계합니다.')}</div>
          </div>
        </div>
      </div>

      <div class="guide">불러온 데이터 경로: ${esc(source)}</div>
    `;
  }

  function renderPlans(student){
    const ssp = student?.selected_subjects_plan || {};
    const list = safeArr(ssp.selection_subjects || ssp.subjects);
    if (!list.length) {
      $('#planCard').innerHTML = `
        <div class="section-h">
          <div>
            <div class="section-title">과목별 다음 단계 설계</div>
            <div class="section-desc">선택과목 설계 데이터가 없습니다.</div>
          </div>
        </div>
        <div class="empty">selected_subjects_plan 안의 selection_subjects 또는 subjects 데이터를 확인해 주세요.</div>
      `;
      return;
    }

    $('#planCard').innerHTML = `
      <div class="section-h">
        <div>
          <div class="section-title">과목별 다음 단계 설계</div>
          <div class="section-desc">과목 역할 → 현재 강점 → 보완 지점 → 다음 활동 흐름으로 분리했습니다.</div>
        </div>
      </div>
      <div class="plan-grid">
        ${list.map(item => `
          <div class="plan-card">
            <div class="plan-title">${esc(item.subject || '')}</div>
            <div class="plan-role">${esc(item.course_role || '')}</div>

            <div class="stack">
              <div class="item">
                <div class="item-label">현재 강점</div>
                <div class="item-body">${esc(item.current_strength || '')}</div>
              </div>
              <div class="item">
                <div class="item-label">보완 지점</div>
                <div class="item-body">${esc(item.gap_point || '')}</div>
              </div>
              <div class="item">
                <div class="item-label">현재 기록 근거</div>
                <div class="item-body">
                  ${Array.isArray(item.current_evidence) ? item.current_evidence.map(v => `• ${esc(v)}`).join('<br>') : esc(item.current_evidence || '')}
                </div>
              </div>
            </div>

            <div class="block" style="margin-top:14px;">
              <div class="mini-title">다음 단계 활동</div>
              <div class="stack">
                ${safeArr(item.next_stage_activities).length ? safeArr(item.next_stage_activities).map(act => `
                  <div class="act-card">
                    <div class="act-title">${esc(act.title || '')}</div>
                    <div class="act-row">
                      <div class="item-label">왜 필요한가</div>
                      <div class="item-body">${esc(act.why_needed || '')}</div>
                    </div>
                    <div class="act-row">
                      <div class="item-label">활동 내용</div>
                      <div class="item-body">${esc(act.activity_detail || '')}</div>
                    </div>
                    <div class="act-row">
                      <div class="item-label">기록 변화</div>
                      <div class="item-body">${esc(act.expected_record_change || '')}</div>
                    </div>
                  </div>
                `).join('') : '<div class="empty">다음 단계 활동 데이터가 없습니다.</div>'}
              </div>
            </div>

            <div class="block" style="margin-top:14px;">
              <div class="mini-title">입시 관점</div>
              <div class="item-body">${esc(item.admission_view || '')}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  async function boot(){
    const loaded = await loadRecordData();
    const sid = pickStudentId();
    const students = Array.isArray(loaded.data?.students) ? loaded.data.students : [];
    const student = students.find(s => String(s.student_id || '').trim() === sid) || students[0] || null;
    if (!student) throw new Error('학생 데이터를 찾지 못했습니다.');
    state.student = student;
    renderIntro(student, loaded.source);
    renderPlans(student);
  }

  boot().catch(err => {
    $('#studentMeta').textContent = '데이터를 불러오지 못했습니다.';
    $('#introCard').innerHTML = `<div class="empty">${esc(err?.message || err)}</div>`;
    $('#planCard').innerHTML = '';
  });
})();
</script>
</body>
</html>
