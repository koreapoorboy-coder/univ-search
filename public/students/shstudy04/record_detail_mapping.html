<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>생활기록부 연결</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;color:#111;margin:0}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:20px;margin-bottom:18px}
    .title{font-size:20px;font-weight:800;margin:0 0 12px}
    .sub{color:#475569;margin:0 0 10px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .chip{display:inline-block;padding:8px 12px;border:1px solid #dbe2f0;border-radius:999px;background:#f6f8fc;margin:4px 6px 0 0}
    .score{width:88px;height:88px;border-radius:24px;background:#6b7280;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800}
    .row{display:flex;justify-content:space-between;gap:20px;align-items:flex-start}
    .box{border:1px solid #e5e7eb;border-radius:18px;padding:16px;background:#fff}
    ul{margin:8px 0 0 20px;padding:0}
    li{margin:6px 0}
    .section-title{font-size:14px;color:#64748b;margin-bottom:8px;font-weight:700}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.row{flex-direction:column}.score{width:72px;height:72px;font-size:24px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">생활기록부 연결</div>
      <p class="sub">현재 기록 → 연결 개념 → 확장 질문 → 다음 과목 역할 흐름으로 보여주는 입시형 카드 구조입니다.</p>
    </div>
    <div id="app"></div>
  </div>

  <script>
    async function loadJson(path){
      const res = await fetch(path, {cache:'no-store'});
      if(!res.ok) throw new Error(path + ' 로드 실패');
      return await res.json();
    }
    function qs(name){
      return new URL(location.href).searchParams.get(name);
    }
    function h(s){ return String(s||'').replace(/[&<>"]/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }

    async function main(){
      const targetId = qs('student_id') || 'shstudy04';
      const detail = await loadJson('./record_detail.json');
      const ext = await loadJson('./record_detail_extension.json');
      const rules = await loadJson('../../univ-search/data/student_extension_rules.json');
      const student = detail[targetId] || {};
      const extStudent = ext[targetId] || {};
      const fakeMatches = (student?.detail?.subjects || []).flatMap(s => (s.keywords || []).map(k => ({
        subject: s.subject || '',
        unit: k,
        matched_keywords: [k],
        core_concepts: [k]
      })));

      const rec = window.StudentTextbookRecommendationEngine.generateRecommendations(fakeMatches, extStudent, rules, targetId);
      const app = document.getElementById('app');
      const cards = (rec.recommended_subjects || []).map(item => `
        <div class="card">
          <div class="row">
            <div style="flex:1">
              <div class="title">${h(item.subject)}</div>
              <p class="sub">${h(item.next_subject_role)}</p>
            </div>
            <div class="score">${h(item.auto_score)}</div>
          </div>
          <div class="grid">
            <div class="box">
              <div class="section-title">연결 개념</div>
              ${(item.connection_concepts || []).map(v=>`<span class="chip">${h(v)}</span>`).join('')}
            </div>
            <div class="box">
              <div class="section-title">다음 과목 역할</div>
              <div>${h(item.next_subject_role)}</div>
            </div>
            <div class="box">
              <div class="section-title">확장 질문</div>
              <ul>${(item.expansion_questions || []).map(v=>`<li>${h(v)}</li>`).join('')}</ul>
            </div>
            <div class="box">
              <div class="section-title">교과서 연결 근거</div>
              <div>${(item.textbook_connection?.related_units || []).map(v=>`<span class="chip">${h(v)}</span>`).join('')}</div>
              <p class="sub" style="margin-top:10px">${h(item.textbook_connection?.concept_link || '')}</p>
            </div>
            <div class="box" style="grid-column:1 / -1">
              <div class="section-title">학교 안에서 작동 가능한 장면</div>
              <ul>${(item.school_scene || []).map(v=>`<li>${h(v)}</li>`).join('')}</ul>
            </div>
            <div class="box" style="grid-column:1 / -1">
              <div class="section-title">왜 다음 과목 후보인가</div>
              <ul>${(item.auto_reasons || []).map(v=>`<li>${h(v)}</li>`).join('')}</ul>
            </div>
          </div>
        </div>
      `).join('');

      app.innerHTML = cards || '<div class="card">추천 결과가 없습니다.</div>';
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (!window.StudentTextbookRecommendationEngine) {
        const s = document.createElement('script');
        s.src = '../../univ-search/data/student_textbook_recommendation_engine.js';
        s.onload = () => main().catch(err => { document.getElementById('app').innerHTML = '<div class="card">' + h(err.message) + '</div>'; });
        s.onerror = () => { document.getElementById('app').innerHTML = '<div class="card">추천 엔진 로드 실패</div>'; };
        document.body.appendChild(s);
      } else {
        main().catch(err => { document.getElementById('app').innerHTML = '<div class="card">' + h(err.message) + '</div>'; });
      }
    });
  </script>
</body>
</html>
