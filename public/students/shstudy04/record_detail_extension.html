<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_extension</title>
<style>
:root{--bg:#f5f8fd;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1460px;margin:0 auto;padding:24px 18px 48px}
.hero,.side,.ext-card,.topbar{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
.hero{padding:26px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:34px}.sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:#16202a;font-weight:900}.nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;align-items:start}.side{padding:20px;position:sticky;top:18px}.side-title{font-size:20px;font-weight:900;margin:0 0 12px}.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.side-box+.side-box{margin-top:12px}.label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.value{font-weight:800;line-height:1.8}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:16px}.topbar{padding:14px 16px}.topbar-title{font-weight:900}.topbar-sub{font-size:13px;color:var(--sub);font-weight:700;margin-top:3px}.btn{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:900;cursor:pointer}
.ext-card{padding:20px}.ext-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px}.ext-title{font-size:26px;font-weight:900}.ext-sub{margin-top:6px;color:var(--sub);font-weight:700;line-height:1.65}.ext-tag{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:900}.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mini-box,.line-block,.activity-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.mini-title,.field-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.mini-body,.field-body{font-weight:800;line-height:1.8}.field+.field{margin-top:10px}
.activities{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.activity-title{font-size:16px;font-weight:900;line-height:1.45;margin-bottom:10px}
.list{margin:0;padding-left:18px;line-height:1.9;font-weight:800}.stack{display:grid;gap:12px}.muted{color:var(--sub)}.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:18px;line-height:1.8;color:var(--sub)}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto}.activities{grid-template-columns:1fr}}
@media (max-width:760px){.wrap{padding:14px 12px 32px}.hero{padding:18px}.hero h1{font-size:26px}.dual{grid-template-columns:1fr}.ext-title{font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="heroTitle">학생 포트폴리오 확장 설계</h1>
    <div class="sub">선택과목 계획과 연결점을 기준으로, 학교 안에서 실제로 작동할 수 있는 확장 방향을 근거 중심으로 정리한 화면입니다.</div>
    <div class="nav">
      <a id="goBasic" href="./record_detail.html">생활기록부 분석</a>
      <a id="goMapping" href="./record_detail_mapping.html">생활기록부 연결</a>
      <a class="active">확장 활동 보기</a>
      <a id="goCreative" href="./record_creative.html">창의체험활동 분석</a>
      <a id="goRaw" href="./record_detail_raw.html">생활기록부 원문</a>
    </div>
  </section>

  <div class="layout">
    <aside class="side">
      <h2 class="side-title">학생 요약</h2>
      <div class="side-box"><div class="label">학생</div><div class="value" id="studentBasic"></div></div>
      <div class="side-box"><div class="label">통합 방향</div><div class="value" id="directionValue"></div></div>
      <div class="side-box"><div class="label">보조 축</div><div class="value" id="secondaryValue"></div></div>
      <div class="side-box"><div class="label">확장 과목</div><div class="chips" id="subjectChips"></div></div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div>
          <div class="topbar-title">확장 활동 설계 결과</div>
          <div class="topbar-sub" id="resultInfo">상위 3개 과목을 먼저 보여줍니다.</div>
        </div>
        <button class="btn" id="toggleMoreBtn" type="button">더 보기</button>
      </section>
      <div id="cards"></div>
    </main>
  </div>
</div>

<script>
const COLORS={"물리학":["#f6fbff","#4f8cc9"],"물리학Ⅰ":["#f6fbff","#4f8cc9"],"물리학Ⅱ":["#f6fbff","#4f8cc9"],"화학":["#fff8f3","#e38b2c"],"화학Ⅰ":["#fff8f3","#e38b2c"],"화학Ⅱ":["#fff8f3","#e38b2c"],"생명과학":["#f7fcf7","#4da866"],"생명과학Ⅰ":["#f7fcf7","#4da866"],"고급화학":["#fff7fb","#c05693"],"대수":["#f8f6ff","#7e66d4"],"미적분":["#f8f6ff","#7e66d4"],"기하":["#f8f6ff","#7e66d4"],"문학":["#fffaf4","#cf8d3c"]};
const esc=(s='')=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
const liList=(arr=[])=>Array.isArray(arr)&&arr.length?`<ul class="list">${arr.map(v=>`<li>${esc(v)}</li>`).join('')}</ul>`:`<div class="muted">표시할 내용이 없습니다.</div>`;
let SHOW_ALL=false, ALL_SUBJECTS=[];

function activityCards(subj){
  const acts=Array.isArray(subj.next_stage_activities)?subj.next_stage_activities:[];
  if(!acts.length) return '<div class="muted">추가된 안내 데이터가 없습니다.</div>';
  return `<div class="activities">${acts.map(a=>`
    <div class="activity-card">
      <div class="activity-title">${esc(a.title||'')}</div>
      <div class="field"><div class="field-label">이 방향이 자연스러운 이유</div><div class="field-body">${esc(a.why_needed||'')}</div></div>
      <div class="field"><div class="field-label">학교 안에서 연결 가능한 접근</div><div class="field-body">${esc(a.activity_detail||'')}</div></div>
      <div class="field"><div class="field-label">학생부에서 읽힐 수 있는 포인트</div><div class="field-body">${esc(a.expected_record_change||'')}</div></div>
    </div>`).join('')}</div>`;
}

function textbookBlock(subj){
  const t=subj.textbook_connection||{};
  const units=Array.isArray(t.related_units)&&t.related_units.length ? `<div class="field"><div class="field-label">관련 단원</div>${liList(t.related_units)}</div>` : '';
  const concepts=Array.isArray(t.core_concepts)&&t.core_concepts.length ? `<div class="field"><div class="field-label">핵심 개념</div>${liList(t.core_concepts)}</div>` : '';
  const link=t.concept_link ? `<div class="field"><div class="field-label">연결 해석</div><div class="field-body">${esc(t.concept_link)}</div></div>` : '';
  if(!units && !concepts && !link) return '';
  return `<div class="line-block"><div class="mini-title">교과서 연결 근거</div><div class="stack">${units}${concepts}${link}</div></div>`;
}

function cardHTML(subj){
  const evidence=Array.isArray(subj.current_evidence)?subj.current_evidence:[];
  const schoolScene=Array.isArray(subj.school_scene)?subj.school_scene:[];
  const [bg,bd]=COLORS[subj.subject]||['#fff','#5c6b7a'];
  return `
  <section class="ext-card" style="background:${bg};border-color:${bd}">
    <div class="ext-head">
      <div>
        <div class="ext-title">${esc(subj.subject||'')}</div>
        <div class="ext-sub">${esc(subj.course_role||'')}</div>
      </div>
      <div class="ext-tag">방향 안내</div>
    </div>

    <div class="dual">
      <div class="mini-box"><div class="mini-title">현재 강점</div><div class="mini-body">${esc(subj.current_strength||subj.guidance_strength||'')}</div></div>
      <div class="mini-box"><div class="mini-title">보완 관점</div><div class="mini-body">${esc(subj.gap_point||subj.guidance_improve||'')}</div></div>
    </div>

    <div class="line-block"><div class="mini-title">현재 기록 근거</div>${liList(evidence)}</div>
    ${textbookBlock(subj)}
    <div class="line-block"><div class="mini-title">확장 가능 방향</div>${activityCards(subj)}</div>
    <div class="line-block"><div class="mini-title">학교 안에서 작동 가능한 장면</div>${liList(schoolScene)}</div>
    <div class="line-block"><div class="mini-title">평가상 해석 포인트</div><div class="mini-body">${esc(subj.admission_view||subj.guidance_record_point||'')}</div></div>
  </section>`;
}

function renderCards(){
  const wrap=document.getElementById('cards');
  const info=document.getElementById('resultInfo');
  const btn=document.getElementById('toggleMoreBtn');
  const visible=SHOW_ALL?ALL_SUBJECTS:ALL_SUBJECTS.slice(0,3);
  wrap.innerHTML=visible.map(cardHTML).join('') || '<div class="empty">데이터가 없습니다.</div>';
  info.textContent=SHOW_ALL?`전체 ${ALL_SUBJECTS.length}개 과목을 표시 중입니다.`:`상위 3개 / 전체 ${ALL_SUBJECTS.length}개 과목`;
  btn.textContent=SHOW_ALL?'접기':'더 보기';
  btn.style.display=ALL_SUBJECTS.length>3?'inline-block':'none';
}

(async function(){
  const qs=new URLSearchParams(location.search);
  const sid=qs.get('student_id')||'shstudy04';
  const yearIdx=Number(qs.get('year_idx')||'0')||0;
  document.getElementById('goBasic').href=`./record_detail.html?student_id=${encodeURIComponent(sid)}&year_idx=${yearIdx}`;
  document.getElementById('goMapping').href=`./record_detail_mapping.html?student_id=${encodeURIComponent(sid)}&year_idx=${yearIdx}`;
  document.getElementById('goCreative').href=`./record_creative.html?student_id=${encodeURIComponent(sid)}`;
  document.getElementById('goRaw').href=`./record_detail_raw.html?student_id=${encodeURIComponent(sid)}`;

  const res=await fetch('./record_detail_extension.json?v='+Date.now(), {cache:'no-store'});
  const data=await res.json();
  const student=(data.students||[]).find(s=>String(s.student_id||'')===sid)||(data.students||[])[0]||{};
  const plan=student.selected_subjects_plan||{};
  ALL_SUBJECTS=plan.selection_subjects||[];

  document.getElementById('heroTitle').textContent=`${student.student_name||'학생'} 학생 포트폴리오 확장 설계`;
  document.getElementById('studentBasic').textContent=`${student.student_name||''} · ${student.school_name||''}`;
  document.getElementById('directionValue').textContent=plan.integrated_direction||student.track||'';
  document.getElementById('secondaryValue').textContent=plan.secondary_track||'';
  document.getElementById('subjectChips').innerHTML=(ALL_SUBJECTS||[]).map(v=>`<span class="chip">${esc(v.subject||'')}</span>`).join('');
  renderCards();
  document.getElementById('toggleMoreBtn').onclick=()=>{SHOW_ALL=!SHOW_ALL; renderCards();};
})();
</script>
</body>
</html>
