<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>확장 활동 보기</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --ink:#111827; --muted:#6b7280;
      --line:#e5e7eb; --soft:#f3f4f6; --brand:#2563eb; --brand2:#0ea5e9;
      --good:#065f46; --warn:#92400e;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:1100px;margin:0 auto;padding:22px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    .title{font-size:28px;font-weight:800}
    .sub{color:var(--muted);font-size:14px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;text-decoration:none;color:var(--ink);font-weight:700}
    .hero{background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1px solid #dbeafe;border-radius:20px;padding:18px 18px 14px;margin-bottom:18px}
    .hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
    .hero h2{margin:0 0 8px;font-size:20px}
    .hero p{margin:0;color:#334155;line-height:1.7}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .meta .box{background:#fff;border:1px solid #dbeafe;border-radius:16px;padding:12px}
    .meta .label{font-size:12px;color:#64748b;font-weight:700;margin-bottom:6px}
    .meta .value{font-size:15px;font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 18px rgba(15,23,42,.04)}
    .card h3{margin:0 0 6px;font-size:22px}
    .role{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;margin-bottom:12px}
    .section{margin-top:14px;padding:12px 13px;border-radius:14px;background:var(--soft);border:1px solid #eef2f7}
    .section h4{margin:0 0 8px;font-size:15px}
    .section p{margin:0;color:#374151;line-height:1.7}
    ul.clean{margin:0;padding-left:18px}
    ul.clean li{margin:6px 0;color:#374151;line-height:1.6}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:#334155}
    .k{color:#334155;font-weight:800}
    .muted{color:var(--muted)}
    .empty{padding:18px;border:1px dashed #cbd5e1;background:#fff;border-radius:16px;color:#64748b}
    .footer-note{margin-top:16px;padding:14px 16px;border-radius:16px;background:#fffbeb;border:1px solid #fde68a;color:#78350f;line-height:1.7}
    .loading{padding:18px;border:1px dashed #cbd5e1;background:#fff;border-radius:16px}
    @media (max-width:900px){
      .hero-grid,.grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">확장 활동 보기</div>
        <div class="sub">시작한 흐름을 학교 안에서 어떻게 설계해 갈지 보여주는 전문형 페이지</div>
      </div>
      <div class="toolbar">
        <a class="btn" href="./record_detail.html">생활기록부 분석</a>
        <a class="btn" href="./record_detail_mapping.html">생활기록부 연결</a>
        <a class="btn" href="./record_creative.html">창의체험활동 분석</a>
        <a class="btn" href="./record_detail_raw.html">생활기록부 원문</a>
      </div>
    </div>

    <div id="app" class="loading">로딩 중...</div>
  </div>

<script src="../../univ-search/data/student_textbook_extension_engine.js"></script>
<script>
(async function(){
  const qs = new URLSearchParams(location.search);
  const targetId = qs.get('student_id') || location.pathname.split('/').filter(Boolean).slice(-2,-1)[0] || 'shstudy04';

  const app = document.getElementById('app');

  function h(v){ return String(v ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
  function arr(v){ return Array.isArray(v) ? v : []; }
  async function loadJson(path){
    const res = await fetch(path, {cache:'no-store'});
    if(!res.ok) throw new Error(path + ' 로딩 실패');
    return await res.json();
  }

  function firstStudent(payload, id){
    if(Array.isArray(payload?.students)) return payload.students.find(s => s.student_id === id) || {};
    return payload?.[id] || {};
  }

  function mergeUnique(a,b){
    return [...new Set([...(Array.isArray(a)?a:[]), ...(Array.isArray(b)?b:[])].filter(Boolean))];
  }

  function normalizePlanSubject(s){
    return {
      subject: s?.subject || '',
      course_role: s?.course_role || '',
      current_evidence: s?.current_evidence || '',
      current_strength: s?.current_strength || '',
      gap_point: s?.gap_point || '',
      next_stage_activities: arr(s?.next_stage_activities),
      admission_view: s?.admission_view || '',
      textbook_connection: s?.textbook_connection || null,
      school_scene: arr(s?.school_scene),
      expansion_questions: arr(s?.expansion_questions),
      execution_plan: arr(s?.execution_plan),
      output_structure: arr(s?.output_structure),
      record_point: arr(s?.record_point),
      evaluation_point: s?.evaluation_point || ''
    };
  }

  function buildFallbackMatches(detailStudent){
    const years = arr(detailStudent?.years);
    const subjects = years.flatMap(y => arr(y?.subjects));
    return subjects.flatMap(s => {
      const bag = []
        .concat(arr(s?.activity_framework))
        .concat(arr(s?.axis_list))
        .concat(arr(s?.evaluation_priority))
        .concat(arr(s?.inquiry_flow).map(v => typeof v === 'string' ? v : (v?.title || '')))
        .filter(Boolean);

      return bag.map(k => ({
        subject: s?.subject || '',
        unit: k,
        matched_keywords: [k],
        core_concepts: [k]
      }));
    });
  }

  function renderList(title, items){
    const list = arr(items).filter(Boolean);
    if(!list.length) return '';
    return `
      <div class="section">
        <h4>${h(title)}</h4>
        <ul class="clean">${list.map(v => `<li>${h(v)}</li>`).join('')}</ul>
      </div>
    `;
  }

  function renderChips(title, items){
    const list = arr(items).filter(Boolean);
    if(!list.length) return '';
    return `
      <div class="section">
        <h4>${h(title)}</h4>
        <div class="chips">${list.map(v => `<span class="chip">${h(v)}</span>`).join('')}</div>
      </div>
    `;
  }

  function renderSubjectCard(item){
    const auto = item?.auto_generated || {};
    const relatedUnits = arr(item?.textbook_connection?.related_units || auto?.textbook_connection?.related_units);
    const conceptLink = item?.textbook_connection?.concept_link || auto?.textbook_connection?.concept_link || '';
    const schoolScenes = mergeUnique(item?.school_scene, auto?.school_scene);
    const executionPlan = mergeUnique(item?.execution_plan, auto?.execution_plan);
    const questions = mergeUnique(item?.expansion_questions, auto?.expansion_questions);
    const outputStructure = mergeUnique(item?.output_structure, auto?.output_structure);
    const recordPoint = mergeUnique(item?.record_point, auto?.record_point);

    return `
      <div class="card">
        <h3>${h(item.subject || '과목')}</h3>
        ${item.course_role ? `<div class="role">${h(item.course_role)}</div>` : ''}

        <div class="section">
          <h4>현재 강점</h4>
          <p>${h(item.current_strength || auto.current_strength || '현재 기록을 바탕으로 확장 가능성을 해석하는 단계')}</p>
        </div>

        <div class="section">
          <h4>보완 관점</h4>
          <p>${h(item.gap_point || auto.gap_point || '현재 흐름을 더 명확한 질문과 개념으로 묶어가는 과정이 필요함')}</p>
        </div>

        <div class="section">
          <h4>현재 기록 근거</h4>
          <p>${h(item.current_evidence || auto.current_evidence || '현재 학생 기록에서 확인되는 핵심 표현을 기반으로 설계')}</p>
        </div>

        ${relatedUnits.length || conceptLink ? `
          <div class="section">
            <h4>교과서 연결 근거</h4>
            ${relatedUnits.length ? `<div class="chips" style="margin-bottom:8px">${relatedUnits.map(v=>`<span class="chip">${h(v)}</span>`).join('')}</div>` : ''}
            ${conceptLink ? `<p>${h(conceptLink)}</p>` : ''}
          </div>
        ` : ''}

        ${renderList('확장 가능 방향', arr(auto.expansion_direction || item.expansion_direction))}
        ${renderList('세부 실행 설계', executionPlan)}
        ${renderList('탐구 질문', questions)}
        ${renderList('보고서·발표 구조', outputStructure)}
        ${renderList('학교 안에서 작동 가능한 장면', schoolScenes)}
        ${renderList('학생부에서 읽힐 수 있는 포인트', recordPoint)}

        ${(item.evaluation_point || auto.evaluation_point || item.admission_view) ? `
          <div class="section">
            <h4>평가상 해석 포인트</h4>
            <p>${h(item.evaluation_point || auto.evaluation_point || item.admission_view)}</p>
          </div>
        ` : ''}
      </div>
    `;
  }

  try{
    const [detail, ext, rules] = await Promise.all([
      loadJson('./record_detail.json'),
      loadJson('./record_detail_extension.json'),
      loadJson('../../univ-search/data/student_extension_rules.json')
    ]);

    const detailStudent = firstStudent(detail, targetId);
    const extStudent = firstStudent(ext, targetId);

    const plan = extStudent?.selected_subjects_plan || {};
    const planSubjects = arr(plan?.selection_subjects).map(normalizePlanSubject);
    const matches = buildFallbackMatches(detailStudent);

    let autoSubjects = [];
    if(window.StudentTextbookExtensionEngine && typeof window.StudentTextbookExtensionEngine.generateExtensionPlan === 'function'){
      try{
        const generated = window.StudentTextbookExtensionEngine.generateExtensionPlan(matches, detailStudent, extStudent, rules, targetId) || {};
        autoSubjects = arr(generated?.selection_subjects || generated?.subjects || []);
      }catch(err){
        console.error(err);
      }
    }

    const mergedMap = new Map();
    planSubjects.forEach(s => mergedMap.set(s.subject, {...s}));
    autoSubjects.forEach(s => {
      const prev = mergedMap.get(s.subject) || {subject: s.subject};
      mergedMap.set(s.subject, {
        ...prev,
        auto_generated: s,
        textbook_connection: prev.textbook_connection || s.textbook_connection || null,
        school_scene: mergeUnique(prev.school_scene, s.school_scene),
        expansion_questions: mergeUnique(prev.expansion_questions, s.expansion_questions),
        execution_plan: mergeUnique(prev.execution_plan, s.execution_plan),
        output_structure: mergeUnique(prev.output_structure, s.output_structure),
        record_point: mergeUnique(prev.record_point, s.record_point),
        evaluation_point: prev.evaluation_point || s.evaluation_point || ''
      });
    });

    const subjects = [...mergedMap.values()];
    const studentName = extStudent?.student_name || detailStudent?.student_name || targetId;
    const schoolName = extStudent?.school_name || detailStudent?.school_name || '';
    const integratedDirection = plan?.integrated_direction || extStudent?.main_track || '';
    const secondaryTrack = plan?.secondary_track || extStudent?.sub_track || '';

    app.className = '';
    app.innerHTML = `
      <div class="hero">
        <div class="hero-grid">
          <div>
            <h2>${h(studentName)} 확장 활동 설계</h2>
            <p>
              이 페이지는 <span class="k">시작한 흐름을 학교 안에서 어떻게 설계해 갈지</span>를 보여주는 전문형 페이지야.
              생활기록부 연결이 “어디서 시작할지”를 보여준다면, 여기서는 그 시작을
              <span class="k">질문·실행·결과물 구조</span>로 풀어가는 데 초점을 둔다.
            </p>
          </div>
          <div class="meta">
            <div class="box">
              <div class="label">학교</div>
              <div class="value">${h(schoolName || '미입력')}</div>
            </div>
            <div class="box">
              <div class="label">통합 방향</div>
              <div class="value">${h(integratedDirection || '미설정')}</div>
            </div>
            <div class="box">
              <div class="label">보조 축</div>
              <div class="value">${h(secondaryTrack || '미설정')}</div>
            </div>
            <div class="box">
              <div class="label">과목 수</div>
              <div class="value">${subjects.length}개</div>
            </div>
          </div>
        </div>
      </div>

      ${subjects.length ? `<div class="grid">${subjects.map(renderSubjectCard).join('')}</div>` : `<div class="empty">표시할 확장 과목 데이터가 없습니다.</div>`}

      <div class="footer-note">
        생활기록부 연결 페이지와 달리, 여기서는 <b>질문·실행 설계·결과물 구조</b>를 더 세분화해서 보여준다.
        다만 학교별 수업 구조와 담당 교사 방식이 다르므로, 확정형 지시가 아니라
        <b>학교 안에서 작동 가능한 설계 방향</b>을 제시하는 형태로 읽으면 된다.
      </div>
    `;
  }catch(err){
    console.error(err);
    app.className = 'empty';
    app.innerHTML = `오류: ${h(err.message || err)}`;
  }
})();
</script>
</body>
</html>
