<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_extension_shstudy04</title>
<style>
:root{--bg:#f5f8fd;--line:#dfe8f4;--text:#16202a;--sub:#5c6b7a;--shadow:0 12px 30px rgba(22,32,42,.08)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif}
.wrap{max-width:1460px;margin:0 auto;padding:24px 18px 48px}
.hero{background:linear-gradient(135deg,#fff,#f7fbff);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:26px;margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:34px}
.sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.nav a{text-decoration:none;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:900}
.nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;align-items:start}
.side{position:sticky;top:18px;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.side-title{font-size:20px;font-weight:900;margin:0 0 12px}
.side-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}
.side-box + .side-box{margin-top:12px}
.side-label{font-size:12px;color:var(--sub);font-weight:800;margin-bottom:5px}
.side-value{font-weight:900;line-height:1.75}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef4ff;border:1px solid #d7e3ff;font-size:13px;font-weight:800}
.main{display:grid;gap:16px}
.ext-card{background:var(--card-bg);border:1px solid var(--line);border-left:8px solid var(--card-bd);border-radius:24px;box-shadow:var(--shadow);padding:20px}
.ext-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.ext-title{font-size:28px;font-weight:900;line-height:1.3}
.ext-sub{margin-top:8px;color:#334155;line-height:1.75}
.ext-tag{padding:8px 12px;border-radius:999px;background:var(--card-tag);border:1px solid rgba(0,0,0,.05);font-size:12px;font-weight:900}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.mini-box{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:14px}
.mini-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}
.mini-body{line-height:1.8}
.line-block{margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,0,0,.08)}
.evidence{margin:0;padding-left:18px;line-height:1.8}
.activities{display:grid;gap:12px}
.activity-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:14px}
.activity-title{font-size:16px;font-weight:900;line-height:1.5;margin-bottom:10px}
.field + .field{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(0,0,0,.08)}
.field-label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:4px}
.field-body{line-height:1.75}
@media (max-width:1020px){.layout{grid-template-columns:1fr}.side{position:static}.dual{grid-template-columns:1fr}.ext-title{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 id="heroTitle">shstudy04 확장 제언</h1>
    <div class="sub">shstudy04 학생 전용 확장 제언 화면입니다. 선택과목과 진로 방향을 기준으로 다음 단계 활동을 제안합니다.</div>
    <div class="nav">
      <a href="./record_detail.html">기본 상담 보기</a>
      <a class="active">확장 활동 보기</a>
    </div>
  </section>
  <div class="layout">
    <aside class="side">
      <h2 class="side-title">학생 요약</h2>
      <div class="side-box"><div class="side-label">학교</div><div class="side-value" id="school"></div></div>
      <div class="side-box"><div class="side-label">진로 방향</div><div class="side-value" id="track"></div></div>
      <div class="side-box"><div class="side-label">보조 축</div><div class="side-value" id="secondary"></div></div>
      <div class="side-box"><div class="side-label">핵심 과목</div><div class="chips" id="subjects"></div></div>
    </aside>
    <main class="main" id="cards"></main>
  </div>
</div>
<script>
const COLORS={
 "문학":["#f6fbff","#4f8cc9","#eff7ff"],
 "대수":["#f8f6ff","#7e66d4","#f1ecff"],
 "화학":["#fff8f3","#e38b2c","#fff1e2"],
 "생명과학":["#f7fcf7","#4da866","#eefaf0"],
 "기하":["#fff7fb","#c05693","#fdeaf4"]
};
const esc=s=>String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
function makeCard(s){
 const c=COLORS[s.subject]||["#fff","#5c6b7a","#f5f5f5"];
 const ev=(s.current_evidence||[]).map(v=>`<li>${esc(v)}</li>`).join('');
 const acts=(s.next_stage_activities||[]).map(a=>`
   <div class="activity-card">
     <div class="activity-title">${esc(a.title)}</div>
     <div class="field"><div class="field-label">왜 필요한가</div><div class="field-body">${esc(a.why_needed)}</div></div>
     <div class="field"><div class="field-label">활동 내용</div><div class="field-body">${esc(a.activity_detail)}</div></div>
     <div class="field"><div class="field-label">기록 변화</div><div class="field-body">${esc(a.expected_record_change)}</div></div>
   </div>`).join('');
 return `<section class="ext-card" style="--card-bg:${c[0]};--card-bd:${c[1]};--card-tag:${c[2]}">
   <div class="ext-head">
     <div><div class="ext-title">${esc(s.subject)}</div><div class="ext-sub">${esc(s.course_role)}</div></div>
     <div class="ext-tag">확장 설계</div>
   </div>
   <div class="dual">
     <div class="mini-box"><div class="mini-label">현재 강점</div><div class="mini-body">${esc(s.current_strength)}</div></div>
     <div class="mini-box"><div class="mini-label">보완 지점</div><div class="mini-body">${esc(s.gap_point)}</div></div>
   </div>
   <div class="line-block"><div class="mini-label">현재 기록 근거</div><ul class="evidence">${ev}</ul></div>
   <div class="line-block"><div class="mini-label">다음 단계 활동</div><div class="activities">${acts}</div></div>
   <div class="line-block"><div class="mini-label">입시 관점</div><div class="mini-body">${esc(s.admission_view)}</div></div>
 </section>`;
}
fetch('./record_detail_extension.json',{cache:'no-store'})
 .then(r=>r.json())
 .then(data=>{
   const st=data.students[0];
   const plan=st.selected_subjects_plan;
   document.getElementById('heroTitle').textContent=`${st.student_name} (shstudy04)`;
   document.getElementById('school').textContent=st.school_name;
   document.getElementById('track').textContent=st.track;
   document.getElementById('secondary').textContent=plan.secondary_track;
   document.getElementById('subjects').innerHTML=(st.selected_subjects||[]).map(v=>`<span class="chip">${esc(v)}</span>`).join('');
   document.getElementById('cards').innerHTML=(plan.selection_subjects||[]).map(makeCard).join('');
 });
</script>
</body>
</html>
