<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>확장 활동 보기</title>
  <style>
    :root{
      --bg:#f5f7fb; --card:#ffffff; --ink:#19202a; --muted:#5b6675; --line:#e5e9f2;
      --blue:#eaf2ff; --blue2:#3b82f6; --green:#ecfdf3; --green2:#16a34a;
      --violet:#f3e8ff; --violet2:#7c3aed; --amber:#fff7ed; --amber2:#ea580c;
      --shadow:0 10px 30px rgba(15,23,42,.06);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.65 -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif}
    .wrap{max-width:1180px;margin:0 auto;padding:24px}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap}
    .title{font-size:28px;font-weight:800;letter-spacing:-.02em}
    .sub{color:var(--muted);font-size:14px}
    .studentbox{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px}
    .studentgrid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:12px}
    .label{font-size:12px;color:var(--muted);margin-bottom:4px}
    .value{font-weight:700}
    .overview{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
    .overview .card{padding:16px 18px;border-radius:18px;border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow)}
    .overview .card h3{margin:0 0 8px;font-size:14px}
    .overview .card p{margin:0;color:var(--muted)}
    .subjects{display:grid;gap:18px}
    .subject{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .subject-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
    .subject-title{font-size:22px;font-weight:800;letter-spacing:-.02em}
    .role{display:inline-block;margin-top:6px;padding:6px 10px;border-radius:999px;background:var(--blue);color:var(--blue2);font-weight:700;font-size:12px}
    .cols{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;padding:18px}
    .stack{display:grid;gap:14px}
    .box{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}
    .box h4{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
    .box p{margin:0;color:#243041}
    .box ul{margin:0;padding-left:18px;color:#243041}
    .box li+li{margin-top:6px}
    .tone-blue{background:linear-gradient(180deg,#fff, #f8fbff)}
    .tone-green{background:linear-gradient(180deg,#fff, #f7fcf8)}
    .tone-violet{background:linear-gradient(180deg,#fff, #fbf8ff)}
    .tone-amber{background:linear-gradient(180deg,#fff, #fffaf5)}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{padding:6px 10px;border-radius:999px;background:#f2f4f8;border:1px solid var(--line);font-size:12px;font-weight:700;color:#334155}
    .mini{font-size:13px;color:var(--muted)}
    .divider{height:1px;background:var(--line);margin:10px 0}
    .footer-note{margin-top:18px;padding:16px 18px;background:#fff;border:1px solid var(--line);border-radius:18px;color:var(--muted)}
    .empty{padding:32px 18px;text-align:center;color:var(--muted)}
    @media (max-width: 900px){
      .studentgrid,.overview,.cols{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">확장 활동 보기</div>
        <div class="sub">전문 설계형 버전 · 연결 페이지는 출발점, 이 페이지는 설계와 구조를 담당</div>
      </div>
    </div>

    <div id="studentBox" class="studentbox"></div>
    <div id="overview" class="overview"></div>
    <div id="subjects" class="subjects"></div>

    <div class="footer-note">
      이 페이지는 학생을 대신 수행시키는 목적이 아니라, 현재 기록을 바탕으로 어떤 방식의 설계가 자연스러운지 구조적으로 보여주는 용도입니다.
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const targetId = qs.get('student_id') || 'shstudy04';

    function h(v=''){ return String(v)
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'",'&#39;'); }

    async function loadJson(path){
      const res = await fetch(path, { cache:'no-store' });
      if(!res.ok) throw new Error(path + ' 로딩 실패');
      return res.json();
    }

    function toStudentsArray(data){
      if(Array.isArray(data?.students)) return data.students;
      if(data && typeof data === 'object'){
        return Object.values(data).filter(v => v && typeof v === 'object' && (v.student_id || v.id));
      }
      return [];
    }

    function chipList(arr){
      const list = Array.isArray(arr) ? arr.filter(Boolean) : [];
      if(!list.length) return '<div class="mini">없음</div>';
      return `<div class="chips">${list.map(v=>`<span class="chip">${h(v)}</span>`).join('')}</div>`;
    }

    function listHtml(arr){
      const list = Array.isArray(arr) ? arr.filter(Boolean) : [];
      if(!list.length) return '<div class="mini">정보 없음</div>';
      return `<ul>${list.map(v=>`<li>${h(v)}</li>`).join('')}</ul>`;
    }

    function textOrMini(v){ return v ? `<p>${h(v)}</p>` : '<div class="mini">정보 없음</div>'; }

    function renderStudent(student, extStudent){
      const selected = extStudent?.selected_subjects || student?.selected_subjects || [];
      const plan = extStudent?.selected_subjects_plan || {};
      document.getElementById('studentBox').innerHTML = `
        <div class="studentgrid">
          <div>
            <div class="label">학생</div>
            <div class="value">${h(student?.student_name || student?.name || student?.student_id || targetId)}</div>
          </div>
          <div>
            <div class="label">통합 방향</div>
            <div class="value">${h(plan.integrated_direction || student?.track || '미설정')}</div>
          </div>
          <div>
            <div class="label">보조 축</div>
            <div class="value">${h(plan.secondary_track || student?.sub_track || '미설정')}</div>
          </div>
        </div>
      `;

      document.getElementById('overview').innerHTML = `
        <div class="card">
          <h3>선택 과목</h3>
          ${chipList(selected)}
        </div>
        <div class="card">
          <h3>설계 메모</h3>
          <p>${h(plan.selection_design_note || '현재 기록과 선택 과목의 연결 방향을 기반으로 설계')}</p>
        </div>
        <div class="card">
          <h3>이 페이지의 역할</h3>
          <p>연결 페이지가 “어디서 시작할지”를 보여준다면, 이 페이지는 “그 시작을 어떻게 구조화할지”를 보여줍니다.</p>
        </div>
      `;
    }

    function renderSubjectCard(s){
      const textbook = s.textbook_connection || {};
      const output = s.output_structure || {};
      return `
        <section class="subject">
          <div class="subject-head">
            <div>
              <div class="subject-title">${h(s.subject || '과목')}</div>
              <div class="role">${h(s.course_role || '확장 설계 과목')}</div>
            </div>
          </div>

          <div class="cols">
            <div class="stack">
              <div class="box tone-blue">
                <h4>현재 강점</h4>
                ${textOrMini(s.current_strength)}
              </div>

              <div class="box tone-amber">
                <h4>보완 관점</h4>
                ${textOrMini(s.gap_point)}
              </div>

              <div class="box tone-violet">
                <h4>현재 기록 근거</h4>
                ${listHtml(s.current_evidence)}
              </div>

              <div class="box tone-green">
                <h4>교과서 연결 근거</h4>
                <div class="mini" style="margin-bottom:8px">관련 단원</div>
                ${chipList(textbook.related_units)}
                <div class="divider"></div>
                <div class="mini" style="margin-bottom:8px">핵심 개념</div>
                ${chipList(textbook.core_concepts)}
                <div class="divider"></div>
                ${textOrMini(textbook.concept_link)}
              </div>

              <div class="box tone-blue">
                <h4>확장 가능 방향</h4>
                ${listHtml(s.expansion_directions || s.expansion || [])}
              </div>

              <div class="box tone-amber">
                <h4>세부 실행 설계</h4>
                ${listHtml(s.execution_design || [])}
              </div>
            </div>

            <div class="stack">
              <div class="box tone-violet">
                <h4>탐구 질문</h4>
                ${listHtml(s.inquiry_questions || [])}
              </div>

              <div class="box tone-green">
                <h4>보고서/발표 구조</h4>
                <div class="mini" style="margin-bottom:8px">권장 형식</div>
                ${chipList(output.formats)}
                <div class="divider"></div>
                ${listHtml(output.steps)}
              </div>

              <div class="box tone-blue">
                <h4>학교 안에서 작동 가능한 장면</h4>
                ${listHtml(s.school_scene || [])}
              </div>

              <div class="box tone-amber">
                <h4>학생부에서 읽힐 수 있는 포인트</h4>
                ${listHtml(s.record_point || [])}
              </div>

              <div class="box tone-violet">
                <h4>평가상 해석 포인트</h4>
                ${textOrMini(s.admission_point || s.admission_view)}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    (async function init(){
      try {
        const ext = await loadJson('./record_detail_extension.json');
        const students = toStudentsArray(ext);
        const extStudent = students.find(s => (s.student_id || s.id) === targetId) || {};
        renderStudent(extStudent, extStudent);

        const plan = extStudent?.selected_subjects_plan || {};
        const subjects = Array.isArray(plan.selection_subjects) ? plan.selection_subjects : [];
        const root = document.getElementById('subjects');
        if(!subjects.length){
          root.innerHTML = '<div class="subject"><div class="empty">표시할 확장 설계 과목이 없습니다.</div></div>';
          return;
        }
        root.innerHTML = subjects.map(renderSubjectCard).join('');
      } catch(err){
        document.getElementById('subjects').innerHTML = `<div class="subject"><div class="empty">오류: ${h(err.message)}</div></div>`;
      }
    })();
  </script>
</body>
</html>
