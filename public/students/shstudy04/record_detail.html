<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>record_detail_shstudy04</title>
<style>
:root{--bg:#f8fbff;--card:#fff;--line:#dfe8f4;--text:#122033;--sub:#607286;--blue:#eef5ff;--warm:#fff8ee;--green:#f2fbf4;--shadow:0 10px 28px rgba(28,54,90,.08);--radius:20px}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1440px;margin:0 auto;padding:24px 18px 48px}.hero,.panel,.section,.subject-card,.soft-box,.judge-card,.block{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:24px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:34px}.sub{color:var(--sub);line-height:1.75}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.nav a{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--text);font-weight:900}.nav a.active{background:#111;color:#fff;border-color:#111}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}.panel{padding:18px;position:sticky;top:16px}.panel-title{font-size:20px;font-weight:900;margin:0 0 12px}
.info-box{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.info-box+.info-box{margin-top:12px}.label{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:5px}.value{font-weight:800;line-height:1.75}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:var(--blue);border:1px solid #d6e6ff;font-size:12px;font-weight:900}
.stack{display:grid;gap:16px}.section{padding:20px}.section-title{font-size:24px;font-weight:900;margin:0 0 12px}.summary-list{display:grid;gap:10px}.summary-item{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fbfdff;line-height:1.8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}.soft-box,.block,.judge-card{padding:16px}
.soft-box.blue{background:var(--blue)}.soft-box.warm{background:var(--warm)}.soft-box.green{background:var(--green)}
.judge-card.blue{background:linear-gradient(180deg,#f8fbff,#edf5ff)}.judge-card.warm{background:linear-gradient(180deg,#fffaf4,#fff4e8)}.judge-card.green{background:linear-gradient(180deg,#f8fdf9,#eefaf1)}
.mini-title{font-size:12px;color:var(--sub);font-weight:900;margin-bottom:6px}.mini-body{line-height:1.8}
.top-tools{display:flex;gap:10px;flex-wrap:wrap}.tool-btn,.toggle-btn{display:inline-block;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--text);font-weight:900;cursor:pointer}.toggle-btn.active{background:#111;color:#fff;border-color:#111}
.acc-wrap{display:grid;gap:14px}.subject-card{overflow:hidden}.acc-head{width:100%;border:0;background:#fff;text-align:left;padding:20px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.subject-name{font-size:26px;font-weight:900;line-height:1.3}.subject-sub{margin-top:8px;color:#334155;line-height:1.75}.subject-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.subject-badge{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:900}
.acc-arrow{font-size:22px;font-weight:900;color:#466}.acc-body{display:none;padding:0 20px 20px;border-top:1px solid #edf1f6}.subject-card.open .acc-body{display:block}
.axis-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.axis-item{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fbfdff}.axis-title{font-weight:900;margin-bottom:6px}.axis-body{line-height:1.75}
.flow-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.flow-card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfdff}.flow-kicker{font-size:12px;color:var(--sub);font-weight:900}.flow-title{font-size:17px;font-weight:900;margin:8px 0 6px}.flow-body{line-height:1.75}
.list{margin:0;padding-left:18px;line-height:1.8}.empty{border:1px dashed var(--line);border-radius:14px;padding:14px;color:var(--sub);background:#fff}
@media (max-width:1000px){.layout{grid-template-columns:1fr}.panel{position:static}.grid2,.grid3,.axis-grid,.flow-grid{grid-template-columns:1fr}.hero h1{font-size:28px}.subject-name{font-size:22px}}
</style></head><body><div class="wrap">
<section class="hero"><h1 id="heroName">생활기록부 분석</h1><div class="sub">생활기록부 전체 해석과 과목별 근거를 정리한 기본 화면입니다.</div><div class="nav"><a class="active">생활기록부 분석</a><a id="goMapping" href="./record_detail_mapping.html">생활기록부 연결</a><a id="goExtension" href="./record_detail_extension.html">확장 활동 보기</a><a id="goCreative" href="./record_creative.html">창의체험활동 분석</a><a id="goRaw" href="./record_detail_raw.html">생활기록부 원문</a></div></section>
<div class="layout"><aside class="panel"><h2 class="panel-title">상담 요약</h2><div class="info-box"><div class="label">학교</div><div class="value" id="schoolBox">-</div></div><div class="info-box"><div class="label">트랙</div><div class="value" id="trackBox">-</div></div><div class="info-box"><div class="label">확장 선택과목</div><div class="chips" id="subjectChips"></div></div><div class="info-box"><div class="label">학년 선택</div><div class="top-tools" id="yearToggles"></div></div></aside>
<main class="stack"><section class="section"><h2 class="section-title">생활기록부 핵심 진단</h2><div class="sub" id="diagOneLine" style="margin-bottom:14px"></div><div class="summary-list" id="diagSummary"></div></section>
<section class="section"><h2 class="section-title">생기부 구조와 연결성</h2><div class="grid2"><div class="soft-box blue"><div class="mini-title">교과별 반복 수행 방식</div><div class="mini-body" id="linkPattern"></div></div><div class="soft-box warm"><div class="mini-title">학생부의 중심 축</div><div class="mini-body" id="linkAxis"></div></div></div><div class="soft-box green" style="margin-top:16px"><div class="mini-title">구성 해석</div><div class="mini-body" id="linkMeaning"></div></div></section>
<section class="section"><h2 class="section-title">데이터 분석 결과</h2><div class="grid3"><div class="judge-card blue"><div class="mini-title">강점</div><div class="mini-body" id="evalStrength"></div></div><div class="judge-card warm"><div class="mini-title">한계</div><div class="mini-body" id="evalLimit"></div></div><div class="judge-card green"><div class="mini-title">종합 판단</div><div class="mini-body" id="evalOverall"></div></div></div></section>
<section class="section"><div class="section-title">과목별 근거 카드</div><div class="top-tools" style="margin-top:12px"><button class="tool-btn" id="openAllBtn" type="button">전체 펼치기</button><button class="tool-btn" id="closeAllBtn" type="button">전체 접기</button></div></section><div class="acc-wrap" id="accWrap"></div></main></div></div>
<script>
const qs=new URLSearchParams(location.search); const targetId=qs.get('student_id')||'shstudy04'; let currentYear=Math.max(0, Number(qs.get('year_idx')||'0')||0);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]))}
function t(s){return String(s??'').trim();}
async function loadData(){const r=await fetch('./record_detail.json?v='+Date.now(),{cache:'no-store'}); return r.json();}
function pickStudent(data){const arr=Array.isArray(data?.students)?data.students:[]; return arr.find(s=>String(s.student_id||s.id||'')===targetId)||arr[0]||null;}
function setNav(){document.getElementById('goMapping').href=`./record_detail_mapping.html?student_id=${encodeURIComponent(targetId)}&year_idx=${currentYear}`; document.getElementById('goExtension').href=`./record_detail_extension.html?student_id=${encodeURIComponent(targetId)}&year_idx=${currentYear}`; document.getElementById('goCreative').href=`./record_creative.html?student_id=${encodeURIComponent(targetId)}`; document.getElementById('goRaw').href=`./record_detail_raw.html?student_id=${encodeURIComponent(targetId)}`;}
function renderOverview(student){document.getElementById('heroName').textContent=`${student.student_name||student.name||''} (${student.student_id||student.id||''})`; document.getElementById('schoolBox').textContent=student.school_name||student.school||'-'; document.getElementById('trackBox').textContent=student.track||'-'; setNav(); const chips=Array.isArray(student.selected_subjects)?student.selected_subjects:[]; document.getElementById('subjectChips').innerHTML=chips.length?chips.map(v=>`<span class="chip">${esc(v)}</span>`).join(''):'<span class="chip">선택과목 없음</span>'; const ri=student.record_interpretation||{}; document.getElementById('diagOneLine').textContent=t(ri.one_line_diagnosis||''); document.getElementById('diagSummary').innerHTML=(ri.core_summary||[]).map(v=>`<div class="summary-item">${esc(t(v))}</div>`).join(''); document.getElementById('linkPattern').textContent=t(ri.structure_linkage?.pattern||''); document.getElementById('linkAxis').textContent=t(ri.structure_linkage?.axis||''); document.getElementById('linkMeaning').textContent=t(ri.structure_linkage?.meaning||''); document.getElementById('evalStrength').textContent=t(ri.evaluation_meaning?.strength||''); document.getElementById('evalLimit').textContent=t(ri.evaluation_meaning?.limit||''); document.getElementById('evalOverall').textContent=t(ri.evaluation_meaning?.overall||'');}
function renderYearToggles(student){const years=Array.isArray(student.years)?student.years:[]; const wrap=document.getElementById('yearToggles'); wrap.innerHTML=years.map((y,i)=>`<button class="toggle-btn ${i===currentYear?'active':''}" data-idx="${i}">${esc(y.year||y.year_label||`학년 ${i+1}`)}</button>`).join(''); wrap.querySelectorAll('[data-idx]').forEach(btn=>btn.addEventListener('click',()=>{currentYear=Number(btn.dataset.idx||0); history.replaceState(null,'',`?student_id=${encodeURIComponent(targetId)}&year_idx=${currentYear}`); renderOverview(student); renderYearToggles(student); renderSubjects(student);}));}
function axisHtml(list){list=Array.isArray(list)?list:[]; return list.length?list.map(a=>`<div class="axis-item"><div class="axis-title">${esc(a.title||'')}</div><div class="axis-body">${esc(t(a.content||''))}</div></div>`).join(''):'<div class="empty">데이터 없음</div>';}
function flowHtml(list){list=Array.isArray(list)?list:[]; return list.length?list.map(f=>`<div class="flow-card"><div class="flow-kicker">${esc(f.kicker||'')}</div><div class="flow-title">${esc(f.title||'')}</div><div class="flow-body">${esc(t(f.body||f.description||''))}</div></div>`).join(''):'<div class="empty">데이터 없음</div>';}
function renderSubjects(student){const years=Array.isArray(student.years)?student.years:[]; const year=years[currentYear]||years[0]||{}; const subjects=(Array.isArray(year.subjects)?[...year.subjects]:[]).sort((a,b)=>(a.display_order||999)-(b.display_order||999)); const wrap=document.getElementById('accWrap'); wrap.innerHTML=subjects.map((subj,idx)=>{const ef=subj.evidence_first||{}, jb=subj.judgment_block||{}; const evalList=(subj.evaluation_priority||[]).map(v=>`<li>${esc(t(v))}</li>`).join('')||'<li>데이터 없음</li>'; const framework=Array.isArray(subj.activity_framework)?subj.activity_framework:[]; return `<section class="subject-card ${idx===0?'open':''}"><button class="acc-head" type="button"><div style="flex:1"><div class="subject-name">${esc(subj.subject||subj.subject_name||'')}</div><div class="subject-sub">${esc(t(subj.summary||ef.evidence_summary||''))}</div>${framework.length?`<div class="subject-meta">${framework.map(v=>`<span class="subject-badge">${esc(v)}</span>`).join('')}</div>`:''}</div><div class="acc-arrow">${idx===0?'−':'+'}</div></button><div class="acc-body"><div class="grid2"><div class="soft-box blue"><div class="mini-title">교과 목표</div><div class="mini-body">${esc(t(subj.subject_goal_focus||''))}</div></div><div class="soft-box warm"><div class="mini-title">현재 활동 기반</div><div class="mini-body">${esc(t(subj.current_activity_basis||''))}</div></div></div><div class="block" style="margin-top:14px"><div class="mini-title">평가 우선순위</div><ul class="list">${evalList}</ul></div><div class="grid3" style="margin-top:14px"><div class="judge-card blue"><div class="mini-title">입학사정관 시각</div><div class="mini-body">${esc(t(jb.admission_officer_view||''))}</div></div><div class="judge-card warm"><div class="mini-title">기록 판단</div><div class="mini-body">${esc(t(jb.record_judgment||''))}</div></div><div class="judge-card green"><div class="mini-title">구조 해석</div><div class="mini-body">${esc(t(jb.structure_interpretation||''))}</div></div></div><div class="grid2" style="margin-top:14px"><div class="soft-box blue"><div class="mini-title">근거 중심 해석</div><div class="mini-body">${esc(t(ef.interpretation||''))}</div></div><div class="soft-box green"><div class="mini-title">다음 보완</div><div class="mini-body">${esc(t(ef.next_improvement||''))}</div></div></div><div class="block" style="margin-top:14px"><div class="mini-title">핵심 축</div><div class="axis-grid">${axisHtml(subj.axis_list)}</div></div><div class="block" style="margin-top:14px"><div class="mini-title">탐구 흐름</div><div class="flow-grid">${flowHtml(subj.inquiry_flow)}</div></div></div></section>`;}).join(''); wrap.querySelectorAll('.subject-card').forEach(card=>card.querySelector('.acc-head').addEventListener('click',()=>{const open=card.classList.toggle('open'); card.querySelector('.acc-arrow').textContent=open?'−':'+';})); document.getElementById('openAllBtn').onclick=()=>wrap.querySelectorAll('.subject-card').forEach(card=>{card.classList.add('open'); card.querySelector('.acc-arrow').textContent='−';}); document.getElementById('closeAllBtn').onclick=()=>wrap.querySelectorAll('.subject-card').forEach(card=>{card.classList.remove('open'); card.querySelector('.acc-arrow').textContent='+';});}
(async function(){const data=await loadData(); const student=pickStudent(data); renderOverview(student); renderYearToggles(student); renderSubjects(student);})();
</script></body></html>
